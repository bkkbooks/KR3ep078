body:
  text: 卷一外感家叔南山於秋間患感日治日劇漸至神昏譫妄肢振動惕施秦兩醫皆謂元虛欲脫議投峻補家慈聞而疑之曰盍與孟英商之孟英診曰無恐也通絡蠲痰可以即愈用石菖蒲羚羊角絲瓜絡冬瓜子苡仁桑枝旋覆橘絡蔥須貝母鉤藤膽星為劑化服萬氏牛黃清心丸一顆覆杯即安調理半月而愈丙申春蜀人石符生將赴鄧云崖司馬之招經杭抱病僑於張柳吟之舊館亦為寓側陳六順治困居停主人知之即告以柳吟僕病之事石聞之悚然亟遣人延孟英診焉脈沉而澀滯模糊不分至數肢涼畏冷涎沫上湧二便澀少神氣不爽曰此途次感風濕之邪失於解散已從熱化加以溫補致氣機愈形窒塞邪熱漫無出路必致爍液成痰逆行而上但與舒展氣機則痰行熱降諸恙自瘳矣以黃連黃芩枳實橘皮梔子淡豉桔梗杏仁貝母鬱金通草紫菀竹茹蘆菔汁等藥三服而起調理匝旬遂愈夏間王某患感越醫謝樹金治之病雖退而能食矣但不能起坐類乎癱瘓延已月餘人皆謂其成廢所親鍾某浼孟英視之曰此多服表散汗出過分氣血兩傷肢骸失其營養脈微而細舌亮無苔與大劑參耆歸朮熟地杜仲菟絲牛膝枸杞山藥木瓜萸肉葳蕤續斷桑枝氣血雙補而補血之藥重於補氣以汗為血液陰分偏傷也數十而起一勞力人陰分素虧驟感風濕兩膝刺痛痠軟此症延久即成鶴膝風不能稍立孟英以六味地黃湯加獨活豆卷精當一劑知二劑已毛允之戌冬患感初治以溫散繼即以滋陰病日以劇延至亥春或疑為百日之癆或謂是傷寒壞證而鳳山僧主升柴耆術以補之丁卯橋用輕粉巴霜以下之雜藥遍投形神日瘁乃尊學周延孟英視之脈來澀數上溢呃忒口膩雖覺嗜飲而水難下膈頻吐涎沫便秘溺赤潮熱往來少腹如烙按之亦不堅滿曰此病原屬冬溫治以表散則津液傷而熱乃熾繼以滋填熱邪愈錮再施溫補氣機更窒升柴耆術欲升其清而反助其逆巴霜輕粉欲降其濁而盡劫其陰病及三月發熱不是表邪便秘旬余結澀非關積滯且脈澀為津液之已傷數是熱邪之留著溢乃氣機為熱邪所壅而不得下行豈非溫邪未去得補而膠固難除徒使其內爍真陰上薰清道以致一身之氣盡失肅清之令法當搜剔餘邪使熱去津存即是培元之道伸其治節俾濁氣下趨乃為宣達之機何必執參茸為補虛指硝黃為通降哉以北沙參紫菀麥冬知母花粉蘭草石斛丹皮黃芩桑葉梔子黃連木通銀花橘皮竹茹蘆根橄欖枇杷葉地慄海䖳等出入為方服之各恙遞減糜粥漸加半月後始得大解而腹熱全消穀食亦安乃與滋陰善後而愈清熱生津治法固善然亦此人本元堅固故屢誤之後猶能挽回否則亦難為力矣莊半霞芝階中翰之三郎也闈後患感日作寒熱七八次神氣昏迷微斑隱隱醫者無策始迎孟英診之曰此平昔飲酒積熱深蘊挾感而發理從清解必誤投溫補以致熱勢披猖若是詢之果三場皆服參且攜棗子浸燒酒入闈初病尚不至此因連服羌防薑桂漸以滋甚孟英曰是矣先以白虎湯三劑斑化而寒熱漸已繼用大苦寒之藥瀉其結熱所下黑矢皆作棗子氣旬日後與甘潤滋濡之法兩月始得全愈陳足甫稟質素弱上年曾經吐血今夏患感之後咳嗽夜熱飲食漸減醫作損治滋陰潛陽久服不效秋杪孟英診之曰陰分誠虛第感後餘熱逗留於肺阻氣機之肅降搏津液以為痰此關不清雖與滋填培補之藥亦焉能飛渡而行其事耶先清肺氣以保胃液俾治節行而灌溉輸然後以甘潤濃厚之法補實真陰始克有濟乃尊仰山聞之擊節歎服如法施之果漸康復晡熱夜熱原有肺熱血瘀二候斷非滋陰所能愈況溫病之後咳嗽夜熱顯為遺邪在肺滋陰藥愈沒幹涉矣棲流所司藥陳芝田於仲夏患感諸醫投以溫散延至旬日神昏譫妄肢搐耳聾舌黑唇焦囊縮溺滴胸口隱隱微斑一望而知其危矣轉邀孟英診之脈細數而促曰陰虧熱熾液將涸矣遂用西洋參元參生地二冬知柏楝實石斛白芍甘草梢銀花木通犀角石菖蒲大劑投之孟英能善用大劑故能起不治之證亦古人所未有也次日復診其家人云七八日來小溲不過涓滴昨藥服六七個時辰後解得小溲半杯孟英曰此即轉機也然陰氣枯竭甘涼濡潤不厭其多於前方再加龜板鱉甲百合花粉大鍋煎之頻灌勿歇如是者八日神氣始清諸恙悉退純用滋陰之藥調治匝月而瘳予謂孟英學識過人熱腸獨具凡遇危險之候從不輕棄最肯出心任怨以圖之如此案八日後神氣始清若經別手縱使治法不錯而一二帖後不甚起色必規避堅辭致病家惑亂謀及道旁雖不死於病亦必死於藥矣此在醫者之識老心堅又須病家之善於擇而任之專也談何易耶且聞孟英嘗云溫熱液涸神昏有投犀角地黃等藥至十餘劑始得神清液復者因溫熱案最夥不暇詳錄姑識此以告司人之命者一派甘寒之藥既可滌熱又以生津真治溫良法也惟濕溫證宜稍加斟酌耳江小香病勢危篤浼人迎孟英診之脈虛弦而小數頭痛偏於左後子夜熱躁肢冷欲嘔口乾不欲飲不飢不欲食舌蹇言澀溺黃而頻曰體屬素虛此由患感時過投溫散陰津陽氣皆傷後來進補而勢反日劇者滋膩妨其中運剛烈動其內風知此二語方可論藥以致醫者僉雲表之不應補亦無功竟成無藥可治之證雖然不過難治耳未可遽棄也與秋石水拌制高麗參蓯蓉首烏生白芍牡蠣楝實鹽水炒橘紅桑椹石斛蒺藜茯苓煎吞飯丸肉桂心五分一劑躁平嘔止各恙皆減連投數服粥食漸安乃去首烏桂楝加砂仁末拌炒熟地菊花枸杞半月而瘳從陰引陽從陽引陰絕妙機軸石誦義夏杪患感多醫廣藥病勢日增延逾一月始請孟英診焉脈至右寸關滑數上溢左手弦數耳聾口苦熱甚於夜胸次迷悶頻吐黏沫啜飲咽喉阻塞便溏溺赤間有譫語曰此暑熱始終在肺並不傳經一劑白虎湯可愈者何以久延至此也乃尊北涯出前所服方見示孟英一一閱之惟初診顧聽泉用清解肺衛法為不謬耳其餘溫散升提滋陰涼血各有來歷皆費心思原是好方惜未中病而北涯因其溏泄見孟英君石膏以為治不敢與服次日復診自陳昨藥未投惟求另施妥法孟英曰我法最妥而君以為未妥者為石膏之性寒耳第藥以對病為妥此病舍此法別無再妥之方若必以模稜迎合為妥恐賢郎之病不妥矣北涯聞而感悟頗有姑且服之之意而病者偶索方一看見首列石膏即曰我胸中但覺一團冷氣湯水皆須熱呷此藥安可投乎堅不肯服然素仰孟英手眼越日仍延過診且告之故孟英曰吾於是證正欲發明夫邪在肺經清肅之令不行津液凝滯結成涎沫盤踞胸中升降之機亦窒大氣僅能旁趨而轉旋是一團涎沫之中為氣機所不能流行之地其覺冷也不亦宜乎且予初診時即斷為不傳經之候所以尚有今日而能自覺胸中之冷若傳入心包則舌黑神昏才合吳古年之犀角地黃矣然雖不傳經延之逾月熱愈久而液愈涸藥愈亂而病愈深切勿以白虎為不妥急急投之為妙於是有敢服之心矣而又有人云曾目擊所親某石膏甫下咽而命亦隨之況月餘之病耳聾泄瀉正氣已虧究宜慎用北涯聞之惶惑仍不敢投乃約翼日廣徵名士會商可否比孟英往診而群賢畢至且見北涯求神拜佛意亂心慌殊可憐憫欲與眾商榷恐轉生掣肘以誤其病遂不遑謙讓援筆立案云病既久延藥無小效主人之方寸亂矣予三疏白虎而不用今仍赴招診視者欲求其病之愈也夫有是病則有是藥諸君不必各抒高見希原自用之愚古云鼻塞治心耳聾治肺肺移熱於大腸則為腸澼是皆白虎之專司何必拘少陽而疑虛寒哉放膽服之勿再因循致貽伊戚也坐中顧聽泉見案即謂北涯曰孟英腸熱膽堅極堪倚賴如猶不信我輩別無善法也顧友梅許芷卿趙笛樓亦皆謂是疏方以白虎加西洋參貝母花粉黃芩紫菀杏仁冬瓜仁枇杷葉竹葉竹茹竹黃而一劑甫投咽喉即利三服後各恙皆去糜粥漸安乃改甘潤生津調理而愈予謂此案不僅治法可傳其闡發病情處識見直超古人之上論亦根柢喻氏而更加明透姚雪蕉孝廉之太夫人年逾花甲患感兩月醫皆束手始延孟英診之身已不能轉側水飲難於下咽聲音不出便溺不通曰此熱邪逗留不去津液剝削殆盡計其受病之時正當酷暑豈即溫補是投但知其虛而不知其病耶閱前服諸方惟初手顧聽泉從吸受暑邪輕清開上立治為合法耳余方非不是起死回生之藥其如與病無涉何而阮某小柴胡方服之最多蓋醫者執此和解之法謂不犯汗吐下三者之險豈不穩當病家見其參胡並用謂補正祛邪具一舉兩全之美最為上策孰知和解足少陽傳經傷寒之劑不可以概和各經各氣之各病徒使參胡升提熱邪以上逆致一身之治節無以清肅下行而薑棗溫膩濕濁於中焦致運化之樞機失其灌溉之布氣機愈窒津液愈干和解之湯愈進而氣愈不和病愈不解今則雖有良治而咽喉僅容點滴氣結津枯至於此極英雄無用武之地矣雪蕉昆季力懇挽救乃疏甘涼清潤之方囑其不限時刻不計多寡頻以水匙挑入使其漸滲下喉而一日之間僅灌一小杯許其病勢之危於此可想直灌至旬余氣機始漸流行藥可服小半劑矣人見轉機之難不無議論旁生賴孟英鎮靜不搖乃得日以向愈粥食漸加惟大解久不行或以為憂孟英曰無恐也水到渠成穀食安而津液充則自解矣若欲速妄攻則久不納穀之胃尚有何物以供其盪滌哉至九月下旬始有欲解之勢孟英連與補氣益血之藥尚不能下於前方加蜣螂一對熱服即解凡不更衣者計及五十日矣聞者莫不驚異繼以平補善後而痊金寬甫初冬患感局醫黃某聞其向來不拘何病總須溫藥而痊胸懷成見進以薑桂之方漸至足冷麵赤譫語煩躁疑為戴陽而束手矣舉家彷徨延孟英診焉曰此伏邪晚發誤與升提熱浮於上清解可安寬甫猶以向不服涼藥為疑方中芩連之類堅不肯用乃兄願谷中翰極力開導督人煎而飲之果得霍然石芷卿患感張某連投柴葛藥熱果漸退而復熱之後勢更孔甚乃延孟英診焉先以梔豉芩連等藥清解其升浮之熱俟邪歸於府脈來弦滑而實徑用承氣湯下之時其尊人北涯赴甌無人敢主其可服否也另招他醫決之以為太峻且腹不堅滿妄攻慮變舉家聞之搖惑暮夜復懇再診孟英辨論洋洋堅主前議服後果下黑矢次日大熱大汗大渴引飲孟英曰此府垢行而經熱始顯與竹葉石膏湯二劑而安繼以育陰充液調理而康孫某患感醫投溫散竟無汗泄延至十一日始請孟英視之業已神昏囊縮面赤舌絳目不識人口不出聲胸膈微斑便瀉而小溲不行者已三日醫皆束手或議大投溫補以冀轉機溫病已至神昏尚議溫補真盲論也孟英急止之曰陰分素虧而溫散劫津邪熱愈熾則營衛不行豈可妄云漏底欲以溫燥竭其欲絕之陰乎曩浦上林先生治予先君之病云泄瀉為熱邪之出路求之不可得者胡可止也以西洋參生地麥冬丹皮連翹生芍石菖蒲鹽水炒黃連甘草梢百合茯苓貝母銀花紫菀為方一劑即周身微汗而斑退三劑始得小溲一杯而識人四劑乃得大汗而身熱退面赤去莖亦舒復解小溲二杯次日於方中減連翹菖蒲丹皮黃連加知母葳蕤竹葉投之舌始潤神始清知渴索水孟英令將蔗梨等榨汁頻灌不歇其汗如雨下者三晝夜始休於是粥漸進瀉漸止溲漸長前方又去貝母銀花紫菀加石斛龍眼肉服之全愈周子朝患惡寒頭痛發熱酷似傷寒而兼心下疼脹孟英脈之右部沉滑苔黃不渴溲如蘇木汁先以蔥豉湯先解表加梔連杏貝蔞橘為方服後微汗而不惡寒反惡熱雖湯飲略溫即氣逆欲死孟英曰客邪解矣清其痰熱可也與知母花粉杏貝旋滑斛橘杷茹茅根蘆根地慄海䖳等藥後清裡果吐膠痰甚多而納食漸復惟動則欲喘於肅上之中佐以滋下為善其後而瘥顧竹如孝廉令嬡患感十餘日耳聾不語昏不識人而客未入室彼反先知熱極而神外越醫以為祟凡犀角地黃牛黃清心復脈等湯遍服無效藥不誤特病重藥輕耳已摒擋後事矣所親濮根厓囑其延診於孟英脈至滑數舌不能伸苔色黃膩遺溺便秘目不交睫者已四晝夜下證已悉備胸腹按之不柔與白虎湯去米草加石菖蒲元參犀角鱉甲花粉杏仁竹葉竹黃竹瀝投一劑即譫語滔滔渠父母疑藥不對病孟英曰不語者欲其語是轉機也再投之大渴而喜極熱之飲又疑涼藥非宜孟英姑應之曰再服一劑更方可也三投之痰果漸吐四劑後舌伸便下神識漸清乃去菖蒲石膏犀角鱉甲加生地石斛麥冬貝母數帖溫病後陰必耗竭宜急救其陰轉方甚合法熱盡退而痰味甚咸又去杏貝竹黃加西洋參牡蠣龜板蓯蓉服之全愈逾年失怙繼遭祝融郁損情懷誤投溫補至戊申年殞葉氏云溫邪中人首先犯肺其次則入心正此病也雖不用下劑而通經透絡之品大劑用之亦足以盪滌邪穢孟英案續編系張柳吟所輯批語不知誰氏手筆於此案便秘目不交睫胸腹按之不柔各證謂系陽明應下之證於孟英治法深露不滿之意其實此證是熱閉心包與陽明譫語大不相同陽明證斷不能投厥陰劑厥陰證斷不能投陽明劑一主硝黃盪滌一主犀角開透誤投皆有弊害近人陸九芝所著世補齋醫書專重陽明不識厥陰心包絡大攻葉天士逆傳心包之說凡治譫語悉用硝黃偏信之者操刀以割不免自誤誤人士諤臨證以來所治熱病不下百數十覺陽明與厥陰大有判別厥陰心包之譫語是昏不識人雖喚之不醒也此是神明已蔽之鐵證陽明之譫語呼之即醒呼過仍譫語如舊足徵神明未盡蔽也此案腹滿雖似陽明證而胸滿則非全屬陽明也孟英方以開痰透邪為主真是能手不可非也陸士諤識姚小蘅太史令侄女初秋患寒熱而汛適至醫用正氣散兩帖遂壯熱狂煩目赤譫語甚至欲刎欲縊勢不可制孟英按脈洪滑且數苔色干黃尖絳脘悶腹脹拒按畏明口渴氣逆痰多與桃仁承氣湯加犀角石膏知母花粉竹瀝甘菊人謂熱雖熾而汛尚行何必大破其血而又加以極寒之藥哉孟英曰叟勿過慮恐一二劑尚不足以濟事果服兩大劑始得大便而神清苔化目赤亦退改用甘寒以清之繼而又不更衣即脈滑苔黃而腹脹更與小承氣湯二帖便行而各恙遄已數日後又如此仍投小承氣湯二帖凡前後六投下劑才得波浪不興漸以清養而瘳季秋適江右上高令孫明府之子沛堂為室顧奏云季秋患感醫作虛治補及旬日舌卷痙厥腰以下不能略動危在須臾所親石誦羲延孟英設死裡求生之策察脈虛促欲絕先灌紫雪一錢隨溉犀角地黃湯二大劑服下厥雖止而舌齶滿黑目赤如鳩仍用前湯三日間計服犀角兩許黑苔漸退神識乃清而呃忒頻作人猶疑其虛也孟英曰營熱雖解氣道未肅耳以犀角元參石花連翹銀花竹茹知母花粉貝母竹葉為方服之次日即下黑韌矢甚多而呃忒止又三劑連解膠黑矢四次舌色始潤略進米飲腿能稍動然臀已磨穿也與甘潤育陰藥續解黑矢又五次便溺之色始正投以滋養日漸向安己酉舉於鄉其弟翰云患左胯間腫硬而疼暮熱溺赤舌絳而渴孟英按脈細數陰虛血熱徑用西洋參生地麥冬楝實知母花粉銀花連翹甘草黃柏等藥服旬余而愈許自堂令孫子社患感延至秋杪證交二十八日諸醫束手渠伯母鮑玉士夫人薦孟英診之左部數右手儼若魚翔痰嗽氣促自汗瘛瘲苔色灰厚渴無一息之停垂危若是而皓首之祖孀母少妻相依為命環乞拯救甚可憫也孟英曰據脈莫能下手吾且竭力勉圖第恐一齊眾楚信任不堅則絕無可望之機矣其母長跽而言曰唯君所命雖砒鴆勿疑也於是先以竹葉石膏湯加減至五劑氣平嗽減汗亦漸收苔色轉黑舌尖露絳改投元參生地犀角石膏知母花粉竹葉銀花等藥又五劑瘛瘲漸減舌絳漸退彼婦翁召羽士為之拜斗飛符噀水鼓樂喧闐病者即譫妄不安神昏如醉羽士反為嚇退夤夜速孟英視之與紫雪錢余神即清爽仍用前方重加竹瀝服八劑始解黑如膠漆之大便而黑苔漸退右脈之至數始清惟煩渴不減令其恣啖北梨舌才不燥痰出亦多又六劑舌色乃淡溲出管痛熱邪得從下行矣凡十二日之間共服大劑寒涼已二十四帖計用犀角三兩有奇而險浪始平續以前法緩制服六劑又解黑矢五次手足始為己有又五劑筋絡之振惕始定略能側臥囈語乃息漸進稀糜繼灌甘潤充其胃汁七八劑後渴止知飢脈皆和緩又浹旬穀食乃復又旬余便溺之色始正前後共下黑矢四十餘次苔色亦淨授滋填善後而康是役也凡同道暨許之族人戚友莫不以為秋冬之交用藥偏寒況病延已久敗象畢呈苟不即投峻補必致失手既聞鮑夫人云歸許氏二十餘年目擊多人無不死於溫補此等病曾見之此等藥蓋未嘗聞也孰知如此之證有如此之治求之古案亦未前聞傳諸後賢亦難追步蓋學識可造而腸熱膽堅非人力所能及此孟英所以為不世出之良醫也段春木秋杪患發熱外感溫邪而腰腿痛如刀割真陰內損孟英視之略不紅腫脈至細數熱傷少陰苔色黑燥溺赤便黑與西洋參麥冬生地犀角銀花楝實石斛知母甘草竹瀝蔗汁為大劑投之熱漸退痛漸已惟舌絳無津陰虧也仍與甘涼濡潤為方數日後忽舌絳倍加燥及咽膈水飲不能下咽孟英曰真陰涸竭藥難奏績矣然竊疑其何以小愈之後驟爾陰枯或者背予而服別藥乎繼其契友來詢云段死而舌出此曷故與孟英聞之爽然大悟因擷傷寒女勞復之文示之其人頓足云良然彼於小愈後曾宿於外次日歸即轉劇苟直陳不諱或尚可治孟英曰未必然也燒褌散鼠矢湯皆從足少陰以逐邪不過熱邪襲入此經所謂陰陽易是也今少腹無絞痛之苦原非他人之病易於我真是女勞之復以致真陰枯涸更將何藥以驟復其真陰哉然從此而女勞復與陰陽易一虛一實有定論不致混同而談治矣吳醞香孝廉三令嬡患感諸醫首以升散繼進溫補至三月下旬證交三十五日昏痙譫語六晝夜不交睫旬日不沾米飲許芷卿視之儼似養雲室證即拉孟英暨顧聽泉趙笛樓會診脈弦滑而微數齒不能開窺其舌縮苔垢孟英曰尖雖卷色猶紅潤且二便不秘尚有一線生機未絕也揆其受病原不甚重只因謬治逾月誤藥釀成大證勢雖危險吾儕當竭力援之第勿再犯一味悖藥事或有濟醞香頗極信從孟英復詢其服事婢媼曰病已逾月腰以下得毋有磨壞之虞乎皆曰無之惟數日前易其所遺略有血漬必月事之不愆也孟英頗疑之囑其再易之時留心細察疏方以犀角四錢石菖蒲二錢貝母二兩整塊硃砂兩許硃砂不宜入煎劑竹瀝碗許佐以竹葉竹黃竹茹知母花粉元參旋覆絲瓜絡葦莖銀花鱉甲調下紫雪丹次日諸君復會渠母徐夫人即云王君明視隔垣小女腰下果已磨穿糜潰如柈婢媼輩粗忽竟未之知也昨藥服後證亦少減孟英仍主原方四服後夜始眠痙才息舌甫伸苔仍黑孟英於前方去鱉甲硃砂菖蒲加生地梔子數服後苔轉黃大便黑如膠漆且有痰色蓋從前大解黃色似乎無甚大熱不知熱由補藥所釀滯於腸胃曲折之地而不能下行勢必薰蒸於上致有內陷入臟之逆也黑矢下而神氣漸清餘熱復從氣分而達痰嗽不爽右脈滑搏孟英主用竹葉石膏湯加減四劑漸安而外患痛楚徹夜呻吟雖敷以珠黃滋以甘潤未能向愈孟英令以大蟾蜍治淨煮湯煎育陰充液之藥服之果痛止肌生眠食漸進汛事如期而瘳冬間適張舟甫之子為室或疑其病雖愈而過餌涼藥恐難受孕迨戊申夏已得子矣吳醞香之僕吳森在越患感旋杭日鼻衄數升苔黃大渴脈滑而洪孟英投白虎湯二帖而安遽食肥甘復發壯熱脘悶昏倦孟英以枳實梔豉湯而瘥數日後又昏沉欲寐發熱自汗舌絳溺澀仍求孟英診之左尺細數而芤右尺洪大是女勞復也研詰之果然與大劑滋陰清熱藥吞豭鼠矢而愈何新之亦儒醫也患感旬日胡士揚診謂勢欲內陷舉家皇皇渠表弟沈悅亭茂才亦工岐黃而心折於孟英因拉視之呃忒苔膩便秘痰多心下拒按持其脈右手洪大滑數與小陷胸加沙參菖貝菀薤茹杏旋杷之劑數帖而安繼以甘涼二旬後得大解而痊何乃執柯為王沈聯姻婭焉陳邠眉令郎孟秋患感醫與表散溫補病隨藥劇至八月初渠叔祖陳靄山延孟英視之目瞪神呆氣喘時作舌絳不語便瀉稀水肢搐而厥人皆以為必死矣察其脈弦而軟數乃陰虧肝盛之質提表助其升逆溫補滯其樞機痰飲轇轕風陽肆橫禱神驅祟有何益哉與鱉甲龍牡旋赭芩連楝貝菖茹膽星犀羚等藥息風鎮逆清熱蠲痰數帖而平龔念匏室故舍人汪小米之女也患秋感服溫散藥而日重渠叔母韓宜人請援於孟英脈見弦數軟滑苔黑肢瘛疏方用沙參元參知母花粉犀羚茹貝梔菖等藥曰亟餌之否將厥也時念匏幕於江南族人皆應試入場侍疾者多母黨伊叔少洪疑藥涼不敢與服迨暮果欲厥矣眾皆皇皇幸彼女兄為故孝廉金訪叔之室頗具卓識急煎孟英方灌之遂得生機次日復診脈較和一路清涼漸以向愈俞博泉令郎患感即兼腹痛而脹胡某投以溫散二便不行昏譫大渴舌苔黑刺孟英以犀翹楝薄梔連花粉元參大黃服之便下神清為去犀角加丹皮二帖苔化熱退惟少腹梗脹不甚知飢改投梔連楝蒺延胡橘核蓯蓉花粉制軍諸藥連解黑矢漸以向安正欲養陰之際而惑於旁言另招金某服大劑溫補藥以圖元氣驟復不知餘燼內燔營受灼而血上溢液被爍而肌漸消猶謂吐血宜補形瘦為虛竟竭力補死而後已張篪百之室患感連服溫散繼邀顧聽泉診之云有驟變須延孟英商治渠不之信旬日後倏然昏厥自寅正至辰初不蘇病者之兄吳次歐速孟英視之脈伏而弦滑與大劑犀羚茹貝知母花粉元參銀花調局方至寶丹灌下即安李竹虛令郎初秋患感醫聞便溏而止之乃至目赤譫妄舌絳苔黃溲澀善嘔粒米不能下咽孟英先與犀角石膏竹葉竹茹枇杷葉茅根知母花粉梔子以清之嘔止神清熱亦漸緩繼以承氣湯加減三下黑矢黃苔始退即能啜粥以其右關尺遲緩有力故知有燥矢也續投甘涼調理而瘥許少卿室故醫陳啟東先生之從女也夏初患感何新之十進清解病不略減因邀診於孟英脈至弦洪豁大右手為尤大渴大汗能食妄言面赤足冷徹夜不瞑孟英曰證雖屬溫而真陰素虧久傷思慮心陽外越內風鴟張幸遇明手未投溫散尚可無恐與龍牡犀珠龜板鱉甲貝母竹瀝竹葉辰砂小麥元參丹參生地麥冬為大劑投之外以燒鐵淬醋令吸其氣蠣粉撲止其汗搗生附子帖於湧泉穴甫服一劑所親薦胡某往視大斥王議為非而主透疹之法真盲人病家惑之即煎胡藥進焉病者神氣昏瞀忽見世父啟東扼其喉使藥不能下嗌且囑云宜服王先生藥少卿聞之大駭專服王藥漸以向愈而陰不易復頻灌甘柔滋鎮月餘始能起榻季夏汛行惟情志不怡易生驚恐與麥參熟地石英茯神龍眼甘麥大棗三甲等藥一定不易之法善其後秋杪歸寧微吸客邪寒熱如瘧孟英投以清解已得向安胡某聞之復於所親處云此證實由夏間治法不善以致邪氣留戀再服清涼必死無疑湯某復從而和之總是病者該死故一時有此二妖孽許氏即招湯某診治謂其陽氣傷殘沉寒久伏既已沉寒焉能作寒熱以理中湯加威靈仙桂枝半夏厚朴薑棗等藥勿論其認證之誤與不誤即理中湯亦有此等加減法耶病者頗疑藥太燥烈湯復膏吞拭舌說得天花亂墜病家惑之初服胃氣倍加繼而痰嗽不飢黃苔滿布肌消汛斷內熱汗多心悸不眠臥榻不起病者堅卻其藥然已進二十劑矣再邀何新之商之亦難措手仍囑其求診於孟英按脈弦細軟數篡患懸癰縱有神丹不可救藥矣服清解藥致邪氣留戀豈服滋補藥邪氣反不留戀耶此等人而亦自命為醫豈非怪物潘馥堂令愛患感沈悅亭治之漸愈惟咽阻無形水穀礙下孟英以竹葉石膏湯加紫菀白前旋覆枇杷葉以清肺熱而降肺氣果即貼然錢聞遠仲郎患感湯某進桂樸薑柴等藥而痰血頻咯神瞀耳聾譫語便溏不飢大渴苔黑溲少徹夜無眠範應樞顧聽泉迭進輕清黑苔漸退舌絳無津外證依然不能措手孟英診之脈皆細數乃真陰素虧營液受爍不必以便溏不食而畏滋膩也授以西洋參生地二至二冬龜板燕窩茹貝銀花藕汁梨汁葳蕤百合等藥二劑咯血漸止痰出甚多漸進稀糜夜能稍寐五劑熱退瀉止渴始減脈漸和旬日後解燥矢而痊陳赤堂令正患感面赤不眠煩躁譫語口甘渴膩溲澀而疼顧聽泉多劑清解未應孟英切其脈左弦洪而數右滑而溢胸次痞結大解未行肝陽上浮肺氣不降痰熱阻痹邪乃逗留與小陷胸合溫膽雪羹加旋薤投之胸結漸開乃去半薤而送當歸龍薈丸譫語止且能眠參以通幽湯下其黑矢三次後始進養陰和胃而痊許芷卿亦精於醫偶患外感即服清散之藥而證不減或疑其非春溫也邀孟英質之診脈遲澀二便皆行筋掣不眠畏寒能食喉舌皆赤血熱之徵與大劑清營藥數服而瘥迨夏兩腿患疥外科治之久而不愈孟英謂其平昔善飲蘊熱深沉瘍科藥亟宜概屏令以雪羹湯送當歸龍薈丸果得漸瘳秋間其太夫人患感連服溫散轉為肢厥便秘面赤冷汗脈來一息一歇肢厥而便秘面赤可決其非脫症矣舉家惶惶慮即脫變孟英視其苔黃膩不渴按其胸悶而不舒且聞其嗅諸食物無不極臭斷為暑濕內伏挾痰阻肺肺主一身之氣氣壅不行法宜開降是虛脫之反面也設投補藥則內閉而外脫昧者猶以為投補遲疑而不及救世之愈補愈虛以至於脫者大半由此孰知真實類虛不必以老年懷成見總須以對證為良藥果一劑而脈至不歇轉為弦滑再服汗止肢和便行進粥數帖而痊方用紫菀白前竹茹枳實旋貝杏蔞兜鈴枇杷葉也吳醞香大令宰金谿自春仲感冒而起迨夏徂秋痰多氣逆肌肉消瘦延至初冬諸證蜂起耳鳴腰痛臥即火升夢必干戈凜寒善怒多醫咸主補虛迄無小效臥理南陽已將半載群公子計無所施飛函至家囑大公子汾伯副車叩求孟英來署已冬仲之杪日矣診脈弦細而左寸與右尺甚數右寸關急搏不調且病者頸垂不仰氣促難言舌黯無苔面黧不渴孟英曰病雖起於勞傷挾感而延已經年然溯其所自平昔善飲三十年來期在必醉非僅外來之客邪失於清解殆由內伏之積熱久錮深沉溫補雜投互相煽動營津受爍內削痰多升降愆常火浮足冷病機錯雜求愈殊難既承千里相招姑且按經設法以石膏知母花粉黃芩等清肺滌痰青蒿鱉甲梔子金鈴等柔肝泄熱元參女貞天冬黃柏等壯水制火竹茹旋覆杷葉橘紅等宣中降氣出入為方間佐龍薈丸直瀉膽經之酒毒紫雪丹搜逐隧絡之留邪服三劑而舌布黃苔蘊熱漸泄服六劑而嗽減知飢渴喜熱飲伏痰漸化季冬八日即能出堂訊案十劑後凜寒始罷足亦漸溫肺氣果得下降望日出署行香繼而兵火之夢漸清夜亦能眠迎春東郊審結積案亦不覺其勞矣方中參以西洋參生地麥冬充其液銀花綠豆雪羹化其積至庚戌歲朝各處賀年午後護日極其裕如且肌肉漸豐面黑亦退藥之對病如是之神調養至開篆時起居如舊各恙皆瘥而孟英將赴宜黃楊明府之招醞香為錄其逐日方案跋而記之茲特採其大略如此醞香之證予於五月間曾為一視知其感受溫邪投以清解三服後頗覺輕減又以赴飲而病復如故然步履尚無恙也後乃惑於溫補之說熟地鹿膠等膩滯之藥恣服不輟比孟英至而其勢已棘雖逐漸清解大勢向愈然病久元虛邪去而正亦隨之此所以終於不起也範廉居夫婦與其令愛一時患恙旬日後咸劇金粟香薦孟英視之廉居則大解已行熱退未淨氣逆不飢呃忒自汗脈形虛大舌紫無苔為上焦熱戀下部陰虧之象予西洋參旋覆竹茹枇杷葉石斛柿蒂牡蠣龜板刀豆牛膝之劑兩服即舌潤知飢嘔汗皆罷去刀豆旋覆柿蒂加熟地胡桃肉當歸投之而愈其室則苔膩口酸耳鳴不寐不飢神憊脘痛頭搖脈至虛弦按之澀弱以當歸白芍枸杞木瓜楝實半夏石斛茯神竹茹蘭葉白豆蔻為養營調氣和胃柔肝之法數啜而瘳渠女則壯熱殿屎二便皆閉苔黃大渴脹悶難堪脈來弦滑數實系府證也投桃核承氣加海䖳蘆菔二劑而痊廉居尊人穎禾曰甚矣服藥之不可不慎也三人之證醫者皆謂可危而治之日劇君悉以一二劑起之抑何神歟因憶四十二歲時患痁胡魁先用首烏太早遂致客邪留戀纏綿百日大為所困嗣後不敢服藥今四十年矣昨聞韓組林年雖七十飲啖兼人而平時喜服藥醫以為老輒用附桂參茸等藥以期可享遐齡詎料初八日晚膳尚健飯三更睡醒倐寒慄發顫俄而四肢瘛瘲越日云亡得非即世人所謂之子午證耶孟英曰此老系陽旺之體肥甘過度痰火日增年至古稀真陰日耗而久服此等助火爍陰之藥以致風從火出立拔根荄與兒科所云急驚風證殆無異焉古云肥白之人多氣虛又云痰飲須以溫藥和之儒醫顧聽泉體豐色白平昔多痰晨起必喘逆飽食稍安頗有氣虛之象季冬感冒自服疏解未效迓孟英診焉左關弦寸滑如珠尺細而干舌尖甚絳乃真陰素虧水不涵木風陽內熾搏液成痰謀慮操持心陽太擾肺金受爍治節不伸苔雖白而已干熱雖微而睛赤忌投溫燥宜予輕清用元參石斛梔子竹茹旋覆蛤殼貝母枇杷葉竹葉蘭葉蓮心為劑三啜而安自謂氣虛遽服黨參枸杞當歸等藥下咽之後即覺火升氣逆漸至言語支離溲頻自汗夤夜復迎孟英拯治脈已虛促不調即投牡蠣龜板鱉甲女貞旱蓮元參甘草小麥竹葉蓮心以和心肝之陽而鎮龍雷之奮一劑而平繼又作勞復感仍授輕清之法兩劑後又因怫怒縈思肝陽復僭顴紅目赤左耳時聾夜不成眠神情煩躁越日陡然大汗濕透衣衾再速孟英圖之脈極弦數而細仍為陰虛陽越不可誤認陽虛而妄施附桂者先令熏以炭醋撲以蠣粉隨灌以大劑二至二冬三甲元參丹參人參黃連童溲而瘳繼予多劑育陰清肝始得全愈又其媳新產之後頭痛甚劇孟英按其脈右甚滑大予清陽明法得大解而瘥施玉林患感治經多手延將匝月熱退未淨苔膩垢黃脘悶便溏腰疼溺短不飢不眠氣短音低醫者技窮李華甫薦孟英視之脈弦軟不調而尺中虛細是痰熱尚結於上焦房勞素傷於下部初治即從清解並無背謬之方奈不足以開有形之結而滋久耗之陰以致曠日相持神氣日形消索也以小陷胸湯加葦莖竹茹枇杷葉蘭葉石斛歸身枸杞為方加野薔薇露和服一劑苔即化三服而結糞下胸乃舒去蔞仁加西洋參服四帖苔淨能餐諸恙冰釋續投峻補肝腎而康翁笠漁素健啖偶患發熱錢某謂勞倦內傷進補中益氣法病日劇張某診為停食感冒用承氣法下之連解黑矢熱如故與養陰藥多劑熱仍不退且從此不食不便不渴不眠金云攻補難施已成壞證所親孫詒堂迓孟英診之脈形澀數不調神呆靜臥倦於語言溺少苔黃時時面赤曰無慮也衛分之邪失於清解補中益氣實衛錮邪何異適燕而南其指乎承氣通腑但能下其腸胃有形之物不能散其衛分無形之邪下後養陰固是方法然必表裡皆和者方可投之衛氣未清徒增窒滯樞機日鈍此神識之所以如呆也升降失司此出入之所以皆廢也延之雖久病猶在衛故可治也予葦莖蔥豉加芩桔梔子栝蔞服一劑而遍身赤疹神氣爽悟乃去芩桔蔥加雪羹蘆菔銀花蘭葉服數帖解醬矢二十餘次苔退知飢脈和而愈一鐵匠婦患感雜治經旬身熱不退不眠妄語口渴耳聾求治於余脈來細數唇紅面白肌瘦汗頻雖是貧家卻為嬌質神虛液奪余暑未清以西洋參甘草小麥黃連麥冬石斛丹參蓮心竹葉為劑服之神氣遂安自云心悸因加紅棗與紫石英服之浹旬竟以告愈七月初旬余遊鴛湖歸三侄壽和陡患凜寒身熱筋瘛面紅譫妄汗頻四肢厥冷年甫六歲其母危之余察其苔色黃膩口渴唇紅乃停食感冒耳以枳實梔豉湯加菖蒲及冬干之蘆菔葉煎成調入玉樞丹五分灌之次日譫瘛皆減而腹痛微有吐瀉寐醒則神猶瞀亂知其邪有外泄之機治當迎刃而導於前方加蘇葉一分黃連二分同炒煎服連吐三五次瀉六七次痛即減第三日神清爽朗余曰去疾莫如盡再服原方一帖遂愈蓋小兒之病因於食滯者多胃不和則臥不安陽明實則譫妄而世人輒作驚風治之每致僨事昧者更惑於巫瞽而祭非其鬼則尤可笑也八月初余遊虎林歸二女定宜患感旬余熱雖退而乾咳無痰不眠不食不便胸腹無所苦湯飲亦不思五熱形瘦僉慮成勞余按脈弦細是痰阻而氣不通也以紫菀白前蔞仁薤白橘紅半夏菖蒲竹茹枳殼桔梗服數帖漸愈三女杏宜年十四因侍姐病過勞且浹旬風雨寒氣外侵而自恐不支勉強納食起病則凜寒微熱腿腫而酸泛泛欲嘔兼以微嗽適余歸之次日也視其苔微黃而膩尖微絳脈緩滑以枳實梔豉湯加前蘇杏桔芩菔飲之日晡余遊南鄉歸內子述服藥後神情昏瞀嘔出藥食恐夾痧邪曾為刮背余謂此食滯上焦濁未下行耳迨夜頗靜詰朝察之胸仍拒按原方加菖蒲紫菀投之余即遊硤川黃昏而歸內子云午後神復瞀亂恐有變證明日君毋他往也余頷之夜間亦靜次早問答如常胸猶拒按因其吐既未暢大便未行以前方合小陷胸為劑外用朴硝罨其胸次至己刻又神昏如寐引衣自覆呼之不應時或妄言面色晦滯四肢時冷內子對之下淚余按脈如故確係濁氣上熏清陽失布既非寒邪深入亦非溫熱逆傳原方再服一帖病如故余再四思維徑以薤白石菖蒲各一錢蔞仁三錢煎成和入醇酒一杯灌之外用蔥白杵罨胸次牙皂末吹鼻取嚏時將薄暮至初更始得微汗而肢和尋即溏解一次而識人夜分安眠第四五日胸次已舒略無譫語乃目有妄見寐即惡夢時有潮熱余以蔞薤菖茹翹薇菀半梔豉省頭草等藥通府滌濁連解三次各恙皆平改用清肝肅肺法至七朝身涼全愈繼治蔣君寅昉五令郎全官身熱筋瘛不啼不乳神呆嗜臥或疑驚風夤夜延余往視乃風熱夾食也與開泄清解法數帖便行而痰漸嗽出病即漸瘥此等雖非大證設稍誤治告危極速故連類錄之以備大匠木屑竹頭之需傷風一何叟年近八旬冬月傷風有面赤氣逆煩躁不安之象孟英曰此喻氏所謂傷風亦有戴陽證也不可藐視以東洋人參細辛炙甘草熟附片白朮白芍茯苓乾薑五味胡桃肉細茶蔥白一劑而瘳孟英曰此真陽素擾痰飲內動衛陽不固風邪外入有根蒂欲拔之虞誤投表散一汗亡陽故以真武四逆諸法回陽鎮飲以此二語印證前方可知用法之周到攘外安內以為劑也不可輕試於人致干操刃之辜慎之慎之馬某年三十餘素用力患發熱惡寒肢振自汗少腹氣上衝胸頭疼口渴孟英診曰衛虛風襲而絡脈久傷肝風內動與建中去飴加龍牡石英蓯蓉楝實桑枝建中之力在飴糖今去飴仍是桂枝法數帖而痊發熱惡寒頭疼自汗皆桂枝證此人必津液素虧因汗出而益耗其津故肝失所養而上衝肺胃失所養而口渴也寓意草謂傷風亦有戴陽證此為高年而言然有似是而非者黃鼎如令堂年登大耋季冬感冒痰嗽氣逆額汗顴紅胸痞不飢神情躁擾孟英診脈左弦疾而促右滑數而溢苔色滿布系冬溫挾痰阻肺治節不伸肝陽鼓舞直升羅謙甫有治痰火類孤陽之案頗相似也以小陷胸湯加薤白旋覆赭石花粉海䖳鳧茈竹瀝為大劑投之痰活便通數日而瘥繼有陳舜廷之父年逾花甲患痰嗽氣逆惟飲薑湯則胸次舒暢醫者以為真屬虛寒矣連投溫補之劑馴致咽痛不食苔色灰刺便閉無溺求孟英診之脈至雙弦按之索然略無胃氣曰渴喜薑湯者不過為痰阻清陽之證據耳豈可妄指為寒迭投剛烈胃陰已竭藥不能為矣夏初孟英挈眷送太夫人葬於皋亭山越日歸其令郎心官患微熱音嗄夜啼搐搦幼科謂其生未三月即感外邪又兼客忤復停乳食證極重也疏方甚龐雜孟英不以為然乃用蚱蟬三枚煎湯飲之蓋取其清熱熄風開聲音而止夜啼一物而擅此數長與證適相對也果覆杯而愈趙笛樓聞而嘆曰用藥原不貴多而貴專精思巧妙抑何至於此極耶然即古之奇方也今人不能用而孟英每以此法奏神效錄此以見一斑傷風雖小恙過表傷陰與邪未淨而早投補劑皆能延損其高年下虛而誤服升提者往往陽浮上戴須以溫補救之更有一種似傷風而實非傷風之證乃根蒂空虛腎水泛溢以成痰浮陽沖逆而為嗽也此自古未經道及者今年四月十二日孟英詣高石泉處謝吊偶診其脈左關尺忽見浮弦而空因私囑其次郎雋生曰尊翁之脈頗有可慮子其慎之繼無所苦方疑其言之未當雖有小恙亦未邀診迨雋生登賢書計偕有日石泉忽患痰嗽酷似傷風馮某視之與解散藥一帖次日便瀉數行黃某進分清藥一劑第三日痰升氣逆自覺唇腫不能啜飲雋生始憶及孟英之言速其拯治脈如蛛絲過指舌色晦黯無津唇不略腫其不能吸飲者蓋由氣有出而無入耳陰既脫於下陽將脫於上莫可救藥翌日云亡此十二月春前事也聞霜降後許吉齋山長微患傷風數日而逝立春後許硯鄰亦然皆同為似傷風證也據孟英曰兒子阿心長成太速心性太靈余固知其不秀秋分後小患傷風適余酬應紛繁不遑顧視且聞無甚大病亦不延兒科診視不料三日倏然而殤或云惜不早治余謂襁褓而患根蒂之病雖治愈亦何益哉然則不必高年慮有此證即小兒亦間有之矣醫者其可以傷風而概視為小恙哉不居集專論傷風誤補成勞猶是一隅之見焉風溫翁嘉順室產後患風溫經孟英治愈病染於姑孟英診曰高年陰氣太虧邪氣偏盛玉版論要云病溫虛甚死言人之真陰甚虛曷足以御邪熱而息燎原可虞在兩候之期乎至十四天果殞而嘉順亦染焉初發熱即舌赤而渴脈數且澀孟英曰非善證也蓋陰虛有素值憂勞哀痛之餘五志內燔溫邪外迫不必由衛及氣自氣而營急與清營繼投涼血病不稍減且家無主藥之人旁議譁然幸其舊工人陳七頗有膽識力懇手援孟英曰我腸最熱奈病來頗惡治雖合法勢必轉重若初起不先覷破早已殆矣吾若畏難推諉恐他手雖識其證亦無如此大劑車薪杯水何益於事吾且肩勞任怨殫心盡力以圖之病果日重昏瞀耳聾自利紅水目赤妄言孟英惟以晉三犀角地黃湯加銀花石膏知斛梔貝花粉蘭草菖蒲元參竹瀝竹茹竹葉鳧茈海䖳等出入互用至十餘劑舌上忽布穢濁垢苔口氣噴出臭難嚮邇手冷如冰頭面自汗咸謂絕望矣孟英曰生機也彼陰虛熱邪深入予一以清營涼血之法服已逾旬始得營陰漸振推邪外出乃現此苔惟本元素弱不能戰解故顯肢冷而汗僅出於頭面非陽虛欲脫也復與甘寒頻灌越三日汗收熱退苔化肢溫自始迄終犀角共服三兩許未犯一毫相悖之藥且賴陳七恪誠始克起九死於一生繼以滋陰善後而康三江地氣卑濕天時溫暖傷寒之證絕少最多濕溫風溫之證又人體質柔脆不任盪滌之藥故惟以甘寒清解之劑漸次搜剔斯邪去而正不傷若在北方剛堅之體此等藥雖服百劑亦若罔知非加硝黃盪滌邪終不去故葉氏之法擅譽江浙而吳氏之方馳名幽冀易地則皆然亦智者之因地制宜也翁嘉順之妹亦染病勢極危因役於冥曹自以為不起孟英曰年壯陰充藥治不謬焉能死乎昔人云見理明者陰陽五行不能拘吾當以理勝數遂按法治之病乃日減且慎寒暄節飲食守禁忌調治二旬果然康健又其姑亦病溫初不服藥七日外始迓孟英診之曰此病邪雖不盛第頻吐涎沫不能出口須以手撩不飲不食不便不眠或多言不倦或久問不答是七情鬱結氣久不舒津液凝痰邪得依附治之中肯尚難即愈不藥而待病從何去遂於清解方中寓蠲痰流氣通胃舒肝之品交十四日而熱退又數日痰沫漸少又旬日大解始行粥食日加而愈此治一法直貫到底不但不犯一分溫燥升補之藥而滋膩入血之品亦皆避之尚須三十劑奏績若病家不篤信醫者不堅持旁人多議論則焉克有濟耶然非乃媳前車之鑑亦未必遽爾任賢不貳也沈裕昆室偶發脘痛範某與逍遙法痛頗止而發熱咽疼邀顧聽泉視之知感溫邪與清散法疼已而熱不退七日後目閉鼻塞耳聾肢搐不言語不飲食顧疑證險願質之孟英而沈之兩郎乃從王瘦石學因請決於師瘦石亦謂孟英識超我當為汝致之時已薄暮乃飛刺追邀比孟英往診見其外候如是而左手診畢即縮去隨以右手出之遽曰非神昏也繼挖牙關察其苔色白滑詢知大解未行曰病是風溫然不逆傳膻中而順傳胃府證可無恐聽泉學問勝我知證有疑竇而虛心下問豈非胸襟過人處但溫邪傳胃世所常有而此證如是駭人者因素有痰飲盤踞胃中外邪入之得以憑藉苔色之不形黃燥者亦此故耳不可誤認為寒夫溫為熱邪脈象既形弦滑以數但令痰飲一降苔必轉黃此殆云遮霧隱之時須具溫太真燃犀之照庶不為病所欺且昔人於溫證僅言逆傳不言順傳後世遂執定傷寒在足經溫熱在手經不知經絡貫串豈容界限喻氏謂傷寒亦傳手經但足經先受之耳吾謂溫熱亦傳足經但手經先受之耳一隅三反既有其逆豈無其順蓋自肺之心包病機漸進而內陷故曰逆自肺之胃府病機欲出而下行故曰順今邪雖順傳欲出未能所謂胃病則九竅不和與逆傳神昏之犀角地黃湯證大相徑庭郭雲臺云胃實不和投滾痰而非峻可謂治斯病之真詮遂疏小陷胸合蠲飲六神湯加枳樸以蘆菔煮水煎藥和入竹瀝一杯送下礞石滾痰丸四錢沈嫌藥峻似有難色孟英曰既患駭人之病必服駭人之藥藥不瞑眩厥疾勿療盍再質之瘦石聽泉乎沈頷之王顧閱方僉以為是且云如畏劑重陸續徐投可也翌日孟英與聽泉會診脈證不甚減詢知昨藥分數次而服孟英曰是勢分力緩之故也今可釋疑急進病必轉機聽泉深然之病家亦膽壯矣如法服下黎明果解膠韌痰穢數升各恙即減略吐語言稍啜稀粥苔轉黃燥藥改輕清漸以向安嗣與育陰柔肝而愈金祿卿室沈裕昆之女也患溫顧聽泉連進輕清涼解而病不減氣逆無寐咳吐黏痰舌絳咽乾耳聾譫語旬日外始延孟英診焉曰體瘦脈細數尺中更亂竟是陰氣先傷陽氣獨發所謂傷寒偏死下虛人譬之火患將臨既無池井缸貯又空縱竭心力曷能有濟再四研詰乃知發熱前一日陡然帶下如崩是真液早經漏泄矣否則藥治未訛胡反燎原益熾痙厥之變不須旋踵祿卿堅懇勉圖孟英以西洋參生地二冬二至元參犀角黃連雞子黃知母為方另用石斛龜板鱉甲各四兩左牡蠣一斤煮湯代水煎藥顧聽泉又加阿膠且云我儕用此育陰鎮陽充液息風大劑焉能津枯風動痙厥陡生乎服兩劑果不能減後惑旁言而禱簽藥附桂乾薑罔知顧忌徑至四肢拘攣而逝是誤藥速其斃而增其慘也繼而裕昆患濕溫亦犯重暍而亡珠小輝太守令嬡驟患頤腫此俗所謂蛤蟆瘟也連及唇鼻乃至口不能開舌不得出孟英視之曰溫毒也用射干山豆根馬勃羚羊薄荷銀花貝母花粉杏仁竹黃為劑仿普濟消毒飲意並以紫雪搽於唇內錫類散吹入咽喉外將橄欖核磨塗腫處果吐韌涎而腫漸消詰朝即啜稀粥數日而愈濮樹堂室懷妊五月患春溫口渴善嘔壯熱無汗旬日後始浼孟英視之見其煩躁譫語苔黃不燥曰痰熱阻氣也病不傳營血藥禁用試令按其胸次果然堅痛而大解仍行法當開上用小陷胸加石菖蒲枳實杏貝茹郁梔翹等藥蘆菔湯煎服服二劑神情即安四帖心下豁然惟心腹如烙嘔吐不納改投大劑甘寒加烏梅頻啜漸康秋間得子亦無恙孟英於溫熱痰飲獨有心得故遇此等證如摧枯拉朽合觀諸案可以得治溫病之法許子雙令堂梁宜人仲春之杪偶患微感醫與溫散熱已漸退孟英偶過診右寸脈促數不調因謂子雙曰此風溫證其誤表乎恐有驟變渠復質之前醫以為妄論仍用溫燥越二日即見鼾睡再延孟英診之促數尤甚曰鼻息鼾矣必至語言難出仲聖豈欺我哉風溫誤汗往往皆然況在高年殊難救藥果浹旬而逝此證雖經仲景指出而人多不識往往雜藥亂投卒至鼾睡而死醫家病家兩俱茫然孟英此案可為仲景之功臣矣姚某年未三旬煙癮甚大適伊母病溫而歿勞瘁悲哀之際吸受溫邪脅痛筋掣氣逆痰多熱壯神昏莖縮自汗醫皆束手所親徐麗生囑其速孟英診之脈見芤數舌絳無津有陰虛陽越熱熾液枯之險況初發即爾其根蒂之不堅可知與犀羚元參知母壯水息風蓯蓉楝實鼠矢石英潛陽鎮逆沙參麥冬石斛葳蕤益氣充津花粉梔子銀花絲瓜絡蠲痰清熱一劑知四劑安隨以大劑養陰而愈吸食鴉片之人津液素虧感受溫邪較平人倍重非此標本並治之劑必不救矣姚令輿室素患喘嗽而病春溫新舊合邪醫知其本元久虧投以溫補痙厥神昏耳聾譫語面青舌絳痰喘不眠肺原包心而生故肺熱必及於心皆束手矣延孟英診之脈猶弦滑曰證雖危險生機未絕遽爾輕棄毋乃太忍與犀角羚羊元參沙參知母花粉石膏以清熱息風救陰生液佐蓯蓉石英鱉甲金鈴旋覆貝母竹瀝以潛陽鎮逆通絡蠲痰三劑而平繼去犀羚石膏加生地黃服旬日而愈仲秋令輿病竟誤服溫補數日而殞豈非命耶韓組林年近古稀孟冬患肢厥頭腫譫語遺溺包某作虛風類進以溫補勢益劇孟英脈之脈弦數右滑溢乃痰熱內阻風溫外侵與羚貝茹梔翹薇桑菊丹皮花粉旋覆以蘆菔湯煎服而瘳余侄森伯患發熱面赤渴而微汗孟英視之曰春溫也乘其初犯邪尚在肺是以右寸之脈洪大宜令其下行由腑而出則即可霍然投知母花粉冬瓜子桑葉杷葉黃芩葦莖梔子等藥果大便連瀉極熱之水二次而脈靜身涼知飢啜粥遂痊設他人治之初感總用汗藥勢必釀成大證陳建周令郎患春溫初起即神氣躁亂驚懼不眠兩脈甚數孟英謂溫邪直入營分也與神犀丹佐紫雪兩劑而瘥夏間吳守旃暨高若舟令郎胡秋紉四令愛患溫初起即肢瘛妄言神情瞀亂孟英皆用此法尋即霍然世人每執汗解之法為初感之治孰知病無定體藥貴得宜無如具眼人稀以致夭枉載道歸諸天數豈盡然哉王皺石廣文令弟患春溫始則譫語發狂連服清解大劑遂昏沉不語肢冷如冰目閉不開遺溺不飲醫皆束手孟英診其脈弦大而緩滑黃膩之苔滿布穢氣直噴投承氣湯加銀花石斛黃芩竹茹元參石菖蒲下膠黑矢甚多而神稍清略進湯飲次日去硝黃加海䖳蘆菔黃連石膏服二劑而戰解肢和苔退進粥不勞餘力而愈繼有張鏡江邀治葉某又錢希敏之妹丈李某孟英咸一下而瘳惟吳守旃之室暨鄭又僑皆下至十餘次始痊今年時疫盛行醫多失手孟英隨機應變治法無窮救活獨多不勝縷載此正吳氏所謂涼藥無滌穢之功而反冰伏其邪也吳又可之法切於疫而不甚切於溫觀此可見又顧氏子患發熱獨熾於頭醫進發散汗出不解胸次痞悶便滯溺艱舌絳口乾飲不下膈不眠頭痛脈數而弦孟英曰體質素虛熱薄於肺痰結於胸治宜輕解羌防柴葛惡可妄投膏粱與藜藿有殊暑熱與風寒迥異治上焦如羽展氣化宜輕以通草葦莖冬瓜子絲瓜絡紫菀枇杷葉射干兜鈴白前九味天泉水急火煎服覆杯即已蓋席豐履厚之家密室深居風寒濕三氣所不能侵惟暑燥之邪易於吸受誤用溫散最易劫津若田野農夫櫛風沐雨肌堅氣實當用辛溫設進輕清焉能濟事故醫者須量體以裁衣弗膠柱而鼓瑟也炳按汪謝城云覆杯即已下宜刪去以言過當也若然則藜藿人溫證暑證亦可用辛溫矣此評甚是關寅伯贊府家某廚患春溫渠主人穎庵治之弗瘳為速孟英診焉脈來弦軟而寸數舌絳苔黑而神昏譫渴溺紅胸腹拒按是雙傳證也夫順傳者宜通其胃逆傳者宜清其營治法不容紊也然氣血流通經絡貫串邪之所湊隨處可傳其合其分莫從界限故臨證者宜審病機而施活變弗執死法以困生人此證屬雙傳即當雙解予涼膈散加犀角菖蒲元參下之果愈梅里任會嘉令正年逾五旬季春患證漸劇訪余視之身熱頭疼凜寒胸悶氣衝不寐神憊音低口渴嗽痰乾嘔便閉脈甚細軟延已旬余咸以為虛欲投補劑余謂陰分雖虧氣鬱痰滯溫邪留戀胡可補邪輕展清宣庶乎合拍以蔥豉合小陷胸加南沙參射干馬兜鈴通草竹茹二劑而熱退嘔止去蔥豉兜射加梔貝芩菖三帖而便行胸適得寐知飢改投柔木涵陰而愈濕溫季秋顧聽泉邀孟英視康康侯副轉之恙切其脈滑數而右歇左促且肝部間有雀啄氣口又兼解索望其面宛如熏黃頭汗自出呼吸粗促似不接續坐臥無須臾之寧便溺澀滯渾赤極臭心下堅硬拒按形若覆碗觀其舌色邊紫苔黃殊不甚乾燥問其所苦曰口渴甜膩不欲飲食苟一閤眼即氣升欲喘煩躁不能自持胸中懊憹莫可言狀孟英曰此由濕熱誤補漫無出路充斥三焦氣機為其阻塞而不流行蔓延日久津液為之凝滯而成痰飲不啻人禽雜處苗莠同疇邪正混為一家醫見肢冷自汗不知病由壅閉而然欲以培正而邪氣方張得補反為樹幟豈非資寇兵而齎盜糧哉非其類者鋤而去之乃為吃緊之治聽泉曰良是也夏間起病聞自心悸少寐楊某以為虛而補之時尚出差辦事暑濕外侵受而不覺迨闈差未竣其病斯發而諸醫之藥總不外乎溫補一途以致愈補愈劇今擬溫膽法待君可否孟英曰脈證多怪皆屬於痰今胸痞如斯略無痰吐蓋由痰能阻氣氣不能運痰耳宜於溫膽中加薤白蔞仁通其胸中之陽又合小陷胸為治飲痞之聖法參以梔豉泄其久郁之熱以除懊憹佐以蘭草滌其陳腐之氣而醒脾胃聽泉深然之連投二劑各恙皆減脈亦略和而病者以為既系實證何妨一瀉而去之連服大黃丸二次承氣湯半帖孟英急止之曰畏虛進補固非欲速妄攻亦謬蓋濕蒸為熱灼液成痰病非一朝一夕而成治以上下分消為是不比熱邪傳府可一瀉而愈也越日下部果漸腫孟英曰攻痞太速之戒古人不我欺也與聽泉商以前法加黃芩合瀉心意再配雪羹投之痰果漸吐痞亦日消而自腹至足以及莖囊腫勢日加孟英謂勢已如此難以遽消但從三焦設法則自上而下病必無虞與聽泉商用河間桂苓甘露飲意而姚平泉孝廉力主崇土勝濕之法深以寒涼為不可用眾議仍投前日之藥孟英曰前藥原可服也嫌力不足耳次日痰中帶血甚多孟英曰濕熱薰蒸不已自氣及營矣與聽泉暨王子能參軍商以知柏生地犀角鱉甲白芍苡仁貝母石斛茅根麥冬滑石梔子藕汁童溺投之而止逾數日又吐且肢冷自汗心餒畏脫姚平泉謂氣不攝血當主歸脾湯以統之舉家皇皇連請診脈者三次孟英曰脈來屢變陳芝江所以不能指實其病而楊阮諸人皆疑為大虛之候也然望聞問切不可獨憑於指下今溲如赭石湯渾赤有腳其為濕熱之病昭昭若揭初傷於氣分則津液受灼以為痰漸及於營分則陰血不安而妄溢邪氣內盛豈非病實而真實類虛吾不受病之欺也堅守前議靜鎮不搖服二劑果止孟英曰血之復吐也由於氣分之邪以擾及也欲清氣道之邪必先去其邪所依附之痰蓋津液既為邪熱灼爍以成痰而痰反即為邪熱之山險也不妨峻攻其實而緩行其勢初進滾痰丸三錢得下泄氣一次副轉云四十日來未有之通暢也連投數日始解膠痰黑矢多遍而小溲亦漸清長苔色亦退寢食遂安惟下部之腫猶爾也馬香崖陸虛舟皆主實脾行水之法孟英曰諦參脈證病不在脾況善飢便燥口渴溺多吾方慮轉消證亟投甘潤之不遑惡可滲利傷陰補土劫液耶且脾虛下陷之腫與濕盛而腫之腫其膝之上下內外形勢必然相貫今膝之上下內外凹凸迥判毫不毗連蓋由濕熱所釀之痰飲既誤補而痞塞中焦復妄攻以流竄隧絡所謂不能一蕩而蠲勢必旁趨四射吾當以法取之會又咳痰帶血而精神食飲如常孟英曰無恐也此乃前次嚼三七太多兜澀留瘀最不宜用吐而去之極妙但須金水同治冀咳止而血絡不震動為要耳與甘露飲加藕汁童溺服之四劑而止咳嗽亦寧於是專治其下部之腫以固本加知柏貝母花粉旋覆橘絡絲瓜絡羚羊角楝實蔥須豆卷薏苡竹瀝出入為劑二三帖間其高突隆腫之處即覺甚癢搔之水出如汗而作蔥氣六七日後兩腿反覺乾瘦燥痛莖囊亦隨之而消矣孟英曰用此潤藥消腫尚且干痛咽燥設從他議而投燥脾利水之法更當何如哉蓋寒濕則傷陽熱濕則傷陰血液皆陰也善後之法還宜滋養血液稍佐竹瀝以搜絡中未淨之痰使愈後不為他日之患更屬法中之法服之飲食中節便溺有權幸無消渴之虞而竟愈焉前云不可妄攻此又投峻下之劑何也蓋前徒攻其熱故不中病而致生他證此則直攻其痰始能與病相當也程庭乃郎芷香今春病溫而精關不固旬日後陡然莖縮寒顫自問不支人皆謂為虛瘧欲投參附孟英曰非瘧也平日體豐多濕厚味釀痰是以苔膩不渴善噫易吐而吸受風溫即以痰濕為山險乘其陰虧陽擾流入厥陰甚易豈容再投溫補以劫液錮邪而速其痙厥耶伊家以六代單傳父母深憂之堅求良治孟英曰予雖洞識其證而病情轇轕縱有妙劑難許速功治法稍乖亦防延損雖主人篤信我有堅持恐病不即瘳必招物議中途岐惑其過誰歸倘信吾言當邀顧聽泉會診既可匡予之不逮即以杜人之妄議程深然之於是王顧熟籌妥治午後進肅清肺胃方以解客邪蠲痰濕而斡樞機早晨投涼腎舒肝法以靖浮越搜隧絡而守關鍵病果遞減奈善生嗔怒易招外感不甘淡泊反復多次每復必莖縮寒顫甚至齒縫見紫血瓣指甲有微紅色溺短而渾黑極臭孟英曰幸上焦已清中樞已運亟宜填腎陰清肝熱以西洋參二冬二地蓯蓉花粉知柏連楝斛芍石英牡蠣龜板鱉甲阿膠雞子黃之類相迭為方大劑連服二十餘帖各恙漸退繼以此藥熬膏晨服午用繆氏資生丸方各品不炒皆生曬研末竹瀝為丸枇杷葉湯送下服至入秋始得康健孟英曰古人丸藥皆用蜜最屬無謂宜各因其證而變通之此其一法也此四損證之最重者治稍不善變證紛如便不可保此案深可為法邵魚竹給諫患感楊某作瘧治不應始迓孟英診之脈軟汗多熱不甚壯熱為濕所持故脈軟苔色厚膩嘔惡煩躁痰多腿痠顯是濕溫因謂其令郎子旃曰濕溫者濕蘊久而從時令之感以化熱也不可從表治更勿畏虛率補與宣解一劑各恙頗減奈眾楚交咻謂病由心力勞瘁而來況汗多防脫豈可不顧本原群醫附和遂服參歸熟地之藥增濕益熱宜乎不救病日以劇最後吳古年診之云此濕溫也何妄投補劑然已末從挽救交十四日而殞始悔不從王議康康侯司馬之夫人久傷謀慮心火外浮面赤齒疼因啖西瓜遂脘悶不舒喜得熱按此寒濕鬱閉其熱也用辛通淡滲之一劑斯愈矣泄瀉不飢自覺舌厚數寸苔色灰膩孟英與厚朴滑石蔥白薤白枇杷葉橘皮薄荷旋覆省頭草一劑霍然仲秋久雨吳汾伯於鄉試後患恙自言坐於水號浸及於膝人皆以為寒濕之病孟英切脈甚數溲赤苔黃口乾燥嗆因謂其尊人醞香曰病由暑濕而體極陰虧已從熱化不可以便泄而稍犯溫燥之藥先與輕清肅解繼用甘涼撤熱漸能安穀半月後熱始退盡而寢汗不眠投以大劑滋填潛攝之藥兼吞五味子磁朱丸數十帖乃得康復此證誤治即敗少謬亦必成損苟非誠信於平日焉能誠服於斯時聞其寢汗不收夜不成寐之間旁言嘖嘖孟英恐其搖動主意必致全功盡棄囑其邀顧聽泉許芷卿質政而顧許咸是孟英議於是主人之意甚堅而大病乃痊籲談何易耶翁嘉順之婦弟吳某勞傷之後發熱身黃自以為脫力也孟英察脈軟數是濕溫重證故初起即黃亟與清解大便漸溏小溲甚赤濕熱已得下行其熱即減因家住茅家埠吝惜輿金遽爾輟藥七八日後復熱譫語昏聾抽痙遺溺再懇孟英視之濕熱之邪擾營矣投元參犀角菖蒲連翹竹茹竹葉銀花石膏泄衛清營之法佐牛黃丸紫雪丹而瘳臀皮已塌亟令貼羊皮金不致成瘡而愈慶雲圃觀察令郎恩蔭堂司馬陡患偏墜醫與茴香蘆巴烏藥荔核等劑遂痛不可忍浼趙棠村鹺尹邀孟英視之按其脈膚甚熱曰非疝也睪丸腫痛必偏於右此濕熱時邪也設以疝治之必成癰按法治之果覆杯而痛減三服而便行熱退因食羊肉腫痛復作再與清解諄囑慎口腹而瘳吳憲章年逾花甲患感醫知其為濕溫也投藥不應而仍能起榻理事石北涯拉孟英視之冀其勿致加劇及診脈左寸數疾余皆軟大穀食略減便溏溲少苔色膩黃舌尖獨黑孟英不肯予方人咸詫之因曰證原不重吾以脈象舌色察之是平昔曲運心機離火內亢坎水不制勢必自焚況兼濕溫之感乎果數日而殞黃純光年七十八歲患濕溫至旬余脈形歇代呃忒連朝諸醫望而畏之孟英診曰脈雖歇而弦搏有根是得乎天者厚雖屬高年猶為實象參以病深聲噦原非小故而二便窒澀苔膩而灰似府氣未宣痰濕熱阻其氣化流行之道也清宣展布尚可圖焉何新之韙其議因以旋茹梔楝杷杏萸連菀蔞雪羹為劑片通草一兩煎湯煮藥投匕即減數服而大吐膠痰連次更衣遂安粥食惟動則嗽逆漸露下虛之象予西洋參龜板牡蠣蓯蓉石斛牛膝冬蟲夏草石英茯苓當歸等藥而各恙遞安繼加砂仁熟地而起沙沛生鹺尹患身熱頭重腹脹便溏脘悶不飢口流涎沫腿痠溺少脈軟神疲孟英診曰內濕素盛兼吸客邪不可謂值此亢旱之年竟無氾濫之病也予檳樸蔻苓豬澤橘半防己秦艽之劑小溲雖行其口涎水流出尤多病遂以愈既而其子龍官初次患瘧耳聾舌絳溺赤痰多脈數而弦寒微熱甚幼科云胎瘧不能即愈孟英曰此齊東野語也予滑石竹茹知母花粉苓翹橘半青蒿鱉甲八帖而痊沈南臺年三十七歲初冬在鄉收租將歸飽啖羊肉麵條途次即發熱頭疼到家招沈某視之謂其體豐陽氣不足以致傷寒夾食表散消導之中佐以姜附數帖後熱壯神昏諸醫束手交八日所親許錫卿吳久山交薦孟英圖之苔色黃膩口不甚渴粒米不沾時時火升汗躁譫語溲赤便秘面晦睛紅呼吸不調胸前拒按脈則虛軟微帶弦滑不甚鼓指曰體氣素虧然脈證太覺懸殊必因痰阻清陽故氣壅塞而脈更無力也劑以小陷胸合雪羹加旋菖薤枳梔子膽星服後痰即吐脈較起再服譫語息三服痰中帶出紫血數塊四服熱退而汗躁胥蠲七服苔淨胸舒溲長口渴改予甘涼濡潤之法服數帖痰已漸少舌布新苔而仍不更衣覺有穢氣上衝亦不知飢仍予甘涼養胃佐以蘭葉野薔薇露降其濁氣數帖後穢氣除粥食進但不大解家人憂之孟英曰既無所苦能食脈和靜俟水到渠成不可妄行催動也既而加谷起床便猶不解病者停藥旬日計起病已交一月矣粥嫌不飽意欲食飯復請孟英商之孟英曰可食也藥則不當停亟宜培養涵濡俾其轉運也授參朮歸蓯杞麻半芍少佐枳殼為方服十二劑始得暢解堅矢嗣與峻補善後尋即復元續有宣氏婦脈體極虛患溫而胸次痞悶苔黃垢膩醫皆畏難而退孟英以輕清肅化之藥數劑苔退胸舒即能進粥隨予生津養血又旬日更衣而愈觀此則黃苔宜下之說須合脈體以為可否也冬溫周曉滄乃郎品方患冬溫所親顧聽泉知其體屬陰虧病非風寒也不犯一分溫升之品而證不能減勢頗可危乃虛懷轉邀孟英診之曰所治良是也但於方中加貝母杏仁紫菀冬瓜子等味與之遂效可見藥貴對病雖平淡之品亦有奇功孟英嘗云重病有輕取之法於此可見癸卯春邵秋子令堂年近六旬患寒熱如瘧者久矣諸醫雜治罔效孟英視之曰此濕邪久蘊已從熱化誤投提補動其肝陽痰飲因而上逆與通降之法寒熱即減而包某謂瘧久陰虛理宜滋養病家聞之近是遂進首烏鱉甲等藥漸至脈伏胸痞呃忒自汗渴飲不食顴赤便泄包某束手疏生脈散以塞責舉家彷徨再求孟英診之曰此滋膩阻塞氣機清陽不司旋運喜用熟地者鑑之痰飲閉滯隧絡非脫象也補藥不可進以栝蔞薤白合小陷胸加菖蒲竹茹旋覆貝母杏仁紫菀枇杷葉投之呃止脈出清熱滌飲旋轉氣機以救滋膩之失大有轉機而鄭某謂病固屬痰須溫熱以宣通勿寒涼而凝遏病家又惑焉薑桂頻投既而唇腫咽疼不能進飲舌乾短硬難出語言復請孟英救療與犀角地黃湯加元參知母銀花竹黃花粉膽星石菖蒲竹瀝之類甘寒生津以救燥烈之失六七劑吐出極臭膠痰甚多粥飲漸進此第三次生機也奈狂瀾莫障邪說橫行輒以涼藥不宜擅服久病必定元虛甘言悅耳遂至升散溫補各逞所能符咒乩方罔不偏試延至仲夏齶腐齦糜唇高數寸竟成燎原莫救仍懇孟英設法乃堅辭不能措手付局醫黃某敷治腫爛日甚而終戴氏婦年五十六歲仲冬患感初服楊某歸柴丹參藥一劑繼服朱某乾薑蒼朮厚朴藥五劑遂崩血一陣謂其熱入血室不可治矣始延孟英診之脈形空軟促數苔黑舌絳足冷而強息微善笑詢其汛斷逾十載曰冬溫失於清解營血暴脫於下豈可與熱入血室同年而語耶必由誤服熱藥所致因檢所服各方而嘆曰小柴胡湯與冬溫何涉即以傷寒論亦不能初感即投況以丹參代人參尤為悖謬夫人參補氣丹參行血主治天淵不論風寒暑濕各氣初感皆禁用血藥為其早用反致引邪深入也既引而入再誤於辛熱燥烈之數投焉得不將其僅存無幾之血逼迫而使之盡脫於下乎女人以血為主天癸既絕無病者尚不宜有所漏泄況溫邪方熾而陰從下脫可不畏哉病家再四求治孟英與西洋參蓯蓉生地犀角石斛生芍銀花知母麥冬甘草蔗漿童溺兩劑足溫舌潤得解醬糞脈數漸減而軟益甚乃去犀角加高麗參數帖脈漸和熱退進粥隨以調補幸得向安即熱入血室亦豈不可治之證可見此人並不知熱入血室為何病第妄指其名耳王開榮素患痰嗽兼有紅證今冬病頭疼發熱渴飲不飢便溏溺少譫語神昏自述胸中冷氣上衝醫見其面赤痰喘欲投附桂黑錫丹等藥所親翁嘉順囑勿輕服為延孟英診之脈滑且數曰溫邪挾宿飲上逆法當清解與北沙參冬瓜子知母滑石花粉石菖蒲貝母杏仁蘆根蔥白淡豉竹瀝兩劑後面赤退乃去蔥豉加麥冬桑葉枇杷葉數帖熱去瀉減譫語止頭痛息喘定神清乃裁菖滑加梨汁地慄海䖳服數日痰漸少欲漸安渴止溺行始進養陰法遂以霍然此人胃氣素不清肅又兼陰虛挾飲故感受溫邪彌見轇轕非此始終如法施治殊難奏效也石子章患腹脹朱某與大劑溫補之藥殊若相安孟英見而非之彼云服之略不助脹正須多服圖痊君何疑焉孟英曰形瘦脈數舌色乾紅此為陰虛熱脹昔年範次侯室暨楊改之如君之恙皆類此醫咸攻補偏施病無小效吾以極苦泄熱微辛通絡之法投之應手而瘳今子病初起時脹不礙食證非氣分可知而溫補不助脹遂服之不疑不知陰愈耗絡愈痹脹雖不加而肌愈削脈愈數干嗆氣急與女子之風消息賁何以異耶尋果不起予按喻氏始言男子亦有血蠱證可見男女雖別而異中有同同中有異臨證者不可膠柱以鼓瑟也沈春暘之母偶患咽喉微痛服輕清藥一劑即覺稍安且起居作勞如常第五日猶操針黹至四鼓第六日忽云坐立不支甫就榻即昏沉如寐亟延王瘦石視之用犀角地黃湯化萬氏牛黃丸灌之繼邀徐小坡亦主是湯云恐無濟乃邀孟英決之切其脈左數右滑皆極虛軟曰王徐所見極是但雖感冬溫邪尚輕微因積勞久虛之體肝陽內動爍液成痰逆升而厥儼似溫邪內陷之候方中犀角靖內風牛黃化痰熱不妨借用病可無虞今日不必再投藥餌矣翼日復診神氣雖清苔色將黑孟英與肅肺蠲痰息風充液之劑熱退而苔色鬆浮孟英曰舌將蛻矣仍與前藥越宿視之苔果盡褪宛如脫液之舌且嘔惡時作大解未行孟英於甘潤生津藥內仍佐竹茹竹瀝柿蒂海䖳數劑嘔止便行而舌上忽布白腐之苔以及齒齦唇頰滿口遍生揩拭不去人皆異之孟英堅守清肅肺胃仍佐茹瀝加橄欖銀花建蘭葉數劑白腐漸以脫下舌色始露惟啜粥則胸次梗梗不舒夜不成寐孟英曰胃汁不充熱痰未淨也仍守前議病家疑之復商於瘦石瘦石云勿論其他即如滿口腐苔酷似小兒鵝白大方證甚屬罕見苟胸無學識者見之必按劍而詫今醫者有不惑之智而病家乃中道生疑豈求愈之道耶沈大愧服一遵孟英設法既而吐痰漸少納穀頗適兩脅又添辣痛孟英診脈左關弦數曰必犯忿怒矣詰之果然加梔楝旱蓮女貞生白芍綠萼梅等數服各恙皆安膚蛻成片而右腿腫痛不能屈伸或疑風氣思用艾灸孟英急止之曰此陰虧耳誤灸必成廢疾吾以妙藥奉贈但不許速效也疏方以西洋參熟地黃蓯蓉桑椹石斛木瓜歸芍二冬杞菊楝實牛膝加無核白蒲桃干為劑久服果得向愈越三載以他疾終吳馥齋室春間娩子不育汛事亦未一行偶患嘔吐發熱眩暈心嘈大解溏泄口渴溲痛或疑其娠或疑為損孟英診曰產及一載而經不至腹不脹脈弦緩非娠非損乃血虛痰滯而感冬溫也以羚羊淡豉竹茹白薇梔子杷葉知母蔥白花粉投之三劑熱退吐止去蔥豉羚羊加生地甘草橘皮調之而愈張肖江妹暮冬患感朱某進溫散藥數服病日劇比孟英視之目瞪不語面赤氣逆晝夜需人抱坐四日不著枕矣乃冬溫挾痰誤提而氣不肅降也以旋赭杏貝花粉茅根冬瓜子紫菀薤白蔞仁蘇子石菖蒲竹瀝為劑蘆菔湯煎三帖大便行而能臥矣自言胸中迷悶改用小陷胸合三子養親加沙參知母旋貝竹茹枇杷葉數劑熱退知飢而愈嗣有王炳華子患感葉某用溫散藥而氣逆礙臥四明老醫王秉衡作腎虛不能納氣治連服大劑溫補喘嗽益劇面浮跗腫抬肩自汗大渴脅痛乞治於孟英已半月不交睫矣診其脈右部弦大而強舌根黑苔如煤者兩條面黧形瘦幸而大解溏泄得能消受許多誤藥徑與旋赭黃連枳實栝蔞蘇子杏仁紫菀生石膏蘆菔汁六大劑始能就枕而大渴不止脘腹反形痞脹按之堅痛乃去旋赭少加白芥子半夏薤白兼令日啖北梨數十枚服旬日胸腹皆舒苔色盡退唯嗽未已改用西洋參杏貝蘆根知母冬瓜子花粉柿霜杷葉竹瀝十許劑嗽止而跗腫渴瀉亦皆霍然矣凡啖梨三百餘斤聞者莫不詫異項肖卿家擁厚貲人極好善年甫三十五歲體甚壯偉微感冬溫門下醫者進以薑桂之劑即覺躁擾更醫迎媚徑用大劑溫補兩帖後發狂莫制又招多醫會診僅以青麟丸數錢服之所親梁楚生宜人聞其危速孟英視之業已決裂不可救藥甚矣服藥之不可不慎也富貴之家可為炯戒屠敬思體氣素弱去冬因子殤於痘醫與舒郁填陰病日以劇僉云不治乃延孟英診之兩關甚數寸上洪滑嗽逆痰多臥不著枕溺赤便難極其畏冷是冬溫未罷誤補熱鬱之候世間之死於勞損者何嘗盡是虛證每為補藥僨事授以廓清肺胃之藥周身發疥各恙漸安蘊伏既清始投滋養善後不僅病愈次年春更得一子本朝乾綱丕振雀頂尚紅冠飾朱纓口燔菸草皆為陽盛之象是以火證偏多夫藥者補偏之物醫為救弊之人豈可不識此大氣運而硜硜然泥夫司天在泉以論治何異癡人說夢耶安徽人程某在余姑丈許辛泉典中司會計仲冬患感醫者聞其病前一日曾啖生蘆菔一枚而大便又溏苔色又白今年又為濕土在泉遂指為中虛寒濕之病參朮附桂多劑率投馴致舌黑神昏尚疑為大虛之候禾中沈柳衣見之知其藥誤另招張鏡江診之曰冬溫也連與犀角地黃湯而無起色二十日外始乞孟英視焉舌縮底絳苔黑如漆口開莖萎脈細數而弦右則按之如無陰液盡爍溫毒深蟠甘露瓊漿不能復其已竭之津矣俄而果敗顧子襄體素豐患頤腫醫投升散之藥神昏氣逆鼻衄大流伊舅氏朱生甫明經為延孟英視之面赤音低不眠脘悶大渴溺赤脈滑數而洪曰冬溫也其苔色白而不燥者內有伏痰耳便瀉如水者肺熱下迫大腸耳豈可以為寒乎予犀角元參旋覆梔芩射干竹茹通銀花石菖蒲服之衄止神清瀉亦不作去犀射加花粉貝母服二劑解堅矢吐膠痰知飢熱退而愈繼有朱氏子右頸腫突外科圍藥甚痛身熱不飢孟英診曰冬溫耳非患癰也敷藥亟令洗淨另以芙蓉葉杵爛塗之投以清解肺衛藥數日而痊朱介眉年逾花甲患感於季冬初服溫散苔色遂黑即投白虎胸脅大疼面赤不眠口乾氣逆音低神憊溺赤便溏醫者僉云不治孟英切脈虛數而弦是真陰素虧痰多氣鬱今年自夏徂冬亢旱已極所伏之邪無非燥熱稍一溫散火即燎原一見黑苔即投白虎而不知其樞機窒滯氣道未舒且陰液耗傷亦非白虎湯僅能滌熱者之任也予沙參葦莖竹茹冬瓜子絲瓜絡展氣開痰蓯蓉當歸紫石英冬蟲夏草潛陽鎮逆覆杯即減旬日而瘥三舍弟拜楓之室汛後患感孟英視曰冬溫也而營分素虧左腹聚氣肝陽爍液痰阻樞機脈數而虛黃苔滿布腰疼礙於呼吸口淡不飢不渴嗽則欲嘔溲熱便秘當變法治之初授蔥豉連楝梔薇延胡絲瓜絡竹茹少加蘇葉服二劑解溏矢苔稍化而身熱退起榻梳髮復發熱脈尚數改用南沙參枇杷葉橘斛梔薇芩翹蘆菔服二帖脈數漸退大解復行心悸汗多時或發熱聞有譫語脅痛不飢苔色根黃即參養血以北沙參歸身石英丹參茯苓黃連萎蕤甘草小麥紅棗核為方服三帖虛熱不作譫語亦休大解已堅夜不成寐不飢胸痞痰滯未清也為去後四味加竹茹半夏鹽橘紅薑汁炒梔子二帖痰果吐胸漸舒仍不知飢神疲不語脈甚細軟乃去芩連梔半加石斛麥冬冬瓜子藕而易沙參以西洋參用陳倉米湯煎藥和入野薔薇露服五帖脈漸起神亦振七帖後知飢而苔花少液去竹茹冬瓜子薔薇露加甘草生地白蒲桃干服二帖粥食雖增耳鳴神憊復加枸杞而地黃用熟者易洋參以高麗參服後苔淨加餐再加黃耆杜仲而愈惟素患帶多仿虎潛法善其後汛至而康蔣君寅昉太夫人患恙適余在武林專丁招往病已七日齦糜頤腫寒熱時形脘悶頭疼不眠不食苔黃便秘脈數而弦是冬令伏邪發為溫病血虛肝旺稟賦使然以枳桔羚翹梔菖蔥頭兜鈴射干為前茅三劑而腫消熱退以小陷胸合梔豉加菖苓竹茹雪羹開中堅亦三劑而便暢胸舒漸啜糜粥以西洋參肉蓯蓉麥冬石斛川貝母竹茹歸身知母黃連為後勁漸安眠食而痊其庶祖母年八十六歲患胸悶便秘少腹瘕痛夜分凜寒兩目更冷不飲不食口苦息粗咸以高年為慮按脈弦數而澀此肝氣素滯食阻上焦升降並愆故脈澀而息不調也豈可誤以為正氣之衰乎進枳桔蔞薤菖菀蘇連橘核旋覆之方投匕而瘥次年春病復如是而較甚余亦以此法瘳之寅昉曾於去冬患血溢與清舒肝膽而安惟久患不眠臂冷食少自云服補心丹及知柏八味丸甚合余曰脈至弦細而緩因賦質陰虧心多思慮五火內熾爍液成痰阻礙氣機故脈證如是滋膩之藥不可再投用沙參丹參絲瓜絡茅根旋覆橘半菖苓服十餘劑而愈伏熱張養之弱冠失怙後即遘無妄之疾纏綿七載罄其貲財經百十三醫之手而病莫能愈因廣購岐黃家言靜心參考居然自療而痊然鼻已壞矣抱此不白之冤自慚形穢乃閉戶學書專工作楷其志良可悼也孟英因與之交見其體怯面青易招外感夏月亦著復衣頻吐白沫詢知陽痿多年常服溫辛之藥孟英屢諫之而己亥九月間患惡寒頭痛自餌溫散不效逆孟英診之脈極沉重按至骨則弦滑隱然臥曲房密帳之中爐火重裘尚覺不足以禦寒且涎沫仍吐毫不作渴胸腹無脹悶之苦咳嗽無暫輟之時惟大解堅燥小溲不多口氣極重耳乃謂曰此積熱深錮氣機鬱而不達非大苦寒以瀉之不可也養之初猶疑焉及見方案辨論滔滔乃大呼曰弟之死生系乎一家之命唯君憐而救之孟英慰之曰我不惑外顯之假象而直斷為實熱之內蘊者非揣度之見而確有脈證可憑但請放心靜養不必稍存疑畏及二三帖後病不略減諸友戚皆詆藥偏於峻究宜慎重服之有於某者揚言於其族黨曰養之之命必送於孟英之手矣眾楚交咻舉家惶惑次日另延陳啟東暨俞某並診孟英聞之急詣病榻前謂曰兄非我之知己也則任兄服誰之藥我不敢與聞也兄苟裕如也則任兄廣徵明哲我不敢阻撓也今兄貧士也與我至交也拮据資囊延來妙手果能洞識病情投劑必效則我亦當竭力慫恿也第恐雖識是病而用藥斷不能如我之力專而劑大也苟未能確識是證而以無毀無譽之方應酬塞責則因循養患誰任其咎也或竟不識是病而開口言虛動手即補甘言悅耳兄必信之我不能坐觀成敗如秦人視越人之肥瘠也今俞某之方如是陳醫殊可卻之速著人趕去辭絕留此一款以作藥資不無小補況連服苦寒病無增減是藥已對證不比平淡之劑誤投數帖尚不見害也實由熱伏深錮藥未及病今日再重用硝黃犀角冀頑邪蘊毒得以通泄下行則周身之氣機自然流布矣養之伏枕恭聽大為感悟如法服之越二日大便下如膠漆穢惡之氣達於戶外而畏寒即以遞減糜粥日以加增旬日後糞色始正百日後康健勝常嗣後雖嚴冬亦不甚畏冷偶有小恙輒服清潤之方陽道復興近添一女養之嘗頌於人曰孟英之手眼或可得而學也孟英之心地不可得而及也我之病奇病也孟英雖具明眼而無此種熱情勢必築室道旁亂嘗藥餌不能有今日矣況不但有今日而十餘年深藏久伏之疴一旦掃除自覺精神勝昔可為後日之根基再生之德不亦大哉張氏婦患氣機不舒似喘非喘似逆非逆似太息非太息似虛促非虛促似短非短似悶非悶面赤眩暈不飢不臥補虛清火行氣消痰服之不應孟英診之曰小恙耳旬日可安但須懲忿是囑與黃連黃芩梔子楝實鱉甲羚羊角旋覆赭石海䖳地慄為大劑送當歸龍薈丸未及十日汛至其色如墨其病已若失後與養血和肝調理而康胡蔚堂舅氏年近古稀患囊腫小溲赤短寒熱如瘧孟英曰非外感也乃久蘊之濕熱下流氣機尚未宣泄與五苓合滋腎加楝實梔子木通兩劑後囊間出腥黏黃水甚多小溲漸行寒熱亦去繼與知柏八味去山藥萸肉加梔子楝實芍藥苡仁等久服而愈壬寅夏感受暑濕誤投溫散以致譫語神昏勢瀕於危而肛前囊後之間潰出腥膿瘡口深大瘍科以為懸癰也敷治罔效時孟英患痁未痊予固邀其扶病一診孟英曰懸癰乃損怯證成之以漸今病來迅速腥穢異常是身中久蘊厚味濕熱之毒挾外受之暑邪無所宣泄下注而為此證切勿敷藥以遏其外走之勢但舌強而紫赤脈細而滑數客邪熾盛伏熱蘊隆陰分甚虧深虞津涸先與清營之劑三投而神氣漸清次以涼潤陽明便暢而熱蠲膿淨改用甘柔滋養月餘潰處肌平善後參入參耆竟得康強如昔用藥次第可法仲冬大雪連朝積厚丈許嚴寒久凍西湖可行車馬斯時也盛少云患痰嗽夜熱自汗不寐左脅痛如針刺肌削不肌自問不起矣請孟英托以後事及診其脈許以可生蓋病來雖惡未經誤藥也與固本加龜板鱉甲蓯蓉知柏青黛石斛花粉白芍楝實海石旋覆貝母蛤殼牛膝出入為大劑投之即效連服四五十帖而痊予謂斯證患於斯時若經別手未有不投溫補者而少云能與孟英遊其亦具眼之人乎此真所謂患難交不可不留心於平日也然亦不能人人而遇之殆佛氏所謂有緣存乎其間歟胡振華以花甲之年患溺後出血水甚痛自云溲頗長激似非火證孟英察脈有滑數之象與元參生地犀角梔楝槐芯側柏知母花粉石斛銀花甘草梢綠豆等藥旬日而痊逾四載以他疾終管氏婦自去秋患赤痢多醫罔效延至暮春孟英診脈弦數苔黃渴飲腹脹而墜五熱夜甚用白頭翁湯合金鈴子散加芩芍梔斛吞駐車丸浹旬而愈濮樹堂室病孟英甫為參愈而樹堂繼焉起即四肢厥逆脈伏惡寒發熱頭痛左為甚惟口渴因與蔥豉二帖解表熱雖退脈仍伏四肢冷過肘膝大解頻行人皆疑為虛寒孟英曰此證儼似陰厥然渴飲溲赤真情已露豈可泥於一起即厥而必定其為寒乎徑投涼解熱果復發而肢冷脈伏如故幸病者堅信服藥不疑至第七日大便瀉出紅水溺則管痛嘔惡煩躁徹夜不瞑人更危之孟英曰熱邪既已下行可望轉機以白頭翁湯加銀花通草芩芍茹滑知斛梔楝羚角之類投三日紅水始止四肢漸和頗有昏瞀譫語用王氏犀角地黃湯一劑四肢熱而脈顯滑數苔轉灰黃大渴遺溺病人自述如臥烘箱上於昨方加入元參銀花竹葉生石膏知貝梔斛服一劑夜間即安寐而苔轉黑燥於昨方復加花粉服一劑熱退而頭面汗多陽越於上懶言倦寐小溲欲解不通陰虛於下諸戚友咸以為危各舉所知病已將愈何危之有而群醫僉云挽救不及病家皇皇孟英曰此證幸初起即予診視得盡力以為死裡求生之舉非比他人之病皆因誤治致危然不明言其險者恐病家惶惑而築室於道旁也今生機已得不過邪去真陰未復但當恪守予法自然水到渠成切勿二三其德以致為山虧簣賴有一二知音竟從孟英議服西洋參生地蓯蓉麥冬楝芍知斛藥一劑溺行索粥再服而黑苔退三服而神清音朗舌潤津回唯有韌痰不能吐左偏頭微痛於原方加二至桑菊貝母牡蠣又復五劑得解硬矢一次各患始安眠食漸適而瘳凡厥逆脈伏之證其熱深藏多不易解非卓識定力不惑於證亦必搖於眾議矣陳足甫溲後見血管痛異常減餐氣短孟英以元參生地知母楝實銀花側柏葉梔子桑葉丹皮綠豆為方藕湯煎服二劑病大減乃去丹皮柏葉加西洋參熟地服之而瘥王開榮偶患腹中絞痛伏暑在內自服治痧諸藥香燥可以益熱而大便瀉血如注孟英診之左頗和右關尺弦大而滑弦滑者痰也大者熱也面色油紅喘逆不寐與葦莖湯合金鈴子散加銀花側柏葉梔斛芩連二帖後面紅退血亦止乃裁柏葉銀花加雪羹枯荷杆又二帖始發熱一夜得大汗周時而腹之痛脹爽然若失即能安寐進粥改投沙參知母花粉桑葉杷葉石斛白芍橘絡杏仁冬瓜子茅根荷杆三帖大解行而脈柔安穀陳叟久患痰嗽氣逆肺氣不清夏初因惡寒熱結在肺自服理中湯遂痰中帶血氣喘而厥二便不通冷汗腹脹孟英察脈洪大按腹如烙與葦莖湯加梔楝旋貝花粉海䖳外以田螺大蒜車前草搗貼臍下即溺行而平高某患兩膝後筋絡痠痛血不養筋略不紅腫臥則痛不可當徹夜危坐孟英切脈虛細苔色黃膩咽燥溺赤與知斛梔楝牛膝豆卷桂枝竹瀝為方送虎潛丸陰虛於下火炎於上煎劑以治其上丸藥以培其下井井有法旬日而瘳張某患發熱醫知其非寒邪也用清解藥數帖腿腫異常身面漸黃孟英診之脈滑實腹脹口乾與茵陳大黃湯兩劑便行而各恙霍然魏女患腳腫嘔吐寒熱便秘孟英與龍膽瀉肝湯而立效繼有孫氏婦患此亦以是藥獲痊此亦肝經鬱熱之證孟英善於調肝故應手輒效馮媼患左目胞起瘰繼而痛及眉稜額角巔頂腦後筋掣難忍醫投風劑其勢孔亟孟英診脈弦勁舌絳不飢與固本合二至桑菊犀羚元參牡蠣鱉甲白芍知母石斛丹皮細茶等出入為用匝月始愈歙人吳永言於十年前讀論語不撤姜食之文因日服之雖盛夏不輟至三年患大溢血雖以涼藥治瘳而時時火升迄今不愈季冬就診於孟英身不衣綿頭面之汗蓬蓬也且云服芩連則煩渴益甚以苦能化燥也用生地即悶滯不飢以甘能緩中也蔗梨入口亦然按其脈沉取滑數是從前之積熱深伏於內與白虎湯去草米加竹葉竹茹花粉海䖳荸薺銀花綠豆恣服漸吐膠痰而愈繼聞趙秋舲進士令郎子循每啖蔗則鼻衄必至或疑蔗為大熱之性孟英曰蔗甘而涼然甘味太重生津之力有餘涼性甚微蕩熱之功不足津虛熱不甚熾者最屬相宜風溫證中救液之良藥吾名之曰天生復脈湯若濕熱痰火內盛者服之則喻氏所謂翻受胃變從而化熱矣凡藥皆當量人之體氣而施豈可拘乎一定之寒熱耶子循之體水虛而火旺者也蔗性不能敵反從其氣而化熱正如蔗經火煉則成糖全失清涼之本氣矣枸杞子亦然朱養之令弟媳初患目赤服藥後漸至滿面紅腫壯熱神昏醫者束手孟英切脈洪實滑數舌絳大渴腹微張以酒洗大黃犀角元參滑石甘草知母花粉銀花黃芩連翹薄荷菊花丹皮兩下之徑愈許培之令祖母年逾七旬久患淋漏屢發風斑孟英持其脈弦而滑舌絳口乾每以犀角生地二至芩蒿白薇元參龜板海螵之類息其暴甘露飲增損調其常人皆疑藥過涼孟英曰量體裁衣稟屬陽旺氣血有餘察其脈色治當如是病者乃云十餘年前偶患崩而廣服溫補遂成此恙始知先天陽氣雖充亦由藥釀為病秋杪患寒熱如瘧喜怒不眠苦渴易飢不能納食孟英察脈弦數倍常與清肺蠲痰柔肝充液之法漸以向安今冬有薦吳古年診治者詢知病原作高年脫營論而以血脫益氣裁方初服三四劑飲食驟增舉家忻幸已而血漏甚多眠食欲廢復延孟英視之仍主前議果得漸康許芷卿患外寒須覆重衾內熱飲不解渴仍能安穀便溺皆行或以為虛寒或以為瘍患投以溫散即顯咽痛孟英脈之沉弦而緩作痰熱內伏投以犀羚元參丹皮白薇黑梔茹貝旋蒡之劑兩帖而寒渴咽疼皆減乃去犀羚牛蒡加二至知母花粉銀花解醬矢而瘳褚芹香女校書患汛愆寒熱醫以為損輒投溫補馴至腹脹不飢帶淋便悶溲澀而痛孟英診脈弦勁而數乃熱伏厥陰誤治而肺亦壅塞也與清肅開上之劑吞當歸龍薈丸兩服寒熱不作而知飢旬日諸恙悉安李德昌之母仲夏患感醫診為濕輒與燥劑大便反瀉遂疑高年氣陷改用補土馴致氣逆神昏汗多舌縮已辦後事始乞診於孟英脈洪數無倫右尺更甚與大劑犀角石膏黃芩黃連黃柏知母花粉梔子石斛竹葉蓮心元參生地之藥另以冷雪水調紫雪灌一晝夜舌即出齒而喉舌赤腐咽水甚痛乃去三黃加銀花射干豆根並吹錫類散三日後脈證漸和稀糜漸受改授甘涼緩劑旬日得堅黑矢而愈幼科王蔚文之甥女向依舅氏於三年前患熱病甚危服多劑涼解始愈第寢食雖如常人而五心恆熱黑苔不退口苦而渴畏食葷膻頻餌甘涼之藥經來色黑不紅去年適吳氏仍服涼藥迄不能痊今夏伊舅氏浼孟英診之脈甚滑數曰此熱毒逗留陽明之絡陷入衝脈以沖隸陽明也然久蘊深沉尚不為大患者以月事時下猶有宣泄之路也其頻年藥餌寒之不寒者以熱藏隧絡湯劑不能搜剔也令每日以豆腐皮包紫雪五分吞下半月後苔果退渴漸減改用元參丹參白薇黃芩青蒿煎湯送服當歸龍薈丸又半月經行色正各恙皆蠲尋即受孕焉周光遠令正孀居十載年已五十三歲汛猶未絕稍涉勞瘁其至如崩偶患少腹偏左掌大一塊作疼其疼似在皮裡膜外拊之痛甚越日發熱自汗眩冒譫語嘔渴不飢耳聾煩躁孟英循其脈虛軟微數左兼弦細便溏溲熱舌本不赤略布黃苔營分素虧而有伏熱阻於隧絡重藥礙投姑予芩連芍楝竹茹桑葉白薇通草橘核絲瓜絡燈薪少加硃砂和服一劑勢即減二劑熱退嘔止啜粥神清第腹猶痛去桑芩燈芯硃砂加蓯歸苡藕服數帖而起迫季冬其君姑七十八歲患腹痛痛亦僅在皮膜仍能納食二便無疴數日後痛及兩腰機關不利礙於咳嗽痰出甚艱而有鹹味夜不能瞑孟英視曰肝腎大虛脈絡失養也以沙參熟地歸杞蓯膝杜仲石英羊藿絡石薏苡胡桃等藥進之日以遞愈繼用一味桑椹善後而康葉承恩年五十歲患發熱暮甚肢厥頭疼嘔惡便溏睡則囈語不飢不渴汗出上焦自覺把握不住延孟英診之脈軟澀而不鼓指右手尤甚宛似虛寒之證惟舌本紫苔雖薄而黃膩口苦眼鼻時覺出火是真陰素虧而熱伏於內也予梔連桑菊茹翹芩斛銀花絲瓜絡蓮子心出入數劑熱囈皆減脈亦較和溲赤而疼大解色醬知其伏熱下行矣又數劑苔始退而知飢參以養陰而愈蔡湘帆年二十歲體素豐偶發寒熱翼日尚吃飯出門自不知為病也第三日寒熱大作莖縮不能小溲氣喘大汗眩暈不支乞孟英往診舉家倉皇大哭循其脈緩大而滑苔色黃膩脘下拒按曰無恐也予菖枳旋蔞梔豉連半茹䖳以蘆菔湯煎服一劑大吐痰涎而喘汗平二劑莖舒溲暢而大解行越日寒熱即減又兩劑瘧罷知飢而愈然李東垣諄諄以內傷類外感為言而溫熱暑濕之病初起極類內傷往往身未發熱而手心先熱或兼眩暈自汗設泥古法而不辨證禍可言哉徐仲榮四令弟德生患感至旬余忽然大戰大汗而大便兼下瘀血朱茂才視之不知戰解之義以為將脫也率投大劑溫補藥一服汗收壯熱杳不知飢渴飲無眠舌赤溲少遂束手更醫謂汗下傷陰滋填疊進馴致身難轉側懶語音低者又旬余矣所親吳愛棠囑延孟英圖之脈弦數而駛按其胸下堅且痛舌絳而根苔黃滯曰汗下傷陰固然惟府猶實也滋膩曷可投耶然一病至此又難攻奪姑以善藥通之因予小陷胸湯合雪羹加茹杏紫菀白前冬瓜子蘆菔和梨汁服二帖堅黑之矢果下仍夾瘀血身熱遂緩稍進稀糜改用清養肺胃以充津液旬日後熱淨溲澄知飢安穀惟舌不生苔寐即汗出授大劑滋陰而愈德生有一婢年十七矣陡患腹痛稍一言動則痛不可支舉家疑為急痧中惡多方以圖皆不應飛速孟英往視見其神色如常並不吐瀉脈則牢澀苔則膩黃曰此多食酸甘而汛阻也詢之果然以桃仁紅花生蒲黃靈脂海䖳香附延胡芍藥蘆菔湯煎藥吞當歸龍薈丸而愈陳載陶令郎夏間患嗽瀉愈後時發微熱寢汗如蒸醫治兩月迄不能退時猶作嗽咸以為勞其世父喆堂逆孟英視之熱甚於頸面形瘦口乾脈則右大曰肺熱不清也養陰之藥久服勢必弄假成真熱錮深入而為損怯之證亟宜淡泊滋味屏絕補物以芩梔地骨桑葉苡仁枇杷葉冬瓜皮梨皮葦莖為劑服後熱汗遞減至九帖解醬矢赤溲皆極熱而臭自此熱盡退而汗不出矣惟噫猶不暢時欲太息飽則胸下不舒乃滋膩藥所釀之痰未去也改用沙參枳實旋覆冬瓜子竹茹白前栝蔞海䖳橘皮數帖而胸舒嗽斷體健餐加張某患四肢發熱久治不痊食減便溏汗多形瘦張孝子謂此證非孟英不能愈遂往就診曰熱厥也前此必誤服補藥矣故脈來甚澀以芩梔連柏白薇通草地骨青蒿絲瓜絡為方十餘劑而瘥傅與三令正年已花甲患瘧服藥浹旬而斷乃夜不能眠者數日忽然吐瀉交作肢冷自汗渴喜熱湯神氣張皇而有譫語張某謂元虛而所用之藥乃桂芍萸連葛霍烏藥木香之類病家欲投溫補迎孟英質之脈來浮弦軟數尺中甚弱舌絳無液稍有黃苔乃真陰素虧久傷謀慮吸受暑熱化瘧未清擾及中州則為吐瀉詢所吐果有酸甘苦辣之味瀉亦色醬而熱如火豈非伏熱之的據耶然邪已自尋出路故腹無痛苦況汗出如淋不獨用香燥疏散之藥為耗液即溫補如理中四逆亦無非助熱而重劫其津也乃定沙參龍牡朱染茯神黑豆皮薏苡木瓜小麥竹針鮮蓮子之方一劑而吐瀉皆止得寐神清且略知飢稍能收谷次日復診病者云儂舌上脫液者三十年矣是以最怕熱藥奈群醫謂瘧宜溫化以致愈服愈殆設非先生眼光如炬恐昨日已登鬼錄矣尋以充液柔肝而愈李華甫年六十三歲仲夏患惡寒氣逆不飢即請孟英視之脈甚虛軟舌本紫而滑澤無苔溲頻數而濃赤不禁陰莖已縮兩手紫黯乃心陽過擾熱伏厥陰之象不可謂無熱惡寒發於陰而認為真傷寒也雖平昔耽飲嗜茶設投燥劑則液之涸也不須旋踵爰以蔥豉茹芩梔薇桑葉通草輕解其外至夜始發熱再劑微汗而解獨腹熱如烙舌漸干而口渴改予西洋參元參生地麥冬甘草花粉梔楝蓯茹和青蔗汁服二帖下堅矢而舌愈干且譫語不寐於前方加竹葉木通服之舌根始見黃苔知伏熱漸化再一劑苔轉黑原方調以神犀丹一丸即戰解而舌始潤稍啜稀糜猶妄言無寐乃心陰久耗陽不能收也仍以前方加童溲和服兩帖大解復行神氣漸謐諸恙尋愈此證設犯溫升即難救藥幸初發得遇名手始克扶危持顛旬日而愈故為相者治天下當因民之所利而利之不必務虛名而復井田肉刑也為醫者治人亦當因病之所利而利之不可守成法而泥麻黃桂枝也丙辰春初余遊梅涇曹靄山茂才拉視其令郎之證云起於往夏瘧後暮熱鼻衄善欠羞明頞頰時酸溲渾有腳先稟素弱僉慮成勞頻服滋填毫無寸效久不起榻及余診之脈軟滑而微長苔淡黃而不渴僅能仰臥反側不能曰此非虛勞也乃熱伏陽明是以機關不利筋骨不束而見以上諸證幸衄血頻流小溲混濁熱氣尚有宣泄而人不甚枯削以陽明為多氣多血之經也與生槐蕊知柏芩梔白薇花粉茅根茹斛絲瓜絡等藥久服果漸愈伏暑壬辰八月範蔚然患感旬余諸醫束手乃弟麗門懇孟英治之見其氣促音微呃忒自汗飲水下咽隨即傾吐無餘曰伏暑在肺必由溫散以致劇也蓋肺氣受病治節不行一身之氣皆失其順降之機即水精四布亦賴清肅之權以主之氣既逆而上奔水亦泛而上溢矣但清其肺則諸恙自安乃閱前服諸方始則柴葛羌防以升提之火藉風威吐逆不已猶謂其胃中有寒也改用桂枝乾薑以溫燥之火上添油肺津欲絕自然氣促音微疑其虛陽將脫也徑與參歸蛤蚧柿蒂丁香以補而納之愈補愈逆邪愈不出欲其愈也難矣亟屏前藥以瀉白散合清燥救肺湯數服而平妙論不獨治暑為然凡上而不下之證皆可類推孫位申患感證見耳聾醫者泥於少陽小柴胡之例聾益甚孟英視之曰伏暑也與傷寒治法何涉改投清肺之藥聾減病安將進善後法矣忽一日耳復聾孟英診之莫測其故因詰其食物云昨日曾吃藕粉一碗孟英曰是矣肆間藕粉罕真每以他粉攙混此必葛粉耳不啻誤服小柴胡一劑復投肅清肺胃藥尋愈錄此以見其審證周詳所謂無微不入也顧宗武偶患微寒發熱醫進溫散法熱雖退而不飢不大便復用平胃散數帖腹漸脹而偏於右尚疑其中氣之虛寒也遂與溫運燥補諸藥脹乃日增杳不進谷或謂恐屬癰瘍因招外科連某診之作脅疽治病如故黃某作腸癰論以大黃瀉之亦不應嚴某謂脅疽部位不對腸癰證據不符作內疝治仿子和活人之法及當歸龍薈丸相間而投亦無效乃延孟英視之脈極弦細而促舌絳大渴小溲赤少飲而不食者月餘矣證實脈虛堅辭不治其家問曰此證究是何病乞為指示孟英曰據述病人素慎起居而薄滋味顯非停滯與癰疽之患良由暑濕內蘊勢欲外泄是以初起有微寒發熱之候誤與風寒藥熱雖暫退於表邪仍伏處於中不飢不便肺胃失其下行再加辛燥溫補氣機更形窒滯伏邪永無出路津液潛消䐜脹日甚以氣血流行之臟腑為暑濕割據之窠巢補之不可攻之不能痛雖不在膏肓盧扁望而驚走逾旬徑歿雜藥亂投一何可笑黃蓮泉家戚嫗病痢朱某以其年老而為舍病顧虛之治漸至少腹結塊攻痛異常大渴無溺杳不知飢晝夜百餘行五色並見呼號欲絕始延孟英診之脈至沉滑而數因謂曰縱使暑熱深受見證奚至是耶此必溫補所釀耳夫痢疾古稱滯下明指欲下而澀滯不通也顧名思義豈可以守補之品更滯其氣燥烈之藥再助其虐乎少腹聚氣如瘕痢證初起因於停滯者有之今見於七八日之後時欲沖逆按之不硬則顯非停滯之可擬實為藥劑之誤投以致邪濁蟠踞滋蔓難圖及檢所服諸方果是參朮薑萸附桂慄殼故紙川椒烏梅等一派與病刺謬之藥孟英曰彼豈讎於汝哉畏老而補之見痢而止之亦未嘗不煞費苦心而欲汝病之即愈惜徒有欲愈之心未明致愈之道但知年老元虛不聞邪盛則實彼亦年近古稀懸壺多載竟畢世沉迷於立齋景岳諸書良可嘆也豈造化果假權於若輩乎不然何彼書彼術之風行哉戚云壬寅之病賴君再生今乃一誤至此恐仙丹不能救矣孟英曰幸未嘔噦尚可希冀一二遂與蓯蓉楝芍芩連橘斛楂曲元胡綠梅鱉甲雞金鼠矢海䖳出入互用數帖漸安繼加駐車丸吞服逾月始健痢疾初起即補變成噤口者有之延為休息者有之邪因補而固結不解雖有明手無如之何良可嘆恨上虞陳茂才患頭痛三日一發發則惡寒多藥不效飲食漸減或擬大劑姜附或議須投金石葛仲信囑其質於孟英察脈甚弦重按則滑曰熱暑伏厥陰也溫補皆為戈戟與左金加楝芍梔桑羚丹菊橘為劑煎吞當歸龍薈丸三服而減旬日即痊關穎庵患寒熱醫者泥於今歲之司天在泉率投溫燥以致壯熱不休阮某用小柴胡和解之治遂自汗神昏苔黑舌強肢掣不語唇繭齒焦張某謂斑疹不透擬進角刺荊蒡越醫指為格陽假熱欲以附子引火歸原許芷卿知為伏暑而病家疑便溏不可服涼藥覆逆孟英診之曰陰虛之體熱邪失清最易劫液幸得溏泄邪氣尚有出路正宜乘此一線生機迎而導之切勿遲疑遂與芷卿商投晉三犀角地黃湯加知麥花粉西洋參元參貝斛之類大劑服八九日甫得轉機續與甘涼充液六七劑忽大汗如雨者一夜人皆疑其虛脫孟英曰此陰氣復而邪氣解也切勿驚惶嗣後果漸安穀投以滋補而愈繼有陳菊人明府乃郎病較輕於此因畏犀角不敢服竟致不救豈不惜哉因前醫之誤而始思轉計已非良醫所為況明睹溫燥表散之害而仍蹈覆轍焉足云醫錢氏婦懷妊四月而患寒熱如瘧醫與發散安胎乃至舌黑神昏大渴便泄臭痰頻吐腰腹痛墜人皆不能措手孟英診曰伏暑失於清解舌雖黑而脈形滑數痰雖臭而氣息調和是胎尚未壞猶可治也重用氣血兩清之藥五劑而安糜粥漸進腰腹皆舒胎亦躍躍趙春山司馬向患痰嗽自秋仲以來屢發寒熱吳古年從伏暑化瘧治頗為應手而一旬半月之後病必復至延至季冬董蘭癡鹺尹囑其質於孟英按脈滑數舌絳苔黃渴飲溲赤動則喘逆夜不成眠痰多畏冷自問不能起矣孟英曰無恐也不過膏粱釀痰溫補助熱是為病根迨夏吸暑邪互相轇轕秋半而發勢頗類瘧古年雖識其證惜手段小耳因與羚羊豆豉連翹薄荷知母花粉竹茹貝母旋覆海䖳元參梔子醒頭草梨汁等藥服五劑熱退不畏冷去前四味加沙參麥冬葳蕤枇杷葉漸能安寐各恙遞減再加生地服匝月而體健勝昔登高不喘司馬雲余昔曾服參茸大補之藥而陽痿今服君方而沉疴頓起乃知藥貴對證不貴補也余朗齋令堂秋間患伏暑孟英已為治愈失於調理復患氣衝自汗肢冷少餐攻補不投仍邀孟英治之與填補衝任清滌伏痰法合甘麥大棗以補血而愈許芷卿痁起季秋孟英嘗清其伏暑而將愈其從母亦知醫強投以小柴胡一劑勢復劇孟英予溫膽湯去甘草加生石膏黃芩知母花粉蘆菔而安繼因作勞太早而復發適孟英丁憂趙君笛樓仍用清解而瘥迨季冬移居勞頓瘧復間作且面浮跗腫喘嗽易嗔人皆以為大虛之候孟英切脈左弦勁而數右滑大不調苔黃且膩口渴溺多乃胃肺之痰熱有餘肝膽之風陽上僭畏虛率補必不能瘳用西洋參知母花粉竹茹蛤殼石斛枇杷葉青蒿秦艽白薇銀花海䖳為方連投四劑大吐膠痰而各恙悉除沈氏子年甫髫仲秋患感兩旬屢醫弗愈求孟英視之神昏譫語面慘無眠舌絳耳聾頻吐白沫脈數溺少渴飲不飢熱已甚微汗亦頻出牛黃紫雪數進無功以元參丹參白薇知母葦莖竹茹旋覆冬瓜子蛤殼石斛枇杷葉竹葉花粉蓮子心西瓜翠衣等出入為方數服而愈蓋邪雖傳營氣分未廓故雖善飲水而敷布無權不能下行為溺但能旁溢為汗上行為沫良由初起不知為暑治以表散風寒之藥及至傳營又不知營衛兩解之法徒以直走膻中之藥漫圖僥倖何異鸚鵡學人言而不知所以言耶邱小敏初發熱即肢瘛腹痛臥則昏譫坐起即清膈間痞悶飲亦礙下舌色紫腫苔厚膩黃身面赤色齦腫而疼醫見其病情錯雜初以為斑疹之候進透發之劑渾身冷汗又慮內閉外脫灌以紫雪病如故又疑熱入血室用桃仁茺蔚丹皮藕汁童溲等藥又恐其虛用西洋參龜板等味遂言謇呃逆正在彷徨適病者登圊更衣忽然昏暈謂欲虛脫欲進生脈飲以固元氣舉家無措所親姜柳湖請孟英往診之脈洪弦而兼滑數病屬暑濕惟肝氣素郁肺胃多痰是以升降失常邪氣壅塞臥即神昏者乃濕熱上熏也故坐起則爽彼熱入血室乃晝明瞭而夜譫語非晝臥即昏夜坐即明也治宜清展氣機病必化瘧而解設以溫散表其汗則邪熾而津劫若以滋補固其元則邪閉而正脫誤用血分藥則引邪入營徒用寒潤法則遏邪不化先以雪羹梔楝旋枳連蔞芩半菖茹元參銀花絲瓜絡等出入為方吞當歸龍薈丸果轉為瘧各恙遞減連下黑矢半月後便色始正而瘧亦止胃醒安穀而瘳停藥數日偶因嗔怒其瘧復作寒少熱多睛赤齦疼汗多足冷孟英曰餘熱逗留風陽內煽也視其苔灰黃夾黑因謂其弟桂山曰但看黑苔退淨則邪自清矣仍予元參白薇知芩梔茹銀花木通絲瓜絡菊葉等送龍薈丸瘧即遞減逾旬苔淨眠食如常而起矣高魯川家兄禮園之外舅也年近古稀新秋患感顧某進清解藥二劑熱即退以其年高遂用滋養越日復熱謂欲轉瘧改用厚朴薑棗等藥遂熱壯神昏速孟英視之脈形滑數舌心已黑溲赤乾嘔粥飲不入亟予元參知母花粉銀花竹茹枇杷葉蓮子心梔子白薇西瓜翠衣為劑數帖霍然許梅生仲郎恬甫年未冠仲秋患感醫知其陰虛伏暑也疊進清衛涼營之法旬餘熱退以為無慮矣惟六日不更衣因用生地麻仁花粉等藥服後果欲大解及登圊大瀉一次人即汗暈急扶上榻連瀉二三十次滿床皆汙盡是黃水身復發熱肢痙音低唇焦齒槁苔色干黃而渴舌不能伸目不欲張速孟英勘之脈微細欲絕而呼吸甚促按其心下堅而且痛曰疾不可為也緣初治失於開泄胸中痞結而津液不能敷布盡從下脫攻補皆難措手矣翼日果殞四舍弟西甫年二十四歲秋杪患感至六日神漸昏延孟英診之脈形澀滯苔垢頭疼氣逆汗頻腰疼溲少脘悶拒按乃伏暑晚發而本元極虧也亟與開中俾有去路小陷胸加梔菖豉芩白薇翹枳蘆菔湯煎服一劑脘不拒按苔亦稍退汗不達於下部脈來軟而且澀改授茹半芩梔橘翹知蛤花粉蓮子心之劑三服脈轉弦數大解未行譫語不休夜間熱熾肢涼頭暈濁熱上熏也以芩蔞梔連茹翹元參白薇丹皮海䖳竹葉投之乃下堅黑大便而圊後神暈苔漸薄而轉黑為去芩蓮蔞䖳加犀角鮮生地知母花粉兩帖更衣仍黑氣乃漸平肢亦漸溫熱渴均減猶不知飢脈軟而虛苔退未淨乃去犀翹加西洋參麥冬銀花菖蒲服三劑又解黑矢舌色始津而寐不安神汗多心悸因去知母花粉丹皮加甘草丹參茯苓而地黃用乾者兩帖大解甚暢胃漸知飢稍進稀糜力不勝啜脈亦虛大寐即神馳乃邪未清而虛畢露也用西洋參生地龍齒歸芍芩甘連柏麥冬小麥服五劑復下醬矢而右脈尚虛大又六帖糞色始正汗減神安脈漸柔和寢食乃適嗣又食複數次賴孟英活潑如龍隨機應變竟以告愈洵屬再生一勞力人發熱左脅疼咳嗽礙眠痰出甚臭苔黃舌絳渴飲譫語便秘溲赤脈形滑數乃伏暑證詢其平昔嗜飲醉後必向左臥故濕熱釀痰久積於左非內癰也以葦莖湯去苡仁加雪羹芩滑茹翹梔蔞旋覆木通等出入三劑大便行譫語止而痰出更多其臭益甚仍用前藥又四劑痰始少而不臭熱淨能眠知飢苔退改授甘涼養液而瘳翁某年甫冠仲冬患感醫與溫散藥數帖神悗耳聾苔黑便瀉胸痞腹脹溲少妄言孟英切脈細數而澀乃暑濕內伏氣鬱不宣也投以犀角銀花元參連翹菖蒲鬱金黃連藥一劑熱退神清脘不拒按別恙未減脈則弦細而數口轉發渴改用芩翹樸斛連楝銀花通草蘭葉冬瓜皮為劑兩啜化為間瘧其瘧發一次則苔化一層脹減一分粥加一盞藥不更張凡四發而苔淨脹消脈和溲暢嗣予調養而康朱氏婦患赤痢匝月多醫雜治痢止三日矣而起病至今胸頭痞脹米飲不沾口渴苔黃溲熱而痛凜寒身熱夜不成眠神憊形消諸醫技窘乞余往視脈數而弦伏暑未清營津已劫氣機窒塞首議清泄南沙參石菖蒲蔞薤梔芩茹連橘半白薇紫菀四劑而痰活胸舒寒熱大減且能啜粥改用北沙參生首烏柏子仁冬瓜子元參蔞薤菖梔二劑堅矢下用清養法而痊錢君友琴年五十九歲曾於七月間患滯下自服大黃一劑而瘥季秋患寒熱時作自服柴桂等藥病益甚狂躁欲啖西瓜而服石膏余診之脈滑右甚苔色膩黃便秘溲短胸痞不沾粒米乃暑濕夾痰阻於氣分治宜開泄白虎不可投也用蔞薤枳樸連夏茹芩菀桔服三劑二便既暢胸次豁然而愈矣季夏余遊檇李陸君又溪邀視其友王姓之病寒熱時作汗多不解便溏不暢溲赤妄言面黑如煤苔黑大渴煩躁氣逆脈滑而洪按其心胸堅硬而痛乃暑濕夾痰食也群醫但知時感輒進寒涼聞說胸次不舒遂疑為疹羚犀膏地力竭計窮已令病家備後事余曰此非重證何必張皇撤被啟窗勝於服藥病家唯唯而不甚信余即手為揭被開窗病人即曰舒暢多矣藥以小陷胸加芩枳翹茹薤菖海䖳數服而愈繼有里中張姓者證相類面不黑而紅舌無苔而干諸醫亦不察其氣分之尚結痰食之未行屢進生地唇齒漸焦遂束手余以小陷胸加元參海䖳菖枳芩翹一飲而脘舒得臥齒舌皆津蓋結散邪行則氣通液布也乙卯六月餘三媳患感身熱頭重脘悶頻嘔不食耳聾余投清解藥一劑病不少減而汛事非期而至邪雖尚在氣分但營陰素虧恐易陷血室亟迓半癡至投小柴胡加減一帖病少瘥而虛象畢呈少腹右角甚形掣痛半癡於清解中即佐養營通絡柔肝之品服四帖證交七日得大戰汗而愈原方為三兒遺失惟記後四帖重用乾地黃為君是血虛者必養血則得汗而兒婦氣分甚郁苟不先行清展氣機則養血之藥不能遽入此因事制宜之所以不易也要在先辨其體氣與病情耳更奇者同時余內侄許貫之茂才室體極清癯似較余媳更弱且娩已五次而產後即發壯熱半癡視為暑證投大劑涼解數帖即戰汗而瘥無何胃氣漸復忽又壯熱便閉渴悶不飢或疑新產誤餌涼藥使然幸病家素信仍延半癡診之右甚滑實曰食復也詰之果啖豆腐稍多遂投枳實梔豉湯加蔞翹桔薄蘆菔汁三啜而痊斯人斯證使他醫視之必以為營陰大虧矣而半癡獨不顧及憑證用藥應手而痊且愈後不勞培補尋健如常可見產後不必皆虛而體氣之堅脆亦不能但憑於形色之間也嘻難矣丁巳冬余假館潛齋適半癡草歸硯錄余讀至結散邪行氣通液布二語因追憶兩案筆之於此又可見佳案之遺漏尚多惟冀同志者鈔存以期續採仁和徐然石附識霍亂胡琴泉舅氏家一潘嫗年逾古稀患霍亂轉筋瀕危孟英用自制蠶矢湯而瘳王某久患吐血體極孱弱沈琴癡囑其乞孟英治之服藥甫有小愈而酷暑之時陡患霍亂轉筋大汗如雨一息如絲孟英視曰陰血久奪暑熱鴟張吾霍亂論中之缺典也姑變法救之用北沙參枇杷葉龍牡木瓜扁豆苡仁滑石桑葉蠶砂石斛豆卷投之良愈調理每日仍服滋補以治宿恙越二載聞服溫補藥致血暴湧而亡戚媼者年六十餘矣自幼傭食於黃蓮泉家忠勤敏干老而彌甚主僕之誼勝於親戚也秋間患霍亂轉筋孟英視之暑也投自制蠶矢湯兩服而安三日後忽然倦臥不能反側氣少不能語言不飲不食蓮泉惶懼不暇遠致孟英即邀濟仁堂朱某診之以為霍亂皆屬於寒且昏沉欲脫疏附子理中湯與焉蓮泉知藥猛烈不敢遽投商之王安伯安伯云以予度之且勿服也若謂寒證則前日之藥下咽即斃吐瀉安能漸止乎蓮泉聞之大悟著人飛趕孟英至而切其脈曰此高年之體元氣隨瀉而泄固當補者第余暑未清熱藥在所禁耳若在孟浪之家必以前之涼藥為未當今日溫補為極是縱下咽不及救亦惟歸罪於前手寒涼之誤也設初起即誤死於溫補而世人亦但知霍亂轉筋是危險之證從無一人能知此證有陰陽之異治法有寒熱之殊而一正其得失者此病之所以不易治而醫之所以不可為也今君見姜附而生疑安伯察病機之已轉好問者心虛識機者智贍二美相濟遂使病者跳出鬼門關醫者卸脫無妄罪幸矣幸矣乃以高麗參麥冬知母萎蕤木瓜扁豆石斛白芍苡仁茯苓蒺藜為方服六劑始能言動漸進飲食調理月餘而健七月十八日夜予患霍亂轉筋甚劇倉卒間誤服青麟丸錢許比曉急邀孟英診之脈微弱如無耳聾目陷汗出肢冷音啞肌削危象畢呈藥恐遲滯因囑家慈先濃煎高麗參湯亟為接續隨以參朮白芍茯苓附桂乾薑木瓜苡仁扁豆蓮實為方一劑而各證皆減次日復診孟英曰氣分偏虛那堪吐瀉之泄奪誤服苦寒微陽欲絕昨與真武理中合法脾腎之陽復辟矣剛猛之品可以撤去蓋吐瀉甚而津液傷筋失其養則為之轉薛生白比之痙病例可推也凡治轉筋最要顧其津液若陽既回而再投剛烈則津液不能復而內風動矣此治寒霍亂之用附桂亦貴有權衡而不可漫無節制致墮前功也此一段議論極精微凡用寒用熱俱宜具此權衡方無過當之弊否則藥雖中病而服之不止及受其害矣喻氏論中寒證亦具此意即於前方裁去薑附肉桂加黃耆石斛服至旬日而愈予謂此番之病危同朝露若非孟英恐不能救常聞張柳吟云但使病者聽孟英論病之無微不入用藥之無處不到源源本本信筆成章已覺疾瘳過半古云檄愈頭風良有以也可見浙人稟賦之薄若幽冀之人即誤服青麟丸數錢亦不至如斯之甚也陳藝圃亦知醫其室人於仲秋患霍亂轉筋自診以為寒也投熱劑勢益甚延朱茂才視之亦同乎主人之見也病尤劇始請孟英決之曰寒為外束之新邪熱是內伏之真病口苦而渴姜附不可投矣與河間法人皆不之信也再與他醫商之仍投熱藥乃至口鼻出血而死極其悔嘆始服孟英之卓見予謂霍亂一證近來時有而醫皆不甚識得清楚死於誤治者極多孟英特著專論雖急就成章而辨晰簡當略無支漏實今日醫家首要之書以其切於時用不可不亟為熟讀而研究也段堯卿之太夫人患霍亂轉筋年逾七十矣孟英投自制連樸飲三啜而瘳霍亂案甚夥不遑廣採姑錄數則以示一斑陳嫗年已七旬患霍亂轉筋甚危亟拉孟英救之已目陷神消肢冷音颯脈伏無溺口渴汗多腹痛苔黃自欲投井令取西瓜汁先與恣飲方用白虎加芩連黃柏木瓜威靈仙略佐細辛分許為劑覆杯即安人皆疑用藥太涼何以徑效孟英曰凡夏熱亢旱之年入秋多有此病豈非伏暑使然況見證如是之熾烈乎今秋余已治愈多人詢其病前有無影響或曰五心煩熱者數日矣或曰別無所苦惟睹物皆紅如火已而病即陡發夫端倪如此更為伏暑之的據焉李華甫繼室陡患霍亂而兼溺血如注頭疼如劈自汗息微勢極危殆迎孟英診視脈極弦駛是肝陽內熾暑熱外侵先用犀角木通滑石梔子竹茹薏苡銀花茅根菊葉為大劑和入藕汁送當歸龍薈丸而霍亂即安惟溺血雖減而小溲時頭猶大痛必使人緊抱其頭重撳其巔始可略耐尚是風陽僭極肺胃不清也以葦莖湯去桃仁加百合白薇元參竹葉西瓜翠衣菊葉蓮子心為方和入童溺仍吞龍薈丸服旬日而愈繼有祝氏婦患溺血五六年矣醫皆作淋治孟英診視脈弦數苔黃口苦頭疼溺熱曰是溺血也法宜清肝與久淋當滋補者迥殊病者極為首肯蓋其出路自知而赧於細述故醫者但知其為淋也陳楚珍仲媳陡患霍亂亟迓孟英治之云昨晚曾食冷魚夜深病作想由寒重致此然臍間貼以回陽膏而不效奈何及診脈右甚滑數口渴苔黃今按胸下果堅硬而痛曰吐瀉雖多宿食戀膈非寒證也回陽膏亟為揭去以石菖蒲枳實蘇葉黃連半夏竹茹海䖳蘆菔為方服之一劑霍然暑劉廉方常州名士也在西湖受暑移榻於崔仲遷別駕處醫治垂危莊芝階舍人拉孟英往診之裸臥昏狂舌黑大渴溺赤便秘脈數而芤與犀角地黃湯加減服之神識已清略能進粥次日復診頗知問答大有生機仍處甘涼法以贈之並囑伊格外謹慎而越日莊半霞詣孟英偕往診視見其目張睛瞪齒露唇焦氣喘汗出揚手擲足而不可救藥也眾楚交咻謂是寒涼藥凝閉而然孟英曰病之宜涼宜熱汝輩不知也脈乃皮里之事汝等不見也吾亦不屑為之爭辨惟目瞪唇焦人所共睹則其死於何藥自有定論遂拂衣出半霞再三請罪孟英曰俗人之見何足介懷是非日後自明於我心無慊焉第斯人斯病皆可惜也既而始知有人主熱藥以僨事豈非命耶僅二載而仲遷病孟英聞之曰殆矣蓋知其陰虛而受暑濕恐主藥者未必能悔悟於前車也後果聞其廣服溫補之劑以致真陰竭絕而死覆轍相尋迷而不醒可哀也已五月下旬天即酷熱異常道路受暑而卒死者甚多即古所謂中暍也而不出戶庭之人亦有是病延醫不及醫亦不識此證雖死身不遽冷且有口鼻流血者孟英曰是暑從吸入直犯心臟也惟新產婦人陰血大去熱邪易襲故死者尤多奈愚者不知因時制宜尚扃其窗戶幕以簾幃環侍多人皆能致病又粗工不察天時人秉之不齊動輒生化湯以致覆杯而斃者比比即沙糖酒亦能殺人不可不慎孟英曰六一散既清暑熱又行瘀血當此酷暑之令誠為產後第一妙方特為拈出幸救將來孟英曰吾聞姚氏婦妊已臨月腹中作痛家人謂其將娩急煎參湯令服服後痛益甚忙喚穩婆至已渾身赤斑喘逆昏狂雖知受暑竟不及救又曹氏婦亦懷妊臨月腹痛家人疑其欲產而煎參湯迨湯成痛已止察其情景知不即娩然炎威甚烈參湯久存欲壞其姑云婦既未娩豈可服參滯胎我體素虛常服補劑參湯定亦相宜遂服之甫下咽即覺氣悶躁擾霎時危殆多方拯治逾刻而終予按富貴人之死於溫補者固為常事當酷暑之令漫不少懲誠下愚之不可移矣附錄於此以冀司命之士鑑而戒之陳某自黔來浙一小兒發熱肢搐幼科與驚風藥遂神昏氣促汗出無溺適孟英至而視之曰暑也令取蕉葉鋪於泥地與兒臥之投以辰砂六一散加石膏知母西洋參竹葉荷花露一劑而瘳繼有胡氏女病略同兒科云不治因懇於孟英亦以此法活之潘紅茶方伯之孫翼廷館於許雙南家酷熱之時啜冷石花一碗遂致心下痞悶四肢漸冷而上過肘膝脈伏自汗方某診謂陽虛陰暑脫陷在即疏大劑薑附丁桂以回陽雙南在蘇其三郎杏書駭難主藥邀族人許芷卿診而決之芷卿雲此藥斷不可投第證極危急須逆孟英商之時夜已半孟英往視曰既受暑熱復為冷飲冰伏胸中大氣不能轉旋是以肢冷脈伏二便不行速取六一散一兩以淡鹽湯攪之澄去滓調下紫雪丹一錢藉辛香以通冰伏之氣用意精妙翼日再診脈見胸舒溺行肢熱口乾舌絳暑象畢呈化而為瘧與多劑白虎湯而愈丙午舉於鄉認證既確治法又極精妙真可謂萬世法程金曉耕發熱二旬醫與表散竟無汗泄嗣與溫補而大解泄瀉小水不行口乾肌削勢瀕於危胡秋紉薦孟英診之右寸獨見沉數曰暑熱錮於肺經耳與白虎葦莖天水加芩桔杏貝為方服後頭面㾦疹遍發密無針縫明如水晶光人皆危之孟英曰此肺邪得泄也果膚潤熱退瀉止知飢又服甘涼濡潤二十餘劑㾦疹始愈亦僅見之證也此溫證之輕者用藥合法故其愈甚速汪子與病革始延孟英視之曰陰虛之質暑熱膠錮殆誤投補藥矣乃叔少洪云侄素孱弱醫投熟地等藥十餘劑耳孟英曰暑熱證必看邪到血分始可議用生地何初病即進熟地豈僅知稟賦之虛未睹外來之疾耶昔賢治暑但申表散溫補之戒詎料今人於律外更犯滋膩之辜而一誤至此略無悔悟不啻如油入面如膠投漆將何法以挽回哉越日果卒夫小米舍人僅此一脈完姻未久遽爾珠沉殊為慘然冬間吳忻山亦惟一子素稟虛怯滋補頗投醫者不察其患溫發熱僉謂陰虛競投滯膩培元之劑乃至舌黑卷短唇焦溺赤孟英一診即云不救顧聽泉竭力圖維終不能愈按虛人受感每蹈此轍特錄以為戒金朗然之母偶發脘疼嘔吐醫與溫補藥初若相安漸至畏寒不寐四肢不仁更醫云是風痹仍投溫補因而不飢不食二便不行肌肉盡削帶下如溺始延孟英診之曰暑伏脾胃耳其多投溫補而不遽變者以熟地等陰柔膩滯為之挾制也然津氣灼爍而殆盡脂液奔迫以妄行治節無權陽明涸竭焉能衛皮毛而暢四肢利機關以和九竅哉與白虎湯加西洋參竹茹橘皮絲瓜絡石斛花粉竹瀝海䖳連進二十劑始解黑矢而各恙漸安嗣與和肝胃調八脈以善後遂愈李某向患脘痛孟英頻與建中法獲瘳今秋病偶發他醫診之聞其溫補相投徑依樣而畫葫蘆服後耳閉腿疼不飢便滯仍就孟英視之曰暑邪內伏誤投補藥使然治宜清滌為先彼不之信反疑為風氣付外科灼灸遂致筋不能伸而成錮疾孟英曰此證較金病輕逾十倍惜其惑於淺見致成終身之患良可嘆也獨怪謀利之徒假河間太乙針之名而妄施毒手舉國若狂竟有不惜重價求其一針隨以命殉之者吾目擊不少矣夫內經治病原有熨之一法然但可以療寒濕凝滯之證河間原方惟二活黃連加麝香乳香耳主治風痹今乃托諸鬼神矜誇秘授云可治盡內傷外感四時十二經一切之病天下有是理乎況其所用之藥群集辛熱香竄之品點之以火顯必傷陰一熨而吐血者有之其不可輕試於陰虛之體與挾熱之證也概可見矣吾友盛少云之尊人臥云先生誤於此而致周身潰爛臥床數載以亡仲聖焦骨傷筋之訓言猶在耳操醫術者胡忍執炮烙之嚴刑欺世俗而罔利哉汪子與證誤服熟地而不救此證誤服溫補地兼熟而竟愈蓋體有虛實治有遲早邪有重輕未可以一端拘也喬有南之侄甫五齡發熱數日兒醫與柴葛解肌湯一劑肢搐而厥目張不語其母孀居僅此一脈遍求治療毫無寸效所親徐和甫托王瘦石訪一擅幼科之長者瘦石謂宜求善於外感者蓋人有大小病無二致切勿舍大方而信專科此喻嘉言活幼金針也盍延孟英視之徐從之孟英曰病是暑邪治以風藥熱得風而焰烈津受爍以風騰乃風藥引起肝風再投俗尚驚風之劑稚子根本不牢而狂風不息折拔堪虞與王氏犀角地黃湯加羚羊角生石膏元參桑葉菊花銀花牡蠣知母麥冬竹葉諸藥數服而痊清暑熱息肝風方極平允趙鐵珊乃郎子善康康侯之婿也因事抑鬱凜寒發熱湯某作血虛治進以歸芎丹參之類多劑不效乃移榻康寓延孟英診之脈澀而兼沉弦以數然舌無苔口不渴便溺如常納穀稍減惟左脅下及少腹自覺梗塞不舒按之亦無形跡時欲撫摩似乎稍適曰陰虛挾郁暑邪內伏夫鬱則氣機不宣伏邪無從走泄遽投血藥引之深入血為邪踞更不流行脅腹不舒乃其真諦第病雖在血而治宜清氣為先氣得宣布熱象必露瘀滯得行厥疾始瘳子善因目擊去年婦翁之恙頗極欽服連投清氣熱果漸壯譫妄不眠口乾痰嗽孟英曰脈已轉為弦滑瘀血伏邪皆有欲出之機繼此當用涼血清瘀為治但恐旁觀詫異事反掣肘囑邀顧聽泉質之顧亦云然遂同定犀角地黃湯加味而所親陳眉生許小琴暨乃兄子勉皆疑藥涼劑重縱是熱證豈無冰伏之虞顧為之再四開導總不領解適病者鼻衄大流孟英笑曰真贓獲矣諸公之疑可否冰釋渠舅氏陳穀人鹺尹云證有疑似原難主藥鼻血如是病情已露毋庸再議徑煎而飲之次日衄復至苔色轉黑孟英曰三日不大便瘀熱未能下行也於前方加滑石桃仁木通海䖳竹瀝石斛銀花知母花粉之類又二劑大解始行黑如膠漆三日間共下七十餘次而止乃去木通桃仁輩加西洋參麥冬以生液病者疲憊已極沉寐三晝夜人皆危之孟英曰聽之使其陰氣之來復最是好機醒後尚有微熱譫語藥仍前法又旬日始解一次黑燥大便而各恙悉退惟口尚渴與大劑甘涼以濡之又旬日大解甫得復行色始不黑乃用滋陰填補而康此證不遇孟英必成虛損訖無知其為伏暑者雖死亦不知前藥之誤也仲夏淫雨匝月氾濫為災季夏酷暑如焚人多熱病有沈小園者患病于越醫者但知濕甚而不知化熱投以平胃散數帖壯熱昏狂證極危殆返杭日渠居停吳仲莊浼孟英視之脈滑實而數大渴溲赤稀水旁流與石膏大黃數下之而愈仲莊欲施藥濟人托孟英定一善法孟英曰余不敢師心自用考古惟葉天士甘露消毒丹神犀丹二方為濕溫暑疫最妥之藥一治氣分一治營分規模已具即有兼證尚可通融司天在泉不必拘泥今歲奇荒明年恐有奇疫但甘露二字人必疑為大寒之藥消毒二字世人或誤作外證之方因易其名曰普濟解疫丹吳君與諸好善之家依方合送救活不知若干人也附普濟解疫丹雍正癸丑葉天士先生定飛滑石十五兩綿茵陳十一兩淡黃芩十兩石菖蒲六兩川貝母五兩木通五兩藿香射干連翹薄荷白豆蔻各四兩上藥曬燥生研細末見火則藥盡熱每服三錢開水調服日二次或以神麯糊丸如彈子大開水化服亦可孟英自注云此治濕溫時疫之主方也按六元正紀五運分步每年春分後十三日交二運徵火旺天乃漸溫芒種後十日交三運宮土旺地乃漸濕溫濕蒸騰更加烈日之暑爍石流金人在氣交之中口鼻吸受其氣留而不去乃成溫熱暑疫之病則為發熱倦怠胸悶腹脹肢酸咽腫斑疹身黃頤腫口渴溺赤便秘吐瀉瘧痢淋濁瘡瘍等證但看病人舌苔淡白或厚膩或干黃者是暑濕熱疫之邪尚在氣分悉以此丹治之立效而薄滋味家慈每於夏季茹素且云汝輩為醫者當知之吾見疫癘流行之歲無論貧富無可避之總由不知堅壁清野之故耳試看茹素者獨可不染豈非胃中清虛邪不能留乎旨哉斯言特謹識之遠酒色尤為闢疫之仙方智者識之醫家臨證能准此化裁自可十全為上上參喻嘉言張石頑葉天士沈堯封諸家附神犀丹犀角尖磨汁石菖蒲黃芩各六兩直生地冷水洗淨浸透搗絞汁銀花各一斤如有鮮者搗汁用尤良糞清連翹各十兩板藍根九兩無則以飛淨青黛代之香豉八兩元參七兩花粉紫草各四兩各藥生曬切忌火炒研細以犀角地黃汁糞清和搗為丸切勿加蜜如難丸可將香豉煮爛每重三錢涼開水化服小兒用半丸如無糞清可加人中黃四兩研入孟英自注云溫熱暑疫諸病邪不即解耗液傷營逆傳內陷痙厥昏狂譫語發斑等證但看病人舌色干光或紫絳或圓硬或黑苔皆以此丹救之若初病即覺神情昏躁而舌赤口乾者是溫暑直入營分酷熱之時陰虛之體及新產婦人患此最多急須用此多可挽回切勿拘泥日數誤投別藥以僨事也兼治痘瘄毒重夾帶紫斑危證暨痘瘄後餘毒內熾口糜咽腐目赤神煩諸證上本葉氏參治驗陳蘊泉陡患昏譫夤夜乞診於孟英脈甚滑數苔色膩黃乃平素多痰兼吸暑熱與清解藥一劑化而為瘧脈亦較平或謂其體弱不宜涼藥須用人參渠家惶惑孟英堅持以為不可蓋暑脈頗類乎虛而痰阻於肺呼吸不調又與氣虛短促者相似平昔雖虛有病必先去病況熱能傷氣清暑熱即所以顧元氣也何新之亦贊是議遂連投白虎加減而愈次年春因喪妾悲悼復感溫邪失於肅清病日以甚迨孟英自豫章歸診已不可救藥矣暑證人多不識此二層昔人雖曾論及而無此明晰瀉姚樹庭以古稀之年而患久瀉群醫雜治不效僉以為不起矣延至季秋邀孟英決行期之早晚非敢望愈也孟英曰弦象獨見於右關按之極弱乃土虛木賊也調治得法猶可引年何以遽爾束手乎乃出從前諸方閱之皆主溫補升陽曰理原不背義則未盡耳如薑附肉蔻骨脂之類氣熱味辣雖能溫臟反助肝陽肝愈強則脾愈受戕且辛走氣而性能通泄與脫者收之之義大相刺謬而鹿茸升麻可治氣陷之瀉而非斡旋樞機之品至熟地味厚滋陰更非土受木克脾失健行之所宜縱加砂仁酒炒終不能革其膩滑之性方方用之無怪乎愈服愈瀉徒藉景岳窮必及腎為口實也與異功散加山藥扁豆蓮子烏梅木瓜芍藥蒺藜石脂餘糧扶脾抑肝加以收攝下焦須看其與病症針鋒相對處服之果效恪守百日竟得康強越三載以他疾終語語精義由此類推可以知用藥之權衡也一人患晨泄有年累治不效而春間尤甚孟英按其脈曰汝雖苦瀉而瀉後腹中反覺舒暢乎曰誠然苟不泄瀉又脹悶減食矣而服四神附桂之藥其瀉必加此曷故也曰此非溫升補澀之證乃肝強脾弱木土相凌處一方令其常服數帖即安後竟無此恙也方用白朮苡仁黃連楝實桂枝茯苓木瓜芍藥蒺藜橘皮而已扶脾抑肝制方靈動廣孔愚司馬久患溏泄而舌黑氣短自春徂冬治而不效孟英視之曰勞心太過陽爍其陰人見其溏泄輒與溫中不知肺受火刑氣失清肅而短促於上則水源不生自然溺少便瀉矣投以肅肺清心涼肝滋腎之法果得漸瘳楊氏婦孀居患瀉久治不瘥孟英曰風木行胃也彼不之信另招張某大進溫補乃致腹脹不食夜熱不眠吐酸經秘頭疼如劈復乞孟英視之先投苦泄佐辛通以治其藥嗣以酸苦息風安胃匝月乃瘳續與調補汛至而康方氏女久患泄瀉脘痛間兼齒痛汛事不調極其畏熱治不能愈上年初夏所親崔映溪為延孟英診之體豐脈不甚顯而隱隱然弦且滑焉曰此肝強痰盛耳然病根深錮不可再行妄補渠母云溏泄十餘年本元虛極廣服培補尚無寸效再攻其病豈不可虞孟英曰非然也今之醫者每以漫無著落之虛字括盡天下一切之病動手輒補舉國如狂目擊心傷可勝浩嘆且所謂虛者不外乎陰與陽也今肌肉不瘦冬不知寒是陰虛乎抑陽虛乎只因久瀉遂不察其脈證而僉疑為虛寒之病矣須知痰之為病最頑且幻益以風陽性尤善變治必先去其病而後補其虛不為晚也否則養癰為患不但徒費參藥耳母不之信遍訪醫療千方一律無非補藥至今秋頸下起一痰核黃某敷之使平更以大劑溫補連投百日忽吐瀉膠痰鬥余而亡予按此痰飲滋蔓木土相讎久則我不敵彼而潰敗決裂設早從孟英之言斷不遽死於今日也凡病皆宜如此不獨痰飲為然康康侯司馬之夫人泄瀉頻年納食甚少稍投燥烈咽喉即疼治經多手不能獲效孟英診曰脾虛飲滯肝盛風生之候也用參朮橘半桂苓楝芍木瓜蒺藜投之漸愈健脾滌飲平肝絲絲入扣今冬又患眩暈頭汗面熱肢冷心頭似絞呻吟欲絕孟英以石英蓯蓉牡蠣綠萼梅苓蒺楝芍旋覆為方竟劑即康仍是柔肝滌飲之法盛墨莊冬患間瘧因腹脹畏寒自服神麯薑湯勢益甚延孟英視之曰暑濕內伏也以黃連枳樸梔芩杏貝知斛旋橘蘭草等為劑清暑滲濕而無燥烈之弊洵妙方也蘆菔煮湯煎藥三啜而瘳葉杏江仲郎患發熱泄瀉醫治十七日不效骨瘦如柴音嘶氣逆所親許芷卿薦孟英診之脈數大渴汗多苔黃以竹葉石膏湯加減十餘劑漸以向愈大解反極堅燥肺移熱於大腸繼與滋養而康陳某偶患溏泄所親鮑繼仲云余往歲患瀉治不中肯延逾半載幾為所困今秋患此服孟英方數劑霍然故服藥不可不慎也盍延孟英治之陳因中表二人皆知醫招而視之以為省便輒投以溫補健脾之藥數日後瀉果減熱得補而不行而發熱昏痙咽喉黑腐其居停瞿穎山疑病變太速囑其請援於孟英孟英診曰遲也病起泄瀉何必為寒正是伏邪自尋出路而溫補以固留之自然內陷厥陰不可救藥果即殞焉繼有高小垞孝廉令弟雨生因食蟹患瀉黃某用大劑溫補藥瀉果止而頸筋痠痛舌絳嘔渴口氣甚臭孟英持脈沉數曰食蟹而後瀉會逢其適耳脈證如斯理應清潤奈病人自畏涼藥復質於吳某亦主溫補服及旬日昏痙舌黑而斃吳醞香孝廉令孫兌官患發熱洞瀉大渴溲少涕淚全無孟英曰暑風行於脾胃也以沙參生薏苡生扁豆銀花石斛滑石甘草竹葉冬瓜皮澄地漿煎服數日而痊按此等證幼科無不作驚風治因而夭折者多矣楊某患感旬日初則便溏醫與溫散瀉止熱不退晝夜靜臥飲食不進孟英診脈遲緩浮取甚微目眵舌色光紅口不渴溲亦行胸腹無所苦語懶音低尋即睡去是暑濕內伏而有燥矢在胃機關為之不利也先與清營通胃藥二劑熱退舌淡而脈證依然加以酒洗大黃省頭草即下堅黑燥矢甚多而睡減啜粥繼以涼潤旬日而痊此濕勝於熱之暑證也以其濕勝故不甚現熱證最足眩人斷為暑濕足徵卓識何搢階令正素患肝厥仲夏患感沈越亭按溫證法治之內風不至陡動而大便泄瀉脈細而弦泄瀉乃濕溫應有之證不足為異渴飲痰多不飢不寐因邀孟英商之投白頭翁湯加三甲石斛茯苓竹茹而安隨以峻補善後而痊趙菊齋仲媳素患陰虛內熱時或咯血去年孟英已為治愈既而汛事偶愆孟英診曰病去而孕矣今春娩後患瀉適孟英赴豫章之診專科進以溫熱之方而咳嗽乃作更醫改授養營之劑則滑泄必加簽藥記方備嘗莫效比孟英歸投以甘麥大棗配梅連之法證漸輕減繼為其姻黨尼之多方蠻補遂至腹痛減餐日下數十行皆瑩白堅圓如白蒲桃之形上縈血絲菊齋悔悶仍乞援於孟英予仲景當歸生薑羊肉湯每劑吞鴉膽仁二十一粒以龍眼肉為衣果兩服而便轉為溏痛即遞減再與溫養奇經之龜板鹿霜歸苓杞菟甘芍烏鰂蓯蓉蒲桃藕等藥調理而痊家慈年七十四歲陡患泄瀉腹微痛身發熱神思不清自汗嘔惡不進飲食亟延醫視云慮其脫擬進參藥迨孟英來診曰暑脈微弱不可謂之虛也且兼數象參不可投高年固屬陰虧然去其所本無即所以全其所本有也爰定芩連滑斛茹柏竹葉銀花橘皮枇杷葉之方冬瓜湯煎藥一劑而熱退神清二劑霍然矣既而五弟婦偶患微寒發熱醫與柴芎等藥一劑遂昏狂悲哭見人輒怒詈欲搏屈孟英過診脈弦滑而數面赤不瞑苔色黃膩胸下拒按曰痰熱肝火為患耳以菖蒲膽星旋赭連蔞枳半合雪羹投之一劑而安翼日寒熱復作孟英曰幸其體實藥不可緩庶免化瘧也照方服五劑果寒熱三作而遂痊蔡湘帆之女甫周歲斷乳後患腹膨泄瀉兒科以為疳也遍治不愈謂其將成慢驚丐孟英視之苔甚白滑曰瓜果傷也以生厚朴生蒼朮丁香柄雞䏶胵五穀蟲陳皮苡仁木香黃連防風投之服後連下十餘次而腹即消次日竟不瀉而能安穀矣聞者僉以為異或云尤有異者許子雙大令令愛宜姑幼時患發熱神昏幼科皆束手矣孟英偶一望見曰犀角證也與以方果投匕而瘳此案輯仁術志者失採今子雙宦粵東不能詢其詳矣姑附其略於此以識望而知之之神沈嫗素患肝氣初冬便瀉醫藥勿瘥所親吳馥齋迓孟英診之脈至弦硬舌赤無津杳不知飢脅腹時脹乃風陽內熾津液耗傷香燥忌投法宜濡潤否將陰涸毋畏甘涼予甘草地黃麥冬阿膠枸杞薏苡楝實葳蕤烏梅為劑牡蠣一斤甘瀾水煮濃湯煎藥和入蔗漿服之數日而瘳已能安穀忽然舌不能伸心搖語蹇不眠頭暈面赤火升仍速孟英視之脈硬雖和極其弦細是陰液未復木火失涵以前方去薏楝烏梅加人參龍眼肉少佐黃連授之而愈沈友聞令郎厚栽久患羸弱馴致腹痛便瀉惡谷形消諸醫束手求孟英圖之脈虛弦而空軟曰不可為矣雖然治之得法尚可起榻可虞者其明年春令乎爰以潞參鱉甲耆芍甘柏薏斛木瓜橘皮為方吞仲景烏梅丸不旬日而便堅食進又旬日即下樓而肌充矣又其大令郎子槎之室體素怯夏間曾患久瀉多劑溫補始瘳忽發寒熱肢麻頭痛徹夜不眠嘈雜如飢咽喉似阻食飲難下汗僅出於上焦僉以為虛損將成孟英持其脈弦弱而數視苔微黃滿膩曰暑濕時瘧也補藥烏可投耶以茹滑苓連桑葉紫菀銀花橘皮冬瓜子枇杷葉絲瓜絡等藥蘆根湯煎服數劑而痊嗣與滋養善其後既而子槎自上海歸亦患瘧孟英視之暑濕挾痰也予溫膽湯數服而愈次年春杪厚栽竟逝施瀛洲體豐色白夏月在紹患瀉醫進參朮桂附熟地四神之類略無寸效季冬來杭就診於孟英其脈微弱左手及右尺沉取有弦數之象眩暈形消舌色深紫無苔不渴納食腹脹溲少而赤瀉必腸鳴中氣固虛理應投補但不可佐滋膩以滯中樞而助其溜下之勢又不宜雜燥熱以煽風陽而壯其食氣之火予參耆朮苡升柴芩澤香連為劑吞通關丸乃宣清升降補運兼施之法也服之良效浹旬舌淡溲行脹消暈止惟大便未實耳去芩澤升柴香連通關丸加菟絲木瓜橘皮黃柏石脂白芍善後而瘳鴛湖吳君小漁令寵數年前因娩後啖生菜而患便瀉久治不愈仲秋余視之脈弦數曰此非菜之罪也乃土受木乘而頻年溫補益廣病機頭痛帶多脘疼食少吐酸痰嗽五熱不眠無非八脈無權風陽偏盛授宣養清潛之法而愈繼其令妹適岳氏者久患帶下去冬崩血赤白並行延今不已臥榻數月僉云無生理矣余診脈甚滑數面赤口乾因問足冷乎溲熱乎耳鳴無寐乎向來輒服溫補乎皆曰然幸能安穀是藥病也幸澀之不止藥力尚有分勢也授以大劑清熱堅陰之法服數十劑仲冬余復遊禾已能踵寓就診參秀水吳君小漁年近七旬平昔善飲久患便瀉帶血日夜十餘次溺不單行廣治罔效聘余往視脈軟而弦用補中益氣湯去歸柴加烏梅黃柏白芍茯苓不十帖而痊其季郎雅軒素有失血之患近由穹窿山歸途次發熱兼以咳逆見血醫治兩旬不應余診之脈弦數而上溢氣衝則自覺血腥喘汗睛紅面黧足冷飢不能食脅痛耳鳴苔膩口乾小溲短赤寤不成寐痰色甚濃乃稟賦陰虧水不涵木心火內熾肺金受戕兼感客邪胃濁不降甚難措手即欲辭歸而虞君梅亭胡君春田力乞疏方勉圖一二爰以沙參五錢蛤粉四錢冬瓜子六錢浮石茯苓石斛各三錢桑皮二錢竹茹枇杷葉各一錢五分絲瓜絡桃仁各一錢蘆根湯煎服是清心肝以靖浮越之陽肅肺胃而廓逗留之熱也一帖脈色轉和氣衝亦減餘留七日返棹已熱退便行能安眠食惟不能慎口腹戒忿怒故痰嗽脅痛未能盡蠲逾二月余遊聞川過禾因喉痛復邀過診仍是心肝之火上炎為留三日與龔萍江茂才內外協治而瘥但病源匪淺情性不柔春令深時恐興險浪臨別與其友人餘姚岑君九鼎言之以為左券沈君雪江令嬡黎里徐少岩刑部之媳也胎前患瀉娩後不瘳半載以來諸藥莫效余按脈弦數而尺滑詢知帶盛口乾腰痠咽痛溲熱善噫肢冷畏煩乃肝熱而風行於胃液走則陰血日虧與白頭翁湯加餘糧石脂熟地龜板竹茹青蒿砂仁頻服而痊七月中旬余遊檇李歸道出梅注呂君慎庵拉視沈則甫令正之恙兩年前曾患帶下嗣後便瀉不已今夏更劇每晨尤甚後又腸鳴不飢不渴畏熱無汗胸悶時嘔夜下成眠形消色瘁小溲通暢脈軟微弦經事漸稀乃中虛木侮生化無權氣久虛而血將涸矣若剛燥則助風陽滋膩更增滑溜議砥柱中流回狂瀾而鎮風輪以潞黨參山藥石脂餘糧各三錢茯苓白芍各一錢五分煨訶子橘皮各一錢牡蠣八錢烏梅肉炭八分酒炒黃柏六分熟附子炙甘草各五分甘瀾水煎陳米湯煮藥使濃厚徐徐細呷俾留戀中宮不致直下為法迨八月下旬在曹藹山茂才處晤則甫云前方服至四帖病即愈今已色華能食矣因以詩什芽茶為贈次年冬聞患寒熱亡桐鄉馮詒齋廣文年二十七歲自上年患癧至今已十餘枚皆破而不斂肌肉漸削迨季夏漸形發熱而納食阻膈溲短便溏氣逆嗽痰咽喉疼腫諸醫束手秀水莊文芝階薦余診之脈數而左寸關兼弦大是病由過擾心陽兼傷謀慮從前但從呆補已成不治之證近則吸受暑邪猶日服滋填之劑是以藥造病也而詒齋一見傾心堅留數日因謂其令兄靜岩贊府曰余僅許愈其新病也以沙參苡斛橘半蒿薇蛤谷浮石茯苓煎吞香連丸二劑而痛瀉漸止去香連加鱉甲又二劑而熱退改用參苓橘半苡蠣石英首烏象牙屑冬蟲草等出入為方臥時另制噙化丸以肅上焦痰滯服四帖已能起榻眠食皆安余遂歸秋杪聞其沒於奧江外科家少年博學惜哉余郵挽一聯云傾蓋相知詎成永訣著書未竟遽赴修文知渠方注顧亭林先生肇域志而即病也其夫人即於秋杪起患赤痢延至次年春杪證已頻危適余遊鴛湖往視之晝夜三四十行汛斷肌消少腹素有聚瘕躍躍而動氣衝胸下絞痛難堪仰不能眠飢不能食口乾舌絳五熱溺無頭項汗頻音低色奪脈來細數右軟尺空是久積憂勞兼傷哀痛真陰素弱豈可與常痢同觀以沙參熟地黃連黃柏白頭翁秦皮冬蟲夏草枸杞橘核白薇用藕苡燕窩煮湯煎藥服二十劑余遊瀛洲轉禾復診脈和痢減安穀能眠痛止溺行面有華色改用人參熟地龜板歸身黃連黃柏枸杞白薇薏苡砂仁以藕湯煎成入阿膠烊服而愈瘧海陽趙子升辛卯夏病瘧急延孟英診之曰暑熱為患耳不可膠守於小柴胡也與白虎湯一啜而瘥專清暑邪甲午秋範麗門患溫瘧孟英用白虎加桂枝以痊之丙申夏盛少云病濕熱瘧孟英以白虎加蒼朮湯而安己亥夏予舅母患瘧服柴胡藥二三帖後汗出昏厥妄語遺溺或謂其體質素虛慮有脫變勸服獨參湯幸表弟壽者不敢遽進乃邀孟英商焉切其脈洪大滑數曰陽明暑瘧也與傷寒三陽合病同符處竹葉石膏湯兩劑而瘳清熱兼益氣庚子夏滇人黃肖農自福清赴都道出武林患暑瘧孟英投白虎湯加西洋參數帖始愈清熱益氣與前方意同辛丑秋顧味吾室人患癉瘧孟英亦主是方而效莊芝階中翰張安人年逾花甲瘧熱甚熾孟英審視再四亦與竹葉石膏湯而安聞者無不驚異予謂如此數證體分南北質有壯衰苟非識證之明焉能藥與病相當而用皆適宜哉癸巳秋余在婺患瘧大為醫人所誤初則表散繼則滋補延及月餘肌肉盡削寒熱不休且喜嘔惡食溺赤畏冷乃買棹旋杭托孟英診視曰足太陰濕瘧也以金不換正氣散三啜而安然元氣為誤藥所傷多方調補甫得康健次年秋復患瘧於婺友人咸舉醫療予概卻之憶病情與前無異即於篋中檢得孟英原方按序三帖病亦霍然聞者無不稱歎後歸里為孟英述而謝之孟英曰瘧情如是恐其按年而作乃授崇土勝濕丸方明年夏令予服以堵御之迄秋果無恙後竟不發矣石符生隨乃翁自蜀來浙同時患瘧醫者以小柴胡湯加薑桂投之不效改用四獸休瘧等法反致惡寒日甚穀食不進惟飲燒酒薑湯圍火榻前重裘厚覆胸腹痞悶喜以熱熨猶覺冷氣上衝頻吐黏稠痰沫延至臘初疲憊不堪始憶及丙申之恙訪孟英過診脈沉而滑數苔色黃膩不渴便溏溺赤曰是途次所受之暑濕失於清解復以溫補之品從而附益之釀成痰飲盤踞三焦氣機為之阻塞所以喜得熱熨熱飲氣衝反覺如冰若不推測其所以然之故而但知聞問在切脈之先一聽氣冷喜熱無不以真贓現獲孰知病機善幻理必合參以脈形兼證並究審病要法則其為真熱假寒自昭昭若揭矣與大劑苦寒之藥而以蘆菔湯煎漸服漸不畏寒痰漸少谷漸增繼用甘涼善後喬梓皆得安全汪吉哉久瘧不愈醫謂元氣已虛雜投溫補漸至肌瘦內燔口乾咳嗽寢汗溺赤飲食不甘孟英視之曰餘邪逗留血分也與秦艽鱉甲散而瘳其堂兄養余亦患瘧數月多醫療之罔效肌瘦自汗腰膝痠軟不能稍坐極其畏冷孟英曰此大虛證胡反不補猶以消導是何居心與參耆朮草熟地白芍五味杜仲山藥龍骨牡蠣桂枝大棗木瓜服數十帖而起顧云垞體豐年邁患瘧於秋脈芤而稍有歇止孟英曰芤者暑也歇止者痰濕阻氣機之流行也卓識大忌溫補以助邪氣及與清解蠲痰之法病不少減而大便帶血邪將去矣孟英曰暑濕無形之氣而平素多痰邪反得以盤踞頗似有形之病清解不克勝其任氣血皆受其滋擾必攻去其痰使邪無依附而病自去切勿以高年而畏峻藥伊侄桂生少府亦精於醫者也聞之極口稱是遂以桃仁承氣湯加西洋參滑石芩連橘紅貝母石斛為方送礞石滾痰丸乃郎石甫孝廉云此藥在他人必畏而不敢服我昔年曾患暑濕證深悉溫補之不可輕試況高明所見相同更何疑乎經服二劑下黏痰汙血甚多瘧即不作仍以清潤法善後而康此必別有外證可憑故直斷為暑與痰濕未有專視脈之芤與歇止而如是定斷者讀者勿被瞞過此方可謂峻極良由識高非徒膽大九月間張春橋患瘧寒少熱多間二日而作甫兩發形即清瘦孟英診曰脈弦而細尺中甚數疾作於子夜口乾嗜飲乃足少陰熱瘧也兩發遽爾形消胡可玩視吾以妙藥奉贈可期即已但請即服不可商於人而致生疑義也方用元參生地知母丹皮地骨皮天冬龜板茯苓石斛桑葉春橋以向所心折遂服之一劑瘧即止再以滋陰善後而愈予謂此證一帖而瘳似乎輕易但非真才實學焉有此種妙治設遇別手非溫補即提表其禍可勝道哉然天下之病無論輕重總貴初治得法何致輕者重而重者危耶奈世俗之情必須輕者重而後轉安始知醫藥之功殊可嘆也按此證世人但知其為三陰瘧籠統治以溫補之法從未聞有分經用藥者今提出少陰二字創立清涼之劑用藥精當取效敏捷法似新奇理自完足所謂活人治活病全以活潑運之也可以啟人慧悟垂作典型遂安余皆山貳尹起復赴都道出武林而患瘧範某云春寒所致用辛溫散之來某渭酒濕之疴治以五苓且雜參歸薑棗之類病乃日甚旬日後脘悶腹脹便秘氣逆躁渴自汗昏瞀不瞑亟迎孟英視之曰蘊濕固然而溫風外襲已從熱化何必夏秋始有熱瘧耶清解之法十劑可安服之果效旬日徑瘥酷熱之際瘧疾甚行有儲麗波患此陸某泥今歲寒水司天濕土在泉中運又從濕化是以多瘧率投平胃理中之法漸至危殆伊表兄徐和圃薦孟英視之熱熾神昏胸高氣逆苔若薑黃溺如赭赤脈伏口渴不食不便曰舍現病之暑熱拘司氣而論治謂之執死書以困活人幸其體豐陰足尚可救藥然非白虎湯十劑不能愈也和圃然之遂以生石膏知母銀花枳貝黃連木通花粉茹芩杏斛海䖳竹葉等相迭為方服旬日瘧果斷外甥莊迪卿患瘧大渴而喜熱飲脘悶脈伏苔膩欲嘔孟英曰蘊濕內盛暑熱外侵法當清解然脈證如是乃痰阻氣道使然清之無益溫之助桀宜以礞石滾痰丸先為開導服後痰出甚多脈即見弦滑而數嘔止胸舒苔形黃燥與石膏知母連樸杏橘半茯滑斛菖蒲花粉等藥而安論證論治俱極明透莊曉村芝階姐夫之侄孫也館於金願谷舍人家病瘧孟英曰吸受暑熱清滌即瘳閱數日瘧作甚劇目赤狂言汗如雨下居停大驚聞服涼劑疑為藥誤亟速孟英至正在披狂莫制之時按其脈洪滑無倫視其舌深黃厚燥心疑其另服他藥之故而撲鼻吹來一陣薑棗氣因詰曰得無服薑棗湯乎曰恣飲三日矣孟英即令取西瓜一枚解暑妙品劈開任病者食之方從白虎而生石膏用一兩六錢病即霍然逾六年以他疾亡繼有陳仰山如君患瘧孟英連與清暑法病不少減孟英疑亦薑棗湯所致詢知果然亟令屏絕遂愈余如汪子覺魏云裳胡秋紉等暑瘧治案皆以白虎化裁案多不備載錄此以備讀者之偶反焉何永昌者孟英之輿人也其妻病瘧間二日而作乃母曰瘧不可服官料藥徑服簽方旬日後勢甚危永昌乞孟英救之脈沉細而數尺為甚口渴目不欲張兩腰收痛宛如錐刺寒少熱多心慌不能把握曰異哉病也此暑入足少陰之證喻氏所謂汗下溫三法皆不可行者若病在別家慮其未必我信病在汝而求診於我事非偶然也汝母云官料藥不可治瘧此語出於何書而藥別官私何人所創既官料之勿服則私料更不可妄試矣殊屬可嗤然是證若延醫診非表散即溫補不可謂非汝母之一得也疏方元參八錢龜板石斛各一兩地骨皮六錢知母五錢桑葉金銀花各四錢花粉三錢丹皮二錢令用大砂鍋煎而頻服不必限劑服三日瘧斷而各恙皆減粥食漸進不勞余藥而起暑邪入腎必傷腎液故重用滋陰之品以救之周某患瘧間二日而作寒少熱多醫謂老年三瘧放手溫補漸至杳不進谷所親李石泉孝廉囑迎孟英診之脈細硬如弦毫無胃氣右尺洪數舌色光絳大渴溺滴曰此足少陰暑瘧也廣服溫補津液盡劫欲以草木生之事不及矣世但知治瘧不善有三患邪留肝絡則為瘧母戕及脾元則為瘧鼓耗乎腎陰則為瘧勞而此證以藥助邪邪將劫命求轉三患亦不能得所謂熱得補而更熾陰受爍以速亡陰愈亡則邪愈熾何殊炮烙之刑病者何辜可慘可慘逾日果歿特錄以為戒醫者鑑之姚小蘅大令患瘧寒微熱甚日作二次汪某與柴胡藥二貼勢遂劇舌絳大渴小溲全無孟英曰津欲涸矣與西洋參生地知母花粉石斛麥冬梔子百合竹葉投之五劑而瘧止越三載以他疾終其簉室同時患此嘔吐脅痛畏寒不渴苔色微白孟英與小柴胡湯三飲而瘳王耕蘭室素患脘痛近發寒熱醫與溫補此肝鬱之證非瘧也漸至胸痞嘔呃譫語神昏舌絳面赤足冷自汗瘧仍不休孟英用元參犀角石膏石菖蒲連翹杏仁貝母旋覆竹茹枇杷葉竹黃柿蒂竹瀝鬱金諸藥全是救溫補之誤而開鬱降氣化痰故本病亦愈化服萬氏牛黃清心丸數服而愈潘祥行在外患瘧買舟歸就孟英視曰苔膩脈軟伏邪所化不與正瘧同科風寒藥一味不可犯薑棗一滴不可啜與知芩橘半滑樸杏斛花粉省頭草一劑而病若失此等案極多姑載一二陳足甫室懷妊九月而患瘧目不能瞑口渴自汗便溏氣短醫進育陰清解法數劑不應改用小柴胡一帖而咽疼舌黑心頭絞痛乃翁仰山聞之疑其胎壞延孟英過診曰右脈洪滑雖舌黑而胎固無恙也病由伏暑育陰嫌其滋膩小柴胡乃正瘧之主方古人謂為和劑須知是傷寒之和劑在溫暑等證不特手足異經而人參半夏薑棗皆不可輕用之藥雖有黃芩之苦寒而仲聖於傷寒之治猶有渴者去半夏加栝蔞根之文古人立方之嚴密何後人不加體察耶投以竹葉石膏湯四劑瘧止便秘口渴不休與甘涼濡潤法數帖忽腹鳴泄瀉或疑寒涼所致孟英曰吾當以涼藥解之人莫識其意問難終朝語多不備錄果以白頭翁湯兩啜而愈迨季秋娩後發熱不蒸乳惡露淡且少家人慾用生化湯孟英急止之曰血去陰更傷豈可妄疑瘀停而攻之與西洋參生地茯苓石斛女貞旱蓮甘草為大劑數日而安繼因觸怒少腹聚氣如瘕痠痛夜甚人又疑為涼藥凝瘀所致孟英力為辨析與橘核橘葉橘絡楝實蓯蓉木香梔炭烏藥絲瓜絡海䖳藕石斛兩頭尖等藥外以蔥頭搗爛貼之兩帖後腹中雷鳴周身汗出而痛止人見其汗慮為虛脫急追孟英視之曰此氣行而病解矣但脈形細數陰津大傷苔黃苦渴亟宜潤補奈樞機窒滯滋膩難投且以濡養八脈為法服之各恙皆蠲眠食漸適緣平素多郁易犯痧氣頻發脘痛屢次反復孟英竭力圖維幸得轉危為安漸投滋補而愈瘧亦分經而治若陽明瘧正以白虎湯為主劑豈有專守一小柴胡而能愈病者喬有南年三十九歲患牝瘧二旬醫治罔效所親徐和圃疑為伏暑迓孟英往診脈微無神倦臥奄奄便秘半月溺赤不飢痰多口甘稍呷米飲必揉胸捶背而始下苔色黑膩而有蒙茸之象乃曰此精氣神三者交虛之證不可與時行伏暑晚發同年而語也幸前手之藥法主運中尚無大害與參朮桂附沉香拌炒熟地鹿角石英蓯杞歸茯杜仲棗仁菟絲山茱橘皮霞天曲胡桃肉等出入為大劑投十餘帖寒後始有熱而苔色乃退口不作渴甘痰亦日少粥食漸加即裁桂附白朮加石斛又服七劑解黑燥大便甚多凡不更衣者四旬二日矣寒熱亦斷安穀溲澄而竟愈或謂先生嘗訾人溫補之非何一旦放手而大用孟英曰溫補亦治病之一法何可廢也第用較少耳世之醫者眼不識病僅知此法可以媚富貴之人動手輒用殺人無算豈非將古人活世之方翻為誤世之藥可不痛恨耶陳媼患牝瘧月餘腹脹便秘噯多不飢口淡脈滑孟英主連樸橘貝杏茹旋菀杷蒺為方數劑即瘳此與前案虛實相反正可對看蔣北甌二尹患瘧醫與小柴胡平胃散而漸甚繼以大劑溫補勢瀕於危復用桂枝白虎狂亂如故所親董蘭初鹺尹延孟英視之曰暑瘧也桂枝白虎用於起病之時則妙矣今為溫散補燥諸藥助邪爍液脈數無倫汗渴不已雖宜白虎分別了亮豈可監以桂枝助熱耗津而自掣其肘耶因與大劑白虎加花粉竹葉西洋參元參石斛服之即安至十餘帖瘧始瘳而舌尚無苔渴猶不止與甘涼濡潤三十餘劑始告痊周同甫患瘧多汗醫恐其脫與救逆湯而勢劇孟英視之曰濕瘧耳濕家多汗無恐也況口渴溺赤溫補勿投與清解藥漸安繼而乃翁秋叔病初服溫補病進更醫知為伏暑與藥數劑熱果漸退偶延孟英診之尺中甚亂因謂其侄赤霞曰令叔之證必不能起吾不能藥也已而果然廣孔愚司馬之大公子仲秋間患瘧寒少熱多面目甚黃苔膩大渴腹脹溺赤仍能納穀且素嗜肥甘不能撙節孟英按其脈滑實而數與承氣加知芩半貝翹連滑石石膏大腹花粉之類二十餘劑而始愈是膏粱挾暑濕熱之治也許叔超令大母患瘧延孟英治之脈弦滑而數脘悶便秘合目汗出口渴不飢或慮高年欲脫孟英曰此溫邪挾素盛之痰所化補藥斷不可投與知芩蔞杏翹貝旋茹連斛雪羹為方服果漸效許氏婦患間瘧寒少熱多不飢大渴善嘔無汗脈滑而弦孟英投白虎湯加花粉柴胡而愈海鹽周子因工於畫體素弱偶患間瘧黃某用首烏鱉甲薑棗等藥病日甚加以參桂狂躁妄言始延孟英視之面赤舌絳溲澀便溏渴飲汗多脈形細數是暑證也與元參銀花知母芩茹貝竹葉荷杆蓮心西瓜衣為劑尋愈吳西瀍患瘧寒微熱甚旬余不愈孟英診之脈滑而長疏大劑白虎湯與之渠兄濂仲云沈顧二君皆主是方屢服無效孟英索方閱之湯雖白虎而石膏既少且煨兼不去米因謂其兄曰湯雖同君藥己重用而去米加花粉竹茹等其力不同科矣濂仲大悟服之尋愈此可以見服藥不可徒有湯頭之名也黃鼎如令堂年七十七歲季秋患間瘧每發加劇寒甚微而熱必昏痙舌不能伸三發之後人皆危之孟英視之顴赤目垂鼻冷額頦微汗苔色黃膩舌根純紅口渴痰多不思粥飲脈至弦數重按少神證屬伏暑挾痰而陰虛陽越先與蓯蓉鱉甲楝斛茹貝燕窩藕兩劑而顴紅頦汗皆蠲繼佐參瀝薤麥枇杷葉旋覆去竹茹蓯蓉投三帖而昏痙不作又去薤楝加生地花粉服五日而瘧休飲食漸加居然告愈方瘧勢披猖之際鼎如上水兩昆仲頗以為憂延諸名家議治有主人參白虎湯者有用犀角地黃湯者有欲大劑溫補者有執小柴胡加減者賴孟英力排眾議病家始有把握與孟英意見相合者何君新之也慫恿參贊與有功焉韓嫗年近花甲患三瘧於仲冬朱某主溫散並以薑棗湯恣飲旬日後粒米不黏瘧至大吐黃某以熱補進勢益甚又浹旬孟英視之胸中痞結如柈苔黃苦渴溲如熱湯脈弦滑右甚帶下如注投小陷胸合溫膽加薤白服後大吐膠痰十餘日胸痞始消改授甘涼瘧亦漸罷遞參滋陰遂以霍然莊芝階舍人三令媳患搐搦間日而作孟英診脈弦數泛泛欲嘔口苦不飢凜寒頭痛汛事愆期溲熱如火乃厥陰暑瘧也投以大劑犀羚元參梔菊木通知楝花粉銀花之藥數日而愈陳舜廷患瘧久不愈其體素虧醫皆束手孟英視之舌絳無津微寒溲赤原屬春溫化瘧體與病皆不是小柴胡之例過投溫散熱熾陰傷與竹葉石膏湯撤熱存津而愈趙子善患瘧畏冷不飢孟英診之脈滑數苔黃溲赤脘悶善嘔投竹葉石膏湯加減以清伏暑而痊王一峰次郎患瘧多服薑棗溫散之藥因致壯熱耳聾譫語殿屎不寐昏狂見人慾咬顧聽泉從伏暑治亦不效延至初冬吳愛棠囑其求診於孟英按脈皆滑即以顧疏犀角等藥內加菖蒲膽星竹瀝珍珠牛黃為劑大驅風痰極為合法吞白金丸一服即減旬日霍然繼其令堂發熱善嘔頻吐黏沫頭疼如劈口苦耳聾神識昏瞀脈弦而數乃伏暑挾內風之鴟張與犀角元參竹茹花粉知翹苓斛梔菊雪羹等藥七日而瘳高瑞生令弟瘧久不痊形消不食醫謂虛也投補藥而更增自汗孟英診之脈弦滑脘下聚氣投小陷胸加竹茹旋枳以開痰結漸能納穀繼以清養病去肌充聞氏婦孟夏患間瘧而妊身八月數發後熱熾昏沉腰疼欲墮張養之囑援於孟英脈來洪滑且數苔色黃膩垢濁與黃芩知母竹茹竹葉銀花桑葉絲瓜絡石斛石膏石菖蒲一劑而痊案中所載多溫瘧暑瘧故治多涼解瘧證多端寒熱俱有不可執一而論此證亦溫瘧也朱佳木令尊患間瘧年逾七旬人頗憂之孟英切脈弦滑脘悶苔黃曰無恐也投清熱滌痰藥數劑霍然余朗齋形瘦體弱患間日瘧寒少熱多二便澀滯脘膈悶極苔膩不渴孟英切脈緩滑而上溢曰素稟雖陰虧而痰濕阻痹既不可以提表助其升逆亦未宜以涼潤礙其樞機投以滑樸茹旋通草枇杷葉葦莖鬱金蘭葉之方苔色漸退即去樸郁加連枳半夏胸悶漸開瘧亦減便乃暢再去滑半連枳加沙參石斛橘皮黃芩浹旬而愈運樞機通經絡孟英用藥秘訣無論用補用清皆不離此意細觀各案自知莊芝階舍人年七十矣患間瘧寒則戰慄熱則妄言孟英視之脈弦數而促苔黑口乾是素有熱痰暑邪內伏予知母花粉元參石斛黃芩竹茹連翹海䖳蘆菔蓮子心等藥數啜而瘳至仲冬因泛湖宴客感冒風邪痰嗽頭疼不飢寒慄自服羌蘇荊芥藥二劑勢益甚而口渴無溺孟英切其脈與季秋無異但兼浮耳證屬風溫既服溫散所謂熱得風而更熾也舌絳無津亟宜清化以桑葉枇杷葉梔子知母冬瓜子元參菊花花粉貝母梨汁為劑投匕即減旬日而痊鎖容亭令妹自太倉歸寧即患時瘧顧某一手清解業已安穀下榻矣忽然氣逆肢寒神疲欲寐耳聾舌蹇杳不知飢大便仍行別無痛苦顧知其素患脫血元氣久虛改用參附等藥勢愈劇以為欲脫矣所親吳久山囑拉孟英圖之切脈弦緩視苔黃膩乃胎之初孕阻氣凝痰窒礙樞機治當宣豁以石菖蒲枳實旋覆半夏黃連茯苓橘皮蔥白海䖳竹瀝為方投匕即效三啜霍然繼而久山令妹為鎖繩先之室患瘧而馴致脘痞嘔呃鼻冷自汗不食不眠脈來歇止醫者危之孟英視之亦痰為患耳即以此方去蔥䖳竹瀝加薤白蔞仁竹茹投之果驗朱生甫明經令郎仲和於六月初旬患瘧寒少熱多嘔渴痞悶逆孟英視之曰曩曾屢患此病證形大略相同廣延名手治療總難即愈病輒經年大受其累聞君療瘧極神不知能否於月內即痊孟英曰何限之寬耶余非神於此蓋寒暑燥濕風五氣之感於人也重則為傷寒輕則為瘧疾今所患者暑濕之瘧也清其暑濕旬日可瘥前此之纏綿歲月而不能已者必是不分五氣之源流徒以見瘧治瘧而用柴胡姜東等風瘧之方以致暑濕之邪滋蔓難圖耳茲以清暑化濕湯奉贈放膽服之不可商於人恐其於五種傷寒未能辨晰而泥少陽正瘧之法以相爭也仲和韙之方用石膏杏仁半夏厚朴知母竹葉果八劑而安既而梁甫之仲郎亦患瘧孟英視曰脈數舌絳熱熾寒微素質陰虧暑邪為患也更不可用瘧門套藥予元參青蒿白薇丹皮黃菊知母花粉銀花竹葉梔子數劑而脈減乃去青蒿丹皮加生地甘草數服而瘳石北涯之大令媳患瘧壯熱如焚背微惡冷汗多大渴舌絳神煩不食不眠奄奄一息亟迓孟英診之脈細數而芤知其陰分久虧暑邪深入遂予白虎湯去米加西洋參元參犀角竹葉銀花石斛為方六劑而愈人皆聞而異之孟英曰見病治病耳何異之有然與見瘧治瘧而不治其所以瘧者固有異焉韓正甫患瘧越醫王某進以柴桂薑樸等藥勢乃劇所親何新之知為藥誤改用清解而不效始乞診於孟英脈數而右更滑大搏指胸悶不堪溲赤而渴苔極垢膩以涼膈散去芒硝甘草合雪羹加厚朴杏仁石膏半夏石菖蒲投四帖頻下宿垢各恙皆減改投輕清以滌餘邪遂以向愈其時渠兄貢甫之室患瘧初起肢麻且冷口渴苔黃眩瞀善嘔心煩無寐孟英診曰此亦暑濕為瘧不可溫散者而越醫勸服朮樸薑椒等藥病家聞用溫化恪信弗疑二劑後嘔渴愈甚經不當期而至四肢終日不溫汗頻出而熱不休再邀孟英診之脈漸伏曰此熱深厥深之謂也溫燥熱補切弗再服病家不信另招張某黃某會診僉云陰暑宜舍時從證徑用薑附六君加萸桂沉香等藥服之肢愈冷藥愈重八劑後血脫如崩而逝即以春間為貢甫所治之棺殮焉豈非數已早定耶故雖一家之中同時之病而疑信不同死生判別況春間貢甫之病治有成效尚蹈此轍無怪乎未經目擊溫熱之害者宜其以服涼解藥為可恥矣繼有趙廉士表弟潘少梅喬梓同時患暑濕瘧孟英咸與清化法數劑皆愈潘反生疑謂病邪被涼藥遏伏故瘧遽止恐將來必有他患孟英喟然曰甚矣醫之不可為也世人患瘧苦無良治纏綿不愈習見不疑余之治瘧則不然但專力治其所以病故瘧疾雖與傷寒同有五種之別而受病究比傷寒為輕苟治之如法無有不數劑而愈者設誤藥以遏其邪之出路則苔不能化溲不能澄神不能清食不能進矣子自思之其真愈乎抑假愈乎潘始恍然大悟而首肯焉新秋汪子與室寡居患瘧範某疊進小柴胡法昏熱皆厥腹痛汗淋人皆危之乃祖朱椿年太史逆孟英往視兩尺空數左關弦寸溢右寸關滑駛曰此真陰素虧腹有聚氣吸受暑熱最忌升提與元參西洋參百合竹葉蓮子心鱉甲牡蠣楝實小麥黃連等藥兩劑而減其族人謂瘧禁涼劑而尺脈無根苟非溫補猝變可虞母家不從兩疑莫決因請乩方服之數日後勢復劇苔漸黑伊父朱次膺仍乞援於孟英乃診脈更數於前因於前法中加犀角兩帖而安續以滋潛善其後而愈湯振甫患瘧於嘉興醫知為暑與清解法轉為泄瀉以為暑去而濕存改用溫燥瀉益甚而發熱不休神氣昏瞀因而束手令其買棹旋杭所親陳雪舫延孟英視之苔黑麵紅胸間拒按便如膠漆小溲全無譫妄耳聾不眠善笑脈則洪數而芤予黃連黃柏黃芩銀花石斛梔子楝實知母蔞仁元參為方綠豆煎清湯煮藥調下神犀丹四劑而胸次漸舒稍啜稀粥便色漸正小溲亦通乃去神犀楝柏加生地石膏服三日熱淨神清脈來柔緩以甘涼養液十餘劑而瘳大凡溫熱暑證而大解溏泄者正是熱邪下行豈可誤投溫燥之藥反助燎原之勢哉同時一男子患感瀕危浼孟英勘之神昏舌黑瘈瘲脈微曰遲矣此犀角地黃證惜無人用病家云陸某已屢用之矣因索其方閱之雖用犀角屑八分生地五錢緣病者便溏配以枳殼炒焦白朮三錢孟英喟然曰此方從無如此加減法況清涼下敵溫燥是徒有犀角地黃之名耳古人治病必放出路茲反截其去路良由學無理路遂致人無生路良可哀也同門相簡哉室患瘧始則消散繼則補中益氣治之匝月痿靡不堪腹中似有聚氣時欲上衝氣促心搖汗多眩暈左脅震躍渴飲無眠骨瘦如柴醫皆束手吾師趙菊齋先生拉孟英往診脈弦細而數按之不鼓因謂相曰不可再以瘧字橫於胸中則旬日可安若見其久瘧而欲截之且聞前醫謂令正初次患瘧為胎瘧務令發透不妨形瘦似鶴此皆非余之所知也夫一生不患瘧者有之矣未聞先在胞中患過瘧疾而後生者也若以初次患瘧為胎瘧則他病之初患者無不可以胎字冠之矣何以不聞有胎痢胎傷寒之名乎因醫者治瘧而不知治其所以瘧以致纏綿難愈者多遂妄立胎瘧鬼瘧等名以紿世俗而自文其淺陋今昔相沿賢者不免故世人又有瘧疾不可服官料藥之戒其實藥亦何嘗有官私之別耶服藥不當皆能增病不服藥為中醫不僅為瘧疾而言也令正素稟陰虧感邪不重過投消散營液重虛再升其陽本實欲撥補中益氣原是成方與證不宜於體不合即為毒藥我儀圖之介類潛陽重鎮理怯甘酸化液厚味滋陰大劑而投膚功可奏相極感服如法服之果未浹旬霍然病已方以西洋參熟地牡蠣紫石英龜板鱉甲枸杞當歸冬蟲夏草龍齒阿膠麥冬龍眼甘草蒲桃干紅棗蓮子心小麥等出入互用也吳曲城三令郎年未冠患瘧醫作食瘧暑瘧陰虛瘧治之諸法不應逆孟英視之面色浮黃便溏嘔惡脘悶腹脹溺少汗多曰濕瘧也予枳樸芩滑蒼朮半夏為方送服香連丸而愈繼用六君子善其後或云先生近輯溫熱經緯力辨暑必兼濕之非今年黴雨全無夏至後酷熱亢旱流金爍石濕自何來方嘆先生析理之精胡以此證是濕邪大劑爍藥果然獲效又何說歟孟英曰暑即天上之日有何濕氣人因畏暑貪涼瓜果過度雖無雨濕相雜濕亦自內而生所以暑每易於挾濕而昧者遂指濕熱相合之病為暑證殆由未見天日故不識暑之真面目也一笑蔣禮園令堂年七十三歲患瘧寒少熱多時時自汗咸慮其脫議欲進補孟英切脈洪數而滑舌絳口乾是暑為病也與清解法數劑而痊張六橋年逾七旬素不耐病新秋患瘧托孟英籌速愈之方曰易事耳第寒少熱多苔黃渴汗溺赤便秘體厚多痰杳不知飢極其畏熱其年雖耄其證宜清以大劑知芩連滑花粉竹茹厚朴石膏加雪羹投之數劑而痊康強如昔羅氏婦先患痰嗽氣逆礙眠後兼瘧痢並作醫者僉云無法浼人乞診於孟英脈見滑數口渴苔黃不飢脘悶溺似沸湯曰無恐也雖見三證其實一病蓋肺胃大腸一氣流通暑伏肺經始為痰嗽失於清解氣逆上奔溫納妄投胃樞塞滯郁遏成瘧渴飲汗多熱甚寒微病情畢露溫化再誤轉入大腸赤白稠黏無非熱迫不必見證治證但治其暑則源清流自潔矣以葦莖湯加滑石黃芩竹茹石膏厚朴授之不旬日而三證悉瘳朱生甫明經令郎萊云之室娩後月餘患間瘧孟英脈之虛數而弦頭疼腹痛苔色甚薄乳少善嘔乃營虛而邪客少陽也令郎斷乳庶免蓐勞劑以柴芩茹半桑楝延胡枇杷葉二帖嘔止腹不痛去楝實延胡加當歸四帖瘧罷能餐而頭尚痛再加杞菊服三劑頭不疼改用甘麥大棗加歸芍杞菊竹茹蒲桃干藕調之經行而愈陳氏婦季夏患瘧寒微熱熾舌紅不渴而思啖瓜果不飢不食二便皆通夜不成眠汗多神憊孟英審脈虛軟微數雖屬暑瘧邪不甚重惟營陰久虧不須重劑誅罰無辜以西洋參知母芩茹白薇麥冬西瓜翠衣為劑果三嗓而瘳胡氏婦患瘧寒少熱多自云陰分素虧醫進清解涼營之藥多劑其熱愈熾改用養陰法嘔惡煩躁自欲投井或謂今年中伏之時風雨連朝人須挾纊有何暑熱而多服涼劑以致瘧來發躁必屬虛火擬以姜附治之病者云吾舌已脫液陰將涸矣堅不肯服而請決於孟英脈至滑數右寸關更甚視其舌淡白而光滑儼似無苔其實有苔如膜滿包於舌也證屬陰虛吸暑兼以痰阻清陽初治失於開泄耳授菖茹連半旋茯蘇枳枇杷葉為小劑取其輕清開上也兩服舌即露紅嘔止受谷瘧熱亦減又兩服瘧竟罷孟英曰余亦初不料其若是之神也隨以清養善後而安高某以陰虛之體而患瘧於暑月久而不愈馮黃二醫僉用補養矣而杳不知飢欲噫不暢便溺艱澀渴喜沸湯孟英診脈緩澀不調按其胸次堅而不柔舌上滿布干黃薄苔曰氣機鬱結痰滯未行如何遽投補劑予菖貝旋蔞蘇桔連半紫菀枇杷葉為方四帖而愈始從調養以善其後嗣有王雨蒼仲郎之證治與此略同謝氏婦素體孱弱亦屬陰虛暑瘧久延舌色鮮赤醫投養血竟不見功孟英視之曰舌雖無苔色絳而澤此非脫液乃液為痰隔而不能上布故不生苔如果脫液詎能如是之鮮澤哉蓋痰雖因火灼成究是水液所結其潮氣上騰舌自不燥與茹貝菖蔞芩桔蛤粉枇杷葉等藥痰果漸吐三日後熱減知飢白苔漸布改用養陰清熱而瘳孟英嘗曰臨證必先辨其病屬何因繼必察其體性何似更當審其有無宿恙然後權其先後之宜才可用藥自然手到病除無枘鑿之不入矣又曰熱證有見白潤苔者亦痰盛於中潮氣上蒸也此不可遽施涼潤先宜開以辛通而昧者但知苔色白潤為寒證之的據遂不詳勘其兼證而妄投溫散燥補以誤事者多矣附錄於此學者識之陳德齋令侄緝庵患瘧黃某連投小柴胡湯漸至熱勢如長撫之烙手時當盛暑帳幔不啟而不得汗神情瞀亂大渴苔黃脘悶欲嘔便秘溺赤孟英按脈軟滑而數身面膚赤乃暑濕挾痰轇輵於中氣機阻痹宜予清宣劑以菖茹蔞枳知滑芩連花粉枇杷葉西瓜翠服後痰即漸吐異日瘧來有汗病者臥於藤榻身穿西洋布汗衫短褲其汗但出於衣不遮蔽之處孟英適至診畢令裸其體汗即遍出熱亦尋退方不加減四劑瘧斷更衣胸舒安穀另以輕清肅滌餘邪而愈世人不論天時不究病因但知蓋覆以取汗者宜於此案探討其未發之義不可草草讀過也許子芍年甫冠平素飲食不節氣滯多痰偶患時瘧溺赤苔黃脈至滑數脘悶不飢孟英投清解一劑其門下醫者黃某云瘧疾以小柴胡湯為主方乃舍之不用而以竹茹大寒之品遏伏其邪菖蒲散心之藥耗損其神此病雖輕而藥已誤恐有變證病家聞而惑之次日即服其方病勢日進輒云菖蒲散心以致神氣不安竹茹寒滯以致邪不能解小柴胡方內加入桂枝首烏等藥狂熱尤甚黃後薦招任某會診交口以為開手一藥之誤恐延虛脫徑用生脈六味加龍牡杜仲續斷阿膠之類服之半月後病者目不能張畏聞聲響語出無音身挺而重不能轉側略一動搖則手足震掉如擂鼓然房中几案皆為撼䐈黃任二醫僉云汗脫在即舉家皇皇其堂兄蘭嶼虀夜拉孟英往視脈甚弦疾曰病藥也其何能脫疏方以天竹黃竹茹竹葉竹瀝並用病者聞而咋舌謂一味竹茹釀成大病一方四竹能不殺人仍服任某補劑以冀留人而再治病也又旬日瘧徑不作至時惟腦後之枕骨與兩足跟著席身則反張如弓如是數刻則昏亂狂走醫者諉為祟病符醮水陸大弗不貲而病如故既而黃某疽發於背任亦託病不出所親陳雪舫力舉孟英胸無畦畛不妨再懇其挽救病家計窮始為諄請脈仍弦疾而左尤堅搏且善啖而腹脹如石矣孟英曰幸而便通猶可無虞以旋覆赭石菖蒲膽星枳實黃連青黛整塊硃砂兩許合四竹為方調服蘇合香丸一劑而反張狂譫皆減病者云我今日如夢初醒而精神自覺惘惘次日仍用原方調以玉樞丹得瀉四次腹脹遂減反張狂譫悉蠲惟至時尚有氣逆肢掣耳乃去玉樞丹令吞送當歸龍薈丸大便日瀉胸腹漸柔又服五劑逆掣皆平改用沙參丹參石英茯神白薇梔子絲瓜絡貝母海䖳鳧茈等清理善後而愈孟冬已完姻矣嗣其僕陳福陡患身面如金便血吐血求孟英視之身熱苔垢而肢冷手紫脈至如絲曰此急黃證而兼血溢於上下即所謂瓜瓤瘟也藥不及救越日果亡黃某敦愛局瘍醫也年逾六旬忽患背疽聞服參茸等藥七日而亡夫背疽之敗何至如是之速必是暑熱為患而誤從溫托耳楊素園大令批仁術志云硃砂不宜入煎劑當生研少許調服愚謂硃砂但忌火煉不忌湯煎且整塊而煎僅取其氣較研服其質者尤無弊也余澗花印雪軒隨筆云刑幕鄭春潭患秋感發狂譫語喃喃若與人爭辨謂有二鬼向其索命乃索筆作遺囑處分身後事如是者數晝夜山右武君視之曰非鬼也病由邪熱未清遽服補劑耳如法治之浹旬而起設非武君不又為談因果者添一公案哉子芍之證亦猶是耳陳載陶年五十五歲患瘧兩旬始迓孟英診之脈不浮而弦滑且數按之愈甚苔色黃膩滿布熱至大渴極喜冷飲小溲赤臭熱時則點滴莖痛大解不行間數日則略下稀水是暑熱挾痰見證疏清解法予之及閱前醫之方初則柴桂薑棗嗣用參甘耆朮首烏草果之類溫補雜投其瘧日甚其發日遲其補日峻其口日渴乃令熱時少飲西瓜汁一二杯病者飲瓜汁而大快輒恣飲一二碗蓋謂其體厚陽虛中氣不足故溺赤而便稀水又云暑是陰邪熱自濕來不可稍犯寒涼之藥因仿景岳治陰虛傷寒以冷水與桂附並行之例而令其服溫補以治瘧少佐瓜汁以解渴也噫景岳此案之不可為訓葉香岩發揮於前魏玉橫辨謬於後奚可尤而效之乎治而勿愈反責病人過飲瓜汁使然余謂此證苟非日飲瓜汁一二碗早以液涸痰膠燎原莫救也病者聞而頷之服數劑胸前赤斑密布瘧渴皆減溲漸通苔轉白前醫云再不溫補恐其驟變病者惑之仍服其藥並加鹿茸附子又旬余瘧如故而形瘦面黧氣衝干嗽白糜滿舌言蹇無眠醫者皇皇病家慼慼復延孟英視之脈仍數曰邪較衰矣西瓜汁之功也陰受劫矣溫補之力也極早回頭尚堪登岸爰以西洋生地甘草石斛白石英葳蕤麥冬黃連阿膠牛膝為方並令熬鱉汁飲之五劑而瘧罷嗽蠲得眠安穀苔亦全退但舌紅口辣溲赤不清前方去連膝加歸杞服八劑始解堅燥黑矢而愈然病者喜溫補既愈仍囑前醫善後故舌紅口辣與胸前斑點久不能消直至冬令孟英力勸停藥始漸除也有朱湘槎者與載陶年相若體相似也秋杪自越患瘧旋杭屢藥不應遲孟英視之面赤脘悶二便不行熱則譫言苔焦口渴予小陷胸湯加菖茹梔翹花粉竹葉等藥群謂肥人之體慮其陽不敢服此涼劑治載陶之前醫迎合主見大投溫補載陶偶見孟英而述之孟英曰湘槎殆矣此時恐無西瓜汁以救藥誤也旬日後果狂躁而亡其未亡前一日人已昏狂畢某診云暑熱內陷意欲挽救投以犀角等藥一帖故前醫於陳證則攘為溫補之功於朱證則卸為犀角之罪蓋明知溫補易售可以避罪邀功故樂操其術而不肯改弦易轍也後載陶令兄哲堂喬梓同時患瘧因前車之鑑雖汗多懶語酷類虛象不敢從補均依孟英作暑濕內伏治而愈陳雪舫令郎小舫年甫冠人極清癯偶患瘧醫與柴葛羌防數帖遂不飢不寐胸膈阻塞湯水不能下咽壯熱神疲汗出不解二便閉澀舌絳齦疼齒縫血流凝結於齶孟英持其脈細而數有下厥上竭之勢而肺未肅清宜用輕劑以葦莖冬瓜子紫菀元參通草枇杷葉旋覆滑石蔞皮西瓜翠衣為方數啜而安嗣用養陰西洋參不過一錢生地不過三錢緣其稟賦極弱不但攻散難堪即滋培稍重亦痞悶而不能運也耆術之類更難略試故量體裁衣乃用藥之首務也董茂清患瘧脈軟脘脹手紫面黃便秘溺紅苔膩而渴孟英曰暑濕挾穢氣阻於募原用菖樸橘半杏滑芩翹蔞枳銀花加雪羹出入為方服五劑便瀉知飢瘧休而愈陳芷潯主政患瘧跗腫便溏痰多食少時欲嘔吐間有振聲孟英取其脈微弱而弦不渴無苔小溲不赤乃中虛寒濕為患也方以六君去甘草加桂枝苡仁白芍吳萸投劑即減半月而愈沈陶安寒熱初作醫用溫散藥即眩悗不安延孟英視之舌絳無苔大渴多汗瘧則寒微熱甚發時咳嗽兼嘔溺少不飢脈洪且數清癯之體陰分素虧而伏暑化瘧也予知芩茹貝花粉白薇銀花元參枇杷葉紫菀冬瓜子等藥出入為方服後連解赤糞瘧即遞輕不半月而愈乃兄秋粟賈於蘇因八月初五日上海寇警吳門震恐遂踉蹌旋里迨十七日忽發瘧但熱無寒汗多昏譫脈亦洪數嘔嗽溺頻曲糵素躭體豐痰滯孟英即以治陶安法佐以開痰治之溏解頻行其色皆赤伏邪雖有去路緣心陽過擾譫渴不休加犀角竹葉蓮子心之類至月杪診時適大戰大汗之際其家疑為有祟方在禳禱鐃鼓喧闐病者神氣更不安恬孟英令將蘸壇移遠並灌以神犀丹一丸其家問此證何不用石膏孟英曰藥有定性病無定形況旬日以來苔退將淨瘧即可罷何必石膏次日乃叔蘭谷另邀一醫視之方雖相似而迎合主人之意加入石膏三錢冰糖四錢粳米一兩連進兩帖左脅即痞脹不堪按之如柈杳不思谷病者悔恨云月杪大汗之後吾瘧已休何以更醫致生痞脹仍迓孟英診之脈來澀滯苔復膩黃因詢曾服滋膩之藥乎陶安始述其所以孟英曰石膏為治暑良藥吾非不善用者因此證不止肺胃二經受暑心肝二經皆有所病故不用也且內挾痰濕者雖當用亦必佐以宣化之品辛丑夏家竾伯茂才患瘧初起誤服此公石膏兩劑腹遽脹延成瘧鼓幾至不起後服多劑桂附及金液丹而始愈蓋此公但見其瘧至睛赤裸衣狂走而不研察其病情也余究其因遽云瘧發時其熱自下而上比之心頭即覺昏冒且口不渴而惡涼飲乃濕上甚為熱之證彼時若以蒼朮同用則濕熱之邪一齊同解奚至延鼓哉賢昆仲之瘧熱亦自下而上系挾肝陽上升故熱升則必嘔嗽而令兄更有伏痰故余劑中多用連夏菖蒲滑石之類以化之今瘧罷熱去之後痰濕未清石膏已誤再佐糖米之甘緩俾膩塞而不行苟不急為宣導則鼓脹之萌也遂以蔞薤菖枳連夏旋橘楝實延胡雞金雪羹之類出入互用至二十劑痞始泯然粥食遞加苔亦退盡而竟不更衣改用參歸杞芍橘半蓯蓉首烏鱉甲等藥十劑大解始下堅黑異常連解數日始淨隨予峻補善後而痊秋粟之室懷妊九月加以憂勞九月初七日患瘧間作寒熱之時胎痛上竄或下墜腰疼更兼痰嗽帶下口渴無苔其勢甚危孟英但於清解之中加蔥白蘇梗投之連下赤矢痛勢遞減第瘧雖漸殺至期必兩發病者苦之孟英曰愈機也毋憂焉果浹旬而愈復苦脘痛嘔吐勺水不納藥亦不受授以藕汁蘆根汁梨汁少加生薑汁和入薔薇露枇杷葉露香櫞露徐徐呷之漸瘥嗣予滋養藥加黃柏服之而愈迨冬至分娩甚快健又秋粟令郎十歲陶安令愛八歲俱患間瘧僉慮胎瘧難瘳孟英曰無是理也小兒內無七情苟能慎飲食較大人易治焉劑以清解旬日胥痊施玉林之侄順老患瘧失治自頭至足龐然浮腫溲赤便溏不飢痰嗽孟英授杏樸橘半蘇滑桑皮通草銀花冬瓜皮蘆菔為方服六劑瘧愈腫消便堅溲暢而善飯也沙沛生鹺尹令堂年五十七歲體素弱而多怫鬱秋間患瘧於諸暨醫治未效冬初來杭謝某疊進溫補其勢孔亟寒微熱熾昏譫瘈瘲目不識人舌絳無液苔色黃燥便秘不行延孟英視之脈洪滑右甚左手兼弦乃痰熱深蟠內風煽動也予知母花粉蔞仁竹茹各三錢佐以梔薇翹貝橘紅蓮心一飲而更衣溲暢胸次較寬痰嗽口糜且知頭暈乃去知母花粉蔞翹加沙參苡斛麥冬野薔薇露次日瘧來甚減糜退口乾神憊音低津虛痰滯也去苡仁枇杷葉薔薇露加知母花粉各一錢五分甘草五分和入藕汁一杯服二帖瘧至甚微口乾倦臥脈則右虛左數用養氣充津蠲痰清熱法西洋參鹽橘紅歸甘杞斛冬茯茹蕤和入藕汁服兩帖瘧休神爽咽痛唇糜飢不能餐余焰內燃也去杞斛甘草加生地牛膝四劑後咽唇皆愈神憊懶言仍加杞子甘草服二劑胃氣漸蘇口猶少液因涉嗔怒暮有微熱膚腫欲嘔口乾便秘即去地冬杞甘膝加連楝蒺藜石英絲瓜絡冬瓜皮一啜熱去嘔蠲而腹猶脹去西洋參歸身冬瓜皮石英黃連加沙參旋芍延胡香附藕一劑脹消而口淡便秘飢不能餐改用西洋參木瓜銀花延胡蒺藜蓯歸芍斛為方投匕而便行三啜而腫盡消始予高麗參紫石英橘半歸冬菖茹牡蠣調養續去菖半加杞地鱉甲而愈嗣因登圊跌僕而發寒熱周身骨痛會陰穴起一瘰甚疼乃以高麗參骨碎補合歡木瓜杜仲絲瓜絡鹿角霜首烏鱉甲杞柏歸甘苡膝蓯斛等出入為方外用蔥白杵爛蜜調敷患處七日而痊沛生令庶母亦在越患瘧來杭後孟英視之脘悶欲嘔汗多頭重脈來弦數苔色膩黃乃餘邪逗留兼挾肝鬱以枳樸芩半茹斛蔞菖加蘇葉炒黃連投之痰涎大吐邪已外越脘脹口乾寒熱復作乃去樸半而加艽翹吐猶不止聚氣上腫渴飲無眠筋瘈便秘改用金鈴子散合雪羹加旋赭茹半薑汁炒梔子蘇葉炒黃連一飲而嘔渴減氣下行即去金鈴子散旋赭加沙參歸斛服五劑各恙皆安神憊汗多為用沙參歸斛芩橘梔連茹藕二帖又因嗔怒左脅作脹苦渴不飢暮熱便秘於前方加紫芍金鈴子散一啜脅脹即舒惟氣衝口苦飢不能餐自汗耳鳴頭左筋惕改授沙參當歸鱉甲石英竹茹牡蠣蒺藜菊花絲瓜絡服旬余眠食皆適但暮則火升口乾易汗去蒺藜絲瓜絡加黃連麥冬合甘麥大棗湯服浹旬經行腰痛頭震耳鳴八脈久虧也調養奇經以善後而康四弟婦懷娠臨月西甫起病之次日即患瘧因弟病日劇不免憂勞至第五日孟英視之脈欲離經腰疼腹墜伏暑化瘧將娩之徵以梔豉蘇歸芩連茹半知母蔥白服兩帖而產產後瘧來頗減惡露不行腹不脹疼不飢而渴投梔滑薇茹澤蘭丹參通草桃仁茺蔚藥一劑惡露即行而狂言不寐面紅口渴人皆危之蓋杭諺有云夫病妻懷孕鐵船過海難逃命未產先縈憂懼既娩血去火炎故晝夜輒以鐵船沉海云云孟英於前方去澤蘭通草加琥珀菖蒲膽星燈心和以童溲投之一飲神識漸清再劑即安睡矣去琥珀菖星桃仁燈草茺蔚加知母麥冬甘草沙參枇杷葉衝入藕汁一杯三服解赤矢而苔退瘧亦減而嗽痰改用沙參枇杷葉冬瓜子甘斛梔薇茹翹兩帖嗽減猶渴而身痛去梔薇枇杷葉加歸貝鱉甲四帖而瘧罷眠食鹹安調養至彌月即出房矣德清徐子瑞令正屢次墮胎復多憂鬱汛行之際患瘧經止而兩耳驟聾雖對面疾呼亦不聞也不飢不渴不語不眠便秘遺溺仰面靜臥而已惟熱至則昏譫欲厥乃父沈悅亭謂其熱入血室拉孟英視之脈滑數而右大按之皆虛兩尺尤甚胸下拒按曰此下元虛損故耳聾若是即精脫之徵豈可因汛遽止而輒通其血乎然氣鬱痰凝苔色白膩上焦邪實補且緩商先予小陷胸合蠲飲六神湯加雪羹開痰行氣悅亭韙之三服便通胸不拒按苔化黃色瘧即較輕改以沙參歸斛茹半翹芩菖橘甘艽五劑瘧止漸思飲食二便皆調兩耳仍聾脈形細弱乃用大劑培養藥善後而愈仲冬余遊姑蘇有長洲朱姓患久瘧求診面腫目黃聲音不爽溲赤腹脹脈滑而弦濕熱蘊隆失於宣解苔膩無汗食少痰多與清化方囑其慎口腹戒甜膩渠云此間名手皆曰藥餌之外須日飲糖湯庶久瘧易愈余曰渠但知表散可以發汗解邪糖湯可以和中已瘧而愈散愈不解愈和愈不已者是執死法以限活病也再信其言必成瘧膨病人聞之悚然亟服余方數帖得汗而愈秀水董君枯匏之夫人余於秋仲偶診其脈知其八脈久虧積勞多郁故指下虛弦而澀寒熱時形虛火易升少眠善悸性又畏藥不肯節勞至冬令證類三瘧余以病未能往視來信云桐鄉傳一妙方治三瘧效驗如神方用甜茶半夏各二錢川貝檳榔各三錢橘皮甘草各一錢五分乾薑一錢木香五分凡八味已服三帖而瘳余即函覆云此乃劫劑僅可以治寒濕飲邪為患之實證設虛證熱證服之雖愈必為後患故抄傳單方最非易事若好仁不好學功過恐不相敵也既而病果復作較甚於前余與呂君慎庵同議鎮養柔潛之法始得漸愈後聞服此方者率多反覆乃郎味清茂才深佩余之先見云前月中旬余過濮院有香海寺前一婦患三瘧求診面白唇紅舌絳而渴寒微熱盛溲短便艱汛事先期不眠脈數乃暑邪侵營也與元參丹皮知薇蒿梔花粉鮮斛竹葉之方至八月下旬再遊其地渠復求視云前方服即病減至二十劑而痊乃子以為病後須服補藥才四帖瘧復作遂不敢再進余謂此必溫補方也閱之果然仍授清化之劑五服而瘳山妻懷孕四月患間瘧腹痛便溏汗多嘔悶乃痰氣內滯風暑外侵脈滑而弦與枳桔蘇連柴芩菖夏三劑而瘳大女馥宜患微寒熱熾每發於夜汛不當期而至口渴便閉目眩多汗米飲不沾暑熱為瘧也脈洪數以知芩橘半蒿薇鮮斛元參梔子花粉服六劑而熱減大半去蒿半加西洋參麥冬竹茹枇杷葉又六劑而便行瘧止隨去元參鮮斛加歸身調之而愈季傑弟簉室之瘧日輕夜重少腹覺有塊上衝則嘔嗽並作杳不進谷余遊禾歸已交八日矣脈軟以澀是肝鬱於內暑侵其外也用芩夏翹滑葛蛤蘇連旋橘絲瓜絡服六帖諸恙霍然隨與清養善後仲秋二十八日余遊濮院歸是夜又徒患霍亂腹痛異常余起診其脈細數而弦肢冷畏寒蓋覆甚厚詢其口不渴而瀉亦不熱惟小溲全無吐者極苦舌色甚赤乃新涼束暑也玉樞丹絳雪灌之皆不受瀉至四五次始覺漸熱而口大渴仍不受飲語言微蹇余令搗生藕汁徐灌之漸能受隨以芩連苡楝梔斛桑葉煎服痛即減吐瀉亦止次日知飢略受食神憊已極筋絡痠疼與清養法而痊秋杪山妻懷孕已七月又患瘧醫從清解不應半月後轉為間作時余臥病省垣家人恐添憂慮初不我聞延至匝月病漸瀕危錢君意山管君芝山放棹迎余扶病歸來診脈軟滑而尺帶虛弦凡瘧至一時之先必大渴背麻脘悶既熱則頭疼腿足腫脹寒不過一時而熱有七八時之久骨瘦如柴肌膚甲錯便堅溲澀心悸無眠目不見人苔光無液乃真陰素虧水不涵木風陽內熾耗血傷津兼挾勞傷而吸秋熱熱茗頻啜米飯惡沾腰痛而胎動不安勢已十分險惡遂與西洋參元參知薇蒿菊菖麥梔甘桑葉竹瀝兩劑嗽痰甚多渴悶稍減去桑菊梔蒿加橘紅八分蘇葉五分蔥白兩莖又兩劑瘧止吐痰更多舌色漸潤去元參知薇加冬瓜子茯苓蛤殼一劑嗽雖減而左脅時疼乃用北沙參熟地麥冬蔞仁楝實石菖蒲絲瓜絡十大功勞藕養陰柔木而清痰熱服之甚妥然目雖能視而早晨必昏臥如迷遂增熟地加白薇歸身一帖寒熱陡作面赤氣衝或咎補早瘧復余曰非也此不耐歸身之竄動耳即去此一味加蔥白蒲桃干服之果愈隨去蔥白加甘草石斛兩帖嗽大減胃漸和更衣較潤惟手心如烙兩足不溫乃易沙參以西洋參去蔞楝而加生牡蠣一兩鹽水炒橘紅一錢二帖足漸溫痰漸濃而腰痛脅痛未已又加酒炒知母一錢兩帖痰出極多昏臥始減惟納食如噎火降即飢舌辣齶干小溲尚熱改用西洋參二地二冬二至知柏牡蠣十大功勞少佐砂仁為劑服六帖各恙皆已能起榻而腿軟齶干神猶貿貿即以此方加白芍木瓜石菖蒲熬膏服至冬至後神氣始爽而痊痢金願谷舍人次郎魁官九月間患五色痢日下數十行七八日來口噤不納腹痛呻吟危在旦夕矣有主人參以補之者有主生軍以蕩之者舉家皇皇不知所措孟英視之曰暑挾食耳誤服熱藥矣攻補皆不可施也輕清取之可以愈焉以北沙參黃連鮮蓮子梔子黃芩枇杷葉石斛扁豆銀花桔梗山楂神麯滑石為方其家以為病深藥淡恐不濟事西席莊曉村云縱使藥不勝病而議論極是定不致加病也竭力贊其居停投之覆杯即安旬日而起予聞孟英嘗曰蓮子最補胃氣而鎮虛逆若反胃由於胃虛而氣衝不納者但日以干蓮子細嚼而咽之勝於他藥多矣凡胃氣薄弱者常服玉芝丸能令人肥健至痢證噤口皆是熱邪傷其胃中清和之氣要言不煩故以黃連苦泄其邪即仗蓮子甘鎮其胃今肆中石蓮皆偽味苦反能傷胃切不可用惟鮮蓮子煎之清香不渾鎮胃之功獨勝如無鮮蓮則干蓮亦可用或產蓮之地湖池中淘得入水不腐之老蓮即古所謂真石蓮也昔人治噤口痢多用此然可不必拘泥庶免作偽之人以贗亂真反致用而無效徒使病不即愈也噤口痢虛熱在胃也補虛則礙熱清熱則妨虛茲又加以食積尤為棘手須看其用藥圓到處附玉芝丸孟英豬肚一具治淨以蓮子去心入肚內水煎糜爛收干搗為丸服朱某患痢于越表散盪滌滋膩等藥備嘗之矣勢瀕於危始返杭乞孟英診之神氣昏沉耳聾脘悶口乾身熱環臍硬痛異常晝夜下五色者數十行小溲澀痛四肢抽搐時時暈厥曰此暑濕之邪失於清解表散盪滌正氣傷殘而邪乃傳入厥陰再以滋膩之品補而錮之遂成牢不可拔之勢正虛邪實危險極矣與白頭翁湯加楝實蓯蓉芩連梔芍銀花石斛桑葉橘葉羚羊角牡蠣海䖳鱉甲雞內金等藥大劑頻灌一帖而抽厥減半四帖而抽厥始息旬日後便色始正溲漸清長粥食漸進半月後臍間之硬始得盡消改用養陰調理逾月而康汪左泉病滯下晝夜數十行而即日須補歲考遺才浼孟英商速愈之策切脈弦滑苔黃滿布曰易事耳重用芩連佐以楂樸送服青麟丸四錢投匕而痊略無他恙陳晝三病滯下某進通因通用法痛泄無度嘔惡不納汗出息微脈弱眩暈孟英曰近多伏暑之痢此獨非其證也元將脫矣急投大劑溫補脈候漸安一月後甫得健復高若舟之庶母年逾花甲體豐善瀉張某向用參朮取效今秋患白痢張謂寒濕滯中仍與理中加減病遂日增因疑老年火衰蒸變無權前藥中復加附子白痢果減而腹脹且痛不食不溺噦逆發熱勢已危殆始迓孟英視之脈沉而滑數梗梗曰暑熱未清得無補藥早投乎與芩連杏樸曲芍滑楝銀花海䖳雞內金之類一劑溺行痛減而痢下仍白其女為屠西園之室乃云向服補藥白痢已止今服涼藥白痢復作蓋病本久寒涼藥不可再用矣孟英曰言頗近理使他醫聞之必改溫補但病機隱伏測識匪易前此之止非邪淨而止之止乃邪得補而不行之止邪氣止而不行是以痛脹欲死夫強止其痢遽截其瘧猶之乎新產後妄澀其惡露也世人但知惡露之宜通而不知間有不可妄通者但知瘧痢之當止而不知邪未去而強止之其害較不止為尤甚也今邪未清滌而以溫補藥壅塞其流行之道以致邪不能出逆而上衝噦不能食此痢證之所畏吾以通降涼潤之劑搜邪掃濁惟恐其去之不速胡反以白痢復作為憂豈欲留此垢滯於腹中冀其化脂膏而填空隙故若是之寶惜而不願其去耶幸若舟深信竟從孟英議尋愈通達之論醫所宜知十八澗徐有堂病痢醫作寒濕治廣服溫補之藥痢出覺冷遂謂沉寒改投燥熱半月後發熱無溺口渴不飢腹痛且脹巔痛不眠翁嘉順囑其求診於孟英察脈弦細沉取甚數舌絳無津肌肉盡削是暑熱膠錮陰氣受爍與北沙參肉蓯蓉芩斛楝芍銀花桑葉丹皮阿膠合白頭翁湯為劑次日各患皆減痢出反熱有堂不解問故孟英曰熱證誤投熱藥熱結而大便不行者有之或熱勢奔迫而泄瀉如火者有之若誤服熱藥而痢出反冷者殊不多見也無怪醫者指為久伏之沉寒吾以脈證參之顯為暑熱然暑熱之邪本無形質其為滯下也必挾身中有形之垢濁故治之之道最忌補澀壅滯之品設誤用之則邪得補而愈熾濁被壅而愈塞耗其真液之灌溉阻其正氣之流行液耗則出艱氣阻則覺冷大凡有形之邪皆能阻氣機之周流如痰盛於中胸頭覺冷積滯於府臍下欲熨之類皆非真冷人不易識吾曾治愈多人矣徐極歎服仍議育陰滌熱病果漸瘳莊芝階舍人之外孫汪震官春前陡患赤痢孟英診之脈滑數而沉面赤苔黃手足冷過肘膝當臍硬痛小溲澀少此大實症也何不加大黃盪滌之伏熱為病也與大劑芩連梔楝滑石丹皮砂仁延胡楂曲銀花草決明等藥兩服手足漸溫清熱之效而腳背紅腫起疱如蒲桃大一二十枚濕熱下注也若如前方加大黃盪滌當不至此四服後腹痛減苔退而渴於原方去楂曲砂仁加白頭翁赤芍海䖳旬日後痢色轉白而腿筋抽痛乃去丹皮滑石赤芍加雞金橘紅生苡石斛熱久傷陰也古人急下存陰之法原以仿此救法好兩服痛止溲長糞色亦正腳疱潰黃水而平穀食遂安改用養胃陰清餘熱之法而愈合法聞孟英治此證每劑銀花輒兩許尚須半月而瘳設病在他家焉能如此恪信苟遇別手斷無如此重劑況在冬春之交誠古所未有之痢案後人恐難企及此案步步合法特少一番盪滌之功故覺少延時日耳然涼劑已畏其寒若加盪滌之品必不敢服此治病之所以難也王葦塘患滯下醫投枳樸檳楂之藥數服後肢冷自汗杳不進谷脘悶腹痛小溲牽痛舉家皇皇孟英視脈細澀舌絳無津是高年陰虧伏暑傷液況平昔茹素胃汁不充加以燥熱之藥津何以堪因與沙參銀花蓯蓉白芍石斛木瓜甘草楝實扁豆花鮮稻頭滋陰養液兼調肝氣數劑痛悶漸去汗止肢溫乃加生地阿膠麥冬柿餅蒲桃乾等以滋之居然而痢止餐加惟舌色至匝月始津潤復常陰液之難充也如此沈綬齋令堂患滯下色白醫與溫運病勢日劇腹脹昏瞀湯飲不下孟英診為伏暑用芩連滑樸等藥沈疑高年且素患脘痛豈可輒用苦寒孟英再四剖陳始服半劑病果大減不數帖即愈按此等症甚多奈執迷不悟者雖剴切言之不能解其惑亦可衰也已一叟患滯下色白不黏不飢不渴腹微痛而不脹孟英切脈遲微進大劑真武湯加參而愈程秋霞之子患腦漏醫與辛夷蒼耳之藥漸有寒熱肺移熱於肝方言所載不過如此改用柴葛羌防數帖遂致寒熱日發數次神昏自汗勢甚可危孟英用竹葉石膏湯一劑肅清肺氣寒熱退而神清進粥繼以甘涼清肅復投滋潤填陰旬日而愈上病取下朱浚宣令堂患滯下醫聞色白而與升提溫補旬日後肢冷自汗液脫肛墜群醫束手慮其虛脫因浼濮樹堂乞診於孟英曰藥誤耳與大劑行氣蠲痰清熱之藥果漸吐痰而痢愈又其令弟同時患此五色並見神昏肢搐大渴莖腫腹痛夜熱危險異常孟英察脈細數與白頭翁湯加犀角生地銀花石斛楝實延胡芩連滑石丹皮木通甘草梢等藥三帖後熱退神清溺行搐止乃去犀角草梢丹皮滑石木通加砂仁拌炒熟地山楂炭服之漸安半月而愈孫渭川年逾七旬脈象六陰按之如無偶患音嘶痰嗽舌絳無津孟英用甘涼清潤法音開而嗽不已仍與前藥轉為滯下色醬溺赤臍旁堅硬按之趯趯舌猶枯絳渴飲不飢人皆危之孟英曰腸熱由府而出此語甚精痢不足慮第高年陰液難充不能捨涼潤為方苟犯溫燥其敗可必幸渠家平素恪信竟服犀角地黃知母銀花蓯蓉花粉麥冬白芍石斛楝實等藥十餘劑痢止而臍旁柔軟因去犀角加西洋參又服兩旬始解燥矢而溲澈胃蘇又服半月復得暢解舌亦潤澤而愈盛犀林廣文之僕患血痢自秋徂冬半年罔效孟英察脈細弱而口乾腰膝痠疼與鹿角霜蓯蓉枸杞杜仲菟絲續斷血餘木瓜石脂砂仁末炒熟地黃十餘劑而痊丙午春高漢芳患滯下色醬日數十行年已七十七歲自去秋以來漸形疲憊即服補藥馴致見痢黃某徑用溫補勢乃劇延孟英診之右脈弦細芤遲脈虛證實口渴溲澀時時面赤自汗乃吸受暑邪誤作虛治幸其所稟極堅尚能轉痢一誤再誤邪愈盛而正反虛矣以白頭翁湯加參朮銀花芩芍楝斛延胡二劑即減五劑而安繼與調補竟得霍然後三載以他疾終葉晝三侄女適朱氏上年四月分娩七月患赤痢其家謂產後之病不敢服藥延至今春肌消膝軟見食欲嘔晝三迓孟英診之左細軟右滑數伏暑為病幸未誤藥與沙參陳倉米歸芍續斷木瓜扁豆連斛石蓮荷蒂柿蒂枇杷葉橘皮為方送駐車丸而愈孫心言以七十之年患滯下胡某知為暑熱以青磷丸下之治頗不謬繼則連投朮樸夏葛等藥漸至咽疼口糜呃忒噤口諸醫進補其勢孔亟伊婿童秋門迓孟英診之右脈滑數上溢身熱面赤溲澀無眠體厚痰多時欲出汗在痢疾門中固為危候第以脈證參之豈是陽虛欲脫實由升散溫燥之劑爍其陰液肺胃之氣窒塞而不能下行也與大劑肅清之藥一劑知二劑已隨以生津藥溉之痢亦尋愈按此等痢呃古書未載而治法懸殊世人但守成法不知變通治而不愈諉之證危況屬年高病家亦不之咎也孰知有此隨時而中之妙法耶曹泳之二尹將赴代理昌化任而瘧痢並作寒少熱多滯下五色迓孟英視之面垢苔黃乾嘔口渴痛脹溺赤汗出神疲脈至洪數不清與大劑芩連滑樸知母花粉銀花石膏連翹竹茹等藥投匕即減三服而起吳爾純八月下旬患滯下腹痛異常伊外祖許仲廉延孟英往診形瘦脈數而弦口渴音微溺澀乃陰分極虛肝陽熾盛伏暑為痢治法不但與寒痢迥異即與他人之伏暑成痢者亦當分別用藥也與白頭翁湯亦通治伏暑成痢之方加知母花粉銀花丹皮金鈴延胡沙參芩連服之次日復視痢減音開而右腹疼脹拒按為加冬瓜子烏藥鼠矢三劑而消滯下亦愈惟薄暮火升面赤自汗重加介類潛陽而痊此方顧及陰虛謝再華請孟英治乍浦人滯下證晝夜百餘行不飢不渴而欲嘔腹痛上及於心胸切其脈頗平和是寒濕也與時行暑濕痢大相徑庭投薑桂萸樸之劑數服霍然王瘦石夫人患滯下腹痛微嘔不飢口苦溲短耳鳴孟英診曰脈見細弱之形肌無華澤之色汛不行而早斷舌紫黯以無津是素質陰虧情懷悒鬱二陽默熾五液潛消雖吸暑邪莫投套藥予白頭翁湯加雪羹銀花梔子楝實數劑而減繼去雪羹加生地蓯蓉柿餅藕汁而安改授甘麥大棗加西洋參生地蓯蓉竹茹歸芍蒲桃干而以藕湯煎服調養體質以痊潘聖徵於仲冬患感至十四日退熱之後杳不知飢群醫雜治迨季冬下旬轉為滯下五色腿腫裂血溲澀口乾始延孟英診之右脈弦細而數右弦滑而空苔色黃膩根焦時或自汗乃氣液兩竭熱毒逗留之象必從前過服溫補之藥否則熱退在十四日之期何至延今五十餘朝而見證若是之棘手哉其弟鴻軒云此番之病補藥不過二三劑惟仲秋患瘧時醫謂其苔白體豐云是寒濕嘗餌附桂數十劑且日飲燒酒耳孟英曰此即釀病之具矣治病且難何況有如許之藥毒內伏更將何法以生之耶堅不立方其家必欲求藥以期扶持度歲孟英曰是則可也以白頭翁湯加銀花綠豆歸身白芍陳米燕根蘭葉藕為劑而以補中益氣大料蒸露代水煎藥服後焦苔漸退糞色亦正舉家喜出望外復丐孟英圖之柰脈無轉色遂力辭之又沉聽松鹺尹太夫人季秋患瘧孟英嘗往診之曰伏暑所化且體屬陽強而多痰火切勿畏虛輒從溫補奈病者期於速愈廣徵醫療或以為證屬三陰或謂是子母瘧或指為老年胎瘧眾楚交咻病不能愈延至季冬亦轉為痢且膚腫臀瘡口糜舌疱諸醫束手復請診於孟英脈與潘同不可救藥王雨蒼室仲秋患滯下治兩旬而罔效何新之薦孟英往視脈來弦數而滑腹墜腰疼溲少口乾面紅煩躁知飢能食夜不成眠而滯下赤白從無糞色相兼及至更衣又極艱澀略無痢色相雜通補溫涼服皆不應稍投升舉氣塞於胸詢其月事因痢愆期孟英曰此病不在腸中也能食便堅府氣並不窒滯陰虛木旺營液因而旁溢緣衝任隸於陽明平人氣血循經各行其度豈有衝任之血液可從大腸而出之理乎然天地雖有定位山澤可以通氣周身脈絡原自貫穿挹彼注茲風陽所煽猶之交腸證糞從前陰而出舉一反三病機可悟何極歎服爰以烏鰂茜根阿膠鮑魚蓯蓉枸杞柏子仁黃柏銀花藕為劑一服即減不旬而瘥續參熟地當歸龜板鹿霜善後而愈鮑魚淡乾魚也諸魚皆可為之然以石首魚為勝俗謂白鯗是也惟台州三伏時所幹者味淡而香色白尾圓世稱松門臺鯗可以入藥無腥咸作吐之弊其誤用蝮魚者蓋失考也朱生甫明經以花甲之年偶在嘉興患滯下甚劇急買棹旋杭集諸醫議治許敬齋宗景岳謂痢必本於寒濕主幹薑桂樸以溫化洪石生尚東垣聞其向患脫肛主清暑益氣以舉陷或云素善飲而有鼻衄血熱陰虧既受暑邪宜玉女法以兩清或云痢必有積不必問其餘宜大黃歸枳以盪滌聚訟紛紜乃郎仲和等不知所從而質諸孟英診畢遂問此證何當用何藥曰此滯下證之最難治者也痢初作即不能起於榻而五色並見噤口不食非暑熱之深受一何至於此極耶滿面紅光鼻赤尤甚肺熱素熾暑火爍金故水濕化源溺少而澀此不可以溫燥再劫其津也肢掣無眠合目囈語時時煩躁視物不明畏熱喜風口乾易汗陽氣浮越暑漸侵營故苔雖膩黃尖紅根黑此不可以升散再擾其陽也胸次不舒飲水欲噎欲噎不達欲嚏不能莖縮易嗔時有惡夢肝多怫鬱痰阻清陽故升降不調中樞窒滯此不可以滋澀再礙其機也又非尋常之痢病僅在府可以推蕩以為功也參之於脈右寸關緩滑而寸較抑左則弦洪而數兼上溢故知其氣鬱痰凝暑火深受風陽內動久耗心營所幸兩尺皆平身無大熱如能治之中肯儘可無虞仲和出諸方云然則此皆不可服乎曰咸治痢之法也惜尊翁之症不能合於此藥耳若尊翁之恙見證雖太錯雜而責重在於肝經肝屬厥陰風火內寄故此經之痢宜柔宜涼忌剛忌溫以肝為角木龍性難馴變化飛騰病機莫測但使風陽靖息庶幾險浪不興縱有別脈未清自可徐為疏瀹也仲和聞而心折力懇圖維於是以仲聖白頭翁湯為主方加石菖蒲川貝母竹茹開痰舒郁以調其氣犀角銀花竹葉涼血息風以清其心冬瓜蔗梢鳧茈海䖳煮湯煎藥以清胃熱而生津化府氣而濯垢吞送滋腎丸三十粒引肝火迅速下行服後諸恙遞減糞色漸見痰果頻吐神氣亦安既而粥食日增夜眠恬適始去犀角雪羹滋腎丸加西洋參阿膠以復其津液迨痢淨而時有血隨糞下為加鴉膽仁以龍眼肉包而吞之果止惟腸鳴氣泄稀糞隨流肛墜難收脈亦弦軟知其病去而正虛也改用三奇散而安繼予氣血交培善後仍佐蠲痰舒郁康健較勝曩時蓋並其積年宿疾而去之也故生甫謝孟英詩五排結句云不因施上藥那得挽沉疴磈磊從今盡先生殆緩和朱飭庵孝廉年未三旬自都中奔喪回杭患滯下赤白腹不甚痛而奔迫異常能食溺長醫治罔效孟英脈之虛弦而軟曰此不可以常痢視也以三奇散加歸芍送香連丸而愈濮樹堂患滯下醫者以其脈弱體虛第三日即參補養延至匝月痛痢不減穀食不思飢瘦如柴面浮足腫口乾舌絳懶語音低氣短汗多略難轉側諸醫無策始迓孟英診之曰初起脈微弱為暑之本象今按之尚數乃陰液已傷渴飲無苔豈容溫補溲赤而痛胡可酸收見證雖危治不可紊為定白頭翁湯加西洋參乾地黃炙草白芍麥冬阿膠酒炒銀花之劑以水露煮陳倉米湯煎藥群議以為藥太涼潤不可輕試孟英曰此厥陰證而胃液已傷幸而脈未空數浮弦亟予養陰清熱庶可圖功若徒議藥不議病縱有一片婆心未免好仁不好學矣病者憶及乙巳之病深信不疑遂服之一劑知六劑而痢淨舌潤知飢溲通得睡第便溏腹痛日必兩行左齦赤腫而疼外塗以玉樞丹內治以三奇散加潞參炙草薏仁扁豆雞䏶胵黃柏橘皮吞香連丸旬余而浮腫消大便堅舌苔生起於榻而口腹不節發熱口乾乃食復也按法治之熱退至七日始更衣因囑其加意珍攝俾易康痊奈家務紛繁既愈即不能靜養神機曲運心氣渙散不收液涸津枯而前功盡墮惜哉然此案自可傳也陳誦芬令堂年越古稀精神素旺滯下數月病日以劇所親蔣策勳囑延孟英圖之已粒米不納雖啜飲而咽膈阻塞唇舌皆紫痰中帶血吐之甚艱日夜更衣數十次稀糞挾以赤垢若欲小溲必令人重按肛門始能涓滴而出熱如沸湯脈則左手弦洪澀數而上溢軟滑而大按之無神孟英曰此證本滯下良由七情鬱結木土相乘醫謂高年輒投溫補釀成危證藥不可為誦芬云先生之言是也家慈因春間疊聞江南之警心甚皇皇舉家遷避飲食頓減夏初旋里似已稍安六月間患瀉飲食又減屢進參朮熟地附桂炮姜之劑竟無寸效惟望鼎力斡旋是幸孟英曰上不能納下不能分中氣無權營津兩匱既承下問姑擬一方僅許小瘥不能奏績也誦芬從之服後即思粥食小溲單行再求轉方孟英堅不承手果至季秋而沒其方乃沙參冬瓜子絲瓜絡蘆根紫菀菖蒲竹茹通草薏仁枇杷葉陳倉米以水露煎服也顧鐵舟贊府精於醫者也目擊其一服而進粥溺行因嘆曰仙方也惜遇之不早命矣夫項君香圃患赤痢瀕危其親莊嵋仙少府拉余往視脈細不飢口乾舌絳形消色瘁不寐溺無禾中醫者以其素耽曲糵輒進苦燥滲利之藥而不聞景岳云酒之為害陰虛者飲之則傷陰也況病因暑熱不夾濕邪溫燥過投陰液有立涸之虞余將旋里為定西洋參生地甘草銀花石斛麥冬生白芍扁豆花枳椇子藕汁一方冬瓜湯煎令其恣服次年春余往禾候莊芝階先生之疾有一人來拜謝面如重棗素昧生平甚訝之嵋山曰即香圃也面色素赤上年因病危而色脫故先生不識耳承惠之方服十餘帖而愈今又善飲如昔矣斑胡季權令郎珍官右顴偶發紫斑一塊時當季冬孟英以犀角石膏涼解之藥二三帖後始發熱斑漸透犀角服二十帖始撤素有目疾餘熱復從目發令以石膏藥久服居然漸愈且能食肌充略無他患聞者莫不異之胡孟紳乃弟季權同時患黑斑苔穢脈渾氣粗麵垢孟英即以涼膈散投之大解得行脘亦不悶斑皆透綻脈顯滑數而洪遂與大劑涼潤清肅之藥直俟其旬日外大解不瀉藥始緩授復又沉臥不醒人皆疑之孟英曰痰熱尚熾也仍授大劑數帖果頻吐膠痰累日而眠食漸安是役也當兩病披猖之際舉家皇皇他醫或以前證為神不守舍議投溫補後證則以為必敗聞者無不危之賴季權之夫人獨具卓識任賢不貳孟英始無掣肘之慮而鹹得收功也姚祿皆在金陵適遇大水繼而回杭途次酷熱患感顧某診為濕邪與桂枝葛根藥三帖病乃劇趙笛樓知其誤治連用清解因見藍斑不肯承手迓孟英視之脈細數而體瘦平昔陰虧熱邪藉風藥而披猖營液得溫燥而乾涸斑色既紺危險萬分勉投大劑石膏知母白薇梔子青蒿丹皮竹葉竹瀝童溲之藥調以神犀丹三服大解下如膠漆斑色漸退而昏狂遺溺大渴不已仍與前方調以紫雪數劑熱退神清而言出無倫猶如夢囈或慮其成癲孟英曰痰留包絡也與犀角菖蒲元參鱉甲花粉竹茹黃連生地木通甘草為方調以真珠牛黃始得漸安改授存陰調理而愈仁和戴君文叔令嬡年十二患風斑睛赤服升散藥數帖忽覺胸次不舒飲食下咽即吐時作時止醫皆莫措六七日後其作愈頻而有欲厥之勢其親徐君樂亭囑延余診脈弦而數夜不成眠目赤未蠲苔黃口苦是發斑不由外感乃稚質陰虧風陽上越助以溫散厥少陡升肅降無權因而吐逆以連柏橘半梔菀茹旋海䖳少加蘇葉煎送當歸龍薈丸一劑知二劑已梅溪蔣君寶齋令堂自上年夏秋間患痢之後神疲少寐不能起床醫謂其虛率投補藥馴至驚疑善悸煩躁囈言脅痛巔疼耳鳴咽痛凜寒暮熱大汗如淋暈厥時形愈補愈殆李君蒼雨邀余診之脈弦滑而數白睛微紅而眼眶如墨舌絳無苔因問胸悶乎曰悶甚便秘乎曰秘甚溺熱乎曰熱甚豈非氣鬱而痰凝痰阻而氣痹肺胃無以肅降肝膽併力上升濁不下行風自火出雖年逾五旬陰血不足而上中窒塞首要通陽為處小陷胸加菖薤旋茹苓枳郁李仁群醫謂是猛劑無不咋舌寶齋云鎮補滋斂業已備嘗不但無功病反日劇且服之果一劑知三劑安已而余有會垣之遊前醫謂病既去負進守補月餘仍便秘不眠胸痞躁亂加以發斑腹痛人皆危之時余在禾中函氣往視仍用前法加減合雪羹投數劑連得大解率皆堅燥改與柔養更衣漸暢粥食漸增以潛鎮舒養之劑善其後痘疫附爛喉上年秋燥冬暖略無霜雪河井並涸吾杭自九月間起天花流行十不救五小兒之殤於是者日以百計孟英曰此痘疫也治法當與常痘有異惜幼科未之察耳且天令發泄不主閉藏入春恐多喉患特刊加味三豆飲方俾未曾布痘者予服免患將出者恣飲冀輕又勸人頻服青龍白虎湯以杜春來喉恙不料其言果應三春不雨喉症甚多醫者猶不悟其致病之因僅知發散正如火上添油孟英胸有成竹一以仲聖白虎湯為救焚主劑若已及於營分者用晉三犀角地黃湯相機加減又刊青龍白虎湯暨錫類散方廣為印送賴此以活者不可勝數痘原感疫而發醫林改錯中言之甚詳附加味三豆飲生綠豆生黃豆生黑大豆或用生白扁豆亦可生甘草金銀花水煎服孟英原刻自注云古方三豆飲為痘證始終可服之妙藥未出時常服痘可使稀將出時急服重可冀輕已出時恣服逆可轉順盡出時頻服毒可易清俗傳種痘是密室烘花更有初生小兒於十八日內服藥令其出痘之法是揠苗助長此等矯揉造作陰受其害者古今來不知幾恆河沙數矣至於種種稀痘之方皆無義意或以毒藥損人元氣或以穢物致生別恙慎勿為其所惑惟此方藥極簡易性最平和味不惡劣易辨易服不必論其體質久服無弊誠盡善盡美之王道藥也杭人惑於患痘不食豆之說甚屬可鄙今特辨明冀人醒悟凡小兒能啜飲後即以此藥日日代茶誠保赤之首章焉原方用赤豆性燥傷陰予以黑大豆易之更有補陰之績雖燥令燥體皆無礙矣再益銀花甘草而化毒之功尤勝或疑銀花性涼似難久用不知三豆皆谷也性能實脾得銀花以濟之更覺沖和況小兒體稟純陽極宜此甘涼補陰之味豈特稀痘尤能明目消疳不生瘡癤泄瀉等病其功未能殫述也附青龍白虎湯橄欖生蘆菔水煎服孟英自注云此予自制方也橄橄色青清足厥陰內寄之火風而靖其上騰之焰蘆菔色白化手太陰外來之燥熱而肅其下行之氣合而為劑消經絡留滯之痰解膏粱魚面之毒用以代茶則龍馴虎伏臟腑清和豈但喉病之可免耶且二味處處皆有人人可服物異功優久任無弊實能弭未形之患勿以平淡而忽諸附錫類散象牙屑焙真珠各三分飛淨青黛六分梅花冰片三釐壁錢二十個俗名喜兒窠木板上者勿用西牛黃人指甲各五釐男病用女女病用男合送濟人須分別配之共研極細粉吹患處流出惡涎即愈孟英自注云此專治爛喉痧疹之神方也尤鶴年附載於金匱翼云張符瑞傳此方以救人而得子故予名之曰錫類散段春木之室爛喉內外科治之束手姚雪蕉孝廉薦孟英視之骨瘦如柴肌熱如烙韌痰阻於咽喉不能咯吐須以紙帛攪而曳之患處紅腫白腐齦色皆糜米飲不沾汛事非期而至按其脈左細數右弦滑曰此陰虧之體伏火之病失於清降擾及於營先以犀角地黃湯清營分而調妄行之血續與白虎湯加西洋參等肅氣道而瀉燎原之火外用錫類散掃痰腐而消惡毒繼投甘潤藥蠲餘熱而充津液日以向安月餘而起吳雨峰明府家囑兒科為其仲郎所出之兩孫種痘下苗二三日發熱咽疼醫以為痘之將形也投以升透之藥赤斑似錦咽爛如焚半月之間闔家傳染痘疹一門以護咽為第一要義一見喉痛即急清降大忌升提何專科而不知此耶諸醫莫敢入其室孟英往診時見其三郎耕有四郎小峰尚未病亟曰已病者固當圖治未病者尤宜防患傳以青龍白虎湯代茶恣飲竟得無恙其令閫洪宜人及仲媳皆為之治愈此外如其長媳其令嬡其三孫其僕其探病之女戚殞於是病者七人焉時雨峰築岩兩喬梓咸宦於外仲郎亦慕遊江右不料因種痘而釀此家禍益信孟英勸人勿種痘之說為可訓也種痘之法以人巧而奪天工原屬妙法但須慎於擇時若疫氣流行之時感其氣者尚有腫頤爛喉之酷況又加以痘毒耶此乃醫之不明未可盡歸咎於種痘也潘洪疇托兒醫為其仲郎春波所出之孫種痘下苗三日即咽痛醫與升散藥發熱斑爛七朝而夭咽痛而復升之即非種出之痘亦必不免春波及其弟祥衍皆染其病春波之證顧聽泉治而愈矣祥衍之恙咽喉爛至於後胸膈痞塞不通牙關緊澀小溲淋痛口流紫黑血塊人皆謂其臟腑爛焉孟英視之曰惡血毒涎正欲其出吹以錫類散用碗承其口流出涎血甚多咽喉牙環胸膈皆得漸舒投以犀角地黃湯加元參銀花童溺藕汁竹黃花粉貝母石菖蒲之類漸以向安繼與生津填補而痊趙子循患喉痹渠叔笛樓用大劑生軍下之而藥不能入病在上而用盪滌腸胃之藥殊未合法孟英以錫類散吹之即開與白虎法而瘥陳書伯庶常令弟保和年未冠患失音咽痛孟英與犀羚石膏元參豆根牛蒡射干等大劑清肅之藥音開而咽糜吹以錫類散糜愈而疹點滿布左目及耳後皆腫方中加以鮮菊葉二兩疹愈痰嗽不已仍主前法服三十餘帖而痊此證脈滑且數口大渴初終未曾誤藥故能愈其庶母同時患喉糜而頭偏左痛肝風心悸欲嘔壯熱煩躁脈弦細數孟英曰此兼陰虧風動也初以犀羚元參菊花丹參梔子桑葉馬勃投之外吹錫類散咽愈熱退續用二至二冬生地石英蓯蓉龜板茯苓滋陰潛陽而瘳又其二令妹亦患喉疹汛事適行四肢痠痛略難舉動氣塞於咽孟英診脈弦滑以犀羚旋赭茹貝兜鈴牛蒡射干豆根花粉銀花海䖳竹瀝絲瓜絡等此則專事情熱蠲痰而已須合三案而細參其同異處方有會心出入為方兼吹錫類散而瘥變證雖多不外肺胃二經積熱得其主腦尚非難愈之證周鶴亭令郎年甫五齡痘後月餘清涼藥尚未輟忽發壯熱幼科治之勢益張肢瘈面赤嘔吐苔黃渴而溺清時或昏厥證交六日其外祖何新之邀孟英診之脈甚弦洪滑數心下拒按便秘汗多投小陷胸加石膏知母花粉竹葉枇杷葉貝母雪羹二劑各恙皆減溲赤便行繼與清養而安涼藥未輟而忽見如此之證即不按脈亦可知為新感溫邪矣許安卿患咽痛瘍科黃秀元連與升散之藥延及齦腫牙關不開舌不出齒自汗脈澀絕谷瀕危其族兄辛泉逆孟英往勘即洗去滿頸敷藥而以菊葉搗塗吹以錫類散煎犀羚元參射干馬勃梔貝山豆根等藥灌之數日始痊宜降而反升之宜其病之增劇矣胡韻梅年已逾冠因夜坐感寒患頭疼惡冷嘔吐肢冷孟英視之曰舌絳脈數斑疹之候斷非受寒也幸胡平昔欽信遂與清透藥服之次日點形圓綻細詢果未出痘但火勢甚熾恐其惑於俗論囑請專科王蔚文會診所見略同一路清涼自起發至落茄毫不不雜一味溫升攻托之藥而滿身密布形色粗紫漿濃痂黑便秘不飢渴無一息之停苟不如是用藥其能免乎此建中瑣言之所以有功於世也此大實之證故治宜如此予見一小兒出痘自始至終參茸不輟於口稍停其藥即懨然不振正與此案相對待可見用寒用熱皆宜隨證變通未可執一而論也瘄疹溽暑之令瘄疹盛行幼科僅知套藥升柴防葛亂施殆亦疫癘之病造化默行其殺運歟陳仰山家患此者十餘人其長郎書芾孝廉之女勢最劇以瘄甫出而汛至也醫者卻走始延孟英視之脈滑而數舌絳大渴面赤失音不食便瀉曰此由發散太過火盛風熾氣血兩燔氣分之邪由瀉而略泄其焰營分之熱由汛而稍解其焚豈可畏其脫陷妄投止澀耶與西洋參石膏知母麥冬犀角生地連翹甘草石斛丹皮桑葉竹葉大劑投之三日而愈養陰善後遂以漸安其餘或輕或重孟英一以清解而痊濮東明令孫女素稟陰虛時發夜熱少餐不寐仲夏患感發疹肺熱汛不當期而至血熱孟英用犀羚知貝石膏生地梔翹花粉甘草竹葉蘆根等藥疹透神清唯鼻燥異常肺中餘熱吸氣入喉辣痛難忍甚至肢冷復於方中加元參竹茹菊葉荷杆各患始減而心忡吐沫血因熱而虛徹夜不瞑渴汗便瀉改投西洋參生地麥冬小麥竹葉黃連真珠百合貝母石斛牡蠣龜板蔗汁諸藥而愈季秋適姚益齋為室病不甚重治亦合法而難收捷效者以陰虛之體不勝溫熱之氣也此即四損不可正治之例設治不如法則危矣胡季權子珍官甫六歲目患內障繼則夜熱痰嗽小溲過多醫作童損治服滋補數月病日以甚孟英持脈右大口渴苔黃曰伏熱在肺法當清解及詳詰其因始言病起瘄後蓋餘熱未淨而投補太早與滑石知母花粉桑葉茅根枇杷葉蘆根冬瓜子杏仁服二劑遍身發出斑塊又二劑斑退苔化乃去滑石加沙參餌之其熱頭面先退次退四肢以及胸背又數日甫退於腹人皆詫其熱退之異孟英謂熱伏既久復為半年之補藥膩滯於其間焉能一旦盡滌其勢必漸清而漸去也熱退既淨溺亦有節痰嗽遞蠲餐加飢潤而內障亦漸除矣德清蔡初泉陡發寒熱咽痛大渴脘悶舌絳孟英診脈甚數徑投大劑犀羚元參丹皮桑梔銀花花粉翹蒡之藥服後遍身發赤疹而熱退知飢矣仲夏瘄疹流行幼科執用套藥夭札實多有王子能參軍所親楚人劉某僅一子甫五齡陸某見其瘄點不綻連進檉柳等藥壯熱無汗面赤靜臥二便不行參軍聞其殆延孟英視之投犀羚白虎湯而轉機陸某力阻石膏不可再餌仍進溫散以至氣喘痰升復加麻黃八分欲圖定喘而喘汗瀕危二便復秘麻黃定喘乃方脈中感受風寒之症施之麻疹何其不通再懇孟英救之投白虎加西洋參竹葉而愈繼有房氏子亦為陸某誤用溫散致劇痰喘便秘口渴神昏溲碧肢瘈孟英與大劑白虎湯加犀角元參竹葉木通調紫雪四帖而始安疹為陽邪乃肺胃濕熱所致初宜辛涼發散令其盡出不宜驟用寒涼恐冰伏熱邪不能發出也繼即宜大清肺胃之藥以解餘毒從未有溫散之法至麻黃尤為禁劑何兒科之憒憒耶李新畲仲郎瘄未齊而痰嗽氣喘疹中應有之症苔色白滑小溲不赤或主犀角地黃湯加紫雪服而不效熱在氣而清其肝故不效延孟英診之右脈洪滑而口渴乃天時酷熱暑邪薄肺挾其素有之痰而阻其治節所以氣機不行而疹不能達苔不能化溺不能赤也溫散大忌涼血亦非與竹葉石膏湯合葦莖加杏菀旋杷海石投之氣平疹透苔退色紅小溲亦赤數日而愈治疹原以清肺為第一義徐艮生室年四十餘於酷暑之時患瘄所親沈悅亭連與清解不能殺其勢為邀孟英視之體厚痰多脈甚滑數揚擲譫妄舌絳面赤渴飲便澀乃與大劑白虎加犀角元參銀花花粉貝母竹黃竹葉竹茹竹瀝送滾痰丸服後大便下如膠漆脈證漸和數日後去丸藥其勢復劇甚至發厥仍加丸藥乃平如是者三次險浪始息悅亭復以白金丸滌其膈下留痰續用甘涼濡潤法充津液而搜餘熱漸以告愈此大實證也非峻攻不愈朱敦書令愛患感醫投溫散服二劑遍身麻瘄汛事適來醫進小柴胡湯遂狂妄莫制乞援於孟英脈至洪滑弦數目赤苔黃大渴不寐是瘄因溫邪而發所以起病至今時時大汗何必再攻其表汛行為熱迫於營胡反以薑棗溫之參柴升之宜其燎原而不可遏也與大劑犀角元參生地石膏知母花粉銀花竹葉貝母白薇以清衛涼營服後即眠久而未醒或疑為昏沉也屢為呼喚俗情可哂病者驚寤即令家人啟篋易服穿鞋梳髮告別父母云欲往花神廟歸位此即一呼喚之效也人莫能攔舉家痛哭急迓孟英復視脈象依然囑其家靜守勿哭仍以前方加重和以竹瀝童溲灌下即安繼用養陰清熱而愈溫散惟宜於傷寒何可亂投且既已見疹則肺胃之熱已現於外矣與柴胡湯有何干涉此醫直是不通韓石甫大令令正患感發疹沈悅亭治以清解熱漸退而神氣不爽舌黑難伸太息便秘胸次拒按脈弦緩而滑投涼膈散加知母花粉枳實竹茹一帖而苔即退黃再服而黑矢下神氣清即以向愈朱敦書令正患感吳某與表藥二帖發出赤疹神氣漸昏葉某知其素患耳聾目障為陰虛之體改用犀角地黃湯二劑而遺溺痙厥始延孟英視之曰雖形瘦陰虧邪易擾營幸非濕盛之軀尚可設法但心下拒按呃逆便秘是痰熱尚阻氣分誤服升提每成結胸地黃滋滯實為禁藥今人臨證不能詳審往往用非所當用本年敗證甚多余每見神未全昏便不甚秘惟胸前痞結不可救藥而死者皆升提之誤進或滋滯之早投也石北涯在旁聞之嘆曰無怪乎君素以犀角地黃湯奏奇績而他人效尤屢僨事豈非能與人規矩不能與人巧耶於是以犀角元參茹貝旋蔞杷菀白前菖蒲為方調紫雪兩服呃逆止神漸清而咽疼口渴乃去紫雪前菖加射干山豆根知母花粉吹以錫類散二日咽喉即愈胸次漸舒疹回熱退去犀角紫菀射干豆根加銀花梔子竹葉海䖳鳧茈漸安眠食唯大解久不行孟英曰腹無痛苦虛體只宜潤養佐以蓯蓉麻仁當歸生地等藥多服而下遂愈湯西塍年逾花甲感證初起周身膚赤滿舌苔黃頭痛腰疼便溏溲痛伊親家何新之診為險候囑延孟英診之脈見弦細而軟乃陰虛勞倦濕溫毒重之證清解之中須寓存陰以犀角羚苓茹銀翹桑葦通草蘭葉為方煎以冬瓜湯服之遍身赤疹而左眼胞忽腫右臂痠疼不舉耳聾神不清爽亟以元參丹皮菊花梔子桑枝絲瓜絡石斛竹葉煎調神犀丹為劑偶邀瘍科視外患亦知病因濕熱連進木通等藥脈更細弱神益昏憊飲食不進溲澀愈疼新之以為難挽矣孟英曰急救陰液尚可轉機授復脈湯去薑桂麻仁易西洋參加知母花粉竹葉蔗漿灌之一劑神蘇脈起再服苔退知飢三啜身涼溺暢六帖後膚蛻安眠目開舌潤或疑甘柔滑膩之藥何以能清濕熱孟英曰陰虛內熱之人蘊濕易於化火火能爍液濡布無權頻溉甘涼津回氣達徒知利濕陰氣先亡須脈證詳參法難執一也又服數劑後忽然肢腫遍發風塊瘙癢異常或又疑證之有變也孟英曰此陰液充而餘邪自尋出路耳與輕清藥數帖果瘥喘嗽美政關毛內使年逾花甲而患喘嗽醫與腎氣湯全鹿丸等藥反致小溲澀痛病日以劇孟英診之與純陰壯水之治毛曰我輩向吸鴉片煙豈敢服此涼藥孟英曰此齊東之野語也誤盡天下蒼生幸汝一問吾當為世人道破機關不致誤墮火坑者再為積薪貯油之舉也夫阿片本罌粟花之脂液性味溫澀而又產於南夷之熱地煎曬以成土熬煎而為膏吸其煙時還須火煉燥熱毒烈不亞於砒久吸之令人枯槁豈非燥熱傷陰之明驗哉毛極拜服果得霍然或問曰阿片之性殆與酒相近乎孟英曰曲糵之性雖烈然人飲之則質仍化水故陰虛者飲之則傷陰陽虛者飲之則傷陽景岳論之詳矣若阿片雖具水土之質而性從火變且人吸之則質化為煙純乎火之氣焰直行清道爍人津液故吸菸之後口必作渴久吸則津枯液竭精血源窮而宗筋失潤人因見其陽痿也不察其所以痿之故遂指阿片為性冷之物抑何愚耶凡吸阿片煙而醉者以陳醬少許瀹湯服即醒若熬煙時少著以鹽即渙散不凝膏吸時舌上預舐以鹽則不成癮雖癮深者但令舐鹽而吸則癮自斷豈非潤下之精能制炎上之毒乎孟英治其令叔高年痰嗽喘逆礙臥肢冷顴紅飲食不進與真武湯而安照載陽證例治法夏間顧聽泉邀孟英視其所親屠綠堂之恙孟英曰陰生可慮果於夏至前五日而卒屠之五令郎患痰嗽者數年近因悲哀病作徐某見其嗽甚則吐也投以參術之劑病益甚閏七月十七夜綠堂忽示夢雲汝病須延孟英診視服溫養藥可愈覺而異之即迓過診孟英曰此陰虛勞嗽嗽久而沖氣不納則嘔吐非胃寒也經言勞者溫之亦溫養之謂非可以溫補施之者病者見案更為驚歎始以父夢告焉孟英亦為之肅然方用西洋參熟地蓯蓉二冬茯苓坎版牡蠣紫石英萎蕤枇杷葉橘皮服之果安滋陰降氣加以鎮攝乃虛嗽良法非兼外感者所可用予謂凡事皆可以感天地格鬼神況醫為性命之學耶即此一案可以知孟英之手眼通天非幸獲虛名者所能仰望也石誦羲室久患痰嗽諸醫藥之勿瘳孟英切其脈曰非傷風也與北沙參熟地百合麥冬貝母紫菀蓯蓉枇杷葉鹽水炒橘皮燕窩一劑知數劑已初秋又患脘痛上及肩尖向以為肝氣輒服破削之品孟英曰亦非也以砂仁炒熟地炙橘紅楝實延胡枸杞當歸茯苓桑椹蒺藜為方服之良效繼即受孕矣合觀二案其人必陰虛肺燥之質故用藥如此鄰人汪氏婦之父王叟仲秋患痰嗽不食氣喘不臥囊縮便秘心搖搖不能把握勢極可危伊女浼家慈招孟英救之曰根蒂欲脫耳非病也以八味地黃湯去丹澤合生脈加紫石英青鉛龍牡胡桃肉楝實蓯蓉投之大解行而諸恙減乃去蓯蓉麥冬服旬日以瘳初冬邵可亭患痰嗽面浮微喘醫謂年逾花甲總屬下部虛寒進以溫補納氣之藥喘嗽日甚口涎自流莖囊漸腫兩腿腫硬至踵不能稍立開口則喘逆欲死不敢發言頭仰則咳嗆咽疼不容略臥痰色黃濃帶血小溲微黃而長許芷卿薦孟英視之脈形弦滑有力曰此高年孤陽熾於內時令燥火薄其外外病或可圖治真陰未必能復且平昔便如羊矢津液素干再投溫補如火益熱矣乃以白虎湯合瀉白散加西洋參貝母花粉黃芩大劑投之並用北梨搗汁頻飲潤喉以緩其上僭之火數帖後勢漸減改投葦莖湯合清燥救肺湯加海䖳蛤殼青黛竹瀝荸薺為方旬日外梨已用及百斤而喘始息繼加坎板鱉甲犀角而以豬肉湯代水煎藥大滋其陰而潛其陽此卻不必以病者難服也何不另用火始下行小溲赤如蘇木汁而諸證悉平下部之腫隨病遞消一月已來共用梨二百餘斤矣適大雪祁寒更衣時略感冷風腹中微痛自啜薑糖湯兩碗而喘嗽復作口乾咽痛大渴舌破仍不能眠復用前方以綠豆煎清湯代水煮藥始漸向安孟英謂其乃郎步梅曰內經云陰精所奉其人壽今尊翁津液久虧陽氣獨治病雖去矣陰精非藥石所能繼續況年愈六秩長不勝消治病已竭人謀引年且希天眷予以脈察之終屬可虞毋謂治法不周贈言不早致有他日之疑成敗之論也葉晝三患咳逆上氣頭偏左痛口渴不飢便瀉如水王瘦石薦孟英視之曰此肝陰胃汁交虛時令燥邪外薄與育陰息風清燥滋液之法日以漸安服及兩月大解反形乾結而痊鮑繼仲患哮每發於冬醫作虛寒治更劇孟英診之脈滑苔厚溺赤痰濃與知母花粉冬瓜子杏貝茯苓滑石梔子石斛而安孫渭川令侄亦患此氣逆欲死孟英視之口渴頭汗二便不行徑與生石膏橘貝桂苓知母花粉杏菀海䖳等藥而愈一耳姓回婦病哮自以為寒頻飲燒酒不但病加更兼嘔吐泄瀉兩腳筋掣既不能臥又不能坐孟英診曰苦口而渴乎瀉出如火乎小溲不行乎痰黏且韌乎病者云誠如君言想受寒太重始然孟英曰汝何愚耶見證如是猶謂受寒設遇他醫必然承教況當此小寒之候而哮喘與霍亂世俗無不硬指為寒者誤投薑附汝命休矣與北沙參生薏苡冬瓜子絲瓜絡竹茹石斛枇杷葉貝母知母梔子蘆根橄欖海䖳蘆菔汁為方一劑知二劑已哮證乃熱痰伏於肺絡也至冬則熱為寒束故應時而發古人治法於未寒時先以滾痰丸下之使冬時無熱可束則愈但其法太峻人多不敢用今孟英以輕清通透之品搜絡中之伏痰斯有利而無弊真可補古人所未及許守存久患痰嗽孟英主滋水舒肝法以陰虧而兼郁也業已向愈所親某亦涉獵醫書謂滋陰藥不可過服投以溫補已而咳嗽復作漸至咽痛冬初又延診於孟英曰六脈皆數見於水令其不能春乎果驗世人不辯證之陰陽但論藥之涼熱因而僨事者多矣鄭嫗患咳嗽自覺痰從腰下而起吐出甚冷醫作腎虛水泛治漸至咽喉阻塞飲食礙進即勉強嚥之而胸次梗不能下便溏溲頻無一人不從虛論孟英診曰脈雖不甚有力右部微有弦滑苔色黃膩豈屬虛證以葦莖湯合雪羹加貝母知母花粉竹茹麥冬枇杷葉柿蒂等藥進十餘劑而痊此證明明虛寒何以作虛寒治不效蓋虛寒乃此人之本體而痰咳乃新受之外邪不治其邪而專補其虛則邪無出路以致積補生熱此舌胎之所以黃膩也孟英以清熱化痰為治尚是一半治病一半治藥誤也邵奕堂室以花甲之年仲冬患喘嗽藥之罔效坐而不能臥者旬日矣乞診於孟英邵述病原云每進參湯則喘稍定雖服補劑仍易出汗慮其欲脫及察脈弦滑右甚孟英曰甚矣望聞問切之難不可胸無權衡也此證當憑脈設治參湯切勿沾唇以栝蔞薤白旋覆蘇子花粉杏仁蛤殼茯苓青黛海䖳為方而以竹瀝菔汁和服投匕即減十餘帖全愈同時有石媼者患此極相似脈見虛弦細滑孟英於沙參蛤殼旋覆杏仁蘇子貝母桂枝茯苓中重加熟地而瘳所謂病同體異難執成方也王致青鹺尹令正患痰喘胡某進補腎納氣及二陳三子諸方證瀕於危顧升庵參軍令延孟英診之脈沉而澀體冷自汗宛似虛脫之證惟二便不通脘悶苔膩是痰熱為補藥所遏一身之氣機窒痹而不行也與蔞薤旋赭杏貝梔菀兜鈴海䖳竹瀝等以開降覆杯即減再服而安王匯涵室年逾六旬久患痰嗽食減形消夜不能眠寢汗舌絳廣服補劑病日以增孟英視之曰固虛證之當補者想未分經辨證而囫圇顢頇翻與證悖是以無功投以熟地蓯蓉坎板胡桃百合石英茯苓冬蟲夏草等藥一劑知旬日愈以其左脈弦細而虛右尺寸皆數為陰虧氣不潛納之候及閱前服方果雜用耆術以助氣二陳故紙附桂等以劫陰也宜乎愈補而愈劇矣李華甫令正患頭震孟英脈之弦滑乃肝經鬱怒火升也投當歸龍薈丸而瘥然不能懲忿其病屢發之後更兼溺團腹脹喘汗欲絕亟邀孟英視之脈甚弦澀口苦苔黃舌色紫黯汛雖不愆內有瘀滯也以雪羹加金鈴旋覆梔子滑石桃仁茺蔚車前子木通仍吞龍薈丸外以田螺大蒜車前草搗貼臍下服後果先下黑血溲即隨通繼而更衣糞色亦黑遂愈周光遠無疾而逝其母夫人年逾七旬遭此慘痛漸生咳嗽氣逆痰咸夜多漩溺口苦不飢孟英曰根蒂虛而兼怫鬱也與沙參甘草麥冬熟地龜板石斛貝母蛤殼小麥大棗而安滋陰解鬱絲絲入扣迨夏間吸暑而患腹痛滯下小溲熱澀其嗽復作脈仍虛弦略加軟數但於前方增滑石去暑吞香連丸治痢而瘳因平昔畏藥既愈即停至仲秋嗽又作惟口不苦而能食因於前方去沙參加高麗參五味石英牛膝熬膏頻服而痊十月下旬天氣驟冷陡患吐瀉腹痛肢冷音嘶急邀孟英視之脈微為寒邪直中亟與大劑理中加吳萸橘皮杜仲故紙石脂餘糧而瘥其夫人亦因悲鬱而患崩漏面黃腹脹寢食皆廢孟英用龜板海螵蛸女貞旱蓮貝母柏葉青蒿白薇小麥茯苓藕肉蓮子心而康次年夏其母夫人患溫邪痰嗽脘閉汗多孟英投石膏竹茹知母花粉旋覆貝母蔞仁紫菀等藥三十劑而愈聞者無不嘆異此因不兼外邪故加五味牛膝等藥徑固其本若少兼外邪者斷不可用謝某患嗽臥難偏左孟英切其脈右寸軟滑曰此肺虛而痰貯於絡以葦莖絲瓜絡生蛤粉貝母冬瓜子茯苓葳蕤枇杷葉燕窩梨肉投之果愈古方書云喘無善證喘而且汗尤屬可危潘肯堂室仲冬陡患氣喘醫治日劇何新之診其脈無常候囑請孟英質焉孟英曰兩氣口之脈皆肺經所主今肺為痰壅氣不流行虛促雖形未必即為虛諦況年甫三旬平時善飯病起於暴苔膩痰濃縱有足冷麵紅不飢不寐自汗等證無非痰阻樞機有升無降耳遂與石膏黃芩知母花粉旋覆赭石蔞仁通草海䖳竹瀝菔汁梨汁等藥一劑知三劑平乃去二石加元參杏仁服旬日而安俟其痰嗽全蠲始用沙參地黃麥冬等以滋陰善後顧仙槎年越古稀仲冬偶患痰嗽服表散藥數帖氣喘如奔欲臥而不能著枕欲食而不能吸納痰欲出而氣不能吐便欲行而氣不能送日夜危坐躁汗時形其婿家請孟英視之按脈虛洪豁大而舌色干絳溲赤點滴證屬陰虧忌投剛燥與西洋參熟地蓯蓉枸杞蔞仁麥冬牛膝茯苓白芍冬蟲夏草青鉛為大劑以豬肉煮清湯煎服果韌痰漸活堅矢下行眠食亦安遞以告愈諸暨張某者有跛疾業點翠終日坐而三四年來行數十武即喘不能已別無他苦飲食如常醫咸謂虛頻補不應詣孟英視之曰久坐不勞行氣遲滯痰凝久伏故為此患脈緩而滑豈為虛象授雪羹合小陷胸加竹茹旋覆海石杏仁半夏服之果吐多痰而愈高雋生孝廉令堂患痰嗽服傷風而喘汗欲脫孟英予人參茯苓甘草桂枝白石英半夏牡蠣胡桃仁冬蟲夏草而瘳以其年近五旬衝任不足雖素有飲邪而悲哀勞瘁之餘經事忽行一投表散氣即隨而上逆故用藥如此一機匠久患寒熱兼以痰嗽形消肌削人皆以勞怯治之久而不愈或囑其就診於孟英脈弦緩而大畏冷異常動即氣逆時欲出汗暮熱從骨髓中出痰色綠而且臭便堅溺赤曰痰火為患耳誤投補藥矣以葦莖湯合雪羹加白薇花粉旋覆蛤殼服二十劑體健加餐其病如失趙菊齋外孫華穎官易患痰嗽幼科治之漸至發熱口渴便瀉汗多煩哭以為將成慢驚參入溫補日以加劇孟英視之曰肺熱也投葦莖湯加滑石黃芩枇杷葉桑葉地骨皮旬日而愈五舍弟樹廷時患喘逆初冬尤甚稍食甜物其病即發孟英察脈遲弱苔黃垢而不渴指冷腰痠乃中虛痰濕內盛也授參朮蒼枳旋半薤樸杏仁生薑之劑服後痰果大吐氣亦漸平嗣以六君去甘草加當歸木香調補而痊壬子春沈峻揚年五十七歲素患痰嗽年前顧某與小青龍湯一劑喘逆漸甚汪某進腎氣湯一服勢更瀕危醫云治實治虛不能捨此二法而皆不應病真藥假不可為矣王月鉏囑迎孟英圖之脈來虛弦軟滑尺中小數顴紅微汗吸氣不能至腹小便短數大解甚艱舌紅微有黃苔而渴不多飲胸中痞悶不舒曰根蒂虛於下痰熱阻於上小青龍治風寒挾飲之實喘腎氣湯治下部水泛之虛喘皆為仲景聖法用之得當如鼓應桴用失其宜亦同操刃所以讀書須具隻眼辨證尤要具隻眼也此證下雖虛而肺不清肅溫補反助其壅塞上雖實而非寒飲溫散徒耗其氣液耗之於先則虛氣益奔壅之於後則熱痰愈錮其加病也不亦宜乎爰以杏仁葦莖紫菀白前蔞仁竹瀝開氣行痰以治上實而佐蓯蓉胡桃仁以攝納下焦之虛陽一劑知再劑平旋去紫菀白前加枸杞麥冬白石英服三帖而便暢溺長即能安穀再去杏仁竹瀝葦莖加熟地當歸薏苡巴戟填補而痊
