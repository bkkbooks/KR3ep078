body:
  text: 卷二嘔吐朱某患嘔吐諸藥不效甚至大小便祕糞從口出臭不可當自問不起矣孟英用代赭旋覆湯加蜣螂蟲上者下之之法而意甚巧服之而愈陳芰裳之太夫人陡患嘔吐徹夜不止次早延孟英診之自述因寒而致孟英知芰裳進場家無主藥之人若明言屬熱必致畏藥不服矣漫應曰固寒也而疏方則芩連梔楝以大苦寒為劑投之良愈趙子善令愛患發熱嘔吐口渴便祕而年甫三齡不能自言病苦孟英視其舌微絳而苔色干黃因與海虴鼠矢竹茹知母花粉杏貝梔斛之藥二劑果下未化宿食色醬黏膩設投俗尚溫燥消導法必致陰竭而亡繼往維揚孟英臨別贈言謂其體質勿宜溫補次年偶病果為參術殞命惜哉蘭溪吳氏婦盛夏患惡阻洪某進旋覆薑桂等藥而壯熱神昏腰疼欲墜二便祕澀嘔吐不休脈數而洪豫梔芩連楝竹茹知母銀花緑豆為劑佐以蘇葉二分冬瓜煮湯煎藥下咽即安數服而愈吳緑園患發熱嘔吐莖縮腹痛孟英診脈弦軟而數苔色膩黃曰熱伏厥陰也與楝實通草梔蓮茹斛絲瓜絡一劑知數劑愈潘嫗久患痛吐多藥莫痊孟英視之脈弦徑而數曰口苦而渴乎大便不暢乎小溲如沸乎病者云誠然第冷氣時沖欲嘔不暢渴喜飲沸吐沫極酸總由積寒深重耳孟英曰因此諒諸醫必用溫燥之藥矣須知氣衝覺冷者熱極似寒渴欲飲沸者飲邪內踞吐沫作酸者曲直所化其病在絡故吐之不易方以茹旋梔楝枇杷葉絲瓜絡木通生薑衣海虴鳧茈蘇葉炒黃連煎吞當歸龍薈丸一劑知五劑愈噫豫素患噫氣凡體稍不適其病即至既響且多勢不可遏戊子冬發之最甚苦不可言孟英曰此陽氣式微而濁陰上逆也先服理中湯一劑隨以旋覆代赭湯投之遂愈嗣後每發如法服之輒效後來發亦漸輕今已不甚發矣豫聞孟英常云此仲聖妙方藥極平淡奈世人畏不敢用殊可陋也法本喻氏袁某患噫聲聞於鄰俞某與理中湯暨旋覆代赭湯皆不效孟英診之尺中虛大乃詰之曰爾覺氣自少腹上衝乎病者云誠然孟英曰此病在下焦用胡桃肉故紙韭子菟絲小茴鹿角霜枸杞當歸茯苓覆盆龍齒牡蠣服一劑其沖氣即至喉而止不作聲為噫矣再劑寂然多服竟愈許太常滇生之夫人患腿痛而素多噫氣若指頭一搓或眉間一抹其噫即不已向以為虛在都時服補劑竟不能愈冬間旋里孟英診脈弦滑乃痰阻於絡氣不得宣也以絲瓜絡竹茹旋覆橘絡羚羊茯苓豆卷金鈴柿蒂海虴荸薺藕為方吞當歸龍薈丸而安其媳為阮藝臺太傅之女孫在都因喪子悲哀患發厥屢服補劑以致汛愆或疑為娠孟英曰脈雖弦數以滑乃痰挾風陽而為厥也與大劑蠲痰息風舒郁清營之劑漸以獲愈厄一老人霍亂後目閉厄忒醫謂脫陷在即與桂附回陽之藥業已煎矣適孟英至詢知溺赤口乾診得脈形軟數而藥香撲鼻即曰此藥中有肉桂叟勿服也服之必死迫令將藥傾潑而與肅肺清胃之劑果得漸安黃履吉截瘧後患浮腫趙某聞其體素虛切其脈弦細遂用溫補馴致厄忒不休氣衝礙臥飲食不進勢瀕於危請孟英決其及返餘杭否孟英曰脈雖弦細而有力子必誤服溫補矣肯服吾藥猶可無恐因與栝蔞薤白合小陷胸橘皮竹茹湯加柿蒂旋覆蘇子香附赤石紫菀杷葉為方四劑而瘳陳笠塘年近花甲於初冬時偶從梯半一跌遂發寒熱痰多咳逆沈辛甫作虛痰類中挾風溫治熱退便行而痰逆不休且兼厄忒改從清肅鎮攝其厄日甚因拉孟英商之診脈左弦澀不調右兼軟滑察其厄時有微甚而有欲厄不爽之象詢其噴嚏久不作矣曰此氣鬱於肝欲升而不能升痰阻於肺欲降而不能降之證也補攝之品咸在禁例以柴胡枳殼石菖蒲紫蘇薤白蔞仁竹茹橘皮白前為劑覆杯而減再劑而安錢某患感醫治旬日漸致神昏瘈瘲大便泄瀉以其體素弱而吸洋煙也胥束手矣始丐診於孟英左脈弦軟右則虛大而滑汗出不解目瞀耳聾囈語溲紅時時厄逆心下拒按舌不能伸斡齒視苔滿黃微燥曰溫邪雖陷氣分未清裡氣雖虛伏痰內盛幸瀉數次邪勢稍衰先豫人參牡蠣犀角元參竹葉竹茹銀花石斛枇杷葉川貝母蓮子心為劑調服萬氏清心丸一顆目明熱退厄減舌伸臂顯赤斑夜亦能寐詰朝去參蠣牛黃丸加竹瀝桑枝絲瓜絡痰果大吐瘈瘲即平再去犀元桑枝加紫菀海虴厄止胸舒苔色漸退稀糜漸進耳聽略聰再去竹葉蓮心紫菀加沙參花粉服五貼而下堅矢嗣報調養而安脹許某於醉飽後腹中脹悶大解不行自恃強壯仍飲酒食肉二日後腹痛猶疑為寒又飲火酒兼吸洋煙並小溲而不通矣繼而大渴引飲飲而即吐而起居如常也四朝走懇孟英診之脈促歇止滿舌黃苔極其穢膩而體豐肉顫證頗可危因婉言告之曰不過停食耳且飲山楂神麯湯可也午後始覺指冷倦怠尚能坐轎出城到家氣逆夜分痰升比曉胸腹額上俱脹裂而死蓋知下之不及故不與藥也許仲筠患腹痛不飢醫與參朮薑附諸藥疼脹日加水飲不沾沉沉如寐孟英診脈弦細苔色黃膩投以枳朴萸連梔楝香附蒺藜延胡等藥二劑便行脈起苔退知飢而愈吳醞香大令四令媳時患腹脹減餐牙宣腿痛久治不效肌肉漸消孟英診脈弦細而數肝氣雖滯而陰虛營熱豈辛通溫運之可投耶以烏梅黃連楝芍梔子木瓜首烏鱉甲茹貝服之果愈繼與甘潤滋填肌充胃旺汛準脈和積歲沉疴宛然若失吳誦青室年近五旬天癸已絶偶患腹脹局醫黃某知其體素羸也投以腎氣湯而寒熱漸作改從建中法旬日後病劇而崩愈補愈甚乞援於孟英脈洪而數渴飲苔黃是吸受暑邪得溫補而血下漏也與犀角元參茅根柏葉梔楝知斛花粉白薇等藥數劑始安續加生地二至二冬滋養而愈次年患病仍為誤藥而殞宋氏婦患感反復已經向痊忽然腹脹上至心下氣喘便瀉溺閉湯飲不能下咽自汗不能倚息家人皇皇且極貧不能延診走乞孟英擬方挽救因以桂枝石膏旋赭杏朴芩半黃連通草為劑果覆杯而病若失張養之目擊嘆為神治何氏婦年未四旬於庚戌冬患腹脹善嘔或云寒凝氣滯宜吸鴉片煙以溫運之及煙癮既成而病如故或云冷積也莫妙於蒜罨往夏遂以蒜杵如泥遍塗脊骨名曰水炙炙後起疱痛潰骨蒸減餐其脹反加經乃漸斷招越醫莊某治之云勞損也進以溫補病乃日甚復邀張鳳喈包次橋姚益齋諸人視之僉云勞損已成或補陰或補陽服之冬令便瀉不飢骨立形消臥床不起今春請神方於各乩壇皆云不治其夫因蒲艾田薦於許信臣學使隨任廣東家無主意束手待斃而已蒲聞而憐之為屈孟英一診以決危期之遲速初無求愈之心也切其脈弦細數循其尺索刺粗舌絳無津飲而不食兩腿腫痛攣不能伸痰多善怒腹脹堅高上膚黃粗循之戚戚然晝夜殿屎愁容黎瘁小溲短澀而如沸大便日瀉十餘行脈色相參萬分棘手惟目光炯炯音朗神清是精氣神之本實未撥病雖造於極中之極卻非虛損之末傳也殆由木土相凌為嘔為脹洋煙提澀其氣益令疏泄無權蒜灸劫耗其陰更使郁攸內爍進以溫補徒為壯火豎幟而涸其津溉以滋填反致運化無權而釀為瀉固之澀之煞費苦心余謂賴有此瀉尚堪消受許多補劑縱臨證心粗不詢其瀉出之熱而且膩豈有腎虛脾敗之瀉可以久不安穀而延之至今乎夫人氣以成形耳法天行健本無一息之停而性主疏泄者肝也職司敷布者肺也權衡出納者胃也運化精微者脾也咸以氣為用者也肝氣不疏則鬱而為火肺氣不肅則津結成痰胃氣不通則廢其容納脾氣不達則滯其樞機一氣偶愆即能成病推諸外感理亦相同如酷暑嚴寒人所共受而有病有不病者不盡關乎老少強弱也以身中之氣有愆有不愆也愆則邪留著而為病不愆則氣默運而潛消調其愆而使之不愆治外感內傷諸病無餘蘊矣今氣愆其道津液不行血無化源人日枯瘁率投補藥更阻氣機是不調其愆而反錮其疾也疾日錮腹愈脹氣日愆血愈枯或以為乾血勞或以為單腹脹然汛斷於腹脹半年之後是氣愆而致血無以化非血病而成脹矣既脹而馴致腿腫筋攣不可謂之單脹矣腫處裂有血紋堅如鱗甲顯為熱壅不屬虛寒借箸而籌氣行則熱自泄首重調愆展以輕清忌投剛燥熱泄則液自生佐以養血須避滋膩宜取流通徐洄溪所謂病去則虛者亦生病留則實者亦死勿以藥太平淡而疑其不足以去病也艾田云薛一瓢謂人須修到半個神仙身份才可當得名醫二字聆君妙論不愧名醫於是以沙參竹茹絲瓜絡銀花楝實枇杷葉冬瓜皮黃柏當歸麥冬枸杞白芍出入為方用水露煮葦莖藕湯煎藥服四劑脈柔溲暢瀉減餐加乃參以西洋參生地黃連花粉薏苡梔子之類又六劑舌色漸淡腿腫漸消服至匝月忽然周身汗出溱溱而腫脹皆退舌亦津潤皮膚漸蛻肌肉漸生足亦能伸便溺有節並不另授峻補兩月後可策杖而行矣天時漸熱服藥已久以虎潛丸方熬為膏用藕粉溲搗成丸因丸劑皆藥之渣質脾運殊艱孟英凡治陰虛須滋補者悉熬取其精華而以可為佐使者和之為丸不但藥力較優亦且餌之易化如法服至長夏健步經通遂以康復艾田云此證人不能治神亦不能治君竟能肉白骨而生之不僅半個神仙殆人而仙者耶抑仙而降為人者耶水露以甜水貯甑蒸取其露宜臨時蒸用取其有升降之機而養津液也一名甑汗水停久則失性矣余雖挈眷回藉而會垣戚友未能恝然置之故時往寓焉今六月初二日刺船返里欲避暑月應酬之繁也嗣因亢旱河涸舟楫不通或以肩輿相招余畏長途而卻之中秋後河漸通乃二十夜夢先慈以不必進省為訓初謂心有所憶也至九月下旬欲展墓於皋亭山因赴杭視弟妹舟人忘備白米強啖冬舂米飯一餐遂腹脹不飢越日抵寓身漸發熱徐君亞枝為余多劑清化至十六日始解極堅燥矢解後大渴喜飲少頃則傾囊而吐吐則氣自少腹上湧味極酸苦甚至吐蛔趙君笛樓診云十六日不食中已大虛一解之後更無砥柱故肝木乘而沖侮也投參苓椒梅萸連橘半茹薑等四劑吐止稍進飲食然飢肉削盡寐則肢惕而稍一展動則絡痛異常大解必旬日一行極其艱澀扶病而歸兩跗皆腫自知虛不易復而性不受藥遂啖肥濃至冬杪腫消而大便始潤津液易奪而難復如此且稍或煩勞即作寒熱至次年三月各恙始休而步履如常惟肌肉不能復舊以脾主四肢胃主肌肉而束骨利機關也余脾胃素弱故畏藥如虎稍有惡劣之氣者飲之即吐若吞丸藥則不能克化生冷硬物概不敢嘗最奇者冬舂米飯之氣亦所素畏偶食之輒小病而未有如此之劇者嗣後不敢略試矣且深悔不遵先慈母夢示遂息影窮鄉不復寓省乃不知者徑目余為神仙中人蓋余能安其癡也而吳越之間亦未嘗不偶遊焉次年夏遊武林晤許貫之茂才見其令嬡璟姑患疳膨聚氣云起於桐鄉外家食冬舂米飯也可見人之脾胃有同於我者矣盛澤王西泉丈仲郎巽齋刑部夫人年未四旬而十八年前誕子之後汛即不行醫以為虛頻年溫補略無小效董味青茂才囑就余診脈弦滑而體甚豐乃氣鬱生熱熱爍津液以成痰痰復阻其氣道不能化血以流行以致行度愆期腹形脹痛肢背不舒骨疼寐惕渴不欲飲間或吐酸二便不宣苔黃口苦皆風陽浮動治節橫斜之故也與沙參蛤粉各四錢絲瓜絡石菖蒲各一錢紫菀仙夏旋覆蒺藜各一錢五分茯苓三錢丹參二錢黃連四分海虴四兩鳧茈一兩服十餘劑來轉方云脹痛蠲而腹背皆舒夜寐安而二便亦暢酸水不吐痰出已松是肝已漸柔惟食少無味骨節痠疼右甚乃陽明虛無以束骨利機關也擬通養法參鬚石菖蒲各一錢茯神絡石各三錢薏苡四錢仙夏竹茹各一錢五分木瓜八分薑汁炒黃連三分十大功勞一兩仲冬招余往遊復視則諸恙皆安惟右腿尚疼耳即於通養方內加黃柏仙靈脾服之遂愈腫鍾耀輝年逾花甲在都患腫起自腎囊氣逆便溏諸治不效急買車返杭托所親謝金堂邀孟英治之切其脈微而弱虛象顯然詢其溺清且長曰都中所服其五苓八正耶抑腎氣五皮也鍾云誠如君言遍嘗之矣而病反日劇者何哉孟英曰此土虛不制水也通利無功滋陰亦謬法宜補土勝濕此即張景嶽所云理中加茯苓附子之症也與大劑參術果即向安越八載以他疾終一男子患喉痹專科治之甫愈而通身腫勢日甚醫者驚走孟英診之曰病藥也投附子理中湯數劑而痊豫謂喉痹治以寒涼法原不謬而藥過於病翻成溫補之證是病於藥也非病於病也嘗聞孟英云病於病而死者十之三病於藥而死者十之七以豫觀之誠非激論也籲可嘆已王小谷體厚善飲偶患氣逆多醫咸從虛治漸至一身盡腫酷肖回春録所載康副轉之證因懇治於孟英脈甚細數舌絳無津聞有譫語乃真陰欲匱外候雖較輕於康然不能收績矣再四求疏方與西洋參元參二地二冬知母花粉茹貝竹瀝蔥須等藥三劑而囊腫全消舉家欣幸孟英以脈象依然堅辭不肯承手尋果不起脈至細數則陰竭陽亢不拘何病均忌此脈而虛勞為尤甚石北涯令正久患齦疼漸至身面浮腫或以為虛或以為濕病日以劇氣逆不飢孟英察脈左洪數右弦滑陰分雖虛先當清其肺胃之痰熱者投白虎加沙參花粉冬瓜皮枇杷葉梔子竹茹蘆根服之腫即消繼佐滋陰齦疼亦止一嫗患面目肢體浮腫便溏腹脹腸鳴時痛飲食日減醫與理中腎氣多劑病日劇而束手矣始丐孟英診焉按脈弦細沉之帶數舌絳口乾腫處赤痛溺少而熱乃陰虛肝熱鬱火無從宣泄而成此病火愈鬱則氣愈脹氣愈脹則津愈枯再服溫燥如火益熱矣授白頭翁湯加楝實銀花元參丹皮緑豆皮梔子冬瓜皮數劑證減知飢漸佐養血充津之品而愈前此諸醫謂其山居久受濕蒸且病起黴雨之時而又便溏脈細遂不察其兼證而群指為寒濕也嗣有黃梅溪令堂患證類此而燥熱之藥服之更多肌削津枯脈無胃氣邀孟英往勘不遑救藥矣馬翠庭鹺尹令寵患兩腿疼腫便溏不渴醫進蒼朮木瓜萆薢獨活等藥其病日甚不食不眠筋掣欲厥孟英切其脈弦滑而數詢其溺極熱如沸曰非寒濕也肝火為患耳便瀉是土受木乘不渴乃內有伏痰豫梔柏芩連茹楝通草半夏蠶砂絲瓜絡為方一劑知二劑已方氏婦勞傷挾感業已治愈服補藥數劑漸形浮腫或謂邪未淨而補之早也用消導清解法皆不應且兼咳逆礙眠便溏溲澀又謂腎氣不納改從滋填其勢益增遂束手矣浼余視之脈浮無汗尺靜經行既非根蒂之虛亦豈邪留誤補殆愈後復感風邪肺氣阻痹水津失布所謂皮水證也與香薷杏仁紫蘇橘皮兜鈴射干紫菀通草蔥白天泉水蘆火煎服覆杯而愈沈雪江光祿年五十歲於客臘偶患頭暈既而右手足麻木醫進再造丸九十餘顆漸至攣曲不伸針藥無效仲春余遊檇李吳門李君雨村招往視之手足亦腫而疼便堅溲赤口乾舌絳準頭一瘰磊然脈象弦滑而數平時屢有鼻衄肝陽易動曲運神機體質性情陰虛火盛風自火出爍液成痰竄入絡中則為是證初起若以竹瀝一味灌之可以漸愈乃溫補率投遂成錮疾幸而病在經絡停補尚可延年苟欲望有轉機必用清通宣泄擬方三劑腫痛稍瘥議者謂藥太清涼多服恐妨脾胃更醫復進溫補並雨村亦不延診矣逮四月中旬大便忽祕飲食不思半月餘更衣極艱滯而解後胸次愈形窒塞遂不食然參藥不輟也至五月十八日復解燥矢仍不思食勉強啜粥輒嘔吐次日轉為滯下色如魚腦日數十行醫謂有出無入脾胃兩敗矣溫補方再加固澀之品遂鼻衄如注且有成塊成條之堅韌紫血自喉間湧出雖米飲不能下咽小溲澀滯不行時欲呷茶以潤口或云已傳關格無藥可施而引火歸元之法愈用愈劇諸醫無策眷屬皇皇業辦後事矣乃弟云峰待詔余春日所囑浼入聘余往援二十四日余抵禾見其面色枯黧牙關緊而舌不出齒脈至右滑左弦細數皆上溢而尺不應指胸悶溺澀陽宜通而不通是滋膩阻寒氣道也血溢下利陰宜守而不守是溫燥灼爍營液也吾先慈所謂人身如欹器滿則必覆半年蠻補填滿胃中設不傾筐倒篋而出亦必塞死豈可不加揣測而誤認為神機化滅之出入廢關閘不禁之下利陰盛格陽之吐衄而再施鎮納堵截之藥哉古云上部有脈下部無脈其人當吐不吐者死今火熾上炎鼻血大流湯水不能下咽有升無降與吐何殊況見證雖危而呼吸不促稍能安寐皆是未絶之生機考古下利而渴者屬厥陰白頭翁湯主之滯下不食者為噤口參連湯主之余合而用之加石菖蒲宣氣通陽石斛茅根生津涼血一服而利減其半次日去連柏加元參犀角童便專治其衄一服血漸少利漸止然離絡之血不可不使之出未動之血亟當使其各安於位故以西洋參丹參麥冬茯苓菖蒲石斛小麥竹葉梔子甘草梢燕窩等出入三劑血既止牙關漸開苔色黃膩啜飲必拍膈始得下行因參以小陷胸法數劑自覺身體略輕手腕稍舒改清肅肺胃展氣化以充津苔漸退渴亦減脈較平守至閏月二十二日尺脈滑動於方中加肉蓯蓉麻仁二味夜間即解堅黑燥矢而漸能進粥隨去麻蓯加生地服至六月初七日口始不渴而吃飲繼因過飲西瓜汁大便溏瀉復延余往以六君去朮草加苡藿數貼而安隨去藿加首烏絡石石斛十大功勞服二十劑漸能起坐右腿可以屈伸但軟而無力耳中秋後又邀余往則胃氣已復右指已伸皮膚色澤而右臂未能動右頰猶覺木硬是絡中之痰未淨肝藏之風易生氣血之灌溉流行因有所阻礙而不能貫注也以養血息風蠲痰宣氣之方加竹瀝為響導服後足漸能立十月間食蟹過多大解泄瀉余以六君加藕木香蘇葉調愈嗣余遊盛湖轉禾適交至節而天暖不藏又因勞怒陡發頭暈嘔吐痰涎目閉不言不食不便舉家無措醫者率主首烏牡蠣等滋攝之治餘脈之弦而緩是中虛不能御木故內風上僭陰柔之品徒滯中樞不可服也仍用六君去甘草加菖蒲黃連旋覆花薑皮鉤藤三貼霍然小寒後余遊姑蘇轉禾又因天暖而發鼻衄改換養陰潛陽法而瘳次年春季出門因不節勞至端陽復中而逝賢倡橋朱君蘭坡令堂年已六旬素患跗腫夏季患瘧轉痢痢止而腹之疼脹不休漸至脘悶面浮一身俱腫遍治罔效臥床百日後事皆備聞余遊禾諄乞一診左極弦細右弱如無舌赤無津呻吟嘔沫不眠不食溲短目眵系肝旺之體中土受傷運化無權氣液兩竭如何措手勉盡人謀方用參鬚石菖蒲仙夏各一錢石斛冬瓜皮建蘭葉各三錢竹茹一錢五分薑汁炒川連四分陳米湯煎服詰朝蘭坡欣欣然有喜色而相告曰已轉機矣求再診余往視面浮已減病者囅然曰胸腹中舒服多矣故不呻吟且進稀粥按脈略起遂於原方加冬蟲夏草一錢烏梅肉炭四分服後連得大解色醬而夾蠕蠕之蟲盈萬腹之疼脹遂蠲肢腫亦消舌潤進粥又邀余診色脈皆和喜出望外初亦不知其蟲病也所用連梅不過為泄熱生津柔肝和胃之計竟能暗合病情殆蘭坡孝心感格故危險至是可以一二劑取效謹志之以見重證不可輕棄而余僥幸成功實深漸將返棹留與善後方惟加燕窩根薏苡白蒲桃干而已冬初余再遊禾詢其所親云已出房矣因素原方案歸録之痞積陳芰裳患淋久不愈延至溽暑邀孟英診之曰易事耳與補中益氣湯而愈其子荷官病痞積腹脹發熱干嗆善食黃瘦便溏溺赤兒科藥廣服無功已將絶望矣孟英聞而憐之曰吾於幼科雖未討論姑贈一方或有生機也以黃連白芍牡蠣鱉甲雞肫皮五穀蟲霞天曲木瓜山楂楝實橘皮桔梗旋覆梔子丹皮等藥投之一劑知旬余愈高若舟偶患腹脹醫投溫運漸至有形如痞時欲沖逆吐酸益信為虛寒之疾溫補之藥備嘗飲食日減其痞日增肌肉漸消臥榻半載甲辰春迓孟英診脈沉弦而軟滑大解不暢小溲渾短苔色黃膩乃肝鬱氣結鬱則生熱補則凝痰與梔楝萸連元胡烏藥旋枳雞金鱉甲茹橘苓夏等藥服之證雖遞減時發寒熱四肢痠痛或疑為瘧此少陽之氣鬱而欲伸之象孟英曰此氣機宣達鬱熱外泄病之出路豈可截乎參以秦艽柴胡豆卷羚羊蠶砂桑枝之類清熱滌飲條達肝氣允屬合法迎而導之人皆疑久病元虛藥過涼散而若舟堅信不疑孟英識定不惑寒熱漸息攻衝亦止按其腹尚堅硬時以龍薈滾痰丸緩異之峻藥緩投法飲食遞加漸次向愈若舟善作隸因集詩品書一聯以贈孟英云古鏡照神是有真宰明漪絶底如見道心蓋頌其隔垣之視也朱念民患泄瀉自謂春寒偶薄而飲燒酒次日轉為滯下左腹起一痞塊痢時絞痛異常孟英曰陰虛木燥侮胃為泄誤飲火酒怒木愈張非寒也亟屏辛溫之物用白頭翁湯加芩楝梔連海虴銀花草決明枳椇子緑豆皮十餘劑而愈王士乾室素多鬱怒氣聚於腹上攻脘痛旋髮旋安花甲外病益甚醫治益劇李西園薦孟英視之曰此非人間之藥所能療矣辭不與方其夫子及壻環乞手援孟英曰既爾吾當盡力以冀延可也然腹中聚氣為瘕攻痛嘔吐原屬於肝第病已三十載從前服藥諒不外乎溫補一途如近服逍遙散最劫肝陰用古方不可有知此意理中湯極傷胃液名雖療疾實則助桀人但知嘔吐為寒而未識風陽內煽水自沸騰專於爐內添薪津液漸形涸竭奈醫者猶雲水已不吐病似漸輕是不察其水已吐盡僅能噦逆空嘔所以不能納穀便祕不行脈弦無胃舌痿難伸蘊隆蟲蟲何所措手可謂女人亦有孤陽之病矣勉以西洋參肉蓯蓉麥冬葳蕤生白芍石斛竹茹柏子霜紫石英為方豬肉煮湯煎藥和入青蔗漿人乳服後嘔噦皆止人以為轉機孟英曰譬草木乾枯已久驟加灌溉枝葉似轉青蔥奈根荄稿矣生氣不存亦何益耶繼而糜粥漸進頗思肉味其家更喜以為有望孟英曰且看解後何如越數日大便頗暢殊若相安亟迓復診孟英曰枉費苦心矣脈不柔和舌不潤澤審病者宜識此二語雖谷進便行而生津化液之源已絶藥石焉能於無中生有哉夏至後果殞王天成牙行一婦年五十餘初患左目赤漸至發熱醫投溫散便泄而厥進以補劑少腹宿瘕攻痛勢極危殆丐孟英診之脈甚弦軟舌絳而渴與蓯蓉橘核當歸元胡龜板石英螵蛸茯苓梔楝萸連數服而安逾年以他病卒蔡西齋令正腹有聚氣時欲攻衝醫者以為下部虛寒進以溫補攝納如桂附沉香蘆巴故紙吳萸之類愈服愈劇酷暑之時其發益橫日厥數十次醫皆望而卻走乃迎孟英視之脈數舌絳面赤睛紅溺如沸湯渴同奔驥少腹拒按飢不能餐曰事急矣緩劑恐無速效令以豆腐皮包紫雪一錢另用海虴鳧茈煎濃湯俟冷吞下取其芳香清散之性直達病所也服後腹如雷鳴渾身大汗小溲如注宛似嬰兒墜地腹中為之一空其病已如失矣繼有許梅生八令愛患痛屢日筋掣神迷肢冷息微脈伏唇紫多藥無效孟英亦以此藥灌之而蘇蔣禮園三令弟拜楓自去年瘧後左脅聚氣不消時時竄痛疑為瘧母孟英脈之弦軟且滑曰非瘧母也豫旋覆海石竹茹絲瓜絡絳屑蔥白蛤谷島茈海虴為方十餘劑而刈其根高魯川三令愛為外科姚仰余令郎杏村之室年三十五歲自去年仲夏患痢白少赤多晝夜一二十行或有溏糞相雜醫治日殆延至今冬經斷半年脅腹聚塊時時上竄宛如蟲行癢至豫咽食壓始下腹脹腿腫唇白口糜舌絳無津耳鳴巔痛略有干嗆渴飲汗頻熱淚常流溺短而熱善嗔多勞暮熱無眠心似懸旌屢發昏暈痢門與蟲門方藥遍試無功舍病而補法備施亦無寸效僉云不能過冬至棺衾咸備無生望矣杏村之僚壻蔣禮園黃上水交薦孟英圖之脈至左弦數上溢尺中滑大按之細弱右手軟滑略兼弦數診畢謂杏村曰令正幸能安穀得以久延然下痢至五百日喉齶辣燥陰液固已耗傷而尺膚淖澤脂膏未剝其中蓋別有故焉腹中之塊痢前曾有乎痢後始起乎杏村云起於痢前然則前此曾有産育乎云去年二月間分娩艱難胞已糜碎生而未育曰是矣此實似痢而非痢也夫胞衣糜碎必有收拾未盡而遺留於腹中者惡露雖行此物未去沾濡血氣結塊漸成阻礙衝任之常道而衝任二脈皆隸陽明月事既不能循度以時下遂另闢捷徑旁灌於陽明致赤白之物悉由穀道而出宛如痢疾據云姅期向在中旬故每月此時痢必加甚仍與月汛相符雖改途易轍而行尚是應去之血所以痢至年半尺膚猶不至枯瘁也且其痢由腰脊酸楚而下顯非腸胃之本病緣病起夏月正痢疾流行之候病者自云患痢醫者何暇他求通之澀之舉之填之無非腸胃之藥不但未切於病情抑且更廣其病機試思腸胃之痢必脂膏削盡而後經枯則焉能納食如常而充肌膚耶然非謂不必治其痢也欲治痢必治其所以痢則當治衝任必治衝任之所以病則當去其遺留之物遺留之物去則衝任二脈遵道而行月事如期痢亦自愈第物留已將兩載既能上行求食諒已成形前醫指為蟲病而無面白唇紅之證據者蟲必飲食挾濕熱之氣所化此但為本身血氣所凝似是而非判分霄壤況此物早已脫蒂不過應去而未去欲出而不能開通衝任二脈其物自下不比腸覃石瘕有牢不可拔之勢必用毒藥以攻之者爰以烏鰂鮑魚茜根龜鱉甲血餘車前子茺蔚子藕汁為初方衆見方案僉云舍垂危之痢而不顧乃遠推將及兩年之産後而指為未經人道之怪證不但迂遠穿鑿未免立異矜奇疑不敢從蔣禮園令弟敬堂云徐洄溪批葉案以十年九年之病仍標産後為大不然謂産後過百日而起病者不作産後看舉世皆以為定評余讀孟英所輯葉案瑕瑜謂案中所云十年九年者乃病從産後起延至於今而屢發也否則脹瀉浮腫何必遠推多載之前而隸於産後耶更有新産之後其病不因産育所致者雖在百日之內亦不可謂之産後病僅可云病於産後耳此證痢雖起於百日之外塊早形於兩月之前因流溯源正是治病必求其本也今人之病何必古書盡載此醫之所以不易為而辨證之所以為最難也聽其議論具有根柢並非捕風捉影之談況藥極平和又非毒劑似與久病元虛無礙他醫既皆束手盍從其計求生具囑仰余勿改其方於是群議始息服兩劑後病者忽覺糞從前陰而出大駭急視之乃血裹一物頭大尾小形如魚鰾而有口剖之甚韌血滿其中衆始詫為神治而病者汗暈不支孟英即與人參龍骨牡蠣茯苓麥冬甘草小麥紅棗為方服數劑神氣安爽始知臍下之塊已落而左脅下者猶存然上竄之勢向亦臍下為甚竄勢既減痢亦漸稀改用白頭翁湯加阿膠甘草小麥紅棗吞仲景烏梅丸和肝脾之相賊養營液而息風旬日後頭目漸清腫消脹減復以初方合金匱旋覆花湯服四劑又下一物較前差小而脅塊乃消竄癢悉罷痢赤徑止惟溺熱便溏口猶辣渴心搖易汗腿軟無眠煩躁火升脈形虛豁乃陰火內熾脾受木乘營液久傷浮陽不斂也授歸耆建中湯去薑加黃柏烏梅龍骨牡蠣小麥以羊肉湯煎送下交泰丸一錢脈證雖覺漸和惟病久元虛屢生枝節孟英堅持此法不過隨機略為進退而已而旁觀者議論紛紜因囑邀王竾伯會診竾伯亦主是法浮言乃息服至匝月喉間漸生甘液而各恙遞平又匝月甘液布及舌尖而滿口皆潤次年二月中旬經至肌充而愈適吳楚之警遂輟藥逮仲冬患瘡誤用藥水洗之致毒內陷而殞惜哉交泰丸系黃連桂心研末為丸吳曲城仲郎偶患少腹堅脹左脅聚氣群醫見其面黃作暑濕治攻補雜施兩月弗效孟英視脈弦澀溺赤便艱口苦不飢肢冷形瘦曰非外因也肝鬱耳豫旋覆花湯合金鈴子散加雪羹竹茹青皮白芍煎吞當歸龍薈丸八劑而病如失矣沛生令寵平素陰虛肝旺而腹有聚瘕時脹時疼初冬患瘧苔黑口乾孟英脈左弦數而洪右滑數而溢初以梔豉合金鈴子散雪羹加元參白薇竹茹服四貼疼脹皆減瘧緩汗多溲澀口乾飢不能食氣時沖逆豫沙參歸斛茹橘石英絲瓜絡蛤殼藕兩貼後汛行腰痛口渴少餐氣鬱營虛兼有痰滯也去蛤殼加旋覆冬瓜子花粉兩貼而更衣乃暢然猶脘悶不飢汛少且黑口渴頭疼瘧亦未罷乃去石英旋覆加梔滑枳實四劑各恙皆安瘧猶未斷以歸蓯甘杞橘半蔞芩竹茹花粉少佐桂枝調其營衛奈病者因口苦而惡粥食嗜啖甘酸病既曲折邪益留戀此方服至半月而瘧始休惟宿瘕時痛肛痔便難口苦吞酸神疲寢汗去芩桂甘草花粉加鱉甲烏鰂骨白芍延胡仙靈脾出入調補而痊邱氏婦年四十餘患少腹瘕聚時欲上衝昏暈而厥臥榻數月足冷麵紅夜不成寐諸治不應余按脈虛細而弦口乾無液與大劑一貫煎覆杯即愈人咸詫異稱神余卻愧鈔來墨卷也崇明刑幕吳江史勵齋令正久患少腹聚瘕時欲攻痛羞明心悸汛速帶頻向服補藥交夏發之更劇醫用膠艾湯加參朮耆茸峻補痛益難支遂成暈厥不眠不食業已四朝屈余視之脈來弦滑苔黃苦渴溺熱便難與沙參石英龜板鱉甲蒿薇苡柏鰂虴茹菖一飲而病如失眠食皆安贈以清養柔潛而別硤石鎮蔣寅昉大理令正久患少腹聚氣時或上衝於胸而為脘痛時或下墜而為腿腫帶多汛速腹脹胸悶口膩不渴便雖溏而欲解不行心啖鹽而始暢皆為脾虛率進補劑病日以甚迎余診之脈弦滑以梔芩菖枳連夏茹旋雪羹清肝熱以豁痰滯氣果下行至足而胸腹漸舒九月初旬蔣君寅昉招余治其令兄仲卿孝廉夫人之病年五十九歲平素操持腹有聚氣脘痛時作大便易溏半月以來身熱耳聾病瀉不食胸中痞塞痰韌如膠口膩欲嘔神情憊甚脈來虛弦而軟舌苔黃膩無津乃營津久耗氣鬱不舒雖挾客邪過投清散以致本實欲撥也與參苓橘半蔞薤茹連菖斛燕窩枇杷葉用水露煎服三貼後瀉止痰稀胸寬進粥醫見苔退舌紅驚為脫液仲卿復邀余往視乃病退之象也舌上無津前案已述今脈漸轉如何反為詫慮於前方去蔞薤連半加歸地麥冬藕服之而愈痰朱恆山久患胸痞多痰諸藥罔瘳孟英診曰清陽之氣不司旋運也與參耆苓術之劑豁然頓愈因極欽服後數年果以汗脫聞其垂危之際口不能言猶以左手橫三指右手伸一指加於上作王字狀以示家人有會其意者急追孟英至而他醫之中風藥早灌入矣遂以長逝癸卯冬至前一日管大中丞亦是氣從溺脫當以參附挽回者及孟英至而痰藥痧藥風藥灌之遍矣脈僅若蛛絲過指孟英堅不與方須臾而卒丁酉中秋夜牙行張鑑録年逾花甲卒僕於地急延孟英脈之弦滑而大曰痰氣食相併而逆於上也先以烏梅擦開牙關橫一竹箸於口灌以淡鹽薑湯隨入鵝翎探之吐出痰食太息一聲而蘇次與調氣和中而愈後數年以他疾終此案雖無奇而辨證之明不可不録張養之令侄女患汛愆而飲食漸減於某與通經藥服之尤惡谷請孟英診之脈緩滑曰此痰氣凝滯經隧不宣病由安坐不勞法以豁痰流氣勿投血藥經自流通於某聞而笑曰其人從不吐痰血有病而妄治其氣脹病可立待也及服孟英藥果漸吐痰而病遂愈養之大為折服豫謂世人頭痛治頭腳疼療腳偶中而愈貪為己功誤藥而亡冤將奚白此寓意草之所以首列議病之訓也孟英深得力於喻氏故其議病迥出凡流要知識見之超總由讀書而得雖然人存政舉未易言也張養之所親李某戊冬醉飲夜歸為查段巡員所嚇神志即以漸昏治之罔效至於不避親疏裸衣笑罵力大無制糞穢不知己夏延孟英視之用石菖蒲遠志龍齒龜板犀角羚羊角元參丹參知柏梔子龍膽草枳實黃連竹黃竹瀝石膏赭石黑鉛鐵落出入為方十餘貼吐瀉膠痰甚多繼與磁朱丸漸以向愈祛痰清熱滋陰鎮驚力量甚大此必本虛標實者故其方如此一祝叟年近古稀己亥春赴席忽仆地痰湧肢強眼斜舌謇不語外科王瑞芝薦孟英視之投六君子加蠍梢羚羊角膽星石菖蒲竹瀝薑汁而瘳扶脾抑肝驅痰面面圓到孫午泉進士患哮痰多氣逆不能著枕服溫散滋納藥皆不效孟英與北沙參桂枝茯苓貝母花粉杏仁冬瓜仁絲瓜絡枇杷葉旋覆海石蛤殼等藥覆杯即臥數目而痊此是熱痰伏於肺絡故用藥如此一嫗患右腰痛脹欲捶多藥不效孟英視其形雖羸瘦而脈滑痰多苔黃舌絳曰體虛病實溫補非宜苟不攻去其疾徒以疲藥因循則病益實體益虛糜帑勞師養成寇患豈治病之道哉先以雪羹加竹茹楝實緑萼梅杏仁花粉橘紅茯苓旋覆花送控涎丹服後果下膠痰三進而病若失嗣與調補獲痊沈某患脘痛嘔吐二便祕澀諸治不效請孟英視之脈弦軟苔黃膩曰此飲證也豈沉湎於酒乎沈云素不飲酒性嗜茶耳然恐茶寒致病向以武彝紅葉熬濃而飲諒無害焉孟英曰茶雖涼而味清氣降性不停留惟蒸遏為紅味變甘濁全失肅清之氣遂為釀疾之媒較彼曲糵殆一間耳醫者不察僅知嘔吐為寒薑萸沉附不特與病相反抑且更煽風陽飲藉風騰但升不降是以上不能納下不得通宛似關格然非陰枯陽結之候以連楝梔芩旋覆竹茹枇杷葉橘半苓澤蛤殼荷莖生薑衣為方送服震靈丹數劑而平匝月而起此上有停飲下元虛寒故用藥如此康康侯司馬令郎爾九在玉環署中患心忡自汗氣短面赤霎時溲溺數十次澄徹如水醫金謂虛補之日劇乃來省就孟英診焉左寸關數右弦滑心下似阻因作痰火阻氣心熱移肺治用蛤殼黃連枳實楝實旋覆花粉橘紅杏仁百合絲瓜絡冬瓜子海虴荸薺竹茹竹瀝梨汁等出入為方服之良愈而司馬為職守所羈嘗患恙函請孟英診視者再四竟不克往繼聞司馬於冬仲竟卒於甌乃知病而得遇良手原非偶然前歲遇而今歲不能致豈非命也耶金葉仙大令病其媳刲股以進因無效也悲哀欲絶遂發熱胡某治以傷寒藥而神迷自汗驚惕畏冷改換補藥乃氣逆不進水穀矣孟英視之七情有傷痰因火迫堵塞空靈之所也與沙參元參丹參丹皮茯苓麥冬連翹竹茹竹葉蓮心小麥加以川貝母一兩投之數劑而瘥定州楊素園明府宰宜黃吏治有聲精於醫藥其夫人多病自治不痊毗陵吳子和囑其函懇醞香屈孟英診視而孟英因母老急欲旋里堅辭不往即據來信所述病狀擬方立案云細閲病原證延二十餘年始因啖杏生冷傷乎胃陽肝木乘虛遂患脅疼亦掣身軀素厚濕盛為痰溫藥相投是其效也馴致積溫成熱反助風陽消爍胃津漸形瘦削而痰飲者本水穀之悍氣緣肝升太過胃降無權另闢窠囊據為山險初則氣滯以停飲繼則飲蟠而氣阻氣既阻痹血亦愆其行度積以為瘀前此神術丸控涎丹之滌飲丹參飲桃核承氣之逐血皆為傑拘已無遁情逮延久元虛即其氣滯而實者亦將轉為散漫而無把握矣是以氣升火浮顴紅面腫氣降火息黃瘦日增苟情志不怡病必陡發以肝為剛臟在志為怒血不濡養性愈侜張胃土屬陽宜通宜降通則不痛六腑以通為用更衣得暢體覺寬舒是其徵也體已虛病似實虛則虛於胃之液實則實於肝之陽中虛原欲納食而肝逆蛔擾欲嘔吐出之水已見黑色似屬胃底之濁陰風鼓波瀾翻空向上勢難再攻承示脈至兩關中取似形鼓指重按杳然詎為細故際此春令正鳶飛魚躍之時仰屋圖維參徹土綢繆之議是否有當仰就斤繩豫室人患痰飲脅痛二十年矣初則畏寒喜熱頗宜健脾利氣之品至甲辰冬服神術丸一料夙患頓損漸不畏寒己酉冬因氣惱而復病誤服遊山散錢許勢遂披猖得孟英診視始漸就安痊但痰飲未能盡除每日須按摩數百下噯氣數十口方覺稍快否則胸痞異常二便恆祕而便出仍不幹燥偶有時二便通調則為之體適者終日正內經所謂得後與氣則快然而衰也明明痰飲之證特以陰血久虧既不任香燥而氣機素滯又不利滋填遂至莫可為計安得孟英常加診視而盡刈其根株耶沙參八錢鮮竹茹四錢川椒紅二分烏梅肉炭六分茯苓二錢旋覆三錢金鈴肉二錢柿蒂十個仙半夏一錢淡肉蓯蓉一錢五分吳萸湯炒黃連四分冬蟲夏草一錢五分另用炙龜板藕各四兩漂淡陳海虴二兩鳧茈一兩赭石四錢先煮清湯代水煎藥正月十四日右擬方案來差星夜齎回於十六日到宜素園讀案狂喜以為洞見臟腑必欲孟英一診以冀霍然遂夤夜備輿專丁持函求孟英暫緩歸期醞香篤於寅誼再四勸駕並囑四令郎季眉偕行孟英迫於情不可卻二十二日抵宜署初診案云證逾二十年右脅聚氣有升無降飲阻不宣嘔逆減餐亦將半載二便非攻不暢容色改換不常吐苦吞酸苔黃舌絳渴喜冷飲畏食甘甜甘能緩中冷堪沃熱病機於此逗露根深難即蠲除標實本虛求痊匪易據述脈亦屢遷似無定象夫既流善幻顯屬於痰茲按脈左緩滑右軟遲兩尺有根不甚弦澀是汛愆因乎氣阻尚非陰血之枯春令肝木乘權胃土久受戕克病已入絡法貴緩通通則不痛腑以通為補法雖時變不能捨通字以圖功布鼓雷門諸希教正沙參八錢鮮竹茹四錢青黛五分旋覆三錢酒炒黃連六分白前一錢生白蒺三錢紫菀一錢海石五錢川楝肉三錢川貝一兩黑梔三錢另以生蛤粉生冬瓜子蘆根蘆蔔各一兩絲瓜絡五錢漂虴二兩柿蒂十個先煮湯代水煎藥蔥須二分後下再診左脈如昨兼弦右寸亦轉緩滑中脘氣漸下降二便欲解不行蓋升降愆常樞機窒澀由乎風陽浮動治節橫斜肺既不主肅清一身之氣皆滯也輕可去實先廓上遊前方去海石加栝蔞三錢枳實一錢三診脈來較靜小溲漸行雖未更衣已能安穀濁得下降導以清通前方去貝楝加歸尾錢半桃仁十粒送服導水丸十粒四診腿涼便滯氣少下趨顴面時紅火炎上僭兩脅較熱絡聚痰瘀疊授清宣更衣色黑噫氣漸罷酸水不嘔納穀頗增脈稍和緩法仍緩導冀刈根株前方去枳實歸尾減導水丸五粒五診各恙皆減眠食漸安火猶易升頭疼面赤頰酸結核脅熱未蠲脈漸柔和且參清養前方去白前青黛紫菀黃連加銀花貝母黃菊丹參陳細茶橄欖六診積痰下降頸核漸平舌紫口乾卯辰熱僭陰虛木旺氣道尚未肅清養血靖風自可使其向愈前方去陳茶蔥須加石斛留贈善後方便色轉正用此沙參八錢冬蟲夏草二錢女貞三錢丹參三錢鮮竹茹四錢川斛五錢鹽水泡橘紅八分黃菊三錢旋覆三錢黑梔三錢川貝四錢金鈴肉錢半另以炙鱉甲漂虴各一兩葦莖二兩絲瓜絡五錢煮湯代水煎藥又諸恙盡瘳用此滋養前方去橘紅菊花金鈴梔子旋覆加石英沙蒺茯苓各三錢蓯蓉當歸各錢半湯引去葦莖加炙坎板一兩藕二兩鮑繼仲於季春望日忽然發冷而喘汗欲厥速孟英視之脈沉弦而軟滑帶數是素患痰飲必誤服溫補所致也家人始述去冬服胡某腎氣湯頗若相安至今久不吐痰矣孟英曰病在肺肺氣展布痰始能行雖屬久病與少陰水泛迥殊辨證不明何可妄治初服頗若相安者方中附桂剛猛直往無前痰亦不得不為之辟易又得地黃等厚濁下趨之品回護其跋扈跳梁之性然暴戾之氣久而必露柔膩之質反阻樞機治節不伸二便澀少痰無出路愈伏愈多一朝卒發遂壅寒於清陽升降之路是以危險如斯須知與少陰虛喘判分霄壤切勿畏虛妄補投以薤蔞枳杏旋赭橘半菀茹蘆根蛤粉雪羹之劑而平繼與肅清肺氣而滌留痰匝月始愈朱紺云令正去年娩後自乳而月事仍行至仲冬乳少汛愆咸以為妊也既而右脅筋絆作疼漸及肩背醫投平肝藥痛益甚改用補劑遂嗽痰帶血人皆以為損矣廣服溫補其病日增延至仲春臥榻已匝月群醫束手始求診於孟英面赤足冷時時出汗食減無眠脈來右寸溢關尺滑而微數左手弦而帶滑舌赤而潤微有白苔氣逆口渴所吐之血淡紅而夾痰涎大解溏小溲短且熱曰沖為血海而隸於陽明自乳而姅不爽期者血本有餘也因陽明經氣為痰所阻而不能流通輸布致經斷乳少痰血轇輵而為絡痹竄痛醫者不為分導下行病無出路以致逆而上溢再投補劑氣愈窒塞在山過顙夫豈水之性哉豫葦莖湯加茜根海螵蛸旋覆滑石竹茹海虴為劑和藕汁童溺服以肅肺通胃導氣化痰而領血下行覆杯即愈旬余汛至不勞培補尋即受孕此證不遇孟英必至補死而人亦但知其死於虛勞也服藥可不慎耶朱仲和令正向於娩後陡患痙厥多醫以圖廣服補劑其人雖起厥疾弗瘳再産亦然延已數載安之若素孟英聞之嘗謂仲和曰將來受孕宜豫藥以痊之今冬懷妊病發益頻遂邀過診脈甚弦滑厥前必先作脹更衣得瀉始舒巔頂時疼飲食不減曰肝風挾痰為患耳仲和云肝風則良是痰則從來未吐曰惟其不吐所以為患沈堯封謂胎前病痰證居半産時痰涎不下諸病叢生醫者未知此理徒知産後為虛痰處絡中如何自吐亦幸而痰在絡中補之不為大害不過錮之愈深耳豈可以不見痰面遂云無痰乎爰授蠲飲六神湯合雪羹加蔞仁竹瀝服三十劑病果漸愈次年娩後安然知病根已拔矣勞傷東垣云中年以後已行降令清陽易陷升舉為宜吾師趙菊齋先生年逾花甲偶因奔走之勞肛翻患痔小溲不行醫者擬用補中益氣及腎氣丸等法孟英按其脈軟滑而數苔色膩滯此平昔善飲濕熱內蘊奔走過勞邪乃下注想由強忍其肚墜之勢以致膀胱氣阻溲澀不通既非真火無權亦詎清陽下陷師聞而嘆曰論證如見肺肝雖我自言無此明切也方以車前通草烏藥延胡梔子橘核金鈴子澤瀉海金砂調膀胱之氣化而滲水服之溲即漸行改用防風地榆丹皮銀花荊芥槐蕊石斛黃連當歸後治痔漏清血分之熱而導濕肛痔亦平設不辨證而服升提溫補之方則氣愈窒塞濁亦上行況在高年告危極易也孫氏子患腿痠寢汗溺赤脘疼食減口乾或疑為損孟英按脈緩大苔色微黃乃勞力火升內兼濕熱也以沙參竹茹甘草梢小麥石斛楝實絲瓜絡緑萼梅建蘭葉帶露桑葉為方送服松石豬肚丸旬日而愈嗣有任氏女校書患帶諸藥罔瘳孟英視曰脈軟數而長非虛也宜豬肚丸清其濕火服匝月病良已脫甲申夏豫於登廁時忽然體冷汗出氣怯神疲孟英視之曰陽氣欲脫也卒不及得藥適有三年女佩薑一塊約重四五錢急煎而灌之即安後用培補藥率以參耆朮草為主蓋氣分偏虛也乾薑辛溫故用之以回陽氣若並此不得則令壯盛人以氣呵之亦可救倉卒之變無棣張柳吟封翁於乙未夏偕令嗣恆齋刺史赴滇南任道出武林其家人鄭九者封翁寵人之弟也途次抱恙抵杭日招越醫陳六順診治服藥後汗出昏狂精流欲脫封翁大駭躬詣孟英以希挽救孟英切其脈既數且亂沉取極細乃語封翁曰此證頗危生機僅存一線亦斯人之陰分素虧不可竟謂附桂之罪也封翁聞言大悅曰長者也不斥前手之非以自伐不以見證之險而要譽相見恨晚遂定忘年之交彼此盡吐生平始知封翁最喜談醫岐黃之言無所不覽惟不肯為人勘病亦慎重之意耳於是孟英以元參知柏桑枝龍牡生地白芍甘草百合石斛梔子鹽水炒淡豆豉為大劑灌之下咽即安次日去梔豉甘草加龜板鱉甲鹽水炒橘紅十餘帖而康胡秋紉於酷熱時偶有不適醫以柴葛香薷散之反惡寒胸痞更醫用枳朴檳榔以瀉之勢日劇延孟英視之自汗不收肢背極冷奄奄一息脈微無神曰稟賦素虧陽氣欲脫此必誤認表證使然與救逆湯加參耆服之漸安繼以補氣生津調理匝月而痊溫敬齋令正九月間忽然四肢麻木頭暈汗淋尋不能言目垂遺溺渾身膚冷急請孟英視之脈微弱如無乃虛風內動陽浮欲脫也先令煮水以待藥與東洋參黃耆龍牡桂枝甘草茯苓木瓜附子九味煎數沸隨陸續灌之未終劑人漸蘇蓋恐稍緩則藥不能追也葉茂栽年三旬余寒熱時形身振多汗醫從瘧治數日而危速孟英視之脈微欲脫語難出聲舌光無苔筋惕肉瞤亟宜救逆合建中湯灌之覆杯即愈續服多劑培補而安陰虛有患陰虛火炎者面赤常如飲酒之態非戴陽證孟英主一味元參湯其效若神而屢試皆驗元參能滋水以制火獨用則力厚取效倍捷黟人葉殿和庚寅秋患感旬日後汗出昏瞀醫皆束手熱甚陰竭之象乃甥余薇垣浼孟英勘之曰此真陰素虧過服升散與仲聖誤發少陰汗同例比例精當下竭則上厥豈得引亡陽為比而以附桂速其斃耶以元參地黃知母甘草白芍黃連茯苓小麥龜板鱉甲牡蠣驢皮膠為大劑投之得愈湖墅張春橋素稟不堅頭眩腦鳴頻服溫補藥甚覺畏冷人皆謂其體偏於寒也辛丑春始請孟英診之脈甚數曰陰虧也溫補非宜改服滋水培元之劑頗為有效夏間或勸以灸火云可以除百病蓋未知灼艾之可以除百病者謂可除寒濕凝滯陽氣不能宣通之證非謂內傷外感一切之病皆可灸而除之也故仲景有微數之脈慎不可灸之訓正以艾火大能傷陰也灸後數日即寒少熱多宛如瘧疾醫者以為脾寒病投以溫散日以滋甚春橋知藥治未符堅不肯服乃父與之詢其故漫曰要兒服藥須延王先生診視與之遂邀孟英治之切其脈滑數倍加曰陰虛之體內熱自生灸之以艾火氣內攻時當溽暑天熱外爍三者相交陰何以堪再投溫散如火益熱當從疸瘧治專以甘寒息熱孟英長技則陰津不至枯涸而寒熱不攻自去所謂治病必求其本也竟不用一分表散藥而治愈眼前道理而人多不悟一經拈出便成名論此與以針治虛損者同一悖謬甌鎮孫總戎令郎楚樓自鎮江來浙主於石北涯家途次即患寒熱如瘧脅痛痰嗽北涯見其面黧形瘦頗以為憂即延醫與診醫謂秋瘧與疏散方北涯猶疑其藥不勝病復邀孟英視之曰陰虧也勿從瘧治以葦莖湯加北沙參熟地桑葉丹皮海石旋覆貝母枇杷葉為劑北涯見用熟地大為駭然孟英曰君慮彼藥之不勝病吾恐此病之不勝藥贈此肅肺潤燥滋腎清肝之法病必自安楚樓聞之嘆曰妙手也所論深合病情前在姑蘇服疏散藥甚不相合居停無疑我服王公之藥矣果數日而痊逾旬即東渡赴甌去蕭某素患痰多常服六君子湯偶延孟英診之脈細數而兼弦滑曰六君亟當屏絶病由陰虧火盛津液受灼而成痰須服壯水之劑庶可杜患將來蕭因向吸鴉片煙自疑虛寒滋陰不敢頻服繼患咽痛專科治而不效仍乞診於孟英因謂曰早從吾策奚至是耶此陰虛於下陽浮於上喉科藥不可試也大劑育陰潛陽其痛日瘥而喉齶皆形白腐孟英曰吸煙既久毒氣薰蒸之故耳令吹錫類散始得漸退愈後復患滯下孟英曰今秋痢雖盛行而此獨異於人切勿以痢藥治之蓋火迫津液結為痰飲釀以煙毒熏成喉患吾以燃犀之照而投激濁揚清之治病雖愈矣內蘊之痰濁尚多奈向來為溫補藥所禁錮於腸胃曲折之間而不得出今廣投壯水之劑不啻決江河而滌陳莝豈可與時行暑熱之痢同年而語耶治不易法食不減餐日數十行精神反加逾月之後大解始正計服甘涼約二百劑肌肉復充痰患若失吳藝閣因壯年時患黴瘡過服寒涼之藥瘡雖愈陽氣傷殘虛寒病起改投溫補如金液丹大造丸之類始得獲安奈醫者昧於藥為補偏救弊而設漫無節制率以為常馴致血溢於上便泄於下食少痰多喘逆礙臥兩足不能屈伸董某猶云寒濕為患進以苓薑朮桂湯多劑勢益劇且溲漸少而色緑如膽汁醫皆不能明其故延孟英診之脈弦硬無情曰從前寒藥戕陽今則熱藥竭陰矣胃中津液皆灼爍以為痰五臟咸失所養而見證如上水源欲絶小溲自然漸少木火內焚乃露東方之色與章虛谷所治暑結厥陰用來復丹攻其邪從溺出而見深碧之色者彼實此虛判分天壤恐和緩再來亦難為力矣尋果歿石芷卿驟患腹脹旬日後臍間出膿濕熱積於小腸外科視為腸癰與溫補內托之藥遂咳嗽不眠腹中絞痛異常痰色紅緑大便不行乃延孟英商之脈弦細以數舌絳而大渴曰察脈候是真陰大虛之證乃真陰為熱藥所耗非本如是也耆朮歸桂皆為禁劑以甘露飲加西洋參花粉貝母杏仁冬瓜子投之痰咳即安外科謂此恙最忌泄瀉潤藥不宜多服此何恙也而以為最忌泄瀉真囈語也孟英曰陰虛液燥津不易生雖求其瀉不可得也惡可拘泥一偏而不知通變哉仍以前法去杏貝花粉加知母百合合歡為方並囑其另邀老醫朱嵩年敷治其外如法施之果漸向安久之當臍痂落如小兒蛻臍帶狀臍內新肉瑩然而愈腸癰無溫補內托之法清其上源而下流自清亦喻氏法也董曉書令正素患脘痛甚至暈厥今秋病腰疼腿木胸悶氣逆不能臥胡某進溫補藥而喘汗欲脫杳不思谷孟英切脈虛細中兼有弦滑舌絳而渴乃陰虛挾痰耳與沙參蓯蓉木瓜石斛蛤殼蒺藜石英茯苓紫菀杏仁楝實首烏牛膝諸藥滋陰調肝而不膩祛飲利痰而不燥此孟英獨得之祕旬日而安繼加熟地黃服之全愈張與之令堂久患痰嗽礙臥素不投補藥孟英偶持其脈曰非補不可與大劑熟地藥一飲而睡與之曰吾母有十七載不能服熟地矣君何所見而重用頗投孟英曰脈細痰咸陰虛水泛非此不為功從前服之增病者想必雜以參術之助氣昔人云勿執一藥以論方故處方者貴於用藥之恰當病情而取捨得宜也顧云蘿令正久患腳氣屢治屢發馴致周身筋掣上及於巔齦痛指麻腰痠目眩口乾食少夜不成眠孟英察其脈芤而弦數真陰大虧腿雖痛從無赤腫之形腳氣藥豈徒無益而已與二地二冬二至知柏桑菊梔楝蒿薇龜板鱉甲藕等藥服之各恙漸減蓋因平素帶下太甚陰液漏泄而筋骨失其濡養也故治病須澄源以潔流秋間以海螵蛸粉魚鰾黃柏阿膠為丸服之痊愈薛氏醫案每以補中益氣湯與地黃丸並用為治雖盧不遠之賢亦或效尤其實非用藥之法也如果清陽下陷而當升舉者則地黃丸之陰凝滯膩非所宜也設屬真陰不足當用滋填者則升柴之耗散不可投也自相矛盾紀律毫無然上下分治原有矩矱屠敬思素屬陰虧久患痰嗽動即氣逆夜不能眠頻服滋潛納食漸減稍沾厚味嘔腐吞酸孟英視脈左弦而微數右則軟滑兼弦水常泛濫土失堤防肝木過升肺金少降良由久投滋膩濕濁內蟠無益於下焦反礙乎中運左強右弱升降不調以蓯蓉黃柏當歸芍藥熟地丹皮茯苓楝實砂仁研為末藕粉為丸早服溫腎水以清肝以黨參白朮枳實菖蒲半夏茯苓橘皮黃連蒺藜生曬研末竹瀝為丸午服培中土而消痰暮吞咸喜丸肅上源以化濁三焦分治各恙皆安悉用丸劑者避湯藥之助痰濕耳方俱靈妙可以為法咸豐紀元冬十月荊人忽患頭痛偏左為甚醫治日劇延半月痛及頸項頰車始艱於步繼艱於食馴致舌強語謇目閉神蒙呼之弗應日夜沉睡如木偶焉醫者察其舌黑灌犀角牛黃紫雪之類並無小效扶乩求仙藥亦類是乃兄周雨禾云此證非孟英先生不能救吾當踵其門而求之及先生來視曰苔雖黑而邊猶白潤唇雖焦而齒色尚津非熱證也投藥如匙開鎖數日霍然緣識數語並録方案如下用表再生之大德而垂為後學之津梁云仁和蔣寅謹識真陰素虧兩番半産兼以勞瘁內風陡升病起頭疼左偏筋掣旬日不語二便不行不食唇焦苔黑邊白胸腹柔軟神氣不昏脈至弦緩並不洪數此非熱邪內陷乃陰虛痰滯機緘宜豫清宣勿投寒膩轉其關鍵可許漸瘳十月二十五日初診石菖蒲麩炒枳實仙製半夏鹽水泡橘紅各一錢鮮竹茹四錢旋覆花茯苓當歸各三錢陳膽星八分鉤藤五錢後下竹瀝一杯生薑汁三小匙和服蘇合香丸塗於心下以舒氣鬱舌稍出齒未能全伸苔稍轉黃小溲較暢羞明頭痛顯屬風升咽膈不舒痰凝氣阻本虛標實脈軟且弦不可峻攻法先開泄二十六日再診前方去膽星半夏茯苓加枸杞三錢淡蓯蓉一錢蔞仁五錢舌能出齒小溲漸行神識稍清苔猶灰滯頭疼似減語未出聲脈至虛弦右兼微弱本虛標實難授峻攻開養兼參庶無他變二十七日三診前方去枳實旋覆鉤藤竹瀝薑汁加參鬚一錢麥冬三錢遠志七分老蟬一對淡海虴一兩鳧茈三個稍能出語尚未有聲舌色淡紅苔猶灰膩毫不作渴非熱可知脈軟以遲不食不便宜參溫煦以豁凝痰二十八日四診前方去雪羹加酒炒黃連肉桂心各五分苔漸化而舌漸出語稍吐而尚無音頭痛未蠲略思粥食胃氣漸動肝火未平久不更衣脈仍弦軟徐為疏瀹法主溫通二十九日五診前方去麥冬加麻仁四錢野薔薇露二兩和服連投溫養神氣漸清語亦有聲頭猶左痛苔退未淨大解不行左脈微遲法當補血血充風息腑氣自行十一月初一日六診前方去遠志菖蒲老蟬加天麻一錢白芍二錢桑椹三錢脈已漸起尚未更衣濁未下行語猶錯亂時或頭痛寐則夢多濡導下行且為先授初二日七診前方去天麻桑椹加牛膝三錢生首烏四錢柏子仁二錢雖已知飢未得大解肝無宣泄時欲上衝陰分久虧豈容妄下素傷思慮肝鬱神虛脈軟而遲語言錯亂法當養正通鎮相參初三日八診前方去白芍首烏加紫石英四錢砂仁末炒熟地六錢遠志七分菖蒲五分大解已行並不黑燥肝猶未戢乘胃脘疼幸已加餐可從鎮息初四日九診參鬚仙半夏各一錢砂仁末炒熟地八錢牡蠣六錢紫石英四錢歸身三錢枸杞二錢淡蓯蓉一錢五分川楝肉一錢酒炒黃連三分桂心五分研調三貼復得大解苔退餐加肝血久虧筋無所養頭疼脘痛掣悸不安柔養滋潛內風自息初七日十診前方去半夏連楝加炙草橘餅各一錢烏梅肉八分四貼神氣漸振安穀耳鳴脈弱口乾面無華色積虛未復平補是投十一日十一診前方去桂心橘餅烏梅加龜板六錢麥冬蒲桃干各三錢十貼後汛至體康而愈矣胡某素患耳鳴且吸鴉片時服補藥漸至食減痰多舌上起灰黃厚膩之苔者三年矣多醫莫愈孟英脈之弦細軟滑曰陰虧真於下痰熱阻於上耳以西洋參菖蒲遠志麥冬竹茹蓯蓉歸身石英牡蠣冬蟲夏草少加黃連服之不半月痰少餐加舌苔盡退三年之病遂以霍然王炳華之媳屢次墮胎人漸尪羸月事亂行其色甚淡醫謂虛也大投補劑其瘦日甚食少帶多遂加桂附五心如烙面浮咳逆痰壅礙眠大渴喜嗔醫皆束手始請孟英脈之兩尺虛軟左寸關弦數右兼浮滑乃陰虛火炎也然下焦之陰雖虛而痰火實於上焦古人治內傷於虛處求實治外感於實處求虛乃用藥之矩矱也爰以沙參竹茹冬瓜子蘆筍枇杷葉冬蟲夏草石英紫菀蓯蓉旋覆為方兩劑即能寐五六劑嗽止餐加乃去紫菀旋覆沙參加西洋參歸身黃柏服五劑熱減帶稀口和能食再去蘆筍冬瓜子枇杷葉加熟地枸杞烏鰂骨服之而愈又吳氏婦陡患咳嗽痰不甚多不能著枕者旬日也神極萎頓孟英察脈虛數授枸杞蓯蓉歸身石英龜板牡蠣冬蟲夏草麥冬牛膝胡桃肉之劑覆杯而病若失舜傳之舅嫂因用力拔針而患指痛內外雜治漸至痛遍一身臥榻不起食少形消余診之脈細而數口乾舌絳乃營陰大虧無以營養筋骨豈可因拔針起病遂以為外傷而妄投燥烈之藥乎宜其病日以甚也以集靈膏加減為方而愈損張養之令正飲食如常而肌膚消瘦敘症詳明信事如期而紫淡不恆兩腓發熱而別處仍和面色青黃而隱隱有黑氣儼似虛寒多藥不效始逆孟英診之脈似虛細而沉分略形弦滑曰此陽明有餘少陰不足土燥水涸仲聖有急下存陰之法然彼外感也有餘之邪可以直瀉此內傷也無形之熱宜以甘寒義雖同而藥則異也贈以西洋參生地生白芍生石膏知柏苓梔麥冬花粉楝實丹皮木通天冬諸品服至數斤黑氣退而肌漸充腓熱去而經亦調矣孟英善用甘寒投之此證尤宜戊戌春張雨農司馬必欲孟英再赴環山孟英因其受病之深且公事掣肘心境不能泰然誠非藥石之可以為力也固辭不往司馬泫然哀懇但冀偕行旋署則任君去留可耳並囑趙蘭舟再四代陳曲悃孟英感其情同舟渡江次剡溪司馬淡及體氣羸憊情形孟英忽曰公其久不作嚏乎司馬曰誠然有年矣此曷故也孟英曰是陽氣之不宣布也古惟仲景論及之然未立治法今擬鄙方奉贈博公一嚏如何司馬稱善遂以高麗人參乾薑五味石菖蒲酒炒薤白半夏橘皮紫菀桔梗甘草為劑舟行抵嵊登陸取藥煎而服之駕輿以行未及三十里司馬命從人詣孟英車前報曰已得嚏矣其用藥之妙如此朱氏婦素畏藥雖極淡之品服之即吐近患晡寒夜熱寢汗咽乾咳嗽脅疼月餘後漸至減餐經少肌削神疲始迓孟英診之左手弦而數右部澀且弱曰既多悒鬱又善思慮所謂病發心脾是也而平昔畏藥豈可強藥再戕其胃誠大窘事再四思維以甘草小麥紅棗藕四味令其煮湯頻飲勿輟病者嘗藥大喜徑日夜服之逾旬復診脈證大減其家請更方孟英曰毋庸此本仲聖治藏燥之妙劑吾以紅棗易大棗取其色赤補心氣香悅胃加藕以舒郁怡情合之甘麥並能益氣養血潤燥緩急雖若平淡無奇而非惡劣損胃之比不妨人任胡可以果子藥而忽之哉恪守兩月病果霍然余某年三十餘發熱數日醫投涼解之法遂嘔吐自汗肢冷神疲亟延孟英診之脈微弱曰內傷也豈可視同伏暑而一概治之徑不詳辨其證耶與黃耆建中去飴加龍骨生薑茯苓橘皮投劑即安續加參術逾旬而愈陳氏婦素無病娩後甚健乳極多而善飯六月初形忽遽瘦猶疑天熱使然漸至減餐所親徐麗生囑延孟英視之脈細數舌光絳曰急勞也無以藥為夫乳者血之所化也乳之多寡可徵血之盛衰茲乳溢過中與草木將枯精華盡發於外者何異即令斷乳亦不及矣其家聞之尚未深信即日斷乳服藥及秋而逝張慈齋室自春間半産後發熱有時迄於季秋廣服滋陰之藥竟不能愈其大父陳靄山延孟英診脈按之豁然投當歸補血湯而熱退繼以小建中愈之此衆人用滋陰者而孟英以陽和之品愈之可見醫者認證不在執方也胡季權令正許子雙之女弟也初於乙巳患乳房結核此乳岩之漸也豈有用補之理外科雜投溫補核漸增而疼脹日甚馴致形消汛愆夜熱減餐骨痿於床孟英診曰郁損情懷徒補奚益豈惟無益愈增其病矣初以蠲痰開鬱之劑吞當歸龍薈丸痛脹遞減熱退能餐月事乃行因誤補之後故用此丸否則可以不必改投虎潛加減法服半年餘而起凡前後計用川貝母七八斤他藥稱是今春因哭母悲哀陡然發厥與甘麥大棗加龍牡龜鱉磁朱金箔龍眼而安沈辛甫善軒岐之學其令正體素弱而勤於操作年逾四秩汛事過多兼以便溏冷汗氣逆參耆屢進病日以危孟英診曰心脾之脈尚有根猶可望也與龍骨牡蠣龜板鱉甲海螵蛸石英石脂餘糧熟地茯苓為方一劑轉機漸以向愈亦下虛而誤補其上者應補之證補不如法尚且致害況不應補而補者乎董哲卿二尹令正胎前患嗽娩後不痊漸至寢汗減餐頭疼口燥奄奄而臥略難起坐孟英珍脈虛弦軟數視舌光赤無苔曰此頭疼口燥乃陽升無液使然豈可從外感治是沖氣上逆之嗽初非傷風之證也與蓯蓉石英龜板茯苓冬蟲夏草牡蠣穭豆衣甘草小麥紅棗藕數帖嗽減餐加頭疼不作加以熟地服之遂愈錢聞遠自春間偶患痰嗽醫投蘇葛而失音更醫大劑滋補漸致飲水則嗆久延愈劇邀孟英診曰左寸動數尺細關弦右則澀乃心陽過擾而暗耗營陰肺金受爍清肅不行水失化源根無蔭庇左升太過右降無權氣之經度既乖血之絡隧亦痹飲水則嗆是其據也金遇火而伏其可慮乎繼而瘀血果吐納食稍舒老醫嚴少眉以為可治竭力圖維仍殞於伏高石泉仲媳骨小肉脆質本素虛冬間偶涉煩勞不飢不寐心無把握夜汗耳鳴馮某連進滋陰法病日甚孟英察其左寸甚動兩關弦滑苔色膩黃乃心肝之火內燔胃府之氣不降陰虧固其本病滋填未可為非然必升降先調而後補之有益精要語業醫者宜謹識之授鹽水炒黃連石菖蒲元參丹參梔子石斛小麥知母麥冬竹葉蓮子心等藥服之即應續豫女貞旱蓮牡蠣龜板地黃善後而瘥室女多抑鬱干嗽為火鬱夫人而知之者王杞庭之姐年逾標梅陡患干嗽無一息之停目不交睫服藥無功求孟英診焉兩脈上溢左兼弦細口渴無苔乃真陰久虛風陽上潛沖嗽不已厥脫堪虞授牡蠣龜板鱉甲石英蓯蓉茯苓熟地歸身牛膝冬蟲夏草胡桃肉之方藥甫煎果欲厥亟灌之即寐次日黃昏猶發寒痙仍灌前藥至第三夜僅有寢汗而已四劑後諸恙不作眠食就安設此等潛陽鎮逆之方遲投一二日變恐不可知矣況作郁治而再用開泄之品耶故辨證為醫家第一要務也謝譜香體屬久虛初冬患嗽痰減食適孟英丁艱邀施某視之云是腎氣不納命火無權疊進腎氣湯月餘遂致嘔惡便溏不飢無溺乃束手以為必敗矣季冬仍延孟英診之脈甚弦軟苔膩舌紅乃中虛而健運失職誤投滋膩更滯樞機附桂之剛徒增肝橫豫黨參白朮茯苓澤瀉橘皮半夏竹茹梔子薏苡蒺藜蘭葉柿蒂之劑培中泄木行水蠲痰旬日而愈古人補腎不如補脾補脾不如補腎之説均有至理而用違其宜亦均足致敗此醫所以首貴認證也錢氏婦患嗽數月多醫莫治漸至廢寢忘餐凜寒乍熱經停形瘦心悸耳鳴滋補填陰轉兼便泄孟英視脈虛弦緩大而氣短懶言臥榻不支動即自汗曰固虛也然非滋陰藥所宜豫參耆龍牡桂芩甘芍冬蟲夏草餳糖大劑服旬日而安繼去龍牡加歸杞服二十劑汛至而康病者欲常服補藥孟英止之曰病痊體健何以藥為吾先慈嘗云人如欹器虛則欹中則正滿則覆世之過服補劑致招盈滿之災者比比焉可不鑑哉許子厚令庶母年未四旬患晡熱發於上焦心悸頭痛腰痠腿軟飢不欲食暮則目如盲而無所睹時或腹脹自汗帶多孟英脈之弦細而弱氣短不足以息舌赤無苔曰此營血大虧不可作暑治也授人參熟地棗仁枸杞歸身麥冬烏鰂骨牡蠣龜板蒺藜芍藥杜仲羊藿等藥數十劑而康復如常許蘭嶼令正正月中旬偶食蒸餅即覺腹中攻痛而寒熱間作以為瘧也請孟英診之脈弦軟而微數曰此不可以瘧論緣營素虧往歲愈後少於調補仍當濡養奇經蓋陽維為病亦能作寒熱而八脈隸於肝腎溫腎涼肝病即霍然矣授以蓯蓉枸杞當歸白薇青蒿茯苓竹茹鱉甲楝實藕數帖果愈逮二月中旬其病復作舉家僉以為瘧或云必前次早補留邪未去使然而蘭嶼遠出家無主議之人孟英曰前次愈之太易我之罪也不為善後誰之過歟如信我言指日可瘳第須多服培養之劑保無後患於是仍服前藥亦數劑而安續以集靈膏去牛膝加羊藿阿膠當歸黃柏菟絲蓯蓉蒲桃干熬膏服之竟不再發李健伯夫人因傷情志而患心跳服藥數月大解漸溏氣逆不眠面紅易汗臥榻不起勢已瀕危其次壻余朗齋浼孟英診之堅辭不治其長壻瞿彝齋力懇設法且云婦翁遊楚須春節旋里縱使不治亦須妙藥稽延時日孟英曰是則可也立案云此本郁痰證緣謀慮傷肝營陰久耗風陽獨熾爍液成痰痰因火動跳躍如舂若心為君主之官苟一跳動即無生理焉能淹纏至此乎但郁痰之病人多不識廣服溫補陰液將枯脈至右寸關雖滑而別部虛弦軟數指下無情養液開痰不過暫作緩兵之計一交春令更將何物以奉其生莫謂贈言之不詳姑順人情而豫藥方用西洋參貝母竹茹麥冬茯神丹參蓯蓉薏苡紫石英蛤殼等服之痰果漸吐火降汗收納穀能眠胸次舒適而舌色光絳津液毫無改授集靈膏法扶至健伯歸因謂其兩壻曰我輩之心盡矣春節後終虞痙厥之變也已而果然仁和彭君芝亭之三令嬡年甫逾笄自去秋患痰嗽內熱漸至汛愆減食咽爛音嘶肌瘦便溏不眠心悸丁巳正月下旬專人迎余往視左脈細軟而數寸尤甚右尺洪數寸關不耐尋按蓋燥邪薄肺初失肅清陰分素虧源流兩涸今胃氣已敗萬物發蟄之時如何過去其二令嬡深諳醫理極以為然適邵位西樞部持蔣大理之函相召余即解纜嗣接趙君笛樓信云彭女果歿於驚蟄前三日抑何脈之神耶余曰亦偶然事耳如前年五月間偶診顧聽泉明經之脈即謂家竾伯茂才云顧君不可以冬蓋死象已見也後竟歿於立冬之時今年二月診莊文芝階脈謂其文孫嵋仙少君云恐難過夏而立夏前三日竟逝十月初遊武林訪家瘦石兄切其脈尺中微露浮弦即謂其子曰春令可虞亦於次年驚蟄日無疾而終脈之可憑者如是而竟有不可憑者此其所以為微妙之學乎郁許康侯令堂初夏患坐臥不安飢不能食食則滯膈欲噫不宣善恐畏煩少眠形瘦便艱溲短多藥莫瘳孟英按脈弦細而滑乃七情怫鬱五火爍痰誤認為虛妄投補藥氣機窒塞升降失常面赤痰黃宜先清展方用旋覆菖蒲紫菀白前竹茹茯苓黃連半夏枇杷葉蘭葉不旬而眠食皆安為去前四味加沙參歸身紫石英麥冬調養而痊沈峻揚令妹年逾五旬體素瘦弱不能寐者數夜證遂瀕危乃兄延孟英視之目張不能闔淚則常流口開不能閉舌不能伸語難出聲苔黃不渴飲不下咽足冷不溫筋瘛而疼胸膈板悶溲少便祕身硬不柔脈則弦細軟澀重按如無或疑中暑或慮虛脫孟英曰身不發熱神又不昏非中暑也二便艱澀咽膈阻悶非脫證也殆由情志鬱結怒木直升痰亦隨之堵塞華蓋故治節不行脈道不利也誤進補藥其死可必但宜宣肺氣行自愈方用紫菀白前兜鈴射干菖蒲枇杷葉絲瓜絡白豆蔻果一劑知四劑瘳驚邵魚竹給諫起居食飲如常惟僅能側臥略難仰臥仰而寤無恙也稍一閣眼則驚竄而醒雖再側眠亦徹夜不得寐矣多年莫能治凡心腎不交之人多不能仰臥以仰則腎氣不能上承而心氣愈浮也孟英以三才合枕中丹加黃連肉桂服之良效心腎交治而以黃連肉桂媾合之用意甚巧其長郎子旊久患痰多胸膈滿悶連年發癇藥之罔效孟英脈之曰氣分偏虛痰飲阻其清陽之旋運宜法天之健以為方則大氣自強而流行不息胸次乃廓然如太空矣與六君去甘草加黃耆桂枝薤白蔞仁石菖蒲蒺藜旋覆服之滿悶漸舒癇亦不發矣周菊生令正患少腹酸墜小溲頻數而疼醫投通利不效繼以升提溫補諸法備試至於不食不寐大解不行口渴不敢飲水聞聲即生驚悸孟英脈之曰厥陽為病也不可徒治其太陽先與鹹苦以泄其熱續用甘潤以滋其陰毫不犯通滲之藥而愈一圃人詣孟英泣請救命詰其所以云家住清泰門內馬婆巷因本年二月十五日卯刻雷從地奮火藥局適當其沖牆垣廨宇一震泯然雖不傷人而附近民房撼搖如簸其時妻在睡中驚醒即覺氣不舒暢半載以來漸至食減形消神疲汛少帷臥則其病如失藥治罔效或疑邪祟所憑祈禳厭鎮亦屬無靈敢乞手援幸無卻焉孟英許之往見婦臥於榻神色言動固若無恙診畢病人云君欲睹我之疾也坐而起果即面赤如火氣息如奔似不能接續者苟登圊溲便必賁逆欲死前所服藥破氣行血和肝補肺運脾納腎清火安神諸法具備輒如水投石孟英仿喻氏治厥巔疾之法用藥一劑知旬余愈仍是治肝之法楊某方作事不知背後有人潛立回顧失驚遂不言不食不寐不便別無他苦孟英按脈沉弦以石菖蒲遠志琥珀膽星旋貝竹黃杏仁省頭草羚羊角為劑化服蘇合香丸二帖大解行而啜粥夜得寐而能言復與調氣寧神蠲飲藥數日霍然章養雲室患感適遇猝驚黃包二醫皆主溫補乃至昏譫痙厥勢極危殆棺衾咸備無生望矣所親陳仰山聞之謂云去秋顧奏云之恙僅存一息得孟英救愈子盍圖之章遂求診於孟英證交三十八日脈至細數無倫陰將竭矣兩手拘攣肝無血養宛如角弓之反張痰升自汗渴飲苔黃面赤臀穿晝夜不能閣眼先與犀羚貝斛元參連翹知母花粉膽星牛黃鱉甲珍珠竹黃竹葉竹瀝竹茹為方三劑兩手漸柔汗亦漸收又五劑熱退痰降脈較和而自言自答日夜不休乃去羚斛珠黃加西洋參生地大塊硃砂兩許服之聒絮不減或疑為癲似有搖惑之意孟英恐其再誤囑邀許芷卿商之芷卿極言治法之絲絲入扣復於方中加青黛龍牡服二劑仍喋喋不已熱在心而用肝腎藥宜乎不效孟英苦思數四徑於前方加木通一錢投匕即效次日病者自語前此小溲業已通暢不甚覺熱昨藥服後似有一團熱氣從心頭直趨於下由溺而泄從此神氣安謐粥食漸加兩腿能動大解亦堅忽咽腫大痛水飲不下孟英曰餘火上炎也仍與前方更吹錫類散而安惟臀瘡未斂腿痛不已乃下焦氣血傷殘改用參耆歸芍生地合歡山藥麥冬牛膝石斛木瓜桑枝藕肉數服痛止餐加又與峻補生肌而愈溫病誤補未有能生者孟英獨出手眼實發前人所未發用木通精當凡心經蘊熱用犀角黃連等藥必兼木通其效乃捷以能引心經之熱從小腸出也杭城溫元帥例於五月十六日出巡遣疫有魏氏女者家住橫河橋之北會過其門將及天曉適有帶發頭陀由門前趨過瞥見之大為驚駭注目視之知為僧也遂亦釋然而次日即不知飢眩暈便祕醫謂神虛投補數帖反致時欲昏厥不問何證竟投溫補何其愚耶更醫作中風治勢益甚旬日後孟英持其脈弦伏而滑胸腹無脹悶之苦旬余不更衣是驚則氣亂挾痰逆升正仲聖所謂諸厥應下者應下其痰與氣也以旋赭梔連雪羹楝貝金箔竹瀝蔔汁為方並以鐵器燒紅淬醋令吸其氣二劑厥止旬日而痊王瘦石稟屬陰虧卒聞驚嚇之聲而氣逆肢冷自汗息微速孟英視之身面皆青緑之色脈沉弦而細乃素傷憂慮而風陽陡動也與牡蠣四兩鱉甲二兩蛤殼一兩石英五錢龍齒小麥辰砂麥冬茯神貝母竹茹為方一劑知二劑已續以滋養而瘳凡陰虛之體血不足以養肝則肝陽易潛用大劑鎮逆養陰開鬱法治絲絲入扣宜乎應手輒效也顧媼因比鄰失火幾焚其店驚嚇之餘不能起榻脅痛偏右便祕神瞀身面發黃醫云濕熱治之罔效乞診孟英脈澀而弦按之甚軟曰此因驚恐氣結不行所致豫沙參桑葉梔子絲瓜絡冬瓜子葦莖枇杷葉旋覆蔥須竹茹數劑而痊悸太倉陸竹琴令正陡患心悸肢冷如冰其子皇皇浼吳江程勉耘懇援於孟英察其脈浮弦而數視其舌尖赤無苔乃陰虛陽越煎厥根萌豫元參二至三甲龍齒石英生地牛膝茯神蓮子心而愈哭康爾九令正患汛愆而致左脅疼脹口苦吞酸不飢不寐溲熱便難時時欲哭乃尊馬翠庭鹺尹延孟英診之左甚弦數以雪羹湯吞龍薈丸經行如墨而瘳繼因思鄉念切久斷家書心若懸旌似無把握火升面赤汗出肢涼乃父皇皇亟邀孟英視之左寸關弦數尺中如無乃陰虛木火上亢也以元參黃連牡蠣麥冬生地甘草女貞旱蓮百合石英小麥紅棗為劑引以青鹽一分覆杯而愈狂李叟年越古稀意欲納妾雖露其情而子孫以其耄且瞽也不敢從因此漸病狂惑群醫咸謂神志不足廣投熱補之藥愈服愈劇始延孟英診之脈徑搏指面赤不言口涎自流力大無制曰此稟賦過強陽氣偏盛姑勿論其脈證即起病一端概可見矣如果命門火衰早已痿靡不振焉能興此念頭醫見其老輒疑其虛須知根本不堅實者不能享長年既享大壽其得於天者必厚況人年五十陰氣先衰徐靈胎所謂千年之木往往自焚陰盡火炎萬物皆然去冬吾治邵可亭孤陽喘逆壯水清火之外天生甘露飲灌至二百餘斤即梨汁也病已漸平僅誤於兩盞薑湯前功盡墮可見陰難充長火易燎原今附桂仙茅鹿茸參戟河車等藥服之已久更將何物以生其涸竭之水而和其亢極之陽乎尋果不起江某年三十餘忽兩目發赤牙齦腫痛漸致狂妄奔走罵人不避親長其父皇皇求孟英診之脈大而數重按虛散與東洋參熟地黃辰砂磁石龍齒菖蒲棗仁琥珀肉桂金箔龍眼肉為劑投匕即安翼日能課徒矣昔余友彭香林患此證醫雖知其虛而治不如法竟以不起今讀此案彌增惋嘆王月鋤令媳於廟見時忽目偏左視揚手妄言諸親駭然詰其婢媵素無此恙速孟英視之脈弦滑而微數苔黃脘悶蓋時雖春暮天氣酷熱兼以勞則火升挾其素有之痰而使然也與犀羚梔翹元參丹參薄荷花粉送礞石滾痰丸三服而痰下神清改投清養遂愈次年即誕子一婦患證年餘藥治罔效初夏延孟英視之發熱甚於未申足冷須以火烘痰嗽苔黃問有譫語渴飲無汗亟令撤去火盆以生附子搗貼湧泉穴且囑恣啖梨蔗方用人參白虎湯投之七帖而年餘之熱盡退繼與養陰藥而瘳費伯元分司患煩躁不眠醫見其苔白也投以溫藥因而狂妄瘛瘲多方不應余薦孟英視之左脈弦細而數右軟滑乃陰虛之體心火熾肝氣動而痰盛於中也先以犀羚桑菊息其風元參丹皮蓮心童溲清其火茹貝雪羹化其痰兩劑而安隨與三甲二至磁朱潛其陽甘麥大棗緩其急地黃麥冬養其陰漸次康復朱養心後人名大鏞者新婚後神呆目瞪言語失倫或疑其體弱神怯與鎮補安神諸藥馴致善飢善怒罵詈如狂其族兄已生邀孟英診之右脈洪滑與犀角石膏菖蒲膽星竹瀝知母吞礞石滾痰丸而愈其大父患四肢冷顫常服溫補延久不痊孟英切其脈弦而緩曰非虛也與通絡方吞指迷茯苓丸而瘥藁砧遠出婦病如狂似屬七情而亦有不盡然者有陳氏婦患此月餘巫醫屢易所費既巨厥疾日增孟英切其脈弦而數能食便行氣每上衝腹時痛脹詢其月事云病起汛後繼多白帶孟英曰病因如是而晝則明瞭夜多妄言酷似熱入血室之候徑從瘀血治可也豫桃仁紅花犀角菖蒲膽星旋覆赭石丹參琥珀蔥白之劑兩服而瘀血果行神情爽慧繼去桃仁紅花加當歸元參服數劑而瘳陳氏婦年逾四旬娩後忽然發狂時值秋熱甚烈或以為受熱移之清涼之所勢不減或以為瘀投以通血之藥而不效金顧二醫皆為虛火進以大劑溫補則狂莫能制或云痰也灌以牛黃丸亦不應浼孟英視之切脈弦數頭痛睛紅胸腹皆舒身不發熱乃陰虛而肝陽陡動也先灌童溲勢即減劑以三甲二至丹參石英生地菊花牛膝藕用金飾同煎一飲而病若失愈後詢之果因弄瓦而拂其意耳陸渭川令媳患感適遇姅期醫治數日經止而昏狂陡作改從熱入血室治轉為痙厥不省人事所親沈雨階為延孟英診之脈弦軟而虛滑氣逆面青牙關不開遺溺便祕令按胸次堅硬如柈此冬溫尚在氣分如果熱入血室何至晝亦昏迷良由素多怫鬱氣滯痰凝用柴胡則肝氣愈升攻瘀血則誅伐無過豫小陷胸合蠲飲六神湯加竹瀝調服牛黃至寶丹一顆外以蘇合丸塗於心下痰即湧出胸次漸柔厥醒能言脈較有力次日仍用前方調萬氏清心丸一粒果下痰矢漸啜稀糜改授肅清數日而愈續有顧某陡患昏狂苔黃便祕臥則身挺汗出五心醫云熱入膻中宜透斑疹治之加劇孟英診脈弦緩不鼓身無大熱小溲清長的非外感乃心虛膽怯疑慮憂愁情志不怡郁痰堵竅也以蠲飲六神湯合雪羹加竹葉蓮子心竹瀝服二劑狂止自言腹脹而頭偏左痛仍以前方吞當歸龍薈丸大解始下改用清火養心化痰舒郁之法而愈癇朱君慶雨次郎夙有癇證因勞傷之後發冷吐酸不飢神憊服藥數劑遂致故疾日作數次醫者術窮餘脈之弦細若伏而肢冷如冰苔白如砂涎沫頻吐頭疼而暈重裘不知溫是熱深厥深誤投熱藥而飲邪內盛故熱邪隱伏不顯也詢其小溲果甚赤以導痰湯去草合雪羹加芩連梔茹木通煎吞當歸龍薈丸覆杯而愈疑懼顧升庵參軍之仲郎久患多疑善恐痰之見證不出房者數年矣食則不肯與人共案臥則須人防護寡言善笑熱之見症時或遺精多醫廣藥略無寸效孟英切脈甚滑數脈與證合與元參丹參竹黃竹茹丹皮黃連花粉梔子海虴荸薺為劑送服當歸龍薈丸四帖即能出署觀劇遊淨慈而登吳山參軍大喜以為神治次年為之配室己酉春胡孟紳山長患疑坐臥不安如畏人捕自知為痰餌白金丸吐之汗出頭面神躁妄聞撩動其猖狂之勢孟英切其脈弦滑洪數不為指撓投石膏竹茹枳實黃連旋覆花粉膽星石菖蒲加雪羹竹瀝童溲吞礞石滾痰丸下其痰火連得大解夜分較安惟不能斷酒為加緑豆銀花枳椇子吞當歸龍薈丸旬餘脈證漸平神氣亦靜尚多疑懼改授犀角元參丹皮竹葉竹茹貝母百合丹參蓮心豬膽汁炒棗仁鹽水炒黃連吞枕中丹以清包絡肝膽之有餘而調神志又旬日各恙皆蠲即能拈韻繼與十味溫膽法善其後洪張伯孝廉令弟蘇仲鄉試後自以場作不愜於懷怏怏數日漸以發熱醫作伏暑治日形困頓懶語音低神情恍惚稍閣眼輒以文有疪纍如何中式云云屢服牛黃犀角等藥竟無寸效延孟英視之時時出汗不飢溺少舌絳口乾切脈虛軟以數曰此心火外浮也昔賢惟王損庵論之獨詳今人罕讀其書每與溫暑逆傳證混淆施治夫心猶鏡也彼熱邪內陷襲入心包則霧障塵蒙之象也故可磨之使明是為實證今心陽過擾火動神浮乃銅質將鎔之候也法宜堅之使凝是為虛證良由陰分素虧心營易耗功名念切慮落孫山病屬內傷似乎外感大忌發表更禁寒涼又非東垣補中益氣之例無怪醫者為之技窘也而有藥治病無藥移情余有一言可廣其意文之不自愜於懷者安知不中試官之意乎且禍盈福謙易之道也嘗見自命不凡者偏不易售而自視欿然之士恆於意外得之即此一端吾可必其中也病者聞之極為怡曠服藥後各恙漸安半月而愈及榜發果獲雋僉云藥既神妙而慧吐齒牙竟成吉懺仁言仁術醫道通仙可於孟英信之矣其方則甘草乾地黃麥冬枸杞鹽水炒黃連紫石英龜板龍齒珍珠也逮季冬兩孝廉將北上其母夫人陡病恍忽孟英往診曰高年素多憂慮而別離在即神倏飛陽縱有仙丹亦難救藥另邀他醫視之皆云冬溫須過十四日及旬而沒神氣不昏始信孟英鏡質消鎔與塵濛霧障有殊也張友三室去春受孕後忽夢見其亡妹而妹之亡也由於娩難心惡之因囑婢媼輩廣購墮胎餌服卒無驗冬間娩子後亦無恙自疑多餌墮胎藥元氣必傷召朱某治之述其故朱即迎合其意而斷為大虛之候且云苟不極早補救恐延蓐損病者聞而益懼廣服補劑漸至臥榻不起多藥弗效延至仲春族人張鏡江為邀孟英視之不飢不寐時或氣升面赤口乾二便閉澀痰多易汗胸次如舂咽有炙臠畏明善怒刻刻怕死哭笑不常脈至左部弦數右手沉滑曰此郁痰證誤補致劇也與上年李健伯令正之病情極相類第彼已年衰而傷於憂思謀慮是為虛郁此年壯體堅而成於驚疑惑懼是為實郁虛郁不為舒養而輒投溫補則鬱者愈郁而虛者愈虛實郁不為通泄而誤施溫補則鬱不能開而反露虛象所謂大實有羸狀也醫者但云補藥日投虛象日著不知虛象日形病機日錮彼豈故釀其病而使之深耶亦是一片仁心無如藥與病相僢而馳蓋即好仁不好學之謂耳余非好翻人案恐不為此忠告未必肯舍補藥而從余議也病者聞之大悟即授小陷胸合雪羹加菖蒲薤白竹茹知母梔子枳實旋赭出入為方吞當歸龍薈丸三劑後蔞仁每帖用至八錢而大解始行各恙乃減半月後心頭之舂杵始得全休改用清肅濡養之法調理匝月汛至而痊秀水嚴小亭令正五十八歲因數年前家有訟事屢遭驚嚇而起疑病自欲吞金雖己衣不敢用鈕扣並時縶手足即夫媳兒孫皆屏絶不許入房云恐自摘他人之衣扣環飾咽下也僅留一媼在室服侍而飲食起居如常人醫皆謂其神虛率投鎮補今秋患右腿青紫腫痛牙齦臭腐季秋延余視之脈弦滑而數曰此病不在心而在膽故能記憶往事而善謀慮豈可指為神志不足乎膽熱則善疑愈補則熱愈熾熾極則傳於胃胃熱蘊隆乃成青腿牙疳也錮疾已六七年宜先治其新病以菖蒲膽星石膏膽草知母元參銀花梔子白薇竹茹黃連煎調玉樞丹並令購白馬乳飲之六劑而病減半月新病愈仲冬余又遊禾復診脈較平而膽亦稍和蓋白馬乳善清膽胃之熱也內風朱慶雲室年六十六歲初發熱即舌赤無津錢丁任顧諸醫胥云高年液少津涸堪憂甘潤之方連投八劑馴致神悗耳聾不飲不食沉沉欲寐厄忒面紅勢已瀕危徐德生囑其延孟英圖之審其脈弦滑而數視其舌絳而捫之甚燥然體豐呼吸不調厄聲亦不暢達合脈證與體而論之雖無脘悶拒按之候確是肝陽內熾痰阻樞機液不上承非津涸也劑以小陷胸湯加茹薤旋菖枇杷葉蘇葉一飲而夜得微汗身熱即退次日痰嗽大作舌滑流涎病家詫曰奇矣許多潤藥求其潤而愈燥何以此劑一投而反津津若是耶殆仙丹矣三帖後更衣厄止痰嗽亦減漸進稀粥改用沙參紫菀苡斛歸茹麥冬瓜子服數帖溲暢餐加而覺肢麻頭暈豫參耆歸芍橘半熟地天麻石英牛膝茯苓桑枝補虛息風化痰而健曹氏婦孀居而操家政人極精幹患恙旬余諸醫以為冬溫而多藥罔瘥勢瀕於危伊親孫位申速孟英挽之面赤耳聾脈狀細軟舌赤無液粒米不沾夜不成眠便溏溲赤痰咸咳逆腹脹氣衝齦腫巔疼音低自汗口中甚辣心下如焚兩足不溫時欲發暈乃肝腎素虧心陽內亢原非感證藥誤已深縱是冬溫亦不可妄施柴葛況足冷麵赤非渾身發熱之比也既耗其氣更爍其營陰火潛燃治宜鎮息方以參蠣連芍茹冬楝斛丹參小麥龜板鱉甲煎吞磁朱丸一飲脹消餘證不減去楝芍龜板鱉甲加龍齒銀花導赤散三服暈止便堅小溲亦暢略安寢食再去銀花木通磁朱丸加知柏紅棗紫石英而麥冬以硃砂染兩帖火降足和舌色漸潤又兩帖汗嗽胥減心下始涼乃易生地以熟地滋補而瘳癸丑孟春陳舜廷自寧波旋杭迓孟英診視云去冬患痰嗽彼處醫家初以疏散繼則建中諸藥備嘗日漸羸困左脅躍躍跳動胸次癢如蟲行舌素無苔食不甘味嗽甚則汗夜不安眠痰色清稀便溏溲短恐成肺痿惟君圖之孟英診曰病始肺傷於燥治節不行體質素屬陰虧風陽內煽爍其津液故右脈軟滑而虛溫以辛甘致左脈浮弦且數雖非肺痿而上下交虛治先保液息風續宜壯水可奏膚功徒化痰理嗽見病治病有何益乎爰以沙參葦莖冬瓜子絲瓜絡竹茹肅肺氣甘草石斛燕窩生津液冬蟲夏草石英牡蠣息風陽投劑即嗽減能眠旬日後去冬子石斛加歸身麥冬茯苓服數帖兩脈較和餐加溺暢再去牡蠣甘草絲瓜絡加熟地鹽橘紅十餘劑各恙皆安以高麗參易沙參善後而康孟夏許芷卿偶自按脈左寸如無招他醫診之僉云心散舉家驚懼己亦皇皇屈孟英視之曰勞心而兼痰火之郁故脈伏耳其火升面赤不寐脅鳴乃驚駭激動肝膽之陽勃然升越非本病也豫人參黃連菖蒲紫石英小麥麥冬蓮子心紅棗竹葉甘草為方一劑知二劑已石北涯之大令媳忽患多言不寐面赤火升汗出心搖倉皇欲死孟英察脈虛弦小數乃賦質陰虧將交春令虛陽浮動有鳶飛魚躍之虞亟以人參龍齒牡蠣石英甘草百合小麥竹葉紅棗青鹽水炒黃連為劑引以雞子黃投匕即安續加熟地阿膠滋填而愈乙卯冬初余摯眷回藉卜居濟諪溪秀水呂君慎庵邀余遊新塍視屠舜傳之女適張氏者據云病起産後延至五年久臥於床勢成癱瘓廣服補劑迄不見功及入室視之病者尚著單衣貼身僅鋪草席而窗戶盡扃因詢畏熱而喜暗乎曰然按脈弦而滑執燭照之面有赤色苔甚黃膩復詢其胸悶氣升乎溲熱易汗乎亦曰然且汛事仍行飢不能食耳鳴頭暈腿軟痰多病不在於血分雖起自産後而根株實不在是細詰之始云未嫁之前宿有氣升眩暈之疾於今已十載矣余曰是也此固風陽內熾搏液成痰之證因娩而血大去故發之較劇醫者不揣其本而齊其末遂以為産後之虛溫補率投升逆愈甚下虛上實致不能行與清火降痰之劑而別曰氣得下趨病可漸愈後聞其西席鍾君子安向慎庵云服王藥五帖即能扶杖而出矣謝君再華之室偶患齒痛日以加甚至第五日知余遊武林拉往視之已呻吟欲絶渾身肉顫按脈不能準問病不能答苔色不能察惟欲以冷物貼痛處余諦思良久令以淡鹽湯下滋腎丸三錢外以坎宮錠塗痛處吳茱萸末醋調貼湧泉穴次日復診已談笑自若如常作針黹矣向余致謝曰昨夜一飲即寐而病如失真仙丹也余曰昨日大窘若非素知為肝陽內熾之體幾無措手今火雖降脈尚弦數宜用滋潛善後以一貫煎方囑其熬膏服之遂不復發仁和胡次瑤孝廉北上未歸其令正於仲夏陡患肢麻昏暈速余往視面微紅音低神憊睛微赤舌苔微黃足微冷身微汗胸微悶脈微弦乃本元素薄謀慮縈思心火上炎內風隨以上僭也不可誤以為痧閉而妄投香燥辛散之品以人參龍蠣菖連石英麥冬小麥竹葉蓮子心為方兩服而愈尋與平補以善其後不寐錢塘姚歐亭大令宰崇明其夫人自上年九月以來夜不成寐僉以為神虛也補藥頻投漸不起榻頭重如覆善悸便難肢汗而心內如焚多言溺暢畏煩而腹中時脹遍治無功其西席張君心鋤屢信專丁邀診余不得辭初夏乘桴往視左寸關弦大而數右稍和而兼滑口不作渴舌尖獨紅乃憂思謀慮擾動心肝之陽而中挾痰飲火鬱不宣溫補更助風陽滋膩尤增痰滯至鹿茸為透生巔頂之物用於此證猶舟行逆風而扯滿其帆也明粉為芒硝所煉投以通便是認為陽明之實祕也今脹能安穀顯非腑實不過胃降無權肝無疏泄乃無形之氣祕耳遂以參連旋枳半芍蛤茹郁李麻仁鳧茈海虴兩服即寐且覺口苦溺熱余曰此火鬱外泄之徵也去蛤殼加梔子便行脹減脈亦漸柔再去麻郁雪羹加石英柏子仁茯苓橘皮小麥連子心紅棗核三帖各恙皆安去石英梔子加冬蟲夏草鱉甲為善後余即挂帆歸矣然不能靜攝季夏漸又少眠復遣丁諄請余畏熱不行命門人張笏山茂才即渠西席之子也往診遵前而治遂以告愈不語書賈陳南橋患冬溫數日後譫妄不眠所親任殿華竭力清解熱退便行忽然不語因迓孟英視之入房見其危坐於榻面無病容兩目開闔自如呼之不聞不答若無知識者按脈左寸細數無倫尺中微細如絲乃腎陰素傷心陽過擾真水下竭真火將施縱有神丹不能接續吾師趙菊齋先生暨許少卿皆在座僉云渠有八旬老父一歲孤兒盍忍恝然勉為設法如犀角紫雪之類以圖萬一不亦可乎孟英曰此非痰滯於絡亦非熱傳手少陰適從高孫兩家來並此為三敗證餘一日而遇之皆無藥可用不敢立方平素不畏大證君輩共知稍有可為毋勞諄囑也既而果逝仁和邵位西樞部令愛字許子雙司馬為媳者在都患心悸頭暈漸不起榻馴致不能出語旋杭多醫治之僉以為虛廣眼補劑遂減餐少寐頻吐痰涎畏風怕煩溲短便閉汛愆帶盛以為不能過冬至矣適余遊武林趙君菊齋囑其邀診脈象弦數而滑面白唇紅目光炯炯而眉蹙苔黃羞明乳裂既非瘄證又非失音強使出一二字則艱澀異常搖手點頭或以筆代口又無妄見亦非祟病余諦審之謂其必起豫驚恐而痰涎阻於竅隧病者頷之以起病時為一大瓶墮地乍聞其聲而一嚇也遂與清心肝膽胃之法加舒絡滌痰開鬱之品服後各恙漸減眠食漸安丙辰春余復視之仍臥於床仍不出語按鈕氏續觚剩鼠魂一條與此相似彼特神其説耳然余竟不能治之使語殊深抱愧録之以質高明戊午季秋復遊武林往診尚如故聞其仍服補劑因力勸阻而贈以清肺通絡滌痰之品制丸噙化服至次年春仲遍身發疹頻吐穢痰語能漸出乃蘊結外解從此肅清可期奏績初論尚不甚爽類中徐夢香年近六旬患手顫不能握管孟英以通補息風藥吞指迷茯苓丸而安仲秋類中遺溺痰升昏瞀妄言汗多面赤急延孟英視之脈浮弦洪滑蓋吸受熱邪而連日適服參湯也與羚羊角石菖蒲連翹梔子桑葉菊花楝斛知母花粉竹瀝銀花蒿薇等藥一劑知二劑神清乃去羚菖加茹貝滑石投之下利赤白如膿垢者數日始知飢納穀漸以調理而愈匝月即能作畫季秋仍幕遊江右癱瘓徐月岩室患周身麻木四肢癱瘓口苦而渴痰冷如冰氣逆欲嘔汛愆腹脹頻飲極熱薑湯似乎暢適深秋延至季冬服藥不愈孟英診脈沉弦而數曰溺熱如火乎間有發厥乎病者唯唯遂以雪羹旋赭梔楝茹斛知母花粉桑枝羚羊橄欖蛤殼為方送下當歸龍薈丸服之遞效二十劑即能起榻乃去羚赭加西洋參生地蓯蓉藕投之漸愈鄭芷塘令嶽母年逾花甲仲春患右手不遂舌謇不語面赤便祕醫與疏風不效第四日延診於孟英右洪滑左弦數為陽明府實之候疏石菖蒲膽星知母花粉枳實蔞仁秦艽旋覆麻仁竹瀝為方或慮便瀉欲脫置不敢用而不知古人中臟宜下之臟字乃腑字之偽柯氏云讀書無眼病人無命此之謂也延至二旬病勢危急芷塘浼童秋門復懇孟英視之苔裂舌絳米飲不沾腹脹息粗陰津欲竭非急下不可也即以前方加大黃四錢絞汁服急下存陰合法連下黑矢五次舌謇頓減漸啜稀糜乃去大黃加西洋參生地麥冬丹皮薄荷滋陰生津尤合法服五劑復更衣語言乃清專用甘涼充津滌熱又旬日舌色始淡納穀如常改以滋陰漸收全績逾三載聞以他疾終趙秋舲進士去秋患左半不遂伊弟笛樓暨高弟許芷卿茂才主清熱蠲痰治之未能遽效邀孟英診之脈甚遲緩苔極黃膩便祕多言令於藥中和入竹瀝一碗且以龍薈滾痰二丸用藥固甚合法何於脈之遲緩處未見照顧相間而投二丸各用斤許證始向愈如此而止殊少善後之法今春出房眠食已復而素嗜厚味不戒肥甘孟夏其病陡發孟英診之脈形滑駛如蛇斷其不起秋初果歿賴炳也令堂年近古稀患左半不遂醫與再造丸暨補劑服二旬病如故孟英按脈弦緩而滑顴赤苔黃音微舌蹇便澀無痰曰此痰中也伏而未化與犀羚茹貝菖夏花粉知母白薇豆卷桑枝絲瓜絡等藥服三劑而苔化音漸清朗六七劑腿知痛痰漸吐便亦通既而腿痛難忍其熱如烙孟英令塗蔥蜜以吸其熱痛果漸止半月後眠食漸安二旬外手能握月餘可扶掖以行矣蟲一賣酒人姓陸極窘而又遭顛沛久而患一異疾形消善癢蝨從皮膚而出搔之蠕蠕醫治莫效孟英診曰悲哀勞苦陽氣受傷曲糵浸淫乃從蟲化與補氣藥加杉木桑枝而愈亦濕熱生蟲之治法結胸魏翎谷浼孟英視其鬱甥之病熱逾半月自胸次脹及少腹痛而不可撫摩便祕溺赤舌黑口乾自汗煩躁六脈弦強無胃曰此恙酷似傷寒大結胸證結胸煩躁無藥可治越二日便行而歿孟英曰傷寒之邪在表誤下則邪陷而成結胸未經誤下不為結胸溫熱之邪在裡逆傳於心包而誤汗則內閉似外脫順傳於胃府而誤汗則盤踞而結胸前人但云誤汗劫奪胃汁而未及於結胸者因結胸證不多見耳然亦不可不知也故謹識之郁病初起某醫用葛根一劑繼則胡某之柴葛羌防十餘劑釀成是證溫病忌誤汗不忌誤下以汗則津涸而熱益熾下則熱勢可藉以少減也關格王雪山於上年誤餌透土丹之時孟英診治向愈即囑其常飲柿餅湯以杜關格於將來逮今四月間形體日瘦張某進以導濕疏風補氣之藥孟英偶見之力勸其溫補莫投且以凡物遇火則乾癟得滋則肥潤為譬雪山深韙之奈為張某輩朝夕虛言所眩仍服補劑延至秋間始延孟英視之脅痛畏風周身絡脹時欲敲撲食少便難日哺微有寒熱脈來弦澀而數右寸關弦軟以滑是升降之令久窒痰邪襲於隧絡將斷語與脈證合參便知審病之法關格之勢將成再四求治與沙參茹貝薇蒿旋斛梔楝蘭草枇杷葉絲瓜絡冬瓜子蘆根茅根等出入為方服之寒熱既蠲脅痛亦減雪山大喜復請診之脈頗轉和第肝陰久為謀慮所傷最怕情志不怡必生枝節小愈奚足為恃囑其另邀明眼圖之渠即招沈辛甫顧聽泉吳卯君任心柏諸君商之方案皆與孟英相合雪山轉懇孟英設法且云讀君之案洞徹病情僥幸成全足感再生之德即使無效我亦瞑目而亡孟英感其言殫竭心力以圖久延無如嗔怒縈思諸多棖觸頻有轉關屢生枝節大便必極捶背尻而始解上則吐痰惡谷果成關格之候肩至伊子旋杭惑於讒言翻以竹茹竹瀝為藥性太涼而以不用溫補為謗求乩方徑以麻黃細辛鹿角等藥投之遂至舌色乾紫津涸而亡不知者未免以成敗論所謂道高謗多然柿餅湯投於年餘未病之前其卓見已不可及而見危受命勉力圖維腸熱心孤更可欽也特採其案以為世之有識者鑑焉此證即葉氏所謂下竭上結之候也葉氏雖有方案亦未知果能取效否不知古名家遇此當作何治法方書中迄無及者孟英此案已是開人不敢開之口至其悉當病情與否則殊未敢輕論也暈眩一老廣文俸滿來省驗看患眩暈醫謂上虛進以參耆等藥因而不食不便煩躁氣逆孟英診曰下虛之證誤補其上氣分實而不降先當治藥然後療病與梔豉芩桔枳橘菀貝一劑粥進便行嗣用滋陰息風法而愈王雪山令媳患心悸眩暈廣服補劑初若甚效繼乃日劇時時出汗肢冷息微氣逆欲脫灌以參湯稍有把握延逾半載大費不資莊之階舍人令延孟英診視脈沉弦且滑舌絳而有黃膩之苔口苦溲熱汛事仍行病屬痰熱轇輵誤補則氣機壅塞與大劑清熱滌痰藥吞當歸龍薈丸服之漸以向安痰熱體實者此丸須有殊功仲夏即受孕次年二月誕一子惜其娠後停藥去痰未盡娩後復患悸暈不眠氣短不飢或作産後血虛治不效仍請孟英視之脈極滑數曰病根未刈也與蠲痰清氣法果應比邱尼心能體厚蹣跚偶患眩悸醫以為虛久服溫補漸至發腫不飢仲夏延孟英視之脈甚弦滑舌色光絳主清痰熱盡撤補藥彼不之信仍服八味等方至季夏再屈孟英診之脈數七至眠食盡廢不可救藥矣果及秋而茶毗胡秋谷令愛年甫笄往歲患眩暈孟英切其脈滑作痰治服一二劑未愈更醫謂虛進以補藥頗效渠信為實然今冬復病徑服補藥半月後眠食皆廢聞聲驚惕寒顫自汗肢冷如冰以為久虛欲脫乞援於孟英脈極細數陰已傷矣目赤便祕胸下痞塞如柈力辨其非虛證蓋痰飲為患乍補每若相安具隻眼者始不為病所欺也投以旋赭茹貝蛤殼花粉桑梔蔞薤連枳等藥數服即安而暈不能止乃去赭薤蔞枳加元參菊花二至三甲之類服匝月始能起榻痰火為患十人常居八九而醫書所載皆治寒痰之法十投而十不效今得孟英大闡治熱痰之法真可謂獨標精義矣曹稼梅令愛患眩暈脘痛筋掣吐酸渴飲不飢咽中如有炙臠朱某與溫胃藥病日劇孟英診脈弦滑投茹貝萸連旋赭梔楝枳郁雪羹之藥和肝開鬱清痰十餘劑始愈王瘦石令郎遲生年未冠而體甚弱夜夢中忽如魘如驚肢搖目眩雖多燃燈燭總然黑暗醒後納食如常月一二發乃父以為憂而商於孟英脈之弦細而澀曰真陰不足肝膽火炎所致耳令服神犀一月病遂不發繼與西洋參二地二冬三甲黃連阿膠甘草小麥紅棗熬膏服之竟刈其根逾年完姻癸丑已生子矣厥秋初家慈猝僕於地急延孟英診之脈浮弦以滑用羚羊角膽星牡蠣石菖蒲丹參茯苓鉤藤桑葉貝母橘紅蒺藜等以順氣蠲痰息風降火而痊癸卯春前數日忽作欠伸而厥孟英切脈微弱而弦曰病雖與前相似而證則異矣以高麗參白朮何首烏山茱萸枸杞桑椹石斛牛膝蒺藜橘紅牡蠣等鎮補攝納以瘳豫謂此等證安危在呼吸之間觀前後卒僕數案可見其辨證之神雖古人不多讓況世俗之所謂醫乎家慈兩次類中豫皆遠出微孟英吾將焉活感銘五內聊識數言惟願讀是書者體其濟世之心臨證得能如是將胥天下之沉疴而盡起矣牙行王炳華室夏患臂痛孫某曰風也服參耆歸芍數帖臂稍愈而脘痛孫曰寒也加以附桂痛不止而漸覺痰多孫曰肝腎不足也重用熟地枸杞令其多服取效不料愈服愈劇漸至昏厥孫尚以為藥力之未到病體之久虛前方復為加重甚而時時發厥始請孟英診之脈沉而有弦滑且數之象乃謂炳華曰此由過投溫補引動肝風煽其津液為痰痰復乘風而上此暈厥之由來也餘波則奔流經絡四肢因而抽搐陽氣盡逆於上宜乎鼻塞面浮濁氣不能下達是以便滯不飢炳華曰神見也溫補藥服幾三月矣不知尚可救乎孟英曰勿疑吾藥猶有望焉遂與大劑甘寒息風化飲佐以涼苦泄熱清肝厥果漸止各恙遞蠲兩月後康復如常豫偶於舊書中檢得無名氏鈔本一册所録多岐黃之言內一條云附桂回陽在一二帖之間萬一誤投害亦立至功過不掩其性之毒烈也概可見矣奈世人不知藥為治病而設徒以貪生畏死之念橫於胸中遂不暇顧及體之有病無病病之在表在裡但聞溫補之藥無不欣然樂從者模稜之輩趨競存心知其死於溫補而無怨悔也乃衣鉢相傳不必察其體病脈證之千頭萬緒僅以溫補之品二十餘味相迭為用即成一媚世之方且托足金匱之門摹擬腎氣之變蓋知熟地之陰柔可縛附桂之剛猛誤投不至即敗偶中又可邀功包藏禍心文姦飾詐何異新莽比周公子云學孔聖哉人以其貌古人而口聖賢也多深信而不疑逮積薪既厚突火頓燃雖來爛額焦頭之客其不至於焚身者幸矣較彼孟浪之徒誤投純陽藥致人頃刻流血而死者其罪當加十等誅心之論救世之言知我罪我不遑計焉孟英見之拜讀千過且曰剿漢學以欺世由來久矣徐靈胎之論無此透徹可與退之原道文並峙當考其姓字於仲景先師廟內建護聖祠以禮之豫謂孟英如此稱許則其可傳也奚疑故附刊此案之後以證王氏婦溫補藥服及三月即所謂陰柔束縛剛猛之故致人受其愚而不覺者後之人可以鑑矣孟英治其令弟季傑之簉室因夜間未寐侵晨飲酒解寒適見人爭誶即覺心跳欲吐家人疑其醉也而欲吐不出氣即逆奔如喘且肢麻手握語言難出又疑為急痧而欲刺之孟英聞而視之脈象弦駛曰夜坐陽升飲醇則肝陽益浮見人爭誶是驚則氣更上逆不可刺也灌以蘇合香丸一顆下咽即瘥此當是痰閉氣結之故蘇合丸辛香通氣故愈若是肝浮氣逆益以香竄之藥安能愈乎沈新豫令嶽母陡患昏厥速孟英視之病者樓居酷熱如蒸因曰此陰虛肝陽素盛之體暑邪吸入包絡亟宜移榻清涼之地隨以紫雪丹一錢新汲水調下可安而病者自言手足已受縲紲堅不肯移家人驚以為祟聞而束手孟英督令移之如法灌藥果即帖然朱湘槎令郎留耕忽於飽食後大吐而厥冷汗息微急延孟英視之厥甫回而腹痛異常口極苦渴二便不行脈來弦緩乃痰滯而熱伏厥陰肝氣無從疏泄也投雪羹梔楝元胡蓯蓉萸連橘核旋覆竹茹蔔汁之藥一劑痛減再服便行而愈張伯虎紀綱李貴患感數日忽然昏厥比沿途追求孟英往視業已薄暮主人謂自朝至此一息奄奄恐不及灌藥矣實不便屈診孟英曰余既來且視之見其面色灰黯戴眼口開按其脈尚不絶與菖蒲膽星竹茹旋覆等為劑和入童溺調以牛黃至寶丹灌之覆杯而起諸血範慶簪年逾五十素患痰嗽乙酉秋在婺驟然吐血勢頗可危孟英診曰氣虛而血無統攝也雖向來咳嗽陰虧陰藥切不可服然非格陽吐血附桂更為禁劑乃以潞參耆朮苓草山藥扁豆橘皮木瓜酒炒芍藥為方五帖而安繼去甘草木瓜加熟地黃黑驢皮膠紫石英麥冬五味子龍骨牡蠣熬膏服之全愈亦不復發後範旋里數年以他疾終邵子受令壺患吐血肌膚枯澀口渴脈虛大孟英曰氣分之陰虧也溫補既非滋填亦謬以參耆二冬知母百合萎蕤石斛桑葉枇杷葉投之而愈用補亦要用得其宜方能奏效非一味蠻補即能愈疾也案中諸法可以為法鄭某吐血盈碗孟英脈之右關洪滑自汗口渴稍一動搖血即上溢人皆慮其脫意欲補之孟英曰如脫惟我是問與白虎湯加西洋參大黃炭一劑霍然顧石甫宰婁縣患恙醫治日劇解任歸求診於孟英脈見左寸如鉤曰病不能復矣許子雙適至聞而疑之謂此證氣逆血溢腹脹囊腫宛似上年康康侯之疾若以外象觀之似較輕焉胡彼可愈而此勿治耶孟英曰彼為邪氣之壅塞脈雖怪而搏指不撓證實脈亦實也此為真氣之散漫脈來瞥瞥如羹上肥而左寸如鉤是心之真臟見矣壅塞可以疏通散漫不能收拾客邪草木能攻神病刀圭莫濟證雖相似病判天淵縱有神丹終無裨也季春果歿孫氏女年將及笄久患齒衄多醫莫療孟英診曰六脈緩滑天癸將至耳與丹參生地桃仁牛膝茯苓白薇滑石茺蔚子一劑知數日愈亦治倒經之法尋即起汛略無他患鎖某弱冠吐血楊醫連進歸脾湯吐益甚孟英視之面有紅光脈形豁大因問曰足冷乎探之果然遂與六味地黃湯送飯丸肉桂心一錢覆杯而愈此虛火上炎之證歸脾中參耆性皆上升故吐益甚易以引火歸原之法斯愈矣孫執中於春前四日忽患鼻衄如注諸法莫塞夤夜請孟英視之脈弦而數曰冬暖氣泄天令不主閉藏今晚雷聲大振人身應之肝陽乃動血亦隨而上溢不可以其體肥頭汗畏虛脫而進溫補也投以元參生地犀角牡蠣知母生白芍牛膝茯苓側柏葉童溺諸藥一劑知二劑已既而脅痛流乳人皆異之孟英與甘露飲加女貞旱蓮龜板鱉甲牡蠣而瘳一男子患便血醫投溫補血雖止而反泄瀉浮腫延及半年孟英診之脈數舌絳曰此病原濕熱溫補翻傷陰液與芩連梔芍桑葉丹皮銀花石斛楝實冬瓜皮鱉甲雞金等藥旬余而愈丁未春金朗然令堂陡吐狂血肢冷自汗孟英切脈弦澀察血紫黯乃肝鬱凝瘀也證雖可愈復發難瘳與丹參丹皮茺蔚旋覆苓梔柏葉鬱金海虴之方覆杯果愈然不能懲忿逾二年復吐竟不起戊申元旦陳秋槎參軍大便驟下黑血數升血為熱迫而妄行繼即大吐鮮紅之血而汗出神昏心無血養故神昏肢冷搐溺肝無血養故痙厥躁亂妄言速孟英至舉家跪泣救命察其脈左手如無右弦軟虛在陰分按之數熱在氣分以六十八歲之年僉慮其脫參湯煎就將欲灌之孟英急止勿服曰高年陰分久虧肝血大去而風陽陡動殆由忿怒兼服熱藥所致耳其夫人云日來頗有鬱怒熱藥則未服也惟冬間久服薑棗湯且飲都中藥燒酒一瓶耳孟英曰是矣以西洋參犀角生地銀花緑豆梔子元參茯苓羚羊茅根為劑衝入熱童溲灌之外以燒鐵淬醋令吸其氣龍牡研粉撲汗生附子搗貼湧泉穴引納浮陽兩服血止左脈漸起又加以龜板鱉甲介以潛陽法服三帖神氣始清各恙漸息稍能啜粥乃去犀羚加麥冬天冬女貞旱蓮投之眠食日安半月後始解黑燥矢兩旬外便溺之色皆正與滋補藥調痊仍充撫轅巡捕矍鑠如常秋間赴任紹興酉秋以他疾終蒲艾田年逾花甲陡患鼻衄諸法不能止速孟英救之面色黑黯而有紅光脈弦洪而芤詢知冬間廣服助陽藥是熱亢陰虛之證與大劑犀角元參茅根女貞旱蓮石斛茯苓澤瀉天冬知母投匕而安續豫滋陰藥填補而康沈悅亭令正齒衄五日不止去血已多諸方不應孟英脈之弦滑上溢投犀角澤蘭元參旋覆生地花粉茯苓牛膝桃仁澤瀉而安既而詢其經事本月果已愆期蓋即逆行之候也繼用滋陰清熱乃漸康復謝再華室素患肝厥孟英於癸卯歲授藥一劑六載安然今夏偶患齒衄繼漸臭腐頭痛汛阻徹夜無眠蓋秦某作格陽證治進以腎氣湯數服而致劇也孟英與大劑神犀湯加知柏旬日而瘳王子能參軍令正久患吐血醫不能愈延孟英視之脈弦滑而搏指右手較甚渴喜冷飲米穀礙於下咽小溲如沸夜不成眠久服滋陰毫無寸效孟英以葦莖湯合雪羹加石膏知母花粉枇杷葉竹茹旋覆滑石梨汁大劑投三十劑而痊繼而參軍旋省患久積憂勞真陰欲匱竟難救藥尋果仙遊便血至三十餘年且已形瘦腰疼嗽痰氣逆似宜溫補之法矣而嘉定沈醞書患此瀕危求孟英以決歸程之及否比按脈弦數視舌苔黃詢溺短赤曰痔血也殆誤於溫補矣肯服吾藥旬日可瘳醞書欣感力排衆論徑服其方果不旬而愈方用葦莖合白頭翁湯加枇杷葉旋覆花側柏葉藕是肅肺祛痰清肝涼血互用也徐靈胎批葉案云便血無至十餘年者惟痔血則有之今便血三十餘年不問可知為痔血矣惟徐氏未嘗出方孟英此案足為程式孟英治其令弟季傑之簉室懷妊患嗽嗽則鼻衄如噴憎寒乍熱口渴頭疼右脈洪數授白虎湯合蔥豉投匕而瘳或云時已隆冬何以徑投白虎孟英曰脈證如是當用是劑況今年自夏徂冬亢旱不雨寒雖外束伏熱蘊隆此即麻杏甘膏之變法耳關琴楚令孫少西年三十四歲素善飲夏間已患著枕即嗽諱而不言家人未之知也逮秋髮熱嘔吐腹痛伊父母以為痧也諸痧藥遍投之尋即氣衝咳嗽血湧如泉不能稍動動即氣湧血溢沈某但知其素稟陰虧遽從滋補服後益劇遲孟英診焉脈弦洪而數曰雖屬陰虛但飲醇積熱於內暑火外侵而加以治痧丹丸無不香竄燥烈誠如火益熱矣亟當清解客熱昔孫東宿治族侄明之一案與此略同必俟熱退血止再為滋養知所先後則近道矣病家素畏涼藥而滋補又不應遂求乩方服之藥甚離奇並木鱉麝香亦信而不疑旬日後血已吐盡氣逆如奔不寐形消汗多熱壯再乞診於孟英已不可救藥矣秀水懷某三十五歲自春前偶失血一日嗣即頻發所吐漸多延至季冬聘余往視左脈虛弦而數右軟大氣逆自汗足冷麵紅夜不成眠食不甘味音低神憊時欲嘔酸此由心境不怡肝多怫鬱而脈候如斯有氣散血竭之虞堅欲返棹然既邀余至不得不勉寫一方聊慰其意而病者強作解事反以所疏舒郁之品為不然執意要用五味山萸薑桂之類性情剛愎此病之所由來而執迷不悟更為速死之道矣既而其妻出診脈至弦細頂癬頭疼心悸帶多不飢五熱亦是水虧木旺退而謂其所親曰茲二人何郁之深耶始知其無子欲買妾而妻不許遂以反目成病及病成而妻乃憂悔交縈因亦致疾此與曩視省垣顧金城之病同因家擁巨資故壯年即慮無子亦可謂欲速不達矣而愚婦不知大計徑為一妒字以致潰敗決裂此時雖亟為置妾亦無濟矣即以身殉亦何益乎録之以垂炯戒一少年久患內熱鼻衄齦宣溺赤便艱睛紅口渴熱象畢露因陽萎經年醫者但知為陽虛之證而不知有因熱而萎之病遂進溫補其熱愈熾父母不知為之畢姻少年大窘求治於余脈滑而數曰無傷也與元參丹皮知柏薇梔石菖蒲絲瓜絡沙參蛤殼竹茹服六劑來報昨夜忽然夢遺余曰此鬱熱泄而陽事通矣已而果然諸痛金某久患脘痛按之漉漉有聲便閉溲赤口渴苔黃杳不知飢絶粒五日諸藥下咽傾吐無餘孟英察脈沉弱而弦用海虴荸薺各四兩煮湯飲之徑不吐痛亦大減繼以此湯煎高麗參黃連楝實延胡梔子枳椇石斛竹茹柿蒂等藥送服當歸龍薈丸旬日而安續與春澤湯調補收績蓋其人善飲而嗜瓜果以成疾也此肝氣挾停飲上逆也緣素嗜瓜果胃陽久傷故於平肝滌飲之中加參以扶胃氣單小園巡檢患右脅痛醫與溫運藥病益甚至於音瘖不能出聲仰臥不能反側坐起則氣逆如奔便溺不行湯飲不進者已三日矣孟英診其脈沉而弦與旋覆赭石薤白蔞仁連夏茹貝枳實紫菀加雪羹服之一劑知數劑愈一婦患帶下腰疼足心如烙不能移步孟英投大劑甘露飲而瘳某媼年六十餘患腰腿串痛聞響聲即兩腿筋掣不可耐日必二三十次臥榻數載諸藥罔效孟英察脈沉弦苔膩便祕亦廣服溫補而致病日劇也與雪羹羚楝膽星橘絡竹瀝絲瓜絡吞礞石滾痰丸及當歸龍薈丸四劑大瀉數十次臭韌異常筋掣即已乃去二丸加梔連羊霍服六劑即健飯而可扶掖以行矣此人初病必系血虛不足以養肝因妄服溫補以致積痰蘊熱膠固不開孟英治法亦是救藥誤為多愈後必繼以滋養血液之藥方收全功姚令輿令郎瘄後兩腿筋掣臥則更痛幼科作風治而愈劇不通孟英以犀角生地木通豆卷葳蕤桑枝丹皮梔子絲瓜絡投之而效此疹後血為熱毒所耗不足以養肝也與前證大略相同特未受溫補之纍耳徐氏婦重身而患四肢疼痛不可屈伸藥之罔效或疑為癱瘓任殿華令其舍專科而質於孟英診曰暑熱入於隧絡耳吾室人曾患此余以桑枝竹葉扁豆葉絲瓜絡羚羊豆卷知母黃芩白薇梔子者照方服之果即得愈吳天士醫驗録有寒中經絡之證與此正相對待可見病證有寒即有熱不可執一而論也吳沄門年逾花甲素患脘痛以為虛寒輒服溫補久而益劇孟英診曰肝火宜清彼不之信延之仲夏形已消瘦倏然浮腫脅背刺痛氣逆不眠心辣如焚善嗔畏熱大便時瀉飲食下咽即吐諸醫束手乃懇治於孟英脈弦軟而數與竹茹黃連枇杷葉知母梔楝旋赭等藥而吐止飲食雖進各恙未已投大劑沙參生地龜板鱉甲女貞旱蓮桑葉丹皮銀花茅根茹貝知柏枇杷葉菊花等藥出入為方二三十劑後周身發疥瘡而腫漸消右耳出黏稠膿水而瀉止此諸經之伏熱得以宣泄也仍以此藥令其久服逮秋始愈冬間能出門矣所現諸證俱屬痰熱與弦數之脈相合但軟則根柢不堅初方乃急則治標之法次方乃顧及根本亦不易之次第也陳春湖令郎子莊體素弱季秋患腹痛自汗肢冷息微咸謂元虛欲脫孟英診之脈雖沉伏難尋痛脈多沉而苔色黃膩口乾溺赤當從證也與連朴楝梔元胡蠶砂醒頭草等藥而康次年患感復誤死於補又夏醞泉延孟英視錢嫗腹痛欲絶證因見弦滑之脈與當歸龍薈丸而安朱湘槎令媳患小溲澀痛醫與滲利反發熱頭疼不飢口渴夜不成眠孟英診之脈細數乃陰虛肝鬱化熱生風津液已爍豈容再利與白薇梔子金鈴知母花粉紫菀麥冬石斛菊花服之即愈愈後仍當以滋陰善後其侄新泉之室懷娠患痢醫投溫燥止澀腹痛甚而遍身發黃飲食不思孟英視之暑濕也與芩連銀花茅根桑葉梔楝竹葉茵陳冬瓜皮而愈吳醞香大令仲媳汛愆而崩之後脘痛發厥自汗肢冷孟英脈之細而弦滑口苦便澀乃素體多痰風陽內鼓雖當崩後病不在血與旋赭羚茹枳貝薤蔞蛤殼為方痛乃漸下厥亦止再加金鈴延胡蓯蓉鼠矢服之而愈逮季冬因卒驚發狂笑罵不避親疏孟英察脈弦滑而數與犀羚元參丹皮丹參梔子菖蒲竹葉鱉甲竹瀝吞當歸龍薈丸息風陽以滌痰熱果數劑而安然平時喜服補藥或有眩暈不知為風痰內動益疑為元氣大虛孟英嘗諫阻之而彼不能從至次年季春因傷感而狂證陡發毀器登高更甚於昔孟英視之苔黑大渴與前方加真珠牛黃服之苔色轉黃弦滑之脈略減而狂莫可制改以石膏硃砂鐵落菖蒲青黛知母膽星鱉甲金鈴旋覆元參竹瀝為大劑送礞石滾痰丸四服而平繼而腳氣大發腹痛便祕上衝於心肢冷汗出昏暈欲厥與連楝梔茹小麥百合旋貝元胡烏藥雪羹石英鼠矢黃柏藕等藥而安凡藥中用硃砂者宜另研沖服不可同入煎劑謝譜香素屬陰虧情志抑鬱因遠行持重而患咳逆左脅刺痛寸步難移杳不知飢臥難著枕延孟英診之脈象弦細軟數苔膩痰黏便難溲少乃腎氣不納肝氣不舒肺氣不清胃氣不降投以沙參枇杷葉茹貝旋梔龜板鱉甲絲瓜絡瓜冬子青鉛白前金鈴藕肉而以熟地湯煎服數劑而平繼漸滋填向愈張月波令弟陡患腹痛適啖羊肉麵條之後醫皆以為食滯連進消導痛甚而渴得飲大吐二便不行又疑寒結疊投燥熱其病益加呻吟欲絶已四日矣孟英視之脈弦數苔干微黃按腹不堅以海虴一斤鳧茈一斤煎湯頻灌果不吐令將余湯煎梔連楝斛茹芩枇杷葉知母延胡柿蒂旋覆為劑吞龍薈丸投匕而溲行痛減次日更衣而愈謝譜香素體陰虛忽患環跳穴痛始而下及左腿繼而移於右腿甚至兩足轉筋上衝於腹間或痛自乳起下注於髀日夜呼號肢冷自汗略難反側醫見其血不華色輒投補劑逮仲春孟英自江西歸診脈弦軟微滑畏熱知飢溲赤便堅舌紅不渴乃陰虛而痰氣滯於厥陰也以蓯蓉鼠矢竹茹絲瓜絡橘核茴香湯炒當歸吳萸湯炒黃連川椒湯炒烏梅延胡湯炒楝實海虴鳧茈為劑一服即減數啜而安繼與虎潛加秦艽而起莊芝階舍人令愛孀居在室陡患氣衝欲厥脘痛莫當自服沉香吳萸等藥病益劇而嘔吐發熱略有微寒孟英按脈弦滑且數苔色滑膩微黃而渴喜冷飲便祕溲熱眠食皆廢是伏痰內盛肝逆上升而兼吸受暑熱也豫吳萸水炒黃連枳實竹茹栝蔞石膏旋覆赭石知母半夏雪羹服二劑吐止痛減五劑熱退而解猶不暢旬日始得豁然乃去石膏知母旋赭調之而愈儒醫何新之素患脘痛每日必吐水數缶始舒暢吐後啖麵食肉如湯沃雪第不能吃飯者十餘年矣季秋痛吐益甚飲食不進平肝通絡諸治不瘳人極委頓屈孟英視之脈弦滑而軟曰中虛停飲也以六君去甘草加桂枝厚朴牽牛服之積飲果下痛亦漸休吐止餐加精神稍振乃去牽朴加附子白芍慧仁與之遂愈且能吃飯病者謂既能吃飯善後藥不肯多服逮仲冬中旬出門診疾驟與嚴寒歸即痛作連服荔香散數日而逝蓋中氣素虛者不可專用香散之藥也許蘭嶼令正自夏間半産後患感證雖已治愈而腰腹左痛時作多醫雜治其痛日增食減汛愆臥床不起黃某謂諸藥無功惟有腎氣湯先固其根本頻服之痛益劇且痛作之時則帶下如注黃謂顯系真火無權附桂復為加重遂至痛無停晷呻吟欲絶陳春湖囑迎孟英診之左關尺弦數無倫形消舌赤徹夜無眠是腎陰大虧肝陽極熾營液耗奪八脈交虛之證也用龜板烏鰂蓯蓉枸杞歸身楝實竹茹白薇黃柏絲瓜絡蒲桃干藕為方一劑知數劑已續加熟地阿膠調理月餘經行而愈孫位申陡患喉偏左痛下及乳旁神疲欲臥動即凜寒速孟英視之脈弦細以軟苔薄白口不渴痰多且韌溺赤不飢是暑濕內伏而肝鬱不舒且陰分素虧復傷勞倦也昔人之清暑益氣湯藿香正氣丸皆是成法設誤投之悉為戈戟幸病家深信不疑旁無掣肘豫射干兜鈴蔞殼通草滑石竹茹絲瓜絡冬瓜子枇杷葉荷杆極輕清之藥一劑即吐膠痰數碗汗出周身喉痛較松凜寒亦罷而身痛微熱苔色轉黃去射干兜鈴加梔子豆卷服之熱退痛減再去滑石豆卷加石斛沙參野薔薇露投之知飢啜粥諸恙悉安嗣用養陰充液而愈乙巳秋拙荊年三十二歲忽患四肢痠痛早晚尤甚初謂其平素勞瘁所致己而日劇延醫治之以為痛風服藥不效單方針灸無不遍試至冬令漸難行走次年春山陰俞某作虛風治用參朮熟地桂附等藥文恐方熱減去附子服十餘劑遂手足拘攣不能屈伸日夜號痛如受炮烙眠食皆廢痰韌如石皮膚燥裂鱗起如松至夏更加兩腋腫核陰戶瘡糜痛不可支業師顧聽泉先生荊人之舅氏也求其援手云兩脈弦數舌絳無津況汛斷半年破䐃脫肉經言九候雖調猶屬不治危殆若此不能過夏至也因請孟英先生救之先生來視曰營分素虧陰液盡爍幸病在經絡猶可圖治第恐成廢耳授以西洋參元參生地天冬麥冬知母花粉銀花甘草葳蕤石斛絲瓜絡等藥出入為劑用竹瀝梨蔗諸汁和服酷暑之時則加生石膏西瓜汁文遵方恪服計燒瀝之竹四五十竿榨漿之蔗七八十枝搗汁之梨五六十斤絞汁之瓜三四十枚果痛漸以減瘡漸以平膚漸以蛻食漸以增仍溉以涼潤生津兼佐熟地枸杞歸身之類服至兩載月事乃行又半年肌肉漸充手足亦能舒展聞者無不驚異今則形神如昔步履雖未能如常已可坐轎出門是證也不遇先生必致夭枉既銘諸心復録之以為後人鑑錢塘張文輝月卿謹識病人久臥床蓐則腰臀磨穿內經謂之破䐃俗呼痎瘡是也最為難治孟英令人於初起時即用廣東羊皮金貼之甚效然此等隹案前未收輯今張君聞有三編之輯附録於此益信遺珠不少也許蘭嶼令正素屬陰虧舌常脫液季秋患脘下疼脹得食愈甚映及脅背宛如針刺稍閣眼則心掣動而驚寤自按痛處則湧水苦辣渴不欲飲溲少神疲自疑停食服楂曲而益劇孟英視脈弦軟曰此停飲也飲停則液不能上故口渴而飲即水也內有停水故不喜飲其舌上脫液雖屬陰虛亦由飲隔寐即心掣者水凌火也得食痛加者遏其流也以苓澤橘半旋蛤連虴加生薑衣投之溲行得睡惟晚食則脘下猶疼疼即心熱如火且面赤頭痛腿冷腰痠必俟脘間食下則諸恙皆平孟英曰此停飲雖蠲而肝火升也宜參潛養為治矣改授沙參蓯歸竹茹楝柏石決明絲瓜絡薑汁炒梔子少佐生黃連服之遂愈疝金元章年逾七旬久患疝厥每病於冬以為寒也服熱藥而暫愈終不能霍然孟英診曰脾腎雖寒肝陽內盛徒服剛烈焉能中肯以參朮枸杞蓯蓉茴香當歸菟絲鹿角霜桂茯苓楝實黃連吳萸橘核等藥為方服之今數年無恙矣便濁呂慎庵云余於去冬行路過勞兩足劇痛調治至今年春杪似覺小效而陰頭覺冷因食牛骨髓以冀收功遂患便濁莖中梗澀時欲小溲腰脊板痛俯不能仰清心益腎之品備嘗無效秋初舵舟直詣潛齋請診孟英先生曰膽經鬱火未清所服牛髓壅氣助火是猶適燕而南其指矣爰定沙參四錢直生地六錢淡當歸一錢女貞三錢旱蓮三錢鹽川柏一錢酒龍膽八分生薏仁四錢川楝肉錢半絲瓜絡錢半生甘草梢六分砂仁八分研沖一方服十劑溺澀巳減腰足猶疼請改方先生以沙參四錢生地六錢淡歸身錢半絡石四錢柏子霜三錢淡蓯蓉肉一錢酒川柏一錢川楝肉錢半鮮竹茹三錢藕汁一杯和服為劑亦服十數帖證去八九而小溲猶渾有穢氣先生令以虎潛丸料熬成膏藕粉和杵為丸服至三料小溲清暢粗健如常是證也歷半載有餘屢訪前輩證治未有毅然直指病源如先生者獲痊後銘感無既隔垣之視允宜垂世敢贅數言以備採輯遺精一少年驟患遺精數日後形肉大脫連服滋陰澀精之藥如水投石孟英與桂枝湯加參耆龍牡服下即效匝月而瘳此陽浮於上陰孤於下故非滋陰澀精所能治仲景桂枝龍骨牡蠣湯能調和陰陽收攝精氣又復參耆以健其中故取效甚速屠某患夢遺久治不愈耳出膿水目淚難開肩脅胸背痠疼微有寒熱食減神疲孟英察脈左弦數右虛軟以三才封髓加龍牡黃耆桑丹梔菊旬日而瘳殳某久患寒熱精遺自汗能食神疲肌肉漸瘦詣孟英診之脈大微弦豫黃耆建中加參歸龍牡而瘥便祕沈東屏年愈八秩患腹脹便祕孟英診曰耄年脈實天異獨厚證屬陽結法宜清火與四洋參石膏白芍知母花粉桑皮杏仁橘皮枳殼甘草送更衣丸四劑而愈設投別藥勢必遷延而敗人亦謂其天年之得盡斷不料其藥治之誤也後四年始歿夏間汪湘筠明府因食肉病脹醫謂老年氣弱火衰輒投溫補直至腹如抱甕始延孟英視之彌留已極不可救藥矣張孟皋少府令堂年逾古稀患氣逆殿屎躁煩不寐孟英切脈滑實且便祕面赤舌絳痰多以承氣湯下之霍然逾年以他疾終黃履吉患痛吐孟英已為治愈仲冬復發他醫藥之已七日不進谷矣二便祕澀形肉遽消再托孟英診之與旋赭茹苓萸連柿蒂楝實延胡等藥一劑知三劑愈畢方來室患痰嗽礙眠醫與補攝而至涕淚全無耳閉不飢二便澀滯干嗽無痰氣逆自汗孟英切脈右寸沉滑左手細數而弦乃高年陰虧溫邪在肺未經清化率為補藥所錮宜開其痹而通其胃與蔞薤紫菀兜鈴杏貝冬瓜子甘桔旋茹之劑而安逾二年以他疾終亦少善後之法運糧千總馬香谷患溺祕欲死所親趙春山司馬延孟英視之脈堅體厚口渴苔黃投知柏梔楝犀菀蔞茹之藥送當歸龍薈丸而瘳竟不復發阮範書明府令正患腹痛欲厥醫見其體甚弱也與鎮逆通補之法而勢日甚孟英察脈弦數左溢是因忿怒而肝陽勃升也便祕不飢口苦而渴與雪羹梔楝旋絳元胡丹皮茹貝下左金丸而愈逾年以他疾歿於任所吳薇容太史令堂患痰嗽喘逆便祕不眠微熱不飢口乾畏熱年逾六旬多藥勿痊孟英切其脈右寸關弦滑而浮左關尺細軟無神是陰虛於下痰實於上微兼客熱也攻補皆難偏任與茹貝旋斛浮石蘆根冬瓜子枇杷葉杏仁花粉為劑而以熟地泡湯煎服則濁藥輕投清上滋下是一舉兩全之策也投匕果應再服而大便行漸次調養獲瘳戌春患感證比孟英自江西歸已不能治矣海鹽任斐庭館於關琴楚家季夏患感黃某聞其身熱而時有微寒也進以薑萸柴棗等藥數帖熱愈壯而二便不行更醫連用滲利之劑初服溲略通既而益祕居停以為憂始延孟英視焉證交十四日骨瘦如柴脈弦細而澀舌色光紫滿布白糜夜不成眠渴不多飲粒米不進少腹拒按勢將喘逆雖屬下證而形脈如斯法難直授先令取大田螺一枚外治法甚妥鮮車前草一握大蒜六瓣共搗爛加麝香少許罨臍下水分穴方以元參紫菀梔子知母花粉海虴鳧茈蓯蓉牛膝天冬為劑加鮮地黃汁服之其夜小溲即行氣平略寐又兩劑大解始下退熱而漸進稀糜乃去雪羹梔菀蓯蓉膝地黃汁加西洋參麥冬石斛乾生地竹茹銀花等藥又服十餘劑凡三解黑矢而舌色復於紅潤眠食漸安而起矣高氏婦因戒鴉片而服外洋丸藥諸無所苦惟便祕不通醫治兩月迄不能下且仍安穀而面赤齦脹欲挑每以銀針嵌入齒縫而拔出之時銀色已如煤黑孟英診脈滑數豫犀角石膏硝黃升麻蜣螂為劑解毒妙品和以鮮銀花汁一杯服後夜間登圊三四行而病去及半再豫清解化毒而痊屠小蘇令正自乳經停泛泛欲吐或疑為妊所親高嘯琴進以養陰之藥漸致時有微熱脘悶不飢氣逆嗽痰臥難著枕二便祕澀耳閉汗頻孟英脈之虛軟而澀曰根蒂素虧經停乳少血之不足泛泛欲嘔肝乘於胃率投滋膩窒滯不行略受風邪無從解散氣機痹塞九竅不和先以蔥豉通草射干兜鈴杏仁蔞殼枇杷葉白蔻開上兩劑熱退次用小陷胸合雪羹加竹茹旋覆白前紫菀宣中三劑便行安穀繼豫冬蟲夏草蓯蓉當歸枸杞麥冬紫石英楝實熟地牛膝滋下而瘳金願谷中翰患便祕廣服潤劑糞黑而堅如彈丸必旬余始一更衣極其艱澀孟英診脈遲軟舌潤不渴小溲甚多乃久患痹證坐臥不安健運迂遲法宜補氣俾液濡布所謂中氣足則便溺如常矣非涼潤藥所能治也豫大劑參朮橘半加旋覆花以旋轉中樞雞䏶胵以宣通大腸之氣雞不溺而糞易下也更仿金匱谷實之例佐血餘蓯蓉俾為流通府氣之先導如法服之數日即解且較暢潤至三十劑其病若失吳奏云三令郎甫八齡患感幼科治以清解弗瘥迓孟英視之脘悶便祕曰氣機未展耳投小陷胸加紫菀通草杏仁服三劑先戰汗而解尋更衣以愈當戰解之時家人不知詫為將脫欲煎參湯灌之孟英適至阻其勿服既而其婦弟陳某之病略相似亦用此法而痊王子庵令堂年已古稀患便祕不舒時欲拿掙汗出頭暈醫謂其肝氣素滯輒與麻仁丸等藥其勢孔亟伊壻陳載陶屈孟英診之脈虛弦而弱是虛風祕結豫人參蓯蓉當歸柏子仁冬蟲夏草白芍枸杞楝實胡桃仁數帖而痊次年秋患脘痞疼脹醫者率進溫補香燥之藥馴致形消舌絳氣結津枯始延孟英視之不及救矣管君芝山拉余治其表嫂吳媼年五十五歲上年仲夏患癃二十餘日愈後小溲迄未通暢已成錮疾今秋分後溺祕不行醫療旬余溫如薑桂烏藥涼如梔芩黃柏利如木通滑石皆不效甚有用益智等以澀之者漸至腰腹皆脹而拒按胸高腿腫不飢不食大便不通小便略滴幾點熱痛異常舌絳無津渴喜沸飲而不敢多啜以增脹滿呻吟待斃脈軟而微乃陰虛氣化無權也以沙參熟地連蔞芩澤麥冬紫菀牛膝車前加附子一錢桂心五分煎成冷服一周時溺出桶許而大便隨行進粥得眠口苦而喜涼飲即去附子桂連蔞菀膝加知柏芍藥砂仁數帖而起緣境窘不復調理錮疾聞猶存也角里街怡昌燭鋪蘇嫗年已六旬偶患腹痛醫謂寒也進以熱劑痛漸劇而腹脹便閉按之甚堅又以為腸癰攻之而愈痛遂絶粒不眠呼吸將絶挽余視之豚滑而數舌絳苔黃口臭溺無熱阻氣也以雪羹煎湯調益元散五錢徐灌之即痛減氣平次日以雪羹湯送當歸龍薈丸三錢便行溺暢隨以輕清藥數帖而痊妊娠孟英邃於醫學從不侈談脈理足以見其欿然不自足也而脈理之最不易切者莫如妊娠豫聞孟英於乙未春診黃履吉室人之脈曰妊也是月天癸猶來人皆不以為然次月仍轉但不多耳復邀孟英診之曰果妊也汛不斷者蔭胎之血有餘耳逾月汛復行覺更少矣人猶以為妄也四月後經始停娠亦顯娩如期人始服其見老丙申夏滿洲某選粵東鹽場攜眷之任過浙主於李雲臺家請孟英視其如君之恙孟英診曰非病也熊羆入夢矣某頗不信謂經甫停何以遽斷為孕而又必其為男乎反生言過其實之疑既而某延雲臺入幕偕赴粵任次年雲臺於家書中述及居停果得子深嘆孟英指妙豫荊人久無孕辛丑秋汛事偶愆孟英一診即以妊斷且以男許次夏果舉一子惜不育耳邵魚竹給諫仲媳懷妊孟英於寅春初診即許抱孫秋杪果應表弟胡壽者室偶有小忿經事澀少腰腹微脹自以為怒氣所滯也延孟英診之切其脈曰懷麟矣初猶疑之既而始信卯春果弄璋吳云階室年四十餘寅秋汛斷其腹日脹醫謂病也治之罔效迓孟英診之孕也彼猶不自信乃腹中漸動始服其言至期産一女癸秋孟英治石誦義室脘痛甫愈適汛逾期即曰娠矣既而果日形著其指下之神妙如此娠孕之脈最為難憑有初娠即現於脈者有三四月始現於脈者有始終不現於脈者此與憑脈斷證有時可憑有時不足憑同一至理豫嘗以此質之孟英孟英也以為然可見真學問人必不恃虛言以眩世也金畹香令媳半産後營分不攝淋漓數月治之勿瘳孟英於夏季診視兩尺皆浮左寸關弦與三甲二至二地蒿薇柏葉螵蛸黃柏為方服之漸愈仲秋診其脈即斷受孕渠謂懷娠必無病矣而不知病久初痊正須培養雖即受孕涵養無權果至仲冬而胎墮矣肝主疏泄腎主閉藏兩尺浮而不沉是腎失其閉藏之職矣左寸關弦是肝木太過獨行其疏泄之權矣填補腎陰即以涵養肝木加黃柏之苦以堅之螵蛸之澀以固之用藥如法故收效倍捷仁術志者海豐張君柳吟所題孟英之醫案也吾師趙菊齋先生暨莊舍人芝階為之序余以未與其事深以為歉秋間偶過孟英適有陳姓者牽羊來謝孟英頗疑之其人曰三月間次媳患時感而氣逆不能眠醫皆畏卻特延君診甫按脈云甚滑疾是為娠象用藥必須顧及此時次媳於去秋娩後月事尚未一行君為此言闔家未嘗不竊笑也逮疾漸平哺兒之乳亦不覺少雖自問亦斷斷非孕至六月間腹漸脹方謂有病不料昨日倏産一孫舉家敬服高明故來致謝耳孟英因謂余云昨診魏子恆之室亦妊也諸醫作虛損治脈雖虛微軟數而滑象仍形病家深不以吾言為然者緣病人之女兄二人皆死於虛勞也然其伯仲之證吾皆診焉今已十餘年矣猶憶伯字於關氏未嫁而卒證非不治亦為藥誤病中閲吾方案極為折服且曰先生來暮儂不能起矣前此延致諸名家徒曰虛證宜補而不治其所以虛方則群聚補藥必以地黃為之冠雖有參耆亦列於後即使用藥不乖而陽生陰長氣為血帥之旨尚未分曉況其他乎吾聞而愕然何以閨中女子亦解談醫細詢始知為乾隆間名醫吳穎昭先生之女孫也尤為惋惜仲適於陳少簾少府的系損證若季者因其家懷先入之見遂致醫人迎合誤事豈不可嘆逮秋仲果聞魏氏分娩母子皆亡方嘆孟英之卓見為不可及也爰採秋冬諸案之治法不同於尋常者而續成一卷云孫位申室平昔陰虛肝滯痛脹少餐暮熱形消咽疼喉癬不孕育者九年矣往歲汛愆人皆謂將不起而孟英切其脈尚不細膚猶淖澤許籌帶病延年之策果月事仍行而諸恙皆緩且能作勞惟飯食日不過合米今秋延孟英往診云經自三月至今未轉一切舊恙彌見其增君術雖仁恐難再延其算矣及舉脈弦滑左甚遽曰豈僅可延其算哉且有熊羆入夢矣其家聞之駭異逮季冬果得一子頗快而健胎前産後疑似極多號曰專科尚難措手陳肖岩孝廉媳屠仲如之女也汛愆一度次月仍行方疑其病也孟英診曰尺雖小弱來去緩和是娠也繼而果然仲如令弟子緣之室輕事稍遲孟英偶診亦以孕斷尋驗甫三月患胎漏適孟英丁內艱遂不克保而墮墮後惡露雖行而寒熱頭疼時或自汗且覺冷自心中出醫謂類瘧與溫化之藥病日甚交八日孟英始出門即延診之脈來沉實而數舌色紫黯乃瘀血為患耳豫桃仁澤蘭山楂茺蔚旋覆紅花丹參通草琥珀蛤殼絲瓜絡之劑服後腹大痛下瘀血如肺者一枚次日諸恙較減乳汁大流再以前方去通草加麥柏投之服後腹仍痛復下瘀塊纍纍而諸恙若失或問先生嘗言産後腹無痛苦者不可妄行其血此證惡露已行腹無疼脹何以斷為瘀阻而再行其血耶孟英曰正産如瓜熟蒂落諸經蔭胎之血貫串流通苟有瘀停必形痛脹墮胎如癰瘍未熟強擠其膿尚有未化之根柈不能一齊盡出所以胎雖墮而諸經蔭胎之血萃而未渙淺者雖出深者尚留況是血旺之軀加以溫升之藥挽其順流之路窒其欲出之機未到腹中脹疼奚作吾以循經通絡宣氣行瘀之法導使下行故出路始通而後腹痛瘀來然必有脈可徵非謂凡屬墮胎皆有是證也孟英諸案大抵救溫補之失故寒涼為多然斟酌盡善不以苦寒傷生氣則非他人所能學步也通血之劑亦清靈無弊張氏婦先於四月間患嘔吐醫以為寒疊進薑萸之藥致血溢自汗丐孟英診之脈甚滑按之不絶舌光無苔曰孕也詢其經事果愆兩度豫沙參枇杷葉生地蘆根連蘇旋斛之劑而安仲冬舉一男胎前即患痰嗽娩後招專科治之服四物湯增損多劑而氣逆礙眠嗽則汗出便溏遺溺口渴不飢再乞援於孟英脈洪大按之虛軟授沙參石英黃耆薏仁甘草牡蠣石斛茯苓小麥紅棗冬蟲夏草之方兩帖而汗收安穀四帖而渴減便堅旬余遂愈馮益三令正上年春汛偶愆頗露虛象群賢咸以為損余診為孕秋季果舉一男至丁巳春初産逾三月既不自乳汛亦未行偶感客邪醫療半月漸至不飢不食氣自少腹上衝似有聚瘕嘔惡腹痛面黃形瘦溲熱便溏口渴帶多面浮咳逆僉云己成蓐損復延余診脈滑而弦遂以孕斷與沙參蘇葉桑皮冬瓜皮黃芩枳殼石菖蒲白薇橘核楝實煎香連丸三服霍然後聞六月中旬産一女甚快調經吳馥齋令姐稟質素弱幼時鳳山診之許其不秀癸巳失其怙恃情懷悒悒汛事漸愆寢食皆廢肌瘦吞酸勢極可畏孟英以高麗參鹽水炒黃連甘草小麥紅棗百合茯苓牡蠣白芍旋覆花新絳等治之甘以緩之苦以降之酸以斂之皆古聖之良法也各恙漸已繼參歸地滋陰康強竟勝於昔赤山埠李氏女素稟怯弱春間汛事不行脅腹聚氣如瘕減餐肌削屢服溫通之藥至孟秋加以微寒壯熱醫仍作經閉治勢瀕於危乃母托伊表兄林豫堂措辦後事豫堂特請孟英一診以決之孟英切其脈時壯熱烙指汗出如雨其汗珠落於脈枕上微有粉紅色乃曰虛損是其本也今暑熱熾盛先當治其客邪庶可希冀急則治標之法疏白虎湯加西洋參元參竹葉荷杆桑葉及何醫至一籌莫展聞孟英主白虎湯乃謂其母曰危險至此尚可服石膏乎且本草於石膏條下致戒云血虛胃弱者禁用豈彼未之知也豫堂毅然曰我主藥與其束手待斃盍從孟英死裡求生之路耶遂服二帖熱果退汗漸收改用甘涼清餘熱日以向安繼與調氣養營陰宿瘕亦消培補至仲冬汛至而痊次年適孫𢵡伯之弟壬寅春邵小墀室患汛愆釋醫診以為妊廣服保胎藥漸至腹脹跗腫氣逆礙臥飲食不進入夏延孟英視之曰血虛氣滯誤補成脹也先以黃連厚朴山楂雞內金橘皮大腹皮枳實茯苓梔子楝實杏仁紫菀旋覆等藥少佐參術服之氣機旋運脹去食安先疏其滯以治其脹亦一定之法漸入滋陰養血之治數月經行而愈趙聽樵室高若舟之妹也去冬偶患脘痛黃某治之漸增頭疼眩暈氣逆嘔吐痰多不寐脘痛而過投香燥亦能致此證況誤投補乎便溏不食經事不行始謂其虛三月後又疑為娠諸藥遍試病日以進若舟延孟英脈之左弦而數右滑以駛曰病藥耳旬余可瘳趙疑大病小視不服其方越半月病者頸軟頭難舉醫謂天柱已倒勢無望矣若舟聞之復懇援於孟英疏方仍是前診之法趙問此病諸醫束手大劑補藥尚無寸效而君兩次用藥皆極清淡雖分兩頗重亦焉能有濟乎孟英曰子何愚耶藥惟對證乃克愈病病未去而補之是助桀也病日加而補益峻是速死也原彼初意非欲以藥殺人總緣醫理未明世故先熟不須辨證補可媚人病家雖死不怨醫者至老無聞一唱百和孰能挽此頽風令壺體質雖豐而陰虛有素是以木少水涵肝陽偏盛上侮於胃則為脘痛斯時投以酸苦泄肝甘涼養胃葉氏獨得之祕數日而愈矣乃溫補妄施油添火上肺津胃液灼爍無餘怒木直升樞機窒塞水飲入胃凝結為痰雖見證多端皆氣失下降豈可指眠食廢以為勞月汛爽而為妊耶豫以大劑輕淡之品肅清氣道俾一身治節之令肝膽逆升之火胃府逗遛之濁樞機郁遏之熱水飲凝滯之痰鹹得下趨自可向愈不必矯枉過正而妄以硝黃傷正氣所謂藥貴對證而重病有輕取之法非敢藐視人命故將疲藥塞責也趙極感悟投匕即效逾旬果安又一月經至嗣與滋養康復如常越二載又病復惑於黃某而孟英之功盡墮惜哉趙聽樵令妹每汛至則腹脹嘔吐肝氣逆腰脊痠疼肝血虛兩腿腫痛筋掣脘疼甚至痙厥多藥不效孟英以金鈴子散合左金加二陳竹茹枳實桂苓數劑而愈續用蓯蓉菟絲淫羊杜仲桑椹木瓜續斷香附歸芍茴楝調之養血不用地黃避其膩也斯為收用補之利而去其弊汛至如期略無痛苦初冬適楊子朴尋即受孕俱肝氣橫逆之證其發於汛期者肝失所養也孟英先平肝驅痰而後養血柔肝亦先標後本之法里中張君雪沂令正三十七歲於乙巳年患經行腹痛醫進膠艾湯多劑痛乃日盛而加以嘔吐迄今十載諸藥備嘗邇年經至益頻痛勢益劇滿床亂滾聲徹比鄰乞余診之脈弦滑而數曰巔痛口渴乎帶多腰痛乎汛色紫黑乎病者驚以為神慘容為之一展余謂雪沂曰此證不但溫燥膩補不可用即四物湯亦在禁例宜乎遍訪女科而竟無一效也與芩連梔膽茹柏蒿薇烏鰂茅根藕為劑服至下月經行即不吐痛亦大減此等藥服逾半載各恙悉蠲錢塘張君篪伯令郎韻梅茂才之室自去年夏間娩後雖不自乳經亦未行方疑其勞也四月間患感醫進升散藥遂腹膨氣逆肢痙欲厥或又疑其娠也延余診之脈弦巔痛乃營虛肝鬱微挾客邪誤投提表耳以清解輕宣之品數劑而愈繼參養榮月事亦至人皆詫為神治其實非大病也管君幼齋令正汛停七月至仲秋經行不多腹乃微脹繼則胸悶不飢身有寒熱呂某以桂枝黃連等藥進而痞悶轉加二便不行口糜而渴得飲即吐夜不能寐五內如焚余診之脈弦軟而細面赤足冷神憊不支是營陰素虧氣機多郁郁久生熱辛燥忌投授沙參蔞薤梔茹旋菀冬瓜子枇杷葉二劑而燥矢行胸腹舒知飢吐止繼以宣養而瘥其汛停良由血不足非有血不行而阻也王西翁令孫芝生茂才室久患汛行太速頭痛神疲形瘦內煩渴喜熱飲納食滯膈絡脹少眠脈至軟滑虛弦腿痠而有赤塊甚痛乃陰虧水不涵木風陽內熾氣鬱痰凝議宣養清潛互用法沙參六錢鱉甲八錢首烏三錢茯苓菊花各二錢梔炭竹茹桑葉各一錢五分白薇黃柏絲瓜絡各一錢以藕二兩十大功勞一兩煮湯煎藥外用蔥白杵爛蜜調塗腿上赤塊仲冬復視煩減能眠汛行較緩頭疼腿塊均已漸瘥乃與通補柔潛之劑後信來服之甚效張寶商室患凜寒乍熱咳逆形消面赤少餐經遲眩暈醫投補劑盜汗帶頻咸謂不能過春矣余診之脈弦滑而數本非虛勞無須補藥乃肝陽內盛搏液成痰阻塞氣機法宜清展以元參丹參紫菀白薇青蒿黃柏石菖蒲菊花竹茹竹葉為方每服送當歸龍薈丸一分二十劑遂健如初楓涇程笙伯令正半産之後汛事先期淋漓不斷時見痛脹齦衄減餐苦渴苔黃脈弦而數頻服補劑久不能瘳余投沙參龜板制香附絲瓜絡茹陳菖蒲蒿梔薇柏藕十餘帖次月經即調復來求診與以柔養善其後淋帶管授青翁季郎蓉舫之室初冬患寒熱耳聾胸悶便祕帶下如注嘔渴不眠粒米不沾者旬余矣人皆危之余按脈弦數舌絳無苔氣逆面紅自求速死此肝鬱深沉木火內爍耗津阻氣出入無權小柴胡湯逍遙散皆貌合而神離誤施必然決裂此辨證用藥之所以難也幸其喬梓深信遂以小陷胸加菖茹旋覆梔芩蘆根湯煎服一帖胸漸舒氣漸平再服稍寐三服嘔止進粥五劑便行溺暢寒熱亦休苔布知飢始改柔養而痊娼女榮瑛就診於余自述本良家子十四歲而天癸至二十二歲而適人二十五歲初産但覺腰腹微酸子即墮地三十二歲再産亦爾茲又嫁二夫向不自乳而産育漸頻分娩漸慢今春誕子為第十胎腹痛逾四時而生在他人猶以為極快而我已覺漸徐且年雖五十天癸不衰錮疾全無向不服藥素有微帶近年全無惟每日吐痰別無他苦恐此後有難産之虞求為設法余聞而訝之其貌雖不甚都而粉黛不施風致嫣然肌膚尚似三十許人真尤物也始信雞皮三少之説為不誣按脈六部皆緩滑而長左寸關帶弦數是聰明有壽之徵故年愈長而氣愈固是以分娩漸慢也向有帶而近有痰以左寸關合之火搏其液而不下趨也囑以六君子加減為常服之方設再孕至七八月以束胎飲頻服可期易娩渠聞之欣然受方而去録之以見賦體之奇郎氏婦崩後淋帶五內如焚溲熱口乾不飢脘悶腰疼肌削臥榻呻吟頭暈耳鳴夜不能寐脈來細數少腹不舒滋補雜投皆不見效余以菖蒲沙參斛柏薇芩蛤殼冬瓜子藕十大功勞先為清展服五帖熱退渴解脘舒安穀且能起坐夜亦能眠其氣機已調暢矣參入潛陽養血而痊胎前局醫黃秀元之輿人韓名諒者有兒婦重身患熱病局中諸醫皆慮胎隕率以補血為方旬日後勢已垂危浼人求孟英診之曰胎早腐矣宜急下之或可冀幸若欲保胎則吾不知也其家力懇疏方遂以調胃承氣合犀角地黃湯加西洋參麥冬知母石斛牛膝投之胎落果已臭爛而神氣即清熱亦漸緩次與西洋參元參生地知母麥冬丹參丹皮茯苓山楂石斛豆卷茺蔚琥珀等藥調之粥食日加旬日而愈滿洲少婦懷娠漏血醫投補藥漏如故間或不漏則吐血延逾二載腹中漸動孕已無疑然血久溢於上下甚至納食即吐多醫不能治孟英診之脈滑數有力是氣實而血熱也證不屬虛補藥反能助病愈補愈漏胎無血蔭而不長其所以不墮者氣分堅實耳與大劑清營藥血溢遂止而稀沫頻吐得飲即嘔口渴心忡氣短似促乃用西洋參麥冬知母石斛枇杷葉竹茹柿蒂生白芍木瓜重加烏梅投之覆杯即安清肺柔肝益氣生津與證針鋒相對次日能吃飯矣朱砥齋司李之夫人屢患半産每懷妊服保胎藥卒無效今秋受孕後病嗽孟英視之盡屏溫補純與清肺或詰其故曰胎之不固或由元氣之弱者宜補正或由病氣之侵者宜治病今右寸脈滑大搏指吾治其病正所以保其胎苟不知其所以然而徒以俗尚保胎之藥投之則肺氣愈壅咳逆愈盛震動胞系其胎必墮矣朱極欽佩服之良效次年夏誕子甚茁壯通達之論凡病俱宜如此看李華甫繼室娠三月而崩孟英按脈弦洪而數與大劑生地銀花茅根柏葉青蒿白薇黃芩續斷驢皮膠藕節胎髮灰海螵蛸而安奈不能安佚越數日胎墮復崩孟英於前方去後六味加犀角竹茹元參為治或謂胎前宜涼産後則否乃招專科暨蕭山竹林寺僧治之咸用溫藥且熱暴崩宜補服藥數劑虛象日著時時汗出昏暈畏聞人聲懶言息微不食不眠間有厄忒崩仍不止皆束手待弊矣復邀孟英視之曰此執死書以治活病也夫血因熱而崩胎因崩而墮豈胎墮之後熱即化為寒乎妙語解頤參朮薑桂棕灰五味之類溫補酸澀既助其熱血益奔流又窒其氣津亦潛消致現以上諸證脈或不知而苔黃黑燥豈不見乎因與犀角石膏元參知母花粉竹瀝麥冬銀花梔子石斛旋覆青蒿白薇等大劑投之神氣漸清旬日後各恙始平繼去犀角加生地服兩月全愈徐氏婦懷妊患痢醫投溫補胸腹痛極昏厥咽糜水飲礙下孟英診之脈洪數舌絳燥亟吹錫類散灌以犀角元參海虴茹貝梔菀知斛豆根射干銀花楝實諸藥胎下已朽咽腹之疾隨愈續用甘涼清熱存津調之汪氏婦自孟秋患痢之後大解溏泄未愈已而懷娠恐其墮也投補不輟延至仲冬兩目赤障滿遮氣逆礙眠脘疼拒按痰嗽不食苦渴無溺屈孟英診之脈甚滑數曰此溫補所釀之疾也夫秋間滯下原屬暑濕熱為病既失清解逗留而為溏泄受孕以來業經四月慮其墮而補益峻將肺胃下行之令皆挽以逆升是以胸次堵塞而疼喘嗽不能臥又恐其上喘下泄而脫也補之愈力治節盡廢溲閉不飢濁氣壅至清竅兩目之所以蒙障而瞽也與沙參蛤殼枇杷葉冬瓜子海石旋覆蘇子杏仁黃連枳實海虴黃芩梔子重加貝母服二劑即知飢下榻目能睹物矣論極透快説盡庸醫之弊葉承恩室懷妊患感昏譫不眠善嘔便祕汗出不解脈澀口乾乃營陰素虧邪熱內熾以元參石膏知芩茹貝銀花枇杷薇梔楝斛投數帖而愈夏氏婦懷娠患感醫投溫散漸至氣衝不寐時欲痙厥脘悶呻吟渴難受飲所親張養之延孟英診之脈滑數而溢與小陷胸加旋薤石膏知梔茹杏腹皮蘇子竹瀝海虴大劑投旬日而愈設用輕淺之方焉克有濟耶朱次膺令正姅後偶有微寒微熱醫與解散藥一劑遂神疲自汗不食不眠泛泛欲嘔時時欲暈肢麻且軟氣欲上衝舌赤微苔溺頻脘痛便溏不暢目不欲張心悸懶言欲噫不達孟英察其脈虛弦軟數曰此陰虛素虧憂愁勞瘁之餘血從下奪八脈交虛正所謂陽維為病苦寒熱陰維為病苦心痛也豈可以有寒熱而即從瘧治哉授以龜板鹿角霜當歸枸杞白薇紫石英甘草大棗小麥牡蠣數劑而安嗣與熟地棗仁當歸杞子麥冬楝實苡仁黃連壯水和肝而愈蔣敬堂令正懷妊九月忽患胎上撞心面浮痰塞四肢搐溺神氣昏瞀亟延孟英視之豫紫蘇菖蒲半夏枳實茯苓橘皮羚羊鉤藤旋覆赭石為劑服後即舉一男母子皆安而愈同時聞幼科王蔚文令媳妊已臨月患證亦爾治不如法不産而亡朱逵士令正懷妊八月脘痛便溏跗腫腰疼頻吐緑水溫補不效孟英診之脈軟而弦舌絳無液口乾少寐形瘦神疲木土相乘陰液大耗雖宜培養燥烈禁施以參連歸斛杜仲靈脾冬蟲夏草柏橘茹英為劑果各恙遞安脘舒瀉止加以熟地舌漸生津而愈臨産一少婦分娩胞水早破胎澀不能下俗謂之瀝漿生催生藥遍試不應孟英令買鮮豬肉一二斤洗淨切大塊急火煎湯吹去浮油恣飲之即産母子皆生且云豬為水畜其肉最腴大補腎陰而生津液豫嘗用治腎水枯涸之消渴陰虛陽越之喘嗽並著奇效仲聖治少陰咽痛用豬膚亦取其補陰虛而戢浮陽也後賢不察反指為有毒之物汪訒庵非之是矣惟外感初愈及虛寒滑瀉濕盛生痰之證概不可食以其滋膩更甚於阿膠熟地龍眼也然豬以浙産者為良北豬不堪用吾杭燥肉鮓即豬皮為之可以致遠入藥尤為簡當不必泥於皮與膚之字面而穿鑿以誇考據也錢希敏室坐草二日既未分娩忽患小便不通勢甚亟乃速孟英視之脈至滑數睛赤口乾以為熱結膀胱氣不化達豫車前子滑石血餘栝蔞知母梔子牛膝紫菀紫草為大劑投之是通溺催生互用之法服後溲仍不行徑産一男既而胞下溺滿其中始知兒出胞後頻飲湯水盡貯其中也孟英曰此證古所未聞余雖初不料其如此然非開泄導下則兒不即娩吉凶未可知矣而折肱漫録云孕婦將産如患小便不通乃脾氣虛弱不能勝胞故胞下墜壓塞膀胱使然宜重劑白朮大健其脾則胞舉而小便自通者正與此證虛實相對待想其脈必有虛微之象也施秋濤室仲冬分娩因前歲初産艱難穩婆妄施毒手臠而出之自懷憂懼産周時不下舉家皇皇穩婆以為奇貨可居力贊仍喚原手相助竟仍前例索謝而去孟英聞之惻然謂其乃尊趙菊齋曰難産自古有之莊公寤生見於左傳故先生如達不坼不副詩人以為異徵然先生難而後生易理之常也晚嫁者尤可必焉但亦有雖晚嫁而初産不難者非晚嫁而初産雖易繼産反難者或頻産皆易間有一次甚難者有一生所産皆易一生所産皆難者此或由稟賦之不齊或由人事之所召未可以一例論也諺云十個孩兒十樣生至哉言乎若得兒身順下縱稽時日不必驚惶安心靜俟可耳會稽施圃生茂才誕時其母産十三日而始下母子皆安世俗不知此理稍覺不易先自慌張凶惡穩婆故為恫嚇使人不敢不從其計要取重價操刃臠生索謝去後産母隨以告殞者有之奈貿貿者不知墮彼術中尚誇其手段之高忍心害理慘莫慘於此矣設果胎不能下自有因證調治諸法即胎死腹中亦有可下之藥自古方書未聞有臠割之刑加諸投生之嬰兒者惟有一種羸形女子交骨如環不能開坼名鎖子骨能受孕而不能産如懷妊必以娩難亡此乃異稟千萬人中不得其一二者如尋常可開之交骨斷無不能娩之理也菊齋聞而浩嘆産後患干嗆不飢少眠善夢口乾溺數繼發寒熱孟英診曰幸體氣堅實不過因驚懼而感冬溫耳與白薇梔子丹參竹茹茯苓青黛蛤殼枇杷葉豆豉蔥白投匕而安數日後寒熱又作仍投前方覆杯即愈繼去蔥豉加百合石斛知母服之各恙皆痊孟英又曰羸形為五不可孕之一方書誤作螺者非也蓋驢與馬交則生騾純牝如牡其交骨如環無端不能孕育體純陰性極馴而善走勝於驢馬然亦馬之屬也故易曰坤為馬行地無疆利牝馬之貞皆取象於此也人賦此形而不能安其貞則厄於娩矣秋濤聞之方疑其室之羸形也逮癸丑冬産一子竟無恙始悔前此為穩婆所愚也産後朱氏婦産後惡露不行而宿哮頓發專是科者不能下手孟英以丹參桃仁貝母茯苓滑石花粉桂枝通草蛤殼苡仁紫菀山楂絲瓜子茺蔚子旋覆琥珀出入為方三日而愈姚氏婦産後昏譫汗厥肌膚浮腫醫投補虛破血祛祟安神之藥皆不能治舉家惶怖轉延孟英診焉詢知惡露仍行曰此證醫家必以為奇病其實易愈也昔金尚陶先生曾治一人與此相似載於沈堯封女科輯要中方用石菖蒲膽星旋覆茯苓橘紅半夏曲名蠲飲六神湯凡産後惡露行而昏譫者多屬痰飲不可誤投攻補此湯最著神效如方服之良愈夏間牙行倪懷周室新産數日泄瀉自汗嘔吐不納專科謂犯三禁不敢肩任孟英診脈虛微欲絶證極可虞宜急補之遲不及矣用東洋參耆朮龍牡酒炒白芍桑枝木瓜扁豆茯神橘皮紫石英黑大豆投之四劑漸以向安豫謂新産後用參耆大補而又當盛夏之時非有真知灼見者不能也誠以天下之病千變萬化原無一定之治奈耳食之徒惟知執死方以治活病豈非造孽無窮亦何苦人人皆欲為醫而自取罪戾耶庚子春戴氏婦産後惡露不多用山楂益母草酒煎連服數日遂發熱自汗口渴不飢眩暈欲脫徹夜不眠孟英視之曰此稟屬陰虧血已隨胎而去雖惡露甚少但無脹痛之苦者不可妄投藥餌酒煎益母山楂不特傷陰且能散氣而汗泄口乾津液有立竭之勢即仲聖所謂無陽也蓋人身天真之氣謂之陽陽根於津陰化於液津液既奪則陽氣無根而眩暈陰血不生而無寐若補氣養陰則捨本求末氣血不能生津液也惟有澄源潔流使津液充而氣血自復庶可無憂以西洋參生黃耆龍骨牡蠣萎蕤百合甘草麥冬生薏苡生扁豆石斛木瓜桑葉蔗漿投之一劑即安數日而愈後以滋填陰分服之乃健豫荊人娩後惡露不行或勸服生化湯適孟英枉顧診曰陰虛內熱天令炎蒸雖赤沙糖不可服也以生地丹參丹皮豆卷茺蔚子茯苓桃仁山楂梔子澤蘭琥珀投之即效且無別恙而易健不寒不燥真陰虛血滯者之良劑可見體質不齊藥難概用況其致病之因不一病機傳變無窮語云量體裁衣而治病者可不辨證而施治耶孟英嘗曰凡産後世俗多尚生化湯是一定之死方療萬人之活病體寒者固為妙法若血熱之人或兼感溫熱之氣者而一概投之驟則變證蜂起緩則蓐損漸成人但知産後之常有而不知半由生化湯之厲階此風最勝於越方本傳於越之錢氏自景嶽採入八陳遂致流播四海人之陰受其害者數百年矣從無一人能議其非今特為此長夜之燈冀後人不致永遠冥行或可稍補於世但景嶽最偏於溫補而獨於産後一門力辨丹溪大補氣血為主之非可謂此老之一隙微明惜猶泥於産後宜溫之謬説蓋由未入仲聖之宮牆也通人之論無論寒藥熱藥用不得當皆是誤人不可不知張鄭封室娩後即發熱服生化湯二帖熱益熾而發赤疹顧聽泉診之即與清解三劑不應欲進犀角地黃湯而恐病家之狃於産後以生疑也乃拉孟英質之診其脈弦滑而數面赤熱躁胸悶善悲肢腫而疼兩肘白泡如扁豆大者數十顆舌上亦有一顆痛礙食飲大便不解已旬日矣曰此不但胎前伏暑且有蘊毒而誤服生化湯以助其虐幸初手即用清解尚不致於昏陷犀角地黃極是治法猶恐不能勝任乃與聽泉商加西洋參滑石知母銀花花粉人中白蔞仁竹黃貝母桑葉梔子為劑其所親曰高明斷為熱證何以病者雖渴而喜熱飲耶孟英曰此方中所以多用痰藥也凡胸中有熱痰阻礙氣機者每如是不可以其向不吐痰而疑吾言之妄也若因此而指為寒證則禍不旋踵矣進四帖始得大解頻吐稠痰而各恙皆減飲食漸加孟英曰病勢雖穩餘熱尚熾苟不亟為清滌而遽投補益猶有蓐損之虞其母家果疑藥過寒涼必欲招專科調治幸將前方示彼尚不妄施溫補然隔靴搔癢紀律全無旬日後餘火復燃鄭封堅懇孟英設法仍用甘寒療之周身膚蛻如蛇皮爪甲更新其病之再生也可知繼與滋補真陰而起翁嘉順室娩後發熱竹林寺僧治之不應溫龔二醫皆主生化湯加減病益劇請孟英診之脈軟滑微數曰素體陰虧熱自內生新産血去是以發熱惟譫妄昏瞀最是嚇醫之證渴喜熱飲宛似虛寒之據宜其猜風寒而表散疑瘀血以攻通帖帖炮薑人人桃桂陰愈受劫病乃日加幸而痰飲內盛津液未致涸竭與蠲飲六神湯去橘半加西洋參生地花粉竹茹知母生白芍為劑數日而瘳逾旬夏發熱或疑涼藥之弊或謂産蓐成勞衆楚咻之病漸進矣其小姑適吳氏者向役於冥曹俗謂之活無常偶來探病忽仆地而僵口中喃喃或問汝嫂病何如答云須服王先生藥人皆異之次日仍乞診於孟英曰脈浮數而弦是風溫也與前病異便瀉無溺肺熱所迫大渴無苔胃汁受爍亟與天生建中湯頻灌即蔗汁也藥主大劑甘涼果得津回舌潤漸以痊可凡痰飲內盛之人服寒熱藥皆如石投水人皆以為稟賦之異不知皆痰飲為患也施氏婦産後四肢串痛藥治罔效醫謂其成癱瘓矣延已逾月丐孟英視之膏藥遍貼呻吟不息脈數而洪舌絳大渴曰此非風濕為病膏藥亟為揭去近日服藥諒皆溫補祛風之劑營血耗傷內風欲動勢將弄假成真且吾向見其體豐血旺何以娩後遽患斯疾必生化湯沙糖酒之類所釀耳其父倪某目雖瞽聞而笑云君誠天醫也小女服過生化湯二帖赤沙糖八斤從此漸病不識尚可起廢圖全否孟英曰幸其體足於陰恢復尚易若陰虛血少之人而蹈此轍雖不即死難免不成蓐損因投大劑涼潤壯水之藥一劑知旬日安匝月起慎氏婦産後腹脹泄瀉面浮足腫醫與滲濕溫補月餘不效疑為蓐損孟英視之舌色如常小溲通暢宛似氣虛之證惟脈至梗澀毫無微弱之形因與丹參滑石澤蘭茯苓茺蔚蛤殼桃仁海虴五靈脂豆卷數服即瘥亦行瘀利水之法吳馥齋室新産後嘔吐不止湯水不能下咽頭痛痰多苔色白滑孟英用蘇梗橘半吳萸茯苓旋覆薑皮柿蒂紫石英竹茹此痰飲挾肝氣上逆也故方以降氣滌飲為治一劑知二劑已陸厚甫室陳芷潯主事之女也産後經旬偶發脘痛專用溫補藥因寒熱氣逆脘痛何以投溫補不問可知其誤矣自汗不寐登圊不能解而臥則稀水自流口渴善嘔杳不納穀僉云不起矣乃父速孟英診之脈弦數而滑曰本屬陰虧肝陽侮胃誤投溫補澀滯之劑産後肝血大虧所以陰虛肝失血養故陽獨盛氣機全不下降以致諸證蜂起醫見而卻走是未明其故也與沙參竹茹楝實延胡梔連橘貝杏斛枇杷葉為肅肺以和肝胃法覆杯即安但少腹隱隱作痛於前方去杏貝竹茹加知母花粉蓯蓉白芍橘核海虴乃解宿垢而瘳此脘痛之根金亞伯廷尉簉室産後惡露不行渴瀉痰多孟英以北沙參滑石生薏苡生扁豆蛤殼豆卷石斛竹茹枇杷葉琥珀茯苓等藥數劑而愈何新之令愛適湯氏孟冬分娩次日便瀉一次即發熱痙厥譫語昏狂舉家皇皇乃翁邀孟英審之脈弦滑惡露仍行曰此胎前伏暑乘新産血虛痰滯而發也與大劑犀羚元參竹葉知母花粉梔楝銀花投之遍身得赤疹而痙止神清乃翁隨以清肅調之而愈有是病則有是藥不拘拘於産後之元虛此明醫之所以異於庸醫也高祿卿室吳濂仲之妹也孟夏分娩發熱初疑蒸乳數日不退産科治之知挾溫邪進以清解而大便溏泄遂改溫燥其泄不減此邪去之徵識力不堅遂為所眩另招張某視之因謂專科誤用蔞仁所致與參耆薑朮鹿角肉果等藥泄瀉愈甚連服之熱壯神昏汗出不止勢瀕於危醞香孝廉徐夫人病者之從母也心慈似佛有子十人皆己出聞其殆夤夜命四郎季眉請援於孟英按脈洪數七至口渴苔黃洞瀉如火小溲不行因謂季眉曰病猶可治第藥太驚人未必敢服季眉堅欲求方且云在此監服乃疏白頭翁湯加石膏犀角銀花知母花粉竹葉梔楝桑葉與之次日復診脈證較減仍用前方而病家群譁以為産後最忌寒涼況洞泄數日乎仍招張某商之張謂幸我屢投溫補在前否則昨藥下咽盲語頃刻亡陽復定耆術之方業已煎矣所親張芷舟孝廉聞之飛告於醞香處汾伯昆季即馳至病家幸未入口奪盞傾之索孟英方煎而督灌且屬群季輪流守視免致再投別藥孟英感其情誼快舒所長大劑涼解服至七帖瀉全止熱盡退乃去白頭翁湯加生地元參茹貝服半月始解黑色燥矢而眠食漸安第腑臟之邪雖已清滌而從前溫補將熱邪壅滯於膜絡之間者復發數癰於胸乳之間孟英令其恪守前法復入蒲公英絲瓜絡橘葉菊葉等藥服至百劑始告全愈而天癸亦至方遵古法並不驚人特讀立齋景嶽書者見之未免吃驚耳不意浙省名手狃於溫補如此真不能不歸咎於景嶽立齋諸公矣孟英曰世俗泥於産後宜溫之謬説況兼泄瀉即使溫補而死病家不怨醫者無憾也或具隻眼其誰信之此證苟非汾伯昆仲篤信於平時而力排衆論於危難之間余雖見到不疑亦惡能有濟耶余嘗曰病不易識尤不易患醫不易薦尤不易任藥不易用尤不易服誠宇宙間第一難事也而世人淺視之可不悲哉魏西林令侄女娩後惡露延至兩月繼聞乃翁條珊主政及兩弟卒於京悲哀不釋而為干嗽吐血頭痛偏左不飢不食不眠不便渴飲而溲必間日一行久治不效孟英切脈虛弦豁大與甘麥大棗加熟地首烏鱉甲二至菊花旋覆芍藥貝母麻仁青鹽等藥服後脈漸斂血亦止七八劑頭疼始息旬日後便行安穀逾年接柩悲慟血復溢誤投溫補而亡翁嘉順令正娩後陰戶墜下一物氣虛不固形色如肺多方療之不收第三日始求治於孟英令以澤蘭二兩煎濃湯熏而溫洗隨以海螵蛸五倍子等分研細粉糝之果即收上繼而惡露不行白帶時下乳汁全無兩腿作痛又求方以通之前方只治其標未治其本故復發此患孟英曰此血虛也乳與惡露雖無其腹必不脹前證亦屬大虛合而論之毋庸診視因與黃耆當歸甘草生地杜仲大棗糯米脂麻藕濃煎羊肉湯煮藥服後乳汁漸充久服乃健陳書伯太史令弟婦娩後三日發熱汗多苔黃眩悸孟英切脈弦細虛數乃營陰素虧酷熱外爍風陽浮動痙厥之萌也豫元參白薇青蒿生地小麥穭豆衣石斛鱉甲竹葉兩劑熱退知飢悸汗不止去蒿薇加龍牡蓮心龜板石英而安繼又暑風外襲壯熱如焚渴飲不飢視物盡赤改授白虎加西洋參竹葉蓮杆一啜而瘳仍與鎮攝滋潛善其後而愈顧氏婦半産後因吃飯脘痛人以為停食也進以消導痛甚發熱臥則右脅筋掣難忍孟英曰此非發散攻消可療豫旋覆絲瓜絡冬瓜子蓮杆葦莖竹茹貝母枇杷葉蘭葉通草為方一劑知二劑已趙子循室娩後服生化湯二帖更因驚嚇三朝發熱連投四物六合等湯病日以甚半月後始延孟英診之脈象左弦急右洪滑數苔黃大渴譫語嗽痰惡露仍行唇齒乾燥是因陰虛之體血去過多木火上浮酷暑外爍津液大耗兼有伏痰之候也亟與營衛兩清冀免他變而母家極畏石膏堅不與服越三日勢益劇計無所施子循之叔笛樓與其表兄許芷卿徑以白虎加減投之證有轉機翌日再迓孟英會同笛樓暨其舅氏許吉齋山長協商妥治咸是王議且以西瓜汁助其藥力熱始日漸下行二便如火又數日漸安粥食神氣亦清起坐梳頭夜能靜寐然熱蘊太久下焦患癰膿雖即潰陰液漏傷脈復空數浮大便泄善嗔口乾多夢皆木少水涵爍津侮胃之見證也孟英與笛樓商以白頭翁湯加龍骨三甲甘草木瓜以育陰潛陽餘糧石脂丸中加梅連以息風鎮胃果得瘡口膿干餐加瀉止脈柔熱淨苔退神怡正須善後甫授滋填不期酷熱兼旬甘霖忽降窗開徹夜復感風邪身熱微寒鼻流清涕而陰液久奪外患未痂培養礙投又難發汗肝風內應瘈噤旋形九仞之功遂成畫餅門外漢未免以成敗論然此案自堪傳也仍是陰血大虛故變證如此非蓋由於風邪也産後諸證首必通瘀然亦不可以常理測者表弟周鶴庭室新産暈汗目不能開心若懸旌毫無惡露乃父何君新之按其脈有虛弦豁大之形亟拉孟英圖之豫以三甲石英丹參琥珀甘草小麥穭豆衣等藥滋陰鎮逆仍兼行血之品斯靈動而不滯覆杯即安數服而愈或詰其何以知非瘀血為患曰此陰虛之體既産而營液大脫風陽上冒雖無惡露胸腹皆舒豈可誤作瘀沖而妄投破血之藥耶辛亥春孟英治其令正誕子三朝忽渾身麻冷尋即壯熱大渴汗出不解耳鳴眼淚舌絳無津苔色燥黃腹痛拒按不飢脘悶惡露仍行小溲極熱脈則弦滑右甚是胎前吸受風溫兼挾痰食內滯雖新産血去陰傷見證較劇然病不在營亟宜撤熱以安營不可破血以傷營亦不可養陰而助病遂以元參白薇梔子知母竹茹旋覆菖蒲枳實栝蔞為方服之熱雖退而脈不減仍用此方越二日復麻冷而後熱惟舌稍潤苔較薄耳再飲之熱亦即退並吐膠痰數碗略進稀糜間一日又發寒熱或疑為瘧或疑分娩不易用力勞傷恐是虛證苟不及早溫補蓐損堪虞孟英一一頷之復與前藥熱果漸減渴亦遞減逾日寒熱猶來亦不更方至十一朝始下黑燥矢而寒熱乃休即能安穀計服此藥已十大劑矣始出方與戚鄰閲之蓋恐眷屬之預聞涼解而有阻撓也諸親莫不駭詫然此證非孟英獨斷獨行斷難成功設泥新娩而通瘀或以為瘧而溫散或疑其虛而滋補勢必驟變即稍有瞻顧亦必邪熱糾纏而延成蓐損世人之病往往弄假成真者大率類此吾師趙菊齋先生令郎廉士之如君新娩後微寒壯熱小溲全無惡露稍行大便如痢神項善哭大渴不眠專科謂瘧痢交作不能圖治遂請孟英援手脈來洪大滑數曰暑為患耳不必治其瘧痢以辰砂益元散加竹葉銀花丹皮木通元參丹參蓮杆為大劑投之三帖各恙皆平第營陰素虧即改甘涼濡養善後而愈尚且乳汁全無顯由血少設非清解又當何如耶石北涯仲媳胎前患瀉季秋娩後瀉如漏水不分遍數惡露不行專科束手咸慮其脫亟請孟英脈之左弦而數右大不空口苦不飢苔黃無溺曰非虛證也參湯斷弗沾唇豫白頭翁合石頑伏龍肝湯丸治之一劑知三劑愈孫畫三仲郎菊如之室因兒女過多不欲生産懷妊屢服下胎藥不應娩後三朝陡發寒熱兼以痛瀉所下皆黑而小溲不行醫作瘀治用回生丹等藥已覺漸愈惟寒熱間作不休至八朝或囑其邀孟英診視神氣頗安靜苔色黃膩不厚胃略知飢惟右寸關空大有靜中一躍之形診畢適前醫至孟英謂右脈不佳恐有驟變彼按脈云較昨已大和矣必無害也孟英唯唯而退菊如送至門外復囑以令正元氣大傷莫投峻藥而別繼聞是夜寒熱復作腹仍大痛更服回生丹越日而亡沙沛生鹺尹令正胎前痰嗽娩後尤甚孟英視之面赤能餐汗多畏熱脈滑而數嘔渴苔黃惡露流通血分無病乃燥火伏於肺胃法宜清肅上焦不可謂産後禁涼潤也劑以沙參茹滑知斛冬甘枇杷葉冬瓜子葦莖梨皮桑葉蛤殼出入互用旬日而痊陳舜廷繼室娩後略有咳嗽微有寒熱惡露不多少腹似有聚瘕時覺竄痛腰疼不能反側齒衄頻流溺少口乾仍不喜飲舌色無液善怒不眠四肢牽掣不舒易於出汗逆孟英診之脈至虛弦細弱系素屬陰虧新産血去之後八脈皆空陽不能潛遊行於上見證雖然錯雜治當清息風陽表散攻瘀毫不可犯爰以沙參竹茹白薇丹參絲瓜絡石斛梔子小麥甘草紅棗藕為方服數帖嗽衄皆蠲為去丹參麥棗梔斛加歸身熟地枸杞麥冬楝實服之各恙漸瘥復因卒聞驚嚇之聲心悸自汗肢麻欲厥乃定集靈膏加紫石英牡蠣龍齒合甘麥大棗熬膏服之而康繼有汪少洪令侄女適孫彬士者産後患證與此相似誤投溫散發熱愈壯但在上部醫者猶不知為陰虛陽越仍從感治逮脈脫汗淋始邀孟英視之始知是虛陽外越然已不能拯救病者自賦絶命詞而逝蓋凡屬虛脫之證至死而神不昏也醫者識之沈君云峰令正誕子後患身熱痰嗽白㾦頭疼腹痛便溏不飢口渴醫者治此礙彼專事模稜至九朝余抵禾視脈滑數苔微黃胎前感受冬溫也主以清解法或疑有礙便溏余曰便溏為肺熱之去路設便閉則將喘逆矣況夏間余嘗治其胎前溺澀群醫滲利而不應余專清肺而得手今雖産後體臟未更兼有客熱外侵所謂有病則病受也連服多劑果即向安管君錫棠仲郎蘭谷之室季秋患寒熱娠已八月矣繼因其子患驚憂勞數月遂兼痰嗽而舌糜口臭服藥數帖而娩其胎已腐然寒熱咳嗽口糜諸恙不減醫以其産後也用藥益無把握馴致氣逆自汗面赤無眠束手囑備後事矣適余遊武原歸延診其脈寸關弦滑右大惡露流通二便無阻是下焦無病雖在産後而病與産後無涉若云産後宜溫固是謬説而此之口舌糜臭亦非大熱毋庸重劑涼解良由胎已早殞失於早下以致濁氣薰蒸於肺胃故見以上諸證既見諸證而早為肅清則源澄流潔奚至是耶設再誤作産後虛喘而妄投補劑則雖死而莫知其所以死也爰以南沙參省頭草厚朴杏仁菖蒲桑皮竹茹枇杷葉冬瓜子絲瓜絡為方薔薇葉蘆根煮湯煎服兩劑氣順嗽止知飢進谷去杏朴加苡仁甘草口舌隨愈寒熱亦休惟骨節痠疼合目即汗改清熱養陰而起榻腰足尚痠軟授滋補氣血而痊余遊瀛洲有越人李姓浼心鉏茂才見余云親串中一婦人因娩後嗽血遂致兩目無光四肢軃不能動欲求一方張謂如此大證未審其脈如何施治余曰吾知之矣此肺熱欲成痿躄也遂以西洋參桑皮元參百合知母苡仁藕茅根枇杷葉為方服六帖聞余將歸李亟來署致謝云病去大半矣真仙丹也欲再求一方余為加葳蕤一味然此由海外因不知有産後宜溫之謬説故無人阻撓而得偶然幸愈也金氏婦自仲夏墮胎迄今四月有餘惡露淋漓不斷兩臀近復患瘡渾身膚癢脈數而弦多藥罔效亦為産後宜溫之謬説所誤也用西洋參銀花各二錢生地龜板各四錢冬瓜皮三錢梔炭竹茹各一錢五分白薇青蒿黃柏各一錢甘草六分不十帖愈矣中毒丙戌春倉夫鄭德順患急證時已二鼓丐孟英視之見其扒床拉席口不能言惟以兩手指心抓舌而已孟英曰中毒也取緑豆二升急火煎清湯澄冷灌之果能霍然詰朝詢其故始言久患臂痛因餌草頭藥下咽後即心悶不可耐舌麻不能言而旁人不知也録此足以證孟英臨證之燭照如神亦可見草藥之不可輕試之都城售透土長壽丹極言其功之大能治諸疾而價甚廉人皆稱之孟英謂勿論其所用何藥執一方以療百病無此治法每以稟賦不齊證因有別勸人切勿輕嘗況以緑豆湯為引必有熱毒之品在內不可不慎也繼而張孟皋少府餌之患疽廣粵亭司馬服之咽爛孟英投多劑甘寒而愈王雪山久患下部畏冷吞未百丸齒痛目赤諸恙蜂起孟英察脈弦滑與多劑石膏藥兼以當歸龍薈丸頻服新疾既瘳腿亦漸溫令其常飲柿餅湯以杜將來之恙伊弟患腹脹而喜服溫補久而不效孟英曰濕熱也宜清化彼不信因服透土丹初頗應已而血大溢始得悔悟志此數則以為世之好服奇藥者戒邵氏子於母殯發引之時忽仆倒不省人事亟請孟英視之灌蘇合香丸而蘇又屠氏女送父殯至厝所歸即神氣瞀亂如癲如瘋速孟英治之投以玉樞丹而瘳此即所謂飛尸之候也蔣氏婦年逾四旬患一奇證痰必自少腹突沖而上其勢甚猛其堅如石其熱如火故突然而沖之際周身為之震撼日夜二十餘次每次止須一咯即脫然出口四肢漸形牽掣口極渴而溺如沸湯食減少眠形日消瘦諸醫皆知為痰火病而治無寸效孟英視之曰診治非謬而藥不勝病者殆積熱深錮必從前多餌溫補所釀也其夫云誠然向來本無病因無生育紫河車已服過數十具他藥稱是曰愚哉藥之治病猶兵之勘亂也所謂用藥如用兵無病而藥是黷武也既無生育何不納妾凡服溫補之藥以求子者其藥毒鍾於小兒生子多不育況食人之胞乎無論忍心害理已屬不仁即偶然得子多患異疾或頑蠢狠戾而無人心亦何益哉昨聞沙沛生令妹患痘服此致鼻穿而痘仍不救設非胞衣之毒奚至此乎故余臨證三十年從不用之縱病家要用亦必剖陳利害以勸止之或令以羊腎代之溫養有情且無穢毒功較勝焉令正服過數十具而從未生育毒氣毫無出路欲種子者翻種病矣豈尋常清涼之劑所能愈哉考古惟紫雪能搜剔久蘊深藏之毒火試餌之或有驗也爰用紫草銀花元參土茯苓甘草緑豆海虴鳧茈為方和入竹瀝另以豆腐皮包吞紫雪五分服之果效匝月而瘳余口上齒下牙密排各十六雖從無痛楚而自幼不能決硬物故侵晨必以鹽擦而冷水嗽之無間寒暑今年春夏以來飯食日減右之第六齒漸不能嚼偶觸堅韌之物痛不可忍且畏冷嗽以為去年一病遂形衰象初不介意余天性不飲而頗識杯中趣曩侍先慈晚膳每陪飲一二杯因去冬苦絡虛不能轉側戚友咸勸日飲醇酒數杯以和氣血遂習以為常然不敢縱肆未嘗一醉也十二月十八夜寐中忽為右齦痛覺詰朝即礙於飲食而是日已訂有青鎮之遊遂攜一針登舟頻刺痛處出血不少午後漸鬆次日歸飲食如常以為無患矣二十一日立春晨起痛脹復作刺亦不應繼以凜寒身熱偏右之巔額頞䪼顴頰頤頦無不掣痛苔色未露謂是風火外侵用艽翹蠶芷桑薄等二劑惡寒雖減而足冷麵熱溺赤苔黃且鼻竅不塞而右流濁涕如膿時欲哼而出之否則自上齶流下臭苦不堪右面盡腫滿口唇瘡腫處極其畏寒須以熱物尉之為快而時時火升自問素不服丸散又不啖肥甘的系飲酒經年濕熱久蘊而上薰蓋以酒之熱歸於膽上移於腦則為鼻淵其實移腦者即移胃也故見證皆在少陽陽明分野遂以元參桑葉菊花花粉銀花枳椇子絲瓜絡冬瓜子蘆根為劑和入蘆蔔汁調以玉樞丹兩服而苔化火平二便亦暢外用鹽滷熱洗右面而腫漸消去玉樞丹又二服可以嚼飯日啖北梨至戊午元旦而臭濁之涕始稀初五六連日出門適大風初七日午後右齦復痛上連頭角耳門右之第六齒復長出而礙食凜寒畏風乃用桑葉菊花生甘草緑豆皮元參苡仁銀花梔炭薄荷鉤藤以清散風熱一服腫出痛減去薄鉤加枇杷葉四劑痛平而右之第六齒已內外分裂矣其根仍固但礙於嚼物而齦腫直至夏初消盡既而頭面四肢遍發斑塊瘰疱腫而且癢遊行無定手十指足十趾兩手掌兩足心無處不到用力搔之微出紫血結痂堅黑痕如痘疤至秋杪始痊癢時以鹽酒洗之內服銀花緑豆生苡仁湯戒口腹者八閲月嘻酒之為害如此深愧悟之不早從此一滴不敢沾唇憶二十年前海豐張雨農司馬招遊東歐臨行妹嘗戒余勿飲酒佩不敢忘故向無酒病年來自問衰頽稍爾放溢遂釀成此恙幸而資格尚淺藥治未誤不致延成錮疾蓋天性不飲者雖少飲亦能為患也詳録之以為世鑑余妹天性孝友又極賢明幼佐先慈操井臼理家務有北宮嬰兒之志余強之適金氏十載而嫠余深悔之附録以志余過雜治婺人羅元奎丁亥夏卒發寒熱旋即嘔吐不能立自言胯間痛不可當孟英視其痛處焮赤腫硬形如肥皂莢橫梗於毛際之左乃曰此證頗惡然乘初起可一擊去之也用金銀花六兩生甘草一兩皂角刺五錢水煎和酒服之一劑減其勢再劑病若失逾年患傷寒孟英切脈虛細已極曰此不可徒攻其病者以陰分太虧耳與景嶽法以熟地當歸酒炒白芍炙甘草橘皮柴胡等藥一劑而瘳此法豫亦屢用獲效氣虛者並可加參但表藥止柴胡一味猶嫌力微豫每以此法治陽證瘡毒莫不應手取效真妙方也金元章媳於申午新寡後患膿窠疥大抵濕熱之病耳瘍醫連某疑為遺毒徑作廣瘡療漸至上吐下痢不進飲食另從內科治亦無寸效延至末春更兼腹痛自汗汛愆肌削諸醫皆見而卻走矣王仲安薦孟英視之曰此胃氣為苦寒所敗肝陽為辛熱所煽前次每服陽剛即如昏冒稍投滋膩泄瀉必增遂謂不治之證未免輕棄乃以四君子加左金椒梅蓮子木瓜餘糧石脂等出入為方百日而愈第信猶未轉也諸親友環議再不通經病必有變孟英力辨此非經阻可通之證惟有培養生化之源使其氣旺血生則流行自裕若不揣其本而齊其末則礱粳不能榨油徒傷正氣盡隳前功豈不可惜衆議始息恪守其方服至仲冬天癸至而肌肉充康復如常矣牙行王炳華妻患舌瘡痛礙飲食內治外敷皆不效孟英視其舌色紅潤脈形空數曰此血虛火浮也以産後發熱例施之用熟地當歸酒炒白芍炙甘草茯苓炮薑投之其病如失茅家埠翁嘉潤患腰疽愈而復發者五年費用不資諸瘍醫治之不效盛少云囑其求治於孟英切其脈弦細以數曰子之幸也此內損證腎俞發亦然外科惡乎知與大劑甘潤滋填之藥匝月而痊至今不發李燕標參戎於癸夏將欲赴都館於石北涯家項後患疽外科僉云不治孟英薦老醫朱蒿年療之漸安孟英偶診其脈謂北涯曰李證有可愈之機脈難久享其年北涯驚問所以孟英曰左尺堅搏真陰已傷非善象也既而告痊北上今春果卒於京濮嫗於酷熱之秋渾身生癤如疔痛楚難堪小溲或祕或頻大便登圊則努掙不下臥則不能收攝人皆謂其虛也未聞虛而生癤者孟英診脈滑數舌紫苔黃而渴與白虎加花粉竹葉梔子白薇紫菀石斛黃柏十餘劑而痊翁氏婦患目疾自春徂夏治不能瘳漸至腹中痞脹痛不可當食不能下便祕形消孟英視之乃肝鬱痰滯而誤補以致殆也脈弦數而滑與金鈴子散合雪羹煎吞當歸龍薈丸暨礞石滾痰丸三投即效服至二十餘日各恙皆蠲眠食如舊瞿穎山仲媳許培之之妹也患舌糜沈悅亭知其素稟陰虧虛火之上炎也與清涼滋降之法及朱黃等敷藥而不愈乃兄延孟英往視舌心糜腐黃厚邊尖俱已無皮湯飲入口痛不可當此服藥所不能愈者令將錫類散糝之果即霍然或疑喉藥治舌何以敏捷如斯孟英曰此散擅生肌蝕腐之長不但喉舌之相近者可以借用苟能隅反未可言罄貴用者之善悟耳且糜腐厚膩不僅陰虛妙語可思要須識此自知其故歙人吳茂林患右頰腫痛頦下結核牙關僅能呷稀糜外科稱名不一治若罔知孟英投以天麻殭蠶羚羊石膏醒頭草升麻當歸秦艽花粉黃芩等藥漸愈祛肝風清痰熱之法江夢花如君患兩目腫痛不能略張醫投風藥昏痙欲厥浼孟英診之脈至洪滑大渴便祕與白虎湯二劑霍然高若舟庶母患脫肛孟英脈之弦而滑溲澀苔黃雖屬高年非虛證也清其濕熱而痊翁嘉順於去年秋間偶從梯半跌僕初無所傷旬日外陡發寒熱膝旁腫痛外科汪某治之潰後不能收功另招許某療之識為傷絡應手漸效翁極信服然培補年餘雖納食不減而肌肉漸削面色黧黑步履蹇滯且一旬半月之間必患處腫疼大發寒熱臥榻數日始能強起大費不資愈發愈劇至冬間咽糜齦腐睛赤音嘶乃懇孟英以決吉凶按脈滑數舌絳便難口臭溲少蘊隆蟲蟲良由瘍醫僅知溫托一法既潰之後更以溫補收功善後竟未察其體氣病情以致平時所有之濕熱痰火一齊關住病猶自尋出路寒熱頻作而醫者不識妄指為虛補及逾年人財兩瘠真諺所云將錢買憔悴也豫元參黃柏知母甘草銀花花粉緑豆梔子海虴鳧茈為大劑投之外吹以錫類散且令日啖梨蔗麟鱗菜柿餅等物至五十日諸恙悉蠲體腴善步韓貢甫於去冬偶患足瘡瘍科治之瘡愈而大便下血漸至腰背疼脹醫謂其虛率投溫補病日以劇逮仲春寒熱時作臥榻不起諸醫束手已治木矣所親陳季竹囑延孟英圖之脈弦緩而澀苔黃溺赤飲食不思曰此藥病也良由氣機鬱滯濕熱不清補藥亂投病漸入血然猶自尋出路奈醫者不知因病而下血不治其病徒澀其血則氣機愈窒營衛不通寒熱不飢固其宜也而又疑為土敗陰虧脾腎兩補藥力愈峻病勢愈危若我視之原非大病肯服吾藥不日可瘳乃兄聰甫聞之大為折服以海虴蘆蔔湯煎蘆根厚朴絲瓜筋通草白薇梔子楝實竹茹等藥投之三劑而寒熱不作胃漸知飢旬余血止溺澄各恙皆已改服清養藥而康許自堂叔嶽年越古稀忽頭面赤腫磊癢漸及兩臂煩躁不眠飲食日減外科治而勿效孟英脈之弦洪疾駛重按細軟曰高年氣血兩虧鬱火內燔不可從瘍科治豫黃耆當歸梔芍元參生地甘草桑葉菊花丹皮蒺藜荊芥等出入為方十餘劑而瘳黃漱莊司馬素患左目失明今春右目患障多藥未瘳延至秋間孟英視曰脈甚弦滑痰火之疴溫補宜停庶免瞽患奈司馬性喜溫補不以為然漸至耳亦失聰冬季再請孟英往診右目但能視碗大之字稍小者不能見矣耳則雖對面撞鐘放炮胥無聞也且巔腫而疼時咳白沫脈來搏徑不撓見其案頭有顧某所定丸方用藥四十味皆貴重溫補及血肉之品蓋其病在絡不在臟腑故服此如膠似漆之藥僅能錮疾成廢而無性命之虞也聞辛亥春許辛泉患類中諸醫僉從虛治孟英診脈沉滑而數且體厚苔黃亟宜化痰清熱疏方畢人皆不以為然惟其子秋蘆極佩服云五年前家父患恐懼多疑曾屈診視方案猶存若合符節只因家父性喜溫補前之病根不拔釀成今日之疴先生卓見不可及也奈病者依然不悟不刈根株延至壬子夏復中而殞年未五旬也並識之以為不究病情好服溫補者鑑孫位申令正左內踝患一瘡外科敷割雜治兩月漸至瘡色黑陷食減神疲寒熱時形痛無停晷始延孟英診之脈象弦細無神曰此營陰大虧之證余於外科雖疏然初起既無寒熱患處亦不紅腫其非火毒可知並不流膿虛象更著始則攻散劫津繼則溫托壅氣妄施敷割真是好肉剜成瘡矣況病在下焦素患肝鬱耆茸芎歸益令陽浮兩腿不溫豈為真冷亟煎蔥湯將患處洗淨切勿再行鉤割以生附子杵爛貼湧泉穴引火下行患處日用蔥湯溫洗方用血餘當歸冬蟲夏草枸杞牛膝蓯蓉豬膚藕白蒲桃干煎服五劑寒熱全休腿溫安穀黑處轉紫痛減脈和旬日後紫轉為紅陷處日淺始令以珍珠八寶丹糝之匝月而肌生體泰家嫂患疥遍身外科治之不愈且形瘦而左臂痠疼不能舉孟英按脈弦洪而數授清肝滌暑之劑旬余而愈又聞治一妊婦患疥瘍科治而弗愈以壽靈寺所售瘡藥搽之遂渾身壯熱膚赤神昏陰戶疼腫尤為慘酷氣逆不飢徹夜無寐醫皆無策延孟英視之脈甚洪數舌絳無苔四肢拘攣溲熱如火乃暑火證而復為毒烈燥熱之藥助其虐也誰謂外治不比內服可以擅用哉與大劑銀花元參石膏甘草梔子鮮生地竹葉蓮子心菊葉冬瓜皮絲瓜絡西瓜翠衣而以緑豆黑豆煮清湯煎藥服三帖膚淡神清略進稀粥又三帖熱退始盡四肢漸舒浹旬腫盡消周身膚蛻如蛇皮而愈應氏婦年逾四旬去年難産後患左目無光火升心悸諸治不效所親沈玉庭囑延孟英治之豫集靈膏合甘麥大棗湯以峻滋肝腎之陰而愈細君上年病後以清養藥熬膏服至歲杪已康復勝常孟春十八日分娩亦快健七日後余即遊武林繼返硤川由梅溪而遊嘉秀至清明歸為展墓也知其左乳裂疼乳房亦癢搔即水出起已月餘初謂外恙不足慮令取瘍科善藥敷之余復鼓棹遊梅涇而至檇李又浮海由崇沙逮歸已屆端陽矣見有右目胞坍而甚赤詢其乳患左加甚而更及於右諸藥久敷皆不見效且兼氣衝痰嗽口渴膚糙蓋津液悉從外患而耗也察其脈滑而數良由肺胃熱熾使然遂授元參石膏知翹甘苡蔞梔菖菊蛤殼銀花等二十餘劑而各恙並蠲既而余遊吳越間者月餘歸見其遍身暑癤形瘦少餐食後神疲二便不暢脈則弦澀不調與元參絲瓜絡梔連菖橘蔞菀薇蘇四帖而經月之病若失亦因氣鬱熱壅也可見治病必探其源勿徒遏其流而故人菅君榮棠嘗為外證不宜服藥蓋為服不得其當及信書太過泥用成方者言耳若宣氣清血之法原不禁也仲秋偶覺左乳微疼按之更甚始知有堅核如小豆大外微腫即取外科藥圍塗而以紙蓋之逮藥干揭之甚痛余不能忍且僉云必破而不易收功以其在乳盤之內也余不畏死而懼不能受此楚毒因往求呂君慎庵視之曰無慮也掃榻款留日以蔥白寸許嵌入梅花點舌丹一粒旋覆花三錢煎湯下外用洄溪束毒圍方載潛齋醫話圍之亦以紙蓋之而藥干自然脫落略無黏肉伐毛之苦此玉精炭之妙用也凡十二日核漸消盡深佩呂君之德謹録之以識其手眼之不可及而方藥之效驗俾後人亦有所徵信也余襁褓時患瀉經年逮三歲種痘而痘科不知其天花已將出也復以苗助之遂及於險先慈抱而膝行於床者五晝夜賴任六嘉先生救全因而體氣甚弱童年畏勞稍動即鼻衄故恆靜坐十二歲夏間患溫甚劇父母深憂之病中見諸神將相謂曰此一路福星也遂醒而汗出以瘳失怙後遠遊於婺遵母氏之訓諸凡謹慎弱冠後衄病始痊隆冬可不挾纊但略犯生冷即便瀉偶食煿則咽痛己丑受室甲午舉家患疫悉余治愈既而自病甚危夢一淡妝中年婦人持盒貯紅藥一丸以藥納余口中而去乃大汗而寤口中尚有藥香病即已復因作勞太早突然暈去余妹甫十七歲泣禱於天欲刲股以救而余已醒妹因卒嚇吐血至今思之愧無以報也嗣後冬始衣絮壬寅病痁熱盛時夢日月並麗於天而有帶下垂余手挽兩帶而撼之日月皆動遂驚醒出汗而愈丙午酷熱而酬應甚繁始患滿額暑瘍續患痢又患瘧熱時輒夢御風而行告愈之時凌虛上至霄漢忽墜淵一浴汗出如湧而蘇丁未續娶己酉夏錢塘沈悅亭茂才邀視陳茂才疫症勢已垂危余初不知其兼患黴瘡也略不經意吸其穢毒歸而即病雖服故孝子張君養之之方而愈時夢身化異物遍體鱗甲遊泳深淵騰雲而上余體冬夏皆涼而性嗜魚內子嘗謂余為水族降生有以夫適雨聲如注而覺汗如沐雨而天雨竟數日不止江浙因以成災亦奇矣哉此後始衣帛乙卯挈眷回籍丙辰秋杪病於省寓十月初六夜夢法華山備冠服輿從迎余赴職余即欣然冠帶而去出錢塘門過昭慶寺見老少婦女數百人持香攔阻因停輿已而東嶽傳令送歸余遂返寓甫到門一跌而寤此夢則更奇也究不知後來何如嗟乎幸而免者屢矣附録於此以存夢境清賢醫案惟孟英案最為善本因葉天士等醫案編者不善選擇治效各案與未效各案兼收並蓄讀者頗難判別惟王孟英案編印時孟英及身親見且最後之歸硯録為孟英自作所録各案絶無一案不效者讀者因見症之精確悟撰方之靈巧進退變化不越規矩準繩故讀此書勝讀名家醫案多多也後學者青浦陸士諤謹識
