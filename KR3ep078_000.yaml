front:
  text: 序王孟英醫案有初編續編三編之分編者不一其人而歸硯録則孟英自編者也余性鈍讀古人書苦難記憶而原書編年紀録檢查又甚感不便因於診余之暇分類手録藉與同學講解外感統屬六淫故風溫濕溫間有編入外感門者夫孟英之學得力於樞機氣化故其為方於升降出入手眼頗有獨到而治伏氣諸病從裡外逗尤為特長大抵用輕清流動之品疏動其氣機微助其升降而邪已解矣此其法雖宗香岩葉氏而靈巧鋭捷竟有葉氏所未逮者余嘗謂孟英於仲景傷寒論小柴胡湯麻黃附子細辛湯諸方必極深窮研深有所得故師其意不泥其迹投無不效捷若桴鼓讀者須識其認證之確立方之巧勿徒賞其用藥之輕庶有獲乎民國十年五月青浦陸士諤序於松江醫室序青浦陸君士諤名醫也其治症聞聲望色察脈問證洞見臟腑燭照彌遺就診者無不嘆為神技而不知君固苦心得之也余以善病喜讀醫籍去年冬購得醫學南針讀之大好因想見陸君之為人余左脅有塊作痛患已逾年歷經中西名醫診治藥日投而病日劇乃搭車赴松江訪陸君君一診即曰病雖在氣患已及血余告以病起由乎積食陸君曰食入於胃化行於脾今飲啖如常脾胃足徵無病凡氣分之病臌脹浮腫皆不見痛君病在血分也立方當歸川芎白芍香附柴胡潞黨紅棗寥寥七味一劑知三劑病若失因與君暢談醫藥並及近代名流君於王孟英氏最為推服余曰孟英果然名家可惜偏於寒涼讀潛齋書者每每不敢用溫藥君曰孟英用藥何嘗獨遺溫熱其寒涼方救逆之案為多檢其全書用附桂乾薑之方有一十九案可知藥貴對證王氏亦絶無成見也大抵當時醫家喜用溫補王氏所診病病者十之四病藥者十之六讀書者不知研求自然有偏任寒涼之弊矣因出其自編之孟英醫案分類排比眉目朗然余不禁狂喜勸之發刊君曰孟英原案猶資治通鑑余此編猶紀事本末不過自備檢查爾何足問世余曰初學得此因證檢方得見孟英之手眼未始非君之功也陸君頗韙余言余因草其緣起即為之序民國十年五月金陵哈守梅拜序
